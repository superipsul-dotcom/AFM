    const effUnitPrice = (it) => {

    function computeBuildup(est) {
      const items = est.items || [];
      let directMaterial = 0, directLabor = 0, subMaterial = 0;
      items.forEach((it) => {
        const q = Number(it.qty) || 0;
        directMaterial += Math.round(q * (Number(it.material_price) || 0));
        directLabor += Math.round(q * (Number(it.labor_price) || 0));
        subMaterial += Math.round(q * (Number(it.sub_price) || 0));
      });
      const r = (k) => (est[k] != null ? Number(est[k]) : BUILDUP_DEFAULTS[k]);
      const indirectMaterial = Math.round(directMaterial * r('indirect_material_rate'));
      const indirectLabor = Math.round(directLabor * r('indirect_labor_rate'));
      const materialSum = directMaterial + indirectMaterial;

      const expenseSum = subMaterial + safetyIns + employIns + safetyMgmt + otherExp;
      const primeCost = materialSum + laborSum + expenseSum;
      const admin = Math.round(primeCost * r('admin_rate'));

      const afterDiscount = Math.max(0, constructionTotal - discount);
      const roundUnit = Math.max(0, Math.round(r('round_unit')));
      const proposed = roundUnit > 0 ? Math.floor(afterDiscount / roundUnit) * roundUnit : afterDiscount;
      return {
        directMaterial, indirectMaterial, materialSum, directLabor, indirectLabor, laborSum,
        subMaterial, safetyIns, employIns, safetyMgmt, otherExp, expenseSum, primeCost,
        admin, design, profit, constructionTotal, proposed,
      };
    }

      const items = est.items || [];

      const discount = Math.max(0, Math.round(Number(est.discount) || 0));
      const applyVat = (supplyBase) => {
        let supplyAmount, vat, total;
        if (mode === 'inclusive') { total = supplyBase; supplyAmount = Math.round(total / (1 + rate)); vat = total - supplyAmount; }
        else if (mode === 'none') { supplyAmount = supplyBase; vat = 0; total = supplyBase; }

        return { supplyAmount, vat, total };

      num = Math.round(Number(num) || 0);
      if (num === 0) return '영';
      const neg = num < 0; num = Math.abs(num);
      const digits = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
      const small = ['', '십', '백', '천'];
      const big = ['', '만', '억', '조', '경'];
      let result = '', gi = 0, n = num;
      while (n > 0) {
        const group = n % 10000;
        if (group > 0) {
          let gs = '', g = group;
          for (let i = 0; i < 4; i++) { const d = g % 10; if (d > 0) gs = digits[d] + small[i] + gs; g = Math.floor(g / 10); }
          result = gs + big[gi] + result;

        n = Math.floor(n / 10000); gi++;
      }
      return (neg ? '마이너스 ' : '') + result;
    }

    // ========================================
    // 클라이언트 계산 (폴백 summary / 분석)
    // ========================================
    function computeSummary(site, costs, estimates, schedule) {
      const budget = Number(site.budget) || 0;
      const spent = costs.reduce((s, c) => s + (Number(c.amount) || 0), 0);
      const remaining = budget - spent;
      const rate = budget > 0 ? spent / budget : null;

      const catMap = {}, procMap = {};
      costs.forEach((c) => {
        const amt = Number(c.amount) || 0;
        catMap[c.category] = (catMap[c.category] || 0) + amt;
        if (c.process) procMap[c.process] = (procMap[c.process] || 0) + amt;
      });
      const byCategory = Object.entries(catMap).map(([category, total]) => ({ category, total }));
      const byProcess = Object.entries(procMap).map(([process, total]) => ({ process, total }));

      const today = todayStr();
      const totalDays = daysBetween(site.start_date, site.end_date);
      let elapsedDays = null, remainingDays = null, progressRate = null, dday = null;
      if (site.start_date && site.end_date && totalDays != null) {
        const elapsedRaw = daysBetween(site.start_date, today);
        elapsedDays = Math.max(0, Math.min(elapsedRaw, totalDays));
        remainingDays = daysBetween(today, site.end_date);
        progressRate = totalDays > 0 ? elapsedDays / totalDays : null;
        dday = daysBetween(today, site.end_date);
      }
      // ── v2: 견적(확정) 대비 계획 + 일정 집계 ──
      let estimateTotal = null, byProcessPlan = [];
      const confirmed = (estimates || []).filter((e) => e.status === 'confirmed');
      if (confirmed.length > 0) {
        const latest = confirmed.slice().sort((a, b) => (a.created_at < b.created_at ? 1 : -1))[0];
        estimateTotal = computeTotals(latest).total;
        const pm = {};
        (latest.items || []).forEach((it) => {
          const p = it.process || '미분류';
          pm[p] = (pm[p] || 0) + calcItemAmount(it.qty, it.unit_price);
        });
        byProcessPlan = Object.entries(pm).map(([process, total]) => ({ process, total }));
      }
      const sch = schedule || [];
      const scheduleAgg = {
        taskCount: sch.length,
        plannedTotal: sch.reduce((s, t) => s + (Number(t.planned_cost) || 0), 0),
        doneCount: sch.filter((t) => t.status === '완료').length,
      };

      return {
        budget, spent, remaining, rate, byCategory, byProcess,
        schedule: { start_date: site.start_date, end_date: site.end_date, totalDays, elapsedDays, remainingDays, progressRate, dday },
        estimateTotal, byProcessPlan, scheduleAgg,
      };
    }

    // 월별 집행 추이: [{ month:'YYYY-MM', total }]
    function computeMonthly(costs) {
      const map = {};
      costs.forEach((c) => {
        const m = (c.date || '').slice(0, 7);
        if (!m) return;
        map[m] = (map[m] || 0) + (Number(c.amount) || 0);
      });
      return Object.entries(map).map(([month, total]) => ({ month, total })).sort((a, b) => (a.month < b.month ? -1 : 1));
    }

    const api = {
      _useMock: false,

      async _tryFetch(url, opts) {
        const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
        if (!res.ok) {
          let msg = 'HTTP ' + res.status;
          try { const j = await res.json(); if (j && j.error) msg = j.error; else if (j && j.message) msg = j.message; } catch {}
          const err = new Error(msg); err.status = res.status; throw err;
        }
        return res.json();
      },

      _ensureSeed() {
        if (!localStorage.getItem(SITES_KEY)) seedSites();
        return sitesStore.read();
      },

      _sortSites(list) {
        return [...list].sort((a, b) => (a.created_at < b.created_at ? 1 : -1));
      },
      _sortCosts(list) {
        return [...list].sort((a, b) => {
          if (a.date !== b.date) return a.date < b.date ? 1 : -1;
          return (a.created_at < b.created_at) ? 1 : -1;
        });
      },
      // (v4) 현장 목록 경량 롤업 — spent(비용합)/estimateTotal(확정견적) + 신규 7필드 정규화 (폴백 클라이언트 집계)
      _rollupSites(list) {
        const allCosts = costsStore.read();
        const allEst = estimatesStore.read();
        return list.map((s) => {
          const spent = allCosts.filter((c) => String(c.site_id) === String(s.id)).reduce((a, c) => a + (Number(c.amount) || 0), 0);
          const confirmed = allEst.filter((e) => String(e.site_id) === String(s.id) && e.status === 'confirmed');
          let estimateTotal = null;
          if (confirmed.length) {
            const latest = confirmed.slice().sort((a, b) => (a.created_at < b.created_at ? 1 : -1))[0];
            estimateTotal = computeTotals(latest).total;
          }
          return {
            ...s,
            building_type: s.building_type || '',
            floor_area: Number(s.floor_area) || 0,
            move_in_date: s.move_in_date || null,
            pm: s.pm || '', construction_manager: s.construction_manager || '', designer: s.designer || '',
            progress_status: PROGRESS_STATES.includes(s.progress_status) ? s.progress_status : '준비',
            spent, estimateTotal,
          };
        });
      },

          const x = estimatesStore.read().find((y) => String(y.id) === String(id));
          if (!x) { const err = new Error('견적을 찾을 수 없습니다.'); err.status = 404; throw err; }
          const items = (x.items || []).slice().sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
          return { ...x, items, totals: computeTotals(x) };
        }
      },
      _normItems(items) {
        return (items || []).filter((it) => (it.name || '').trim()).map((it, i) => {
          const m = Math.round(Number(it.material_price) || 0);
          const l = Math.round(Number(it.labor_price) || 0);
          const s = Math.round(Number(it.sub_price) || 0);
          // 3분할 중 하나라도 있으면 합산단가, 아니면 입력 단가 (CONTRACT v3 호환)
          const up = (m || l || s) ? (m + l + s) : Math.round(Number(it.unit_price) || 0);
          return {
            id: it.id || uid(), trade: it.trade || '', process: it.process || '', name: it.name, spec: it.spec || '',
            qty: Number(it.qty) || 0, unit: it.unit || '',
            material_price: m, labor_price: l, sub_price: s, unit_price: up, amount: calcItemAmount(it.qty, up),
            catalog_id: it.catalog_id != null ? it.catalog_id : null,
            memo: it.memo || '', sort_order: it.sort_order != null ? it.sort_order : i,
          };
        });
      },
      // (v3) 견적 헤더의 원가계산서 가정값 추출 (미전달 시 DEFAULT)
      _buildupHeader(body) {
        const out = { use_cost_buildup: !!body.use_cost_buildup };
        Object.keys(BUILDUP_DEFAULTS).forEach((k) => {
          out[k] = body[k] != null ? Number(body[k]) : BUILDUP_DEFAULTS[k];
        });
        return out;
      },
      async createEstimate(siteId, body) {
        try { const d = await this._tryFetch(`${API_BASE_URL}/sites/${siteId}/estimates`, { method: 'POST', body: JSON.stringify(body) }); this._useMock = false; return d; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          const item = {
            id: uid(), site_id: siteId, title: body.title || '견적서', client_name: body.client_name || '',
            client_contact: body.client_contact || '', estimate_date: body.estimate_date || todayStr(),
            valid_until: body.valid_until || '', vat_mode: body.vat_mode || 'exclusive',
            vat_rate: body.vat_rate != null ? Number(body.vat_rate) : 0.10, discount: Math.round(Number(body.discount) || 0),
            ...this._buildupHeader(body),
            status: 'draft', memo: body.memo || '', items: this._normItems(body.items), created_at: new Date().toISOString(),
          };
          estimatesStore.write([...estimatesStore.read(), item]);
          return { ...item, totals: computeTotals(item) };
        }
      },
      async updateEstimate(id, body) {
        try { const d = await this._tryFetch(`${API_BASE_URL}/estimates/${id}`, { method: 'PUT', body: JSON.stringify(body) }); this._useMock = false; return d; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          const list = estimatesStore.read();
          const cur = list.find((x) => String(x.id) === String(id));
          if (!cur) { const err = new Error('견적을 찾을 수 없습니다.'); err.status = 404; throw err; }
          const upd = {
            ...cur, title: body.title || '견적서', client_name: body.client_name || '', client_contact: body.client_contact || '',
            estimate_date: body.estimate_date || cur.estimate_date, valid_until: body.valid_until || '',
            vat_mode: body.vat_mode || 'exclusive', vat_rate: body.vat_rate != null ? Number(body.vat_rate) : 0.10,
            discount: Math.round(Number(body.discount) || 0), ...this._buildupHeader(body),
            memo: body.memo || '', items: this._normItems(body.items),
          };
          estimatesStore.write(list.map((x) => (String(x.id) === String(id) ? upd : x)));
          return { ...upd, totals: computeTotals(upd) };
        }
      },
      async removeEstimate(id) {
        try { await this._tryFetch(`${API_BASE_URL}/estimates/${id}`, { method: 'DELETE' }); this._useMock = false; return { success: true }; }
        catch (e) { if (e.status) throw e; this._useMock = true; estimatesStore.write(estimatesStore.read().filter((x) => String(x.id) !== String(id))); return { success: true }; }
      },
      async confirmEstimate(id) {
        try { const d = await this._tryFetch(`${API_BASE_URL}/estimates/${id}/confirm`, { method: 'POST' }); this._useMock = false; return d; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          const list = estimatesStore.read();
          const cur = list.find((x) => String(x.id) === String(id));
          if (!cur) { const err = new Error('견적을 찾을 수 없습니다.'); err.status = 404; throw err; }
          const upd = { ...cur, status: 'confirmed' };
          estimatesStore.write(list.map((x) => (String(x.id) === String(id) ? upd : x)));
          const totals = computeTotals(upd);
          let site = null;
          if (cur.site_id != null) {
            const sites = sitesStore.read();
            const ns = sites.map((s) => (String(s.id) === String(cur.site_id) ? { ...s, budget: totals.total } : s));
            sitesStore.write(ns); site = ns.find((s) => String(s.id) === String(cur.site_id)) || null;
          }
          return { estimate: { ...upd, items: upd.items, totals }, site };
        }
      },
      async unconfirmEstimate(id) {
        try { const d = await this._tryFetch(`${API_BASE_URL}/estimates/${id}/unconfirm`, { method: 'POST' }); this._useMock = false; return d; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          const list = estimatesStore.read();
          const cur = list.find((x) => String(x.id) === String(id));
          if (!cur) { const err = new Error('견적을 찾을 수 없습니다.'); err.status = 404; throw err; }
          const upd = { ...cur, status: 'draft' };
          estimatesStore.write(list.map((x) => (String(x.id) === String(id) ? upd : x)));
          return { estimate: { ...upd, totals: computeTotals(upd) } };
        }
      },

      // ════════ v3: 단가 카탈로그 (catalog) ════════
      async listTrades() {
        try { const d = await this._tryFetch(`${API_BASE_URL}/catalog/trades`); this._useMock = false; return d; }
        catch (e) { if (e.status) throw e; this._useMock = true; return TRADE_MASTER.slice(); }
      },
      async listCatalog({ trade, q, all, limit } = {}) {
        const qs = [];
        if (trade) qs.push('trade=' + encodeURIComponent(trade));
        if (q) qs.push('q=' + encodeURIComponent(q));
        if (all) qs.push('all=1');
        if (limit) qs.push('limit=' + limit);
        const suffix = qs.length ? '?' + qs.join('&') : '';
        try { const d = await this._tryFetch(`${API_BASE_URL}/catalog${suffix}`); this._useMock = false; return d; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          let list = ensureCatalog();
          if (!all) list = list.filter((c) => c.active !== false);
          if (trade) list = list.filter((c) => c.trade === trade);
          if (q) {
            const needle = String(q).toLowerCase();
            list = list.filter((c) => [c.name, c.grp, c.product_name, c.vendor].some((f) => String(f || '').toLowerCase().includes(needle)));
          }
          const cap = Math.min(Number(limit) || 200, 1000);
          return list
            .map((c) => ({ ...c, material_price: Number(c.material_price) || 0, labor_price: Number(c.labor_price) || 0, sub_price: Number(c.sub_price) || 0 }))
            .sort((a, b) => (a.trade !== b.trade ? (a.trade < b.trade ? -1 : 1) : (a.name < b.name ? -1 : 1)))
            .slice(0, cap);
        }
      },
      async createCatalog(body) {
        try { const d = await this._tryFetch(`${API_BASE_URL}/catalog`, { method: 'POST', body: JSON.stringify(body) }); this._useMock = false; return d; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          if (!body.trade || !body.name) { const err = new Error('공종과 품목명은 필수입니다.'); err.status = 400; throw err; }
          const item = {
            id: uid(), trade: body.trade, grp: body.grp || '', name: body.name, unit: body.unit || '',
            material_price: Math.round(Number(body.material_price) || 0), labor_price: Math.round(Number(body.labor_price) || 0), sub_price: Math.round(Number(body.sub_price) || 0),
            product_name: body.product_name || '', vendor: body.vendor || '', code: body.code || '', active: true, created_at: new Date().toISOString(),
          };
          catalogStore.write([...ensureCatalog(), item]); return item;
        }
      },
      async updateCatalog(id, body) {
        try { const d = await this._tryFetch(`${API_BASE_URL}/catalog/${id}`, { method: 'PUT', body: JSON.stringify(body) }); this._useMock = false; return d; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          const patch = { ...body };
          ['material_price', 'labor_price', 'sub_price'].forEach((k) => { if (patch[k] != null) patch[k] = Math.round(Number(patch[k]) || 0); });
          const next = ensureCatalog().map((c) => (String(c.id) === String(id) ? { ...c, ...patch } : c));
          catalogStore.write(next); return next.find((c) => String(c.id) === String(id));
        }
      },
      async removeCatalog(id) {
        try { await this._tryFetch(`${API_BASE_URL}/catalog/${id}`, { method: 'DELETE' }); this._useMock = false; return { success: true }; }
        catch (e) { if (e.status) throw e; this._useMock = true; catalogStore.write(ensureCatalog().filter((c) => String(c.id) !== String(id))); return { success: true }; }
      },
    };

      const base = 'inline-flex items-center justify-center font-semibold rounded-xl transition focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-400',
        secondary: 'bg-slate-200 text-slate-700 hover:bg-slate-300 focus:ring-slate-400',
        danger: 'bg-red-600 text-white hover:bg-red-700 focus:ring-red-400',
        ghost: 'bg-transparent text-slate-600 hover:bg-slate-100 focus:ring-slate-300',
      };
      const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2.5 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

              ${error ? 'border-red-400 ring-1 ring-red-300' : 'border-slate-300'} ${className}`}

    // 드롭다운 + 자유입력 (마스터 기반 셀렉트 + 직접 입력 fallback)
    function Combo({ label, value, onChange, options = [], error, className = '', placeholder, ...props }) {
      const listId = useMemo(() => 'dl-' + uid(), []);

    function Card({ className = '', children }) {
