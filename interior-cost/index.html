    // (v8) 물량(takeoff) 불러오기 모달 — 현재 현장 물량 목록 다중 선택 → 견적 행으로 추가
    function TakeoffPickerModal({ isOpen, onClose, siteId, onAdd }) {
      const [list, setList] = useState([]);
      const [loading, setLoading] = useState(false);
      const [sel, setSel] = useState(() => new Set());
      const [q, setQ] = useState('');
      useEffect(() => {
        if (!isOpen) { setSel(new Set()); setQ(''); return; }
        let alive = true; setLoading(true);
        api.listTakeoff(siteId)
          .then((d) => { if (alive) setList(Array.isArray(d) ? d : []); })
          .catch(() => { if (alive) setList([]); })
          .finally(() => { if (alive) setLoading(false); });
        return () => { alive = false; };
      }, [isOpen, siteId]);
      const filtered = useMemo(() => {
        const n = q.trim().toLowerCase();
        if (!n) return list;
        return list.filter((t) => [t.name, t.trade, t.spec, t.unit].some((f) => String(f || '').toLowerCase().includes(n)));
      }, [list, q]);
      const toggle = (id) => setSel((s) => { const x = new Set(s); x.has(id) ? x.delete(id) : x.add(id); return x; });
      const allSel = filtered.length > 0 && filtered.every((t) => sel.has(t.id));
      const toggleAll = () => setSel((s) => { const x = new Set(s); if (allSel) filtered.forEach((t) => x.delete(t.id)); else filtered.forEach((t) => x.add(t.id)); return x; });
      const confirm = () => { const picked = list.filter((t) => sel.has(t.id)); onAdd(picked); };
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="📐 물량 불러오기 (스케치업·실측)" size="xl">
          <div className="space-y-3">
            <p className="text-[11px] text-slate-400">선택한 물량을 견적 행으로 추가합니다. 공종/품목/규격/단위/수량이 채워지고 <b>단가는 카탈로그/수동 입력</b>으로 넣으세요.</p>
            <div className="flex flex-col sm:flex-row gap-2">
              <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="품목·공종·규격 검색"
                className="flex-1 px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
              {filtered.length > 0 && (
                <button type="button" onClick={toggleAll} className="px-3 py-2 rounded-lg border border-slate-200 bg-slate-50 hover:bg-slate-100 text-sm text-slate-600 whitespace-nowrap">
                  {allSel ? '전체 해제' : '전체 선택'}
                </button>
              )}
            </div>
            <div className="flex items-center justify-between text-xs text-slate-400">
              <span>{loading ? '불러오는 중…' : `${fmtNum(filtered.length)}개 물량`}</span>
              <span>{sel.size > 0 ? `${sel.size}개 선택됨` : '항목을 체크하세요'}</span>
            </div>
            <div className="border border-slate-100 rounded-xl overflow-hidden">
              {loading ? (
                <div className="p-8 text-center text-sm text-slate-400">불러오는 중…</div>
              ) : filtered.length === 0 ? (
                <div className="p-8 text-center text-sm text-slate-400">
                  {list.length === 0 ? '등록된 물량이 없습니다. 아래 “물량 산출(Takeoff)” 섹션에서 추가하거나 스케치업에서 가져오세요.' : '검색 결과가 없습니다.'}
                </div>
              ) : (
                <ul className="divide-y divide-slate-100 max-h-[46vh] overflow-y-auto">
                  {filtered.map((t) => {
                    const on = sel.has(t.id);
                    return (
                      <li key={t.id}>
                        <button type="button" onClick={() => toggle(t.id)} className={`w-full text-left px-3 py-2.5 transition flex items-center gap-3 ${on ? 'bg-blue-50' : 'hover:bg-slate-50'}`}>
                          <input type="checkbox" readOnly checked={on} className="w-4 h-4 shrink-0 accent-blue-600 pointer-events-none" />
                          <div className="min-w-0 flex-1">
                            <div className="flex items-center gap-2 flex-wrap">
                              {t.trade && <span className="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium text-white shrink-0" style={{ backgroundColor: tradeHex(t.trade) }}>{t.trade}</span>}
                              <span className="font-medium text-slate-800 truncate">{t.name}</span>
                              <span className={`text-[10px] px-1.5 py-0.5 rounded shrink-0 ${t.source === 'sketchup' ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-500'}`}>{t.source === 'sketchup' ? '스케치업' : '수기'}</span>
                            </div>
                            {(t.spec || t.memo) && <p className="mt-0.5 text-[11px] text-slate-400 truncate">{[t.spec, t.memo].filter(Boolean).join(' · ')}</p>}
                          </div>
                          <span className="font-bold text-slate-700 shrink-0 whitespace-nowrap">{fmtNum(t.qty)} {t.unit || ''}</span>
                        </button>
                      </li>
                    );
                  })}
                </ul>
              )}
            </div>
            <div className="flex justify-end gap-2 pt-1">
              <Button variant="secondary" onClick={onClose}>닫기</Button>
              <Button onClick={confirm} disabled={sel.size === 0}>선택한 {sel.size > 0 ? sel.size + '개 ' : ''}견적 행으로 추가</Button>
            </div>
          </div>
        </Modal>
      );
    }

    // (v3) 공종별 그룹 소계 (총괄표)
    function TradeSubtotals({ items }) {
      const groups = useMemo(() => {
        const m = {};
        (items || []).forEach((it) => {
          if (!(it.name || '').trim()) return;
          const t = it.trade || it.process || '미분류';
          m[t] = (m[t] || 0) + (Number(it.amount) || 0);
        });
        return Object.entries(m).map(([trade, total]) => ({ trade, total })).sort((a, b) => b.total - a.total);
      }, [items]);
      const total = groups.reduce((s, g) => s + g.total, 0);
      if (groups.length === 0) return null;
      return (
        <Card className="p-4">
          <h3 className="text-sm font-bold text-slate-700 mb-3">공종별 소계 (총괄)</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <tbody className="divide-y divide-slate-100">
                {groups.map((g) => {
                  const pct = total > 0 ? Math.round((g.total / total) * 100) : 0;
                  return (
                    <tr key={g.trade}>
                      <td className="py-1.5 pr-3">
                        <span className="inline-flex items-center gap-1.5">
                          <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: tradeHex(g.trade) }}></span>
                          <span className="text-slate-700 font-medium">{g.trade}</span>
                        </span>
                      </td>
                      <td className="py-1.5 pr-3 text-right text-slate-400 w-12">{pct}%</td>
                      <td className="py-1.5 text-right font-semibold text-slate-700 whitespace-nowrap">{fmtWon(g.total)}</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr className="border-t-2 border-slate-200">
                  <td className="py-2 pr-3 font-bold text-slate-700">합계 (직접공사비)</td>
                  <td></td>
                  <td className="py-2 text-right font-extrabold text-slate-800 whitespace-nowrap">{fmtWon(total)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </Card>
      );
    }

                    {totals.discount > 0 && <div className="flex items-center justify-between py-1"><span className="text-sm text-red-500">할인</span><span className="font-medium text-red-500">- {fmtWon(totals.discount)}</span></div>}
                    <div className="mt-1 pt-1 border-t border-slate-200"><BuildupRow label="제안가 (라운딩)" value={b.proposed} accent /></div>

    function EstimateEditor({ site, initial, trades, procNames, onSave, onConfirm, onUnconfirm, onDelete, onPrint, onClose, onDuplicate }) {
      const toast = useToast();
      const ps = (n) => (Number(n) ? String(Number(n)) : '');
      const mk = () => ({ _k: uid(), trade: '', name: '', spec: '', unit: '', qty: '1', material_price: '', labor_price: '', sub_price: '', memo: '', catalog_id: null });
      const isSaved = !!(initial && initial.id);
      const confirmed = !!(initial && initial.status === 'confirmed');
      const version = (initial && Number(initial.version)) || 1; // v18 견적 버전
      const [shareOpen, setShareOpen] = useState(false); // v17: 공유 모달
      const [header, setHeader] = useState(() => {
        const h = {
          title: (initial && initial.title) || '', // v18: 비우면 저장 시 자동명명
          client_name: (initial && initial.client_name) || (site && site.client) || '',
          client_contact: (initial && initial.client_contact) || '',
          estimate_date: (initial && initial.estimate_date) || todayStr(),
          valid_until: (initial && initial.valid_until) || '',
          vat_mode: (initial && initial.vat_mode) || 'exclusive',
          vat_rate: (initial && initial.vat_rate != null) ? Number(initial.vat_rate) : 0.10,
          discount: (initial && initial.discount != null) ? String(initial.discount) : '0',
          memo: (initial && initial.memo) || '',
          use_cost_buildup: !!(initial && initial.use_cost_buildup),
        };
        Object.keys(BUILDUP_DEFAULTS).forEach((k) => {
          h[k] = (initial && initial[k] != null) ? Number(initial[k]) : BUILDUP_DEFAULTS[k];
        });
        return h;
      });
      const [items, setItems] = useState(
        (initial && initial.items && initial.items.length)
          ? initial.items.map((it) => {
            const hasSplit = (Number(it.material_price) || 0) || (Number(it.labor_price) || 0) || (Number(it.sub_price) || 0);
            return {
              _k: uid(),
              trade: it.trade || it.process || '', name: it.name || '', spec: it.spec || '', unit: it.unit || '',
              qty: String(it.qty != null ? it.qty : ''),
              // 레거시 v2 단가는 재료비단가로 이관(편집/표시 가능)
              material_price: ps(hasSplit ? it.material_price : it.unit_price),
              labor_price: ps(it.labor_price), sub_price: ps(it.sub_price),
              memo: it.memo || '', catalog_id: it.catalog_id != null ? it.catalog_id : null,
            };
          })
          : [mk()]
      );
      const [saving, setSaving] = useState(false);
      const [picker, setPicker] = useState({ open: false, targetIdx: null });
      const [takeoffOpen, setTakeoffOpen] = useState(false); // v8 물량 불러오기 모달
      const setItem = (idx, patch) => setItems((arr) => arr.map((it, i) => (i === idx ? { ...it, ...patch } : it)));
      const addRow = () => setItems((arr) => [...arr, mk()]);
      const delRow = (idx) => setItems((arr) => (arr.length <= 1 ? [mk()] : arr.filter((_, i) => i !== idx)));
      // (v6-2) 행 이동은 공종 그룹 내부에서만 — moveInGroup 으로 대체
      // 카탈로그 항목 → 행 채우기
      const pickCatalog = (c) => {
        const patch = {
          trade: c.trade || '', name: c.name || '', unit: c.unit || '',
          spec: c.product_name || c.grp || '',
          material_price: ps(c.material_price), labor_price: ps(c.labor_price), sub_price: ps(c.sub_price),
          catalog_id: c.id != null ? c.id : null,
        };
        if (picker.targetIdx == null) {
          setItems((arr) => [...arr, { _k: uid(), qty: '1', memo: '', ...patch }]);
          toast(`'${c.name}' 추가됨`, 'success');
        } else {
          setItem(picker.targetIdx, patch);
          setPicker({ open: false, targetIdx: null });
        }
      };
      // (v8) 물량(takeoff) 선택 항목들 → 견적 행으로 추가 (단가는 0/수동 — 카탈로그·직접입력으로 채움)
      const addTakeoffRows = (picked) => {
        setTakeoffOpen(false);
        if (!picked || !picked.length) return;
        setItems((arr) => [
          ...arr,
          ...picked.map((t) => ({
            _k: uid(), trade: t.trade || '', name: t.name || '', spec: t.spec || '', unit: t.unit || '',
            qty: String(t.qty != null ? t.qty : ''),
            material_price: '', labor_price: '', sub_price: '', // 단가 미정 → 수동/카탈로그 입력
            memo: t.memo || '', catalog_id: null,
          })),
        ]);
        toast(`물량 ${picked.length}개를 견적 행으로 추가했습니다. 단가를 입력하세요.`, 'success');
      };
      const parseItem = (it, i) => {
        const m = Math.round(Number(it.material_price) || 0), l = Math.round(Number(it.labor_price) || 0), s = Math.round(Number(it.sub_price) || 0);
        const up = effUnitPrice({ material_price: m, labor_price: l, sub_price: s });
        return {
          trade: it.trade, process: it.trade, name: it.name, spec: it.spec, unit: it.unit,
          qty: Number(it.qty) || 0, material_price: m, labor_price: l, sub_price: s,
          unit_price: up, amount: calcItemAmount(it.qty, up), catalog_id: it.catalog_id, memo: it.memo, sort_order: i,
        };
      };
      const toEstimate = () => {
        const e = {
          title: header.title, client_name: header.client_name, client_contact: header.client_contact,
          estimate_date: header.estimate_date, valid_until: header.valid_until, vat_mode: header.vat_mode,
          vat_rate: Number(header.vat_rate), discount: Math.round(Number(header.discount) || 0), memo: header.memo,
          use_cost_buildup: header.use_cost_buildup,
          site_id: site && site.id, id: initial && initial.id, status: initial && initial.status,
          items: items.map(parseItem),
        };
        Object.keys(BUILDUP_DEFAULTS).forEach((k) => { e[k] = Number(header[k]); });
        return e;
      };
      const est = useMemo(() => toEstimate(), [items, header]);
      const totals = useMemo(() => computeTotals(est), [est]);
      // v18: 자동명명 미리보기(현장·견적일·현시각·담당자·버전). 저장 시 title 비었으면 이 값으로 채움(수정 가능).
      const autoName = () => buildEstimateAutoName({ siteName: site && site.name, estimateDate: header.estimate_date, manager: siteManagerName(site), clientName: header.client_name, version });
      const buildBody = () => {
        const e = toEstimate();
        const body = {
          title: (header.title && header.title.trim()) ? header.title.trim() : autoName(), client_name: header.client_name, client_contact: header.client_contact,
          estimate_date: header.estimate_date, valid_until: header.valid_until, vat_mode: header.vat_mode,
          vat_rate: Number(header.vat_rate), discount: Math.round(Number(header.discount) || 0), memo: header.memo,
          use_cost_buildup: header.use_cost_buildup,
          items: e.items.filter((it) => (it.name || '').trim()),
        };
        Object.keys(BUILDUP_DEFAULTS).forEach((k) => { body[k] = Number(header[k]); });
        return body;
      };
      const inputCls = 'w-full px-2 py-1.5 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300';
      const tradeBase = (trades && trades.length ? trades : TRADE_MASTER);

      // ── v6-2: 작성 중 자동 임시저장(draft) ──
      const draftKey = `interior_estimate_draft_${(site && site.id) || 'x'}_${(initial && initial.id) || 'new'}`;
      const [pendingDraft] = useState(() => { try { const r = localStorage.getItem(draftKey); return r ? JSON.parse(r) : null; } catch { return null; } });
      const [showDraftBanner, setShowDraftBanner] = useState(!!pendingDraft);
      const firstAutosave = useRef(true);
      useEffect(() => {
        if (firstAutosave.current) { firstAutosave.current = false; return; } // 진입 직후엔 저장 안 함(빈 draft 방지)
        const t = setTimeout(() => { try { localStorage.setItem(draftKey, JSON.stringify({ header, items, savedAt: new Date().toISOString() })); } catch (err) {} }, 600);
        return () => clearTimeout(t);
      }, [header, items]);
      const restoreDraft = () => {
        if (pendingDraft) { if (pendingDraft.header) setHeader(pendingDraft.header); if (pendingDraft.items) setItems(pendingDraft.items); }
        setShowDraftBanner(false); toast('임시저장을 복원했습니다.', 'success');
      };
      const ignoreDraft = () => setShowDraftBanner(false);
      const saveDraftManual = () => {
        try { localStorage.setItem(draftKey, JSON.stringify({ header, items, savedAt: new Date().toISOString() })); toast('임시저장했습니다.', 'success'); }
        catch (err) { toast('임시저장에 실패했습니다.', 'error'); }
      };
      const handleSave = async () => {
        setSaving(true); const ok = await onSave(buildBody()); setSaving(false);
        if (ok) { try { localStorage.removeItem(draftKey); } catch (err) {} setShowDraftBanner(false); } // 서버 저장 성공 시 draft 삭제
      };
      // v18: [새 버전으로 저장] — 현재 편집 내용을 먼저 저장(현재 버전 갱신) → 복제해 v(n+1) 새 견적 에디터로 오픈.
      const handleNewVersion = async () => {
        if (!isSaved || !onDuplicate) return;
        setSaving(true);
        const okSaved = await onSave(buildBody()); // 현재 내용을 현재 견적에 반영
        if (!okSaved) { setSaving(false); return; }
        try { localStorage.removeItem(draftKey); } catch (err) {}
        setShowDraftBanner(false);
        await onDuplicate(initial.id); // 복제본(version+1) 생성 → 부모가 setDetail 로 새 견적 에디터 오픈
        setSaving(false);
      };

      // ── v6-2: 공종 그룹 / 접기(accordion) / 점프 / 페이지 분할 ──
      const [collapsed, setCollapsed] = useState(() => new Set());
      const [pageBreakByTrade, setPageBreakByTrade] = useState(false);
      const sectionRefs = useRef({});
      const grouped = useMemo(() => {
        const order = []; const map = {};
        items.forEach((it, idx) => { const k = it.trade || '미분류'; if (!map[k]) { map[k] = []; order.push(k); } map[k].push(idx); });
        return order.map((k) => [k, map[k]]);
      }, [items]);
      const toggleGroup = (k) => setCollapsed((s) => { const n = new Set(s); n.has(k) ? n.delete(k) : n.add(k); return n; });
      const jumpTo = (k) => { setCollapsed((s) => { const n = new Set(s); n.delete(k); return n; }); setTimeout(() => { const el = sectionRefs.current[k]; if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 30); };
      const addRowTo = (k) => setItems((arr) => [...arr, { ...mk(), trade: k === '미분류' ? '' : k }]);
      const moveInGroup = (idx, dir) => setItems((arr) => {
        const key = (x) => x.trade || '미분류'; const cur = key(arr[idx]);
        let j = idx + dir; while (j >= 0 && j < arr.length && key(arr[j]) !== cur) j += dir;
        if (j < 0 || j >= arr.length) return arr;
        const next = arr.slice(); const tmp = next[idx]; next[idx] = next[j]; next[j] = tmp; return next;
      });
      const groupTotal = (idxs) => idxs.reduce((s, i) => s + rowAmount({ qty: items[i].qty, material_price: items[i].material_price, labor_price: items[i].labor_price, sub_price: items[i].sub_price }), 0);
      const renderRow = (idx) => {
        const it = items[idx];
        const inList = !it.trade || tradeBase.includes(it.trade);
        return (
          <tr key={it._k} className="align-top">
            <td className="py-1 pr-2 text-slate-400">{idx + 1}</td>
            <td className="py-1 pr-2">
              <select className={inputCls} value={it.trade} onChange={(e) => setItem(idx, { trade: e.target.value })}>
                <option value="">공종 선택</option>
                {!inList && <option value={it.trade}>{it.trade}</option>}
                {tradeBase.map((t) => <option key={t} value={t}>{t}</option>)}
              </select>
            </td>
            <td className="py-1 pr-2"><input className={inputCls} value={it.name} onChange={(e) => setItem(idx, { name: e.target.value })} placeholder="예: 강마루 시공" /></td>
            <td className="py-1 pr-2"><input className={inputCls} value={it.spec} onChange={(e) => setItem(idx, { spec: e.target.value })} placeholder="규격" /></td>
            <td className="py-1 pr-2"><input className={inputCls} value={it.unit} onChange={(e) => setItem(idx, { unit: e.target.value })} placeholder="개" /></td>
            <td className="py-1 pr-2"><input type="number" min="0" className={inputCls + ' text-right'} value={it.qty} onChange={(e) => setItem(idx, { qty: e.target.value })} /></td>
            <td className="py-1 pr-2"><input type="number" min="0" className={inputCls + ' text-right'} value={it.material_price} onChange={(e) => setItem(idx, { material_price: e.target.value })} /></td>
            <td className="py-1 pr-2"><input type="number" min="0" className={inputCls + ' text-right'} value={it.labor_price} onChange={(e) => setItem(idx, { labor_price: e.target.value })} /></td>
            <td className="py-1 pr-2"><input type="number" min="0" className={inputCls + ' text-right'} value={it.sub_price} onChange={(e) => setItem(idx, { sub_price: e.target.value })} /></td>
            <td className="py-1 pr-2 text-right font-semibold text-slate-700 whitespace-nowrap">{fmtNum(rowAmount({ qty: it.qty, material_price: it.material_price, labor_price: it.labor_price, sub_price: it.sub_price }))}</td>
            <td className="py-1">
              <div className="flex items-center justify-center gap-0.5">
                <button type="button" onClick={() => setPicker({ open: true, targetIdx: idx })} className="p-1 rounded text-slate-400 hover:text-blue-600" aria-label="카탈로그에서 채우기" title="단가 카탈로그에서 이 행 채우기">📖</button>
                <button type="button" onClick={() => moveInGroup(idx, -1)} className="p-1 rounded text-slate-400 hover:text-slate-700" aria-label="위로">▲</button>
                <button type="button" onClick={() => moveInGroup(idx, 1)} className="p-1 rounded text-slate-400 hover:text-slate-700" aria-label="아래로">▼</button>
                <button type="button" onClick={() => delRow(idx)} className="p-1 rounded text-slate-400 hover:text-red-600" aria-label="삭제">✕</button>
              </div>
            </td>
          </tr>
        );
      };
      const autoNamePreview = autoName();
      return (
        <div className="space-y-5">
          {confirmed && (
            <div className="px-3 py-2 rounded-xl bg-emerald-50 border border-emerald-200 text-xs text-emerald-700">
              ✅ 확정된 견적입니다. 편집했다면 다시 ‘확정’을 눌러 현장 예산에 반영하세요.
            </div>
          )}
          {showDraftBanner && (
            <div className="px-3 py-2.5 rounded-xl bg-amber-50 border border-amber-200 flex flex-wrap items-center justify-between gap-2">
              <span className="text-xs text-amber-800">📝 작성 중이던 임시저장 내용이 있습니다{pendingDraft && pendingDraft.savedAt ? ` (${String(pendingDraft.savedAt).slice(0, 16).replace('T', ' ')})` : ''}. 복원하시겠어요?</span>
              <span className="flex gap-1.5">
                <Button size="sm" onClick={restoreDraft}>복원</Button>
                <Button size="sm" variant="ghost" onClick={ignoreDraft}>무시</Button>
              </span>
            </div>
          )}
          {/* v18: 견적 제목(비우면 저장 시 자동명명) + 버전 뱃지 + 자동명명 버튼 */}
          <div>
            <div className="flex items-end gap-2">
              <div className="flex-1 min-w-0">
                <Input label="견적 제목" value={header.title} placeholder={autoNamePreview}
                  onChange={(e) => setHeader({ ...header, title: e.target.value })} />
              </div>
              {isSaved && <span className="mb-2.5 shrink-0"><Badge color="bg-indigo-500">v{version}</Badge></span>}
              <Button type="button" size="sm" variant="ghost" className="mb-1 shrink-0 whitespace-nowrap border border-slate-200"
                onClick={() => setHeader((h) => ({ ...h, title: autoName() }))}
                title="현장명·견적일·현재시각·담당자·버전으로 제목을 자동 생성합니다.">🅰 자동명명</Button>
            </div>
            <p className="mt-1 text-[11px] text-slate-400">비워두면 저장 시 <span className="font-mono text-slate-500">{autoNamePreview}</span> 로 자동 명명됩니다. (수정 가능)</p>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <Input label="고객명" value={header.client_name} onChange={(e) => setHeader({ ...header, client_name: e.target.value })} />
            <Input label="고객 연락처" value={header.client_contact} onChange={(e) => setHeader({ ...header, client_contact: e.target.value })} />
            <Input label="견적일" type="date" value={header.estimate_date} onChange={(e) => setHeader({ ...header, estimate_date: e.target.value })} />
            {/* v18: 유효기간 + 프리셋 [1주][2주][1개월][3개월] (견적일 기준) */}
            <div>
              <Input label="유효기간" type="date" value={header.valid_until} onChange={(e) => setHeader({ ...header, valid_until: e.target.value })} />
              <div className="flex flex-wrap items-center gap-1 mt-1.5">
                <span className="text-[11px] text-slate-400 mr-0.5">견적일 +</span>
                {VALID_PRESETS.map((p) => (
                  <button type="button" key={p.k}
                    onClick={() => setHeader((h) => ({ ...h, valid_until: addValidPeriod(h.estimate_date || todayStr(), p.k) }))}
                    className="px-2 py-0.5 rounded-md text-[11px] font-medium border border-slate-200 bg-slate-50 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-700 text-slate-600 transition">
                    {p.label}
                  </button>
                ))}
              </div>
            </div>
            <Select label="부가세" value={header.vat_mode} onChange={(e) => setHeader({ ...header, vat_mode: e.target.value })}>
              {VAT_MODES.map((m) => <option key={m.value} value={m.value}>{m.label}</option>)}
            </Select>
          </div>
          <div>
            <div className="flex flex-wrap items-center justify-between gap-2 mb-2">
              <h3 className="text-sm font-bold text-slate-700">견적 항목 <span className="text-[11px] font-normal text-slate-400">공종별 그룹 · 재료/노무/부자재 3분할</span></h3>
              <div className="flex flex-wrap gap-2">
                <Button size="sm" variant="ghost" onClick={saveDraftManual}>💾 임시저장</Button>
                <Button size="sm" variant="secondary" onClick={() => setTakeoffOpen(true)}>📐 물량 불러오기</Button>
                <Button size="sm" variant="secondary" onClick={() => setPicker({ open: true, targetIdx: null })}>📚 단가 카탈로그</Button>
                <Button size="sm" variant="secondary" onClick={addRow}>+ 행 추가</Button>
              </div>
            </div>
            {/* 공종 점프 칩 네비 */}
            {grouped.length > 0 && (
              <div className="flex flex-wrap gap-1.5 mb-3">
                {grouped.map(([k, idxs]) => (
                  <button type="button" key={k} onClick={() => jumpTo(k)}
                    className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs border border-slate-200 bg-slate-50 hover:bg-slate-100 text-slate-600">
                    <span className="w-2 h-2 rounded-full" style={{ backgroundColor: tradeHex(k === '미분류' ? '' : k) }}></span>
                    {k}<span className="text-slate-400">{idxs.length}</span>
                  </button>
                ))}
              </div>
            )}
            {/* 공종별 접기 섹션(accordion) */}
            <div className="space-y-3">
              {grouped.map(([k, idxs]) => {
                const isCol = collapsed.has(k);

                    <div className="flex items-center justify-between gap-2 px-3 py-2 bg-slate-50">
                      <button type="button" onClick={() => toggleGroup(k)} className="flex items-center gap-2 min-w-0 text-left">
                        <span className="text-slate-400 text-xs w-3 shrink-0">{isCol ? '▶' : '▼'}</span>
                        <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: tradeHex(k === '미분류' ? '' : k) }}></span>
                        <span className="font-semibold text-slate-700 truncate">{k}</span>
                        <span className="text-[11px] text-slate-400 shrink-0">{idxs.length}개</span>
                      </button>
                      <span className="text-sm font-bold text-slate-700 whitespace-nowrap">{fmtWon(groupTotal(idxs))}</span>
                    </div>
                    {!isCol && (
                      <div className="p-2">
                        <div className="overflow-x-auto -mx-1 px-1">
                          <table className="w-full text-sm" style={{ minWidth: '1180px' }}>
                            <thead>
                              <tr className="text-left text-xs text-slate-400">
                                <th className="py-1 pr-2 font-medium w-6">#</th>
                                <th className="py-1 pr-2 font-medium w-32">공종</th>
                                <th className="py-1 pr-2 font-medium">품목명 *</th>
                                <th className="py-1 pr-2 font-medium w-28">규격</th>
                                <th className="py-1 pr-2 font-medium w-12">단위</th>
                                <th className="py-1 pr-2 font-medium w-16 text-right">수량</th>
                                <th className="py-1 pr-2 font-medium w-24 text-right">재료비단가</th>
                                <th className="py-1 pr-2 font-medium w-24 text-right">노무비단가</th>
                                <th className="py-1 pr-2 font-medium w-24 text-right">부자재단가</th>
                                <th className="py-1 pr-2 font-medium w-28 text-right">행합계</th>
                                <th className="py-1 font-medium w-24 text-center">관리</th>
                              </tr>
                            </thead>
                            <tbody>
                              {idxs.map((idx) => renderRow(idx))}
                            </tbody>
                          </table>
                        </div>
                        <button type="button" onClick={() => addRowTo(k)} className="mt-1 text-xs text-blue-600 hover:underline">+ ‘{k}’에 행 추가</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <p className="mt-2 text-[11px] text-slate-400">행합계 = 수량 × (재료비 + 노무비 + 부자재). 행의 공종을 바꾸면 해당 그룹으로 이동합니다. 작성 내용은 자동 임시저장됩니다.</p>
          </div>

          <TradeSubtotals items={est.items} />

          <CostBuildupPanel header={header} setHeader={setHeader} totals={totals} />

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div className="space-y-3">
              <Input label="할인액 (원)" type="number" min="0" value={header.discount} onChange={(e) => setHeader({ ...header, discount: e.target.value })} />
              <Textarea label="비고 / 특이사항" rows="3" value={header.memo} onChange={(e) => setHeader({ ...header, memo: e.target.value })} />
            </div>
            <div className="rounded-xl bg-slate-50 border border-slate-100 p-4 space-y-2 text-sm self-start">
              {header.use_cost_buildup ? (
                <>
                  <KV label="직접공사비(소계)" value={fmtWon(totals.subtotal)} />
                  {totals.buildup && <KV label="순공사원가" value={fmtWon(totals.buildup.primeCost)} />}
                  {totals.buildup && <KV label="공사비합계" value={fmtWon(totals.buildup.constructionTotal)} />}
                  {totals.discount > 0 && <KV label="할인" value={'- ' + fmtWon(totals.discount)} red />}
                  <KV label="제안가" value={totals.buildup ? fmtWon(totals.buildup.proposed) : '-'} />
                  <KV label={`부가세 (${Math.round(Number(header.vat_rate) * 100)}%)`} value={fmtWon(totals.vat)} />
                </>
              ) : (
                <>
                  <KV label="공급가액(소계)" value={fmtWon(totals.subtotal)} />
                  {totals.discount > 0 && <KV label="할인" value={'- ' + fmtWon(totals.discount)} red />}
                  <KV label={`공급가 (${VAT_MODE_LABEL[header.vat_mode]})`} value={fmtWon(totals.supplyAmount)} />
                  <KV label={`부가세 (${Math.round(Number(header.vat_rate) * 100)}%)`} value={fmtWon(totals.vat)} />
                </>
              )}
              <div className="pt-2 border-t border-slate-200 flex items-center justify-between">
                <span className="font-bold text-slate-700">합계 금액</span>
                <span className="text-lg font-extrabold text-blue-600">{fmtWon(totals.total)}</span>
              </div>
            </div>
          </div>
          <div className="flex flex-wrap gap-2 justify-between pt-3 border-t border-slate-100">
            <div>{isSaved && <Button variant="ghost" className="text-red-600 hover:bg-red-50" onClick={onDelete}>삭제</Button>}</div>
            <div className="flex flex-wrap gap-2 justify-end items-center">
              <label className="inline-flex items-center gap-1.5 text-xs text-slate-500 mr-1 cursor-pointer" title="인쇄 시 공종 그룹마다 새 페이지로 나눕니다.">
                <input type="checkbox" checked={pageBreakByTrade} onChange={(e) => setPageBreakByTrade(e.target.checked)} />
                공종별 페이지 분할
              </label>
              <Button variant="secondary" onClick={() => onPrint({ ...toEstimate(), _splitByTrade: pageBreakByTrade })}>🖨 인쇄(PDF)</Button>
              {isSaved && <Button variant="secondary" onClick={() => setShareOpen(true)} title="로그인 없이 열람 가능한 읽기전용 공유 링크를 생성합니다.">🔗 공유</Button>}
              {isSaved && (confirmed
                ? <Button variant="ghost" onClick={onUnconfirm}>초안으로</Button>
                : <Button variant="ghost" className="text-emerald-700 hover:bg-emerald-50" onClick={onConfirm} title="확정 시 현장 예산이 이 견적 합계로 갱신됩니다.">✅ 확정</Button>)}
              {isSaved && onDuplicate && (
                <Button variant="ghost" className="text-indigo-700 hover:bg-indigo-50" onClick={handleNewVersion} disabled={saving}
                  title={`현재 내용을 저장한 뒤 복제해 새 버전(v${version + 1})을 만듭니다. 덮어쓰기 대신 v${version}과 나란히 비교·보관됩니다.`}>
                  🔁 새 버전으로 저장(v{version + 1})
                </Button>
              )}
              <Button onClick={handleSave} disabled={saving}>{saving ? '저장 중...' : (isSaved ? '저장' : '견적 생성')}</Button>
              <Button variant="secondary" onClick={onClose}>닫기</Button>
            </div>
          </div>
          {!isSaved && <p className="text-[11px] text-slate-400 text-right">먼저 ‘견적 생성’으로 저장하면 확정/예산 연동을 사용할 수 있습니다.</p>}

          <CatalogPickerModal isOpen={picker.open} onClose={() => setPicker({ open: false, targetIdx: null })}
            trades={trades} mode={picker.targetIdx == null ? 'append' : 'replace'} onPick={pickCatalog} />
          <TakeoffPickerModal isOpen={takeoffOpen} onClose={() => setTakeoffOpen(false)}
            siteId={site && site.id} onAdd={addTakeoffRows} />
          {isSaved && (
            <ShareModal isOpen={shareOpen} onClose={() => setShareOpen(false)} kind="estimate"
              id={initial.id} title={header.title}
              initialToken={initial.share_token || null}
              initialHasPassword={!!(initial.share_password_hash || initial.has_password || initial.share_password)} />
          )}
        </div>
      );
    }

    // 견적서 인쇄(A4) 레이아웃 — 셀 스타일
    const _pb = '1px solid #94a3b8';
    const cellTh = { border: _pb, padding: '6px 8px', fontWeight: 600, background: '#f1f5f9' };
    const cellTd = { border: _pb, padding: '6px 8px' };
    const cellTdC = { border: _pb, padding: '6px 8px', textAlign: 'center' };
    const cellTdR = { border: _pb, padding: '6px 8px', textAlign: 'right' };
    const sumTd = { border: _pb, padding: '5px 10px', background: '#f8fafc' };
    const sumTdR = { border: _pb, padding: '5px 10px', textAlign: 'right' };
    function EstimatePrint({ site, estimate, totals }) {
      if (!estimate) return null;
      const items = estimate.items || [];
      const t = totals || computeTotals(estimate);
      const b = t.buildup;
      // 공종별 소계 (총괄)
      const gmap = {};
      items.forEach((it) => { const tr = it.trade || it.process || '미분류'; gmap[tr] = (gmap[tr] || 0) + rowAmount(it); });
      const groupArr = Object.entries(gmap).map(([trade, total]) => ({ trade, total })).sort((a, b2) => b2.total - a.total);
      const directTotal = groupArr.reduce((s, g) => s + g.total, 0);
      // v6-2: 공종별 페이지 분할 인쇄 — 그룹마다 별도 표 + page-break-before
      const splitByTrade = !!estimate._splitByTrade;
      const itemsByTrade = splitByTrade ? groupArr.map((g) => ({ trade: g.trade, rows: items.filter((it) => (it.trade || it.process || '미분류') === g.trade) })) : null;
      return (
        <div className="text-slate-900" style={{ fontFamily: 'sans-serif', padding: '4px' }}>
          <div className="flex items-start justify-between" style={{ borderBottom: '2px solid #1e293b', paddingBottom: '10px', marginBottom: '14px' }}>
            <div>
              <h1 style={{ fontSize: '26px', fontWeight: 800, letterSpacing: '8px', margin: 0 }}>견 적 서</h1>
              <p style={{ fontSize: '11px', color: '#64748b', margin: '4px 0 0' }}>ESTIMATE</p>
            </div>
            <div style={{ textAlign: 'right' }}>
              <p style={{ fontSize: '18px', fontWeight: 700, margin: 0 }}>{SUPPLIER.name} <span style={{ fontSize: '11px', fontWeight: 400, color: '#64748b' }}>{SUPPLIER.en}</span></p>
              <p style={{ fontSize: '11px', color: '#475569', margin: '2px 0 0' }}>{SUPPLIER.biz}</p>
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2px 32px', fontSize: '13px', marginBottom: '14px' }}>
            <div><span style={{ color: '#64748b' }}>고객명: </span><b>{estimate.client_name || '-'}</b></div>
            <div><span style={{ color: '#64748b' }}>현장: </span><b>{site ? site.name : '-'}</b></div>
            <div><span style={{ color: '#64748b' }}>연락처: </span>{estimate.client_contact || '-'}</div>
            <div><span style={{ color: '#64748b' }}>현장주소: </span>{(site && site.address) || '-'}</div>
            <div><span style={{ color: '#64748b' }}>견적일: </span>{estimate.estimate_date || '-'}</div>
            <div><span style={{ color: '#64748b' }}>유효기간: </span>{estimate.valid_until || '-'}</div>
          </div>
          <div style={{ background: '#f1f5f9', textAlign: 'center', padding: '8px', fontSize: '14px', marginBottom: '10px' }}>
            합계금액(부가세 {VAT_MODE_LABEL[estimate.vat_mode || 'exclusive']}) : <b>일금 {wonToKorean(t.total)}원정 (₩{fmtNum(t.total)})</b>
          </div>
          {splitByTrade ? (
            itemsByTrade.map((grp, gi) => (
              <div key={grp.trade} style={gi > 0 ? { pageBreakBefore: 'always' } : undefined}>
                <p style={{ fontWeight: 700, fontSize: '13px', margin: gi > 0 ? '0 0 5px' : '0 0 5px' }}>■ {grp.trade}</p>
                <table className="print-table" style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px', marginBottom: '6px' }}>
                  <thead>
                    <tr>
                      <th style={cellTh}>No</th><th style={cellTh}>공종</th><th style={cellTh}>품목</th><th style={cellTh}>규격</th>
                      <th style={cellTh}>수량</th><th style={cellTh}>단위</th><th style={cellTh}>단가</th><th style={cellTh}>금액</th>
                    </tr>
                  </thead>
                  <tbody>
                    {grp.rows.map((it, i) => (
                      <tr key={i}>
                        <td style={cellTdC}>{i + 1}</td>
                        <td style={cellTd}>{it.trade || it.process || ''}</td>
                        <td style={cellTd}>{it.name}</td>
                        <td style={cellTd}>{it.spec || ''}</td>
                        <td style={cellTdR}>{fmtNum(it.qty)}</td>
                        <td style={cellTdC}>{it.unit || ''}</td>
                        <td style={cellTdR}>{fmtNum(effUnitPrice(it))}</td>
                        <td style={cellTdR}>{fmtNum(rowAmount(it))}</td>
                      </tr>
                    ))}
                    <tr>
                      <td style={{ ...cellTd, fontWeight: 700, background: '#f8fafc' }} colSpan="7">{grp.trade} 소계</td>
                      <td style={{ ...cellTdR, fontWeight: 700, background: '#f8fafc' }}>{fmtNum(grp.rows.reduce((s, it) => s + rowAmount(it), 0))}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            ))
          ) : (
            <table className="print-table" style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
              <thead>
                <tr>
                  <th style={cellTh}>No</th><th style={cellTh}>공종</th><th style={cellTh}>품목</th><th style={cellTh}>규격</th>
                  <th style={cellTh}>수량</th><th style={cellTh}>단위</th><th style={cellTh}>단가</th><th style={cellTh}>금액</th>
                </tr>
              </thead>
              <tbody>
                {items.length === 0 ? (
                  <tr><td style={{ ...cellTdC, color: '#94a3b8' }} colSpan="8">항목 없음</td></tr>
                ) : items.map((it, i) => (
                  <tr key={i}>
                    <td style={cellTdC}>{i + 1}</td>
                    <td style={cellTd}>{it.trade || it.process || ''}</td>
                    <td style={cellTd}>{it.name}</td>
                    <td style={cellTd}>{it.spec || ''}</td>
                    <td style={cellTdR}>{fmtNum(it.qty)}</td>
                    <td style={cellTdC}>{it.unit || ''}</td>
                    <td style={cellTdR}>{fmtNum(effUnitPrice(it))}</td>
                    <td style={cellTdR}>{fmtNum(rowAmount(it))}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}

          {/* 공종별 소계 (총괄표) */}
          {groupArr.length > 0 && (
            <div style={{ marginTop: '14px' }}>
              <p style={{ fontWeight: 700, fontSize: '12.5px', margin: '0 0 4px' }}>공종별 소계</p>
              <table className="print-table" style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
                <thead><tr><th style={cellTh}>공종</th><th style={cellTh}>금액</th></tr></thead>
                <tbody>
                  {groupArr.map((g) => (
                    <tr key={g.trade}><td style={cellTd}>{g.trade}</td><td style={cellTdR}>{fmtNum(g.total)} 원</td></tr>
                  ))}
                  <tr><td style={{ ...cellTd, fontWeight: 700, background: '#f1f5f9' }}>직접공사비 합계</td><td style={{ ...cellTdR, fontWeight: 700, background: '#f1f5f9' }}>{fmtNum(directTotal)} 원</td></tr>
                </tbody>
              </table>
            </div>
          )}

          {/* 원가계산 요약 (원가계산서 모드) */}
          {estimate.use_cost_buildup && b && (
            <div style={{ marginTop: '14px' }}>
              <p style={{ fontWeight: 700, fontSize: '12.5px', margin: '0 0 4px' }}>공사원가계산 요약</p>
              <table className="print-table" style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
                <tbody>
                  <tr><td style={cellTd}>재료비 소계 (직접 {fmtNum(b.directMaterial)} + 간접 {fmtNum(b.indirectMaterial)})</td><td style={cellTdR}>{fmtNum(b.materialSum)} 원</td></tr>
                  <tr><td style={cellTd}>노무비 소계 (직접 {fmtNum(b.directLabor)} + 간접 {fmtNum(b.indirectLabor)})</td><td style={cellTdR}>{fmtNum(b.laborSum)} 원</td></tr>
                  <tr><td style={cellTd}>경비 소계 (부자재·보험료·안전·기타)</td><td style={cellTdR}>{fmtNum(b.expenseSum)} 원</td></tr>
                  <tr><td style={{ ...cellTd, fontWeight: 700, background: '#f8fafc' }}>순공사원가</td><td style={{ ...cellTdR, fontWeight: 700, background: '#f8fafc' }}>{fmtNum(b.primeCost)} 원</td></tr>
                  <tr><td style={cellTd}>일반관리비 + 디자인 + 이윤</td><td style={cellTdR}>{fmtNum(b.admin + b.design + b.profit)} 원</td></tr>
                  <tr><td style={{ ...cellTd, fontWeight: 700, background: '#f1f5f9' }}>공사비합계</td><td style={{ ...cellTdR, fontWeight: 700, background: '#f1f5f9' }}>{fmtNum(b.constructionTotal)} 원</td></tr>
                  <tr><td style={{ ...cellTd, fontWeight: 700 }}>제안가</td><td style={{ ...cellTdR, fontWeight: 700 }}>{fmtNum(b.proposed)} 원</td></tr>
                </tbody>
              </table>
            </div>
          )}
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: '12px' }}>
            <table style={{ borderCollapse: 'collapse', fontSize: '13px', minWidth: '260px' }}>
              <tbody>
                <tr><td style={sumTd}>공급가액</td><td style={sumTdR}>{fmtNum(t.supplyAmount)} 원</td></tr>
                {t.discount > 0 && <tr><td style={sumTd}>할인</td><td style={sumTdR}>- {fmtNum(t.discount)} 원</td></tr>}
                <tr><td style={sumTd}>부가세</td><td style={sumTdR}>{fmtNum(t.vat)} 원</td></tr>
                <tr><td style={{ ...sumTd, fontWeight: 700, background: '#e2e8f0' }}>합계</td><td style={{ ...sumTdR, fontWeight: 700, background: '#e2e8f0' }}>{fmtNum(t.total)} 원</td></tr>
              </tbody>
            </table>
          </div>
          {estimate.memo && (
            <div style={{ marginTop: '16px', fontSize: '12.5px' }}>
              <p style={{ fontWeight: 700, borderBottom: '1px solid #cbd5e1', paddingBottom: '3px', margin: '0 0 4px' }}>비고</p>
              <p style={{ whiteSpace: 'pre-wrap', color: '#334155', margin: 0 }}>{estimate.memo}</p>
            </div>
          )}
          <p style={{ marginTop: '28px', textAlign: 'center', fontSize: '11px', color: '#94a3b8' }}>본 견적서는 {SUPPLIER.name}에서 발행되었습니다.</p>
        </div>
      );
    }

    // 🧩 견적 탭
    // ========================================
    // 📐 물량 산출(Takeoff) — 수동 CRUD (스케치업 연동 전 직접 입력)
    // ========================================
    function TakeoffForm({ initial, trades, onSave, onCancel }) {
      const toast = useToast();
      const [f, setF] = useState(initial ? {
        trade: initial.trade || '', name: initial.name || '', spec: initial.spec || '', unit: initial.unit || '',
        qty: initial.qty != null ? String(initial.qty) : '', source: initial.source || 'manual', memo: initial.memo || '',
      } : { trade: '', name: '', spec: '', unit: '', qty: '', source: 'manual', memo: '' });
      const [saving, setSaving] = useState(false);
      const submit = async (e) => {
        e.preventDefault();
        if (!f.name.trim()) { toast('품목/부재명을 입력하세요.', 'error'); return; }
        setSaving(true);
        await onSave({
          trade: f.trade.trim(), name: f.name.trim(), spec: f.spec.trim(), unit: f.unit.trim(),
          qty: Math.max(0, Number(f.qty) || 0), source: f.source || 'manual', memo: f.memo.trim(),
        });
        setSaving(false);
      };
      return (
        <form onSubmit={submit} className="space-y-4">
          <Input label="품목 / 부재명 *" placeholder="예: 강마루, 석고보드 2겹, 천장 몰딩" value={f.name} onChange={(e) => setF({ ...f, name: e.target.value })} />
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Combo label="공종" placeholder="공종 선택/입력" value={f.trade} options={trades} onChange={(e) => setF({ ...f, trade: e.target.value })} />
            <Input label="규격 / 치수" placeholder="예: 12T, 600x600" value={f.spec} onChange={(e) => setF({ ...f, spec: e.target.value })} />
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <Input label="단위" placeholder="M2 / M / EA / 식" value={f.unit} onChange={(e) => setF({ ...f, unit: e.target.value })} />
            <Input label="물량(수량) *" type="number" inputMode="decimal" min="0" step="any" placeholder="예: 84.5" value={f.qty} onChange={(e) => setF({ ...f, qty: e.target.value })} />
            <Select label="출처" value={f.source} onChange={(e) => setF({ ...f, source: e.target.value })}>
              <option value="manual">수기(실측/직접입력)</option>
              <option value="sketchup">스케치업</option>
            </Select>
          </div>
          <Textarea label="메모" rows="2" placeholder="비고" value={f.memo} onChange={(e) => setF({ ...f, memo: e.target.value })} />
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit" disabled={saving}>{saving ? '저장 중...' : '저장'}</Button>
          </div>
        </form>
      );
    }

    function TakeoffSection({ site, trades }) {
      const toast = useToast();
      const [open, setOpen] = useState(false); // 접이식 — 기본 접힘(기존 견적 UX 보존)
      const [list, setList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editorOpen, setEditorOpen] = useState(false);
      const [editing, setEditing] = useState(null);
      const [delTarget, setDelTarget] = useState(null);
      const reload = useCallback(async () => {
        setLoading(true);
        try { const d = await api.listTakeoff(site.id); setList(Array.isArray(d) ? d : []); }
        catch (e) { setList([]); }
        finally { setLoading(false); }
      }, [site.id]);
      useEffect(() => { reload(); }, [reload]);
      const save = async (body) => {
        try {
          if (editing) { await api.updateTakeoff(editing.id, body); toast('물량이 수정되었습니다.', 'success'); }
          else { await api.createTakeoff(site.id, body); toast('물량이 추가되었습니다.', 'success'); }
          setEditorOpen(false); setEditing(null); await reload();
        } catch (e) { toast(e.status === 400 ? e.message : '저장 실패', 'error'); }
      };
      const confirmDel = async () => {
        const t = delTarget; setDelTarget(null);
        try { await api.removeTakeoff(t.id); toast('물량이 삭제되었습니다.', 'info'); await reload(); }
        catch (e) { toast('삭제 실패', 'error'); }
      };
      return (
        <Card className="p-5">
          <div className="flex flex-wrap items-center justify-between gap-2">
            <button type="button" onClick={() => setOpen((v) => !v)} className="flex items-center gap-2 min-w-0 text-left">
              <span className="text-slate-400 text-xs w-3 shrink-0">{open ? '▼' : '▶'}</span>
              <h2 className="text-base font-bold text-slate-800">📐 물량 산출 (Takeoff) <span className="text-sm font-normal text-slate-400">· 스케치업/실측</span></h2>
              <span className="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 shrink-0">{list.length}건</span>
            </button>
            <Button size="sm" variant="secondary" onClick={() => { setOpen(true); setEditing(null); setEditorOpen(true); }}>+ 물량 추가</Button>
          </div>
          {!open ? (
            <p className="mt-2 text-xs text-slate-400">스케치업/실측 물량을 입력해 두면 견적 에디터의 <b>📐 물량 불러오기</b>로 견적 행에 바로 채울 수 있어요.</p>
          ) : loading ? (
            <div className="mt-4 h-24 bg-slate-100 rounded-xl animate-pulse"></div>
          ) : list.length === 0 ? (
            <p className="mt-4 text-sm text-slate-400 text-center py-8">등록된 물량이 없습니다. <span className="text-slate-300">+ 물량 추가로 시작하세요.</span><br /><span className="text-[11px]">향후 스케치업 플러그인이 보낸 물량은 source=스케치업으로 표시됩니다.</span></p>
          ) : (
            <div className="mt-4 overflow-x-auto">
              <table className="w-full text-sm">
                <thead><tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                  <th className="py-2 pr-3 font-medium">공종</th><th className="py-2 pr-3 font-medium">품목/부재</th>
                  <th className="py-2 pr-3 font-medium">규격</th><th className="py-2 pr-3 font-medium text-right">물량</th>
                  <th className="py-2 pr-3 font-medium">단위</th><th className="py-2 pr-3 font-medium">출처</th>
                  <th className="py-2 font-medium text-right">관리</th></tr></thead>
                <tbody className="divide-y divide-slate-100">
                  {list.map((t) => (
                    <tr key={t.id}>
                      <td className="py-2 pr-3">{t.trade ? <span className="text-xs px-2 py-0.5 rounded-full text-white whitespace-nowrap" style={{ backgroundColor: tradeHex(t.trade) }}>{t.trade}</span> : <span className="text-slate-300">-</span>}</td>
                      <td className="py-2 pr-3 font-medium text-slate-700 min-w-[120px]">{t.name}{t.memo ? <span className="block text-[11px] font-normal text-slate-400 truncate max-w-[200px]">{t.memo}</span> : null}</td>
                      <td className="py-2 pr-3 text-slate-500">{t.spec || '-'}</td>
                      <td className="py-2 pr-3 text-right font-semibold text-slate-700 whitespace-nowrap">{fmtNum(t.qty)}</td>
                      <td className="py-2 pr-3 text-slate-500">{t.unit || '-'}</td>
                      <td className="py-2 pr-3"><span className={`text-[11px] px-2 py-0.5 rounded-full whitespace-nowrap ${t.source === 'sketchup' ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-500'}`}>{t.source === 'sketchup' ? '📐 스케치업' : '수기'}</span></td>
                      <td className="py-2 text-right whitespace-nowrap">
                        <button onClick={() => { setEditing(t); setEditorOpen(true); }} className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50" aria-label="수정">✏️</button>
                        <button onClick={() => setDelTarget(t)} className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50" aria-label="삭제">🗑️</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          <Modal isOpen={editorOpen} onClose={() => { setEditorOpen(false); setEditing(null); }} title={editing ? '물량 수정' : '물량 추가'} size="lg">
            <TakeoffForm key={editing ? editing.id : 'new'} initial={editing} trades={trades} onSave={save} onCancel={() => { setEditorOpen(false); setEditing(null); }} />
          </Modal>
          <Modal isOpen={!!delTarget} onClose={() => setDelTarget(null)} title="물량 삭제 확인" size="sm">
            {delTarget && (
              <div>
                <p className="text-sm text-slate-600">'<span className="font-semibold">{delTarget.name}</span>' 물량을 삭제하시겠습니까?</p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setDelTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDel}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </Card>
      );
    }

    function EstimateTab({ site, estimates, procNames, loading, onChanged, onPrint, openEstimateId = null, onOpenConsumed, templates = [] }) {
      const toast = useToast();
      const [editorOpen, setEditorOpen] = useState(false);
      const [detail, setDetail] = useState(null);
      const [loadingDetail, setLoadingDetail] = useState(false);
      const [delTarget, setDelTarget] = useState(null);
      const [trades, setTrades] = useState(TRADE_MASTER);
      const [editorNonce, setEditorNonce] = useState(0); // v18: 새 견적/템플릿 오픈 시 에디터 강제 remount 용
      useEffect(() => { let alive = true; api.listTrades().then((d) => { if (alive && d && d.length) setTrades(d); }).catch(() => {}); return () => { alive = false; }; }, []);
      const openNew = () => { setDetail(null); setEditorNonce((n) => n + 1); setEditorOpen(true); };
      // v18: 템플릿으로 새 견적 시작 — 템플릿 items+config 를 id 없는 initial 로 합성 → 새 견적 에디터 프리필
      const openNewFromTemplate = (tpl) => {
        const cfg = templateConfigToHeader(tpl && tpl.config);
        const initial = {
          title: '', client_name: (site && site.client) || '', client_contact: '',
          estimate_date: todayStr(), valid_until: '',
          vat_mode: cfg.vat_mode, vat_rate: cfg.vat_rate,
          discount: Number(tpl && tpl.config && tpl.config.discount) || 0,
          use_cost_buildup: cfg.use_cost_buildup, memo: '', version: 1,
          items: ((tpl && tpl.items) || []).map((it, i) => ({ ...it, sort_order: it.sort_order != null ? it.sort_order : i })),
        };
        Object.keys(BUILDUP_DEFAULTS).forEach((k) => { initial[k] = cfg[k]; });
        setDetail(initial); setEditorNonce((n) => n + 1); setEditorOpen(true);
        toast(`'${(tpl && tpl.name) || '템플릿'}'(으)로 새 견적을 시작합니다. 자유롭게 편집·저장하세요.`, 'success');
      };
      // v18: [새 버전으로 저장] — 복제본을 만들고 그 새 버전을 같은 에디터 모달에 오픈(키가 새 id 로 바뀌며 remount)
      const doDuplicate = async (id) => {
        try {
          const nv = await api.duplicateEstimate(id);
          const newId = nv && (nv.id || (nv.estimate && nv.estimate.id));
          const fresh = newId ? await api.getEstimate(newId) : (nv.estimate || nv);
          setDetail(fresh); setEditorOpen(true);
          await onChanged();
          toast(`새 버전(v${(fresh && fresh.version) || '?'})으로 저장했습니다. 이제 이 버전을 편집합니다.`, 'success');
        } catch (e) { toast('새 버전 생성에 실패했습니다.', 'error'); }
      };
      const openEditById = async (id) => {
        setEditorOpen(true); setDetail(null); setLoadingDetail(true);
        try { const d = await api.getEstimate(id); setDetail(d); }
        catch (err) { toast('견적을 불러오지 못했습니다.', 'error'); setEditorOpen(false); }
        finally { setLoadingDetail(false); }
      };
      const openEdit = (e) => openEditById(e.id);
      // v15: 외부(견적으로 현장 만들기)에서 지정한 신규 견적을 에디터로 자동 오픈 → 항목 입력 단계. 1회 소비.
      useEffect(() => {
        if (openEstimateId) { openEditById(openEstimateId); if (onOpenConsumed) onOpenConsumed(); }
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [openEstimateId]);
      const close = () => { setEditorOpen(false); setDetail(null); };
      const save = async (body) => {
        try {
          let saved;
          if (detail && detail.id) { saved = await api.updateEstimate(detail.id, body); toast('견적이 저장되었습니다.', 'success'); }
          else { saved = await api.createEstimate(site.id, body); toast('견적이 생성되었습니다.', 'success'); }
          const fresh = await api.getEstimate(saved.id); setDetail(fresh);
          await onChanged();
          return true; // v6-2: 성공 시 에디터에서 draft 삭제
        } catch (e) { toast('저장에 실패했습니다.', 'error'); return false; }
      };
      const doConfirm = async () => {
        if (!detail || !detail.id) return;
        try { await api.confirmEstimate(detail.id); toast('견적이 확정되어 현장 예산에 반영되었습니다.', 'success'); const fresh = await api.getEstimate(detail.id); setDetail(fresh); await onChanged(); }
        catch (e) { toast('확정에 실패했습니다.', 'error'); }
      };
      const doUnconfirm = async () => {
        if (!detail || !detail.id) return;
        try { await api.unconfirmEstimate(detail.id); toast('초안으로 되돌렸습니다. (예산은 보존)', 'info'); const fresh = await api.getEstimate(detail.id); setDetail(fresh); await onChanged(); }
        catch (e) { toast('실패했습니다.', 'error'); }
      };
      const confirmDel = async () => {
        const e = delTarget; setDelTarget(null);
        try { await api.removeEstimate(e.id); toast('견적이 삭제되었습니다.', 'info'); if (detail && detail.id === e.id) close(); await onChanged(); }
        catch (err) { toast('삭제에 실패했습니다.', 'error'); }
      };
      return (
        <div className="space-y-6">
          <TakeoffSection site={site} trades={trades} />
          {loading ? (
            <Card className="p-5"><div className="h-40 bg-slate-100 rounded-xl animate-pulse"></div></Card>
          ) : (
            <EstimateList estimates={estimates} onOpen={openEdit} onNew={openNew} onAskDelete={setDelTarget}
              templates={templates} onNewFromTemplate={openNewFromTemplate} />
          )}
          <Modal isOpen={editorOpen} onClose={close} title={detail && detail.id ? '견적서 편집' : '새 견적서'} size="xl">
            {loadingDetail ? (
              <div className="h-40 bg-slate-100 rounded-xl animate-pulse"></div>
            ) : (
              <EstimateEditor key={detail && detail.id ? detail.id : ('new-' + editorNonce)} site={site} initial={detail} trades={trades} procNames={procNames}
                onSave={save} onConfirm={doConfirm} onUnconfirm={doUnconfirm} onDelete={() => { if (detail && detail.id) setDelTarget(detail); }}
                onPrint={onPrint} onClose={close} onDuplicate={doDuplicate} />
            )}
          </Modal>
          <Modal isOpen={!!delTarget} onClose={() => setDelTarget(null)} title="견적 삭제 확인" size="sm">
            {delTarget && (
              <div>
                <p className="text-sm text-slate-600">'<span className="font-semibold">{delTarget.title || '견적서'}</span>' 견적을 삭제하시겠습니까?</p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setDelTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDel}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // ========================================
    // 🆕 v15: 견적으로 현장 만들기 (현장정보 + 견적제목 → 원자적 site+estimate 생성)
    // ========================================
    function EstimateSiteForm({ onSubmit, onCancel, staffNames = [], templates = [] }) {
      const [form, setForm] = useState({
        name: '', client: '', address: '', manager: '',
        building_type: '', start_date: todayStr(), end_date: '', move_in_date: '',
        estimate_title: '견적서', template_id: '',
      });
      const [errors, setErrors] = useState({});
      const [submitting, setSubmitting] = useState(false);

      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name = '현장명을 입력하세요.';
        if (form.start_date && form.end_date && form.start_date > form.end_date) e.end_date = '준공일은 착공일 이후여야 합니다.';
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const handleSubmit = async (ev) => {
        ev.preventDefault();
        if (!validate()) return;
        setSubmitting(true);
        const site = {
          name: form.name.trim(), client: form.client.trim(), address: form.address.trim(),
          manager: form.manager.trim(), building_type: form.building_type || '',
          start_date: form.start_date || null, end_date: form.end_date || null,
          move_in_date: form.move_in_date || null,
          // 견적단계 신규 현장 기본값(예산은 0 → 견적 확정 시 자동 반영)
          budget: 0, status: '견적', progress_status: '준비',
        };
        const tpl = templates.find((t) => String(t.id) === String(form.template_id));
        const estimate = {
          title: (form.estimate_title || '').trim() || '견적서',
          client_name: form.client.trim(), // 미입력 시 서버/폴백이 site.client 로 보정
          estimate_date: todayStr(), items: tpl ? (tpl.items || []) : [], // v18: 템플릿 항목 프리필
        };
        if (tpl && tpl.config) { // v18: 템플릿 원가요율 프리필
          const cfg = tpl.config;
          if (cfg.vat_mode) estimate.vat_mode = cfg.vat_mode;
          if (cfg.vat_rate != null) estimate.vat_rate = cfg.vat_rate;
          if (cfg.discount != null) estimate.discount = cfg.discount;
          estimate.use_cost_buildup = !!cfg.use_cost_buildup;
          Object.keys(BUILDUP_DEFAULTS).forEach((k) => { if (cfg[k] != null) estimate[k] = cfg[k]; });
        }
        const ok = await onSubmit({ site, estimate });
        setSubmitting(false);
        // ok=true 면 부모가 모달 닫고 에디터 오픈
      };

      return (
        <form onSubmit={handleSubmit} className="space-y-4">
          <div className="rounded-xl bg-blue-50 border border-blue-100 px-3.5 py-2.5 text-xs text-blue-700">
            현장 정보를 입력하면 새 현장이 만들어지고, 바로 그 현장의 <span className="font-semibold">견적서 편집 화면</span>으로 이동합니다.
            이후 항목을 입력하고 <span className="font-semibold">확정</span>하면 견적 금액이 현장 예산에 반영됩니다.
          </div>
          <Input label="현장(프로젝트)명 *" placeholder="예: 래미안 아파트 34평 리모델링" value={form.name} error={errors.name}
            onChange={(e) => setForm({ ...form, name: e.target.value })} />
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Input label="발주처 / 고객" placeholder="예: 김철수" value={form.client}
              onChange={(e) => setForm({ ...form, client: e.target.value })} />
            <Combo label="현장 담당자" placeholder="담당자 선택/입력" value={form.manager} options={staffNames}
              onChange={(e) => setForm({ ...form, manager: e.target.value })} />
          </div>
          <Input label="현장 주소" placeholder="예: 서울시 강남구 도곡로 123" value={form.address}
            onChange={(e) => setForm({ ...form, address: e.target.value })} />
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Select label="건물 종류" value={form.building_type} onChange={(e) => setForm({ ...form, building_type: e.target.value })}>
              <option value="">선택 안 함</option>
              {BUILDING_TYPES.map((b) => <option key={b} value={b}>{b}</option>)}
            </Select>
            <Input label="입주 예정일" type="date" value={form.move_in_date || ''}
              onChange={(e) => setForm({ ...form, move_in_date: e.target.value })} />
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Input label="착공일" type="date" value={form.start_date || ''}
              onChange={(e) => setForm({ ...form, start_date: e.target.value })} />
            <Input label="준공(예정)일" type="date" value={form.end_date || ''} error={errors.end_date}
              onChange={(e) => setForm({ ...form, end_date: e.target.value })} />
          </div>
          <div className="pt-2 border-t border-slate-100 space-y-4">
            {templates && templates.length > 0 && (
              <Select label="🧩 견적 템플릿으로 시작 (선택)" value={form.template_id} onChange={(e) => setForm({ ...form, template_id: e.target.value })}>
                <option value="">템플릿 없이 빈 견적으로 시작</option>
                {templates.map((t) => <option key={t.id} value={t.id}>{t.name}{t.items ? ` (${t.items.length}개 항목)` : ''}</option>)}
              </Select>
            )}
            <Input label="견적 제목" placeholder="견적서" value={form.estimate_title}
              onChange={(e) => setForm({ ...form, estimate_title: e.target.value })} />
          </div>
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit" disabled={submitting}>{submitting ? '생성 중...' : '현장 만들고 견적 작성 →'}</Button>
          </div>
        </form>
      );
    }

    // ========================================
    // 🧾 발주 (현장 종속) — OrderForm + OrdersTab
    // ========================================
    function OrderForm({ initial, trades, vendorNames, onSave, onCancel }) {
      const toast = useToast();
      const [f, setF] = useState(initial ? {
        vendor: initial.vendor || '', trade: initial.trade || '', title: initial.title || '',
        amount: initial.amount != null ? String(initial.amount) : '', order_date: initial.order_date || '',
        due_date: initial.due_date || '', need_date: initial.need_date || '',
        status: ORDER_STATES.includes(initial.status) ? initial.status : '대기', memo: initial.memo || '',
      } : { vendor: '', trade: '', title: '', amount: '', order_date: todayStr(), due_date: '', need_date: '', status: '대기', memo: '' });
      const [saving, setSaving] = useState(false);
      const submit = async (e) => {
        e.preventDefault();
        if (!f.title.trim()) { toast('발주 품목(내역)을 입력하세요.', 'error'); return; }
        setSaving(true);
        await onSave({
          vendor: f.vendor.trim(), trade: f.trade.trim(), title: f.title.trim(),
          amount: Math.max(0, Math.round(Number(f.amount) || 0)),
          order_date: f.order_date || null, due_date: f.due_date || null, need_date: f.need_date || null,
          status: f.status, memo: f.memo.trim(), auto_generated: !!(initial && initial.auto_generated),
        });
        setSaving(false);
      };
      return (
        <form onSubmit={submit} className="space-y-4">
          <Input label="발주 품목 / 내역 *" placeholder="예: 합판/각재 일괄 발주" value={f.title} onChange={(e) => setF({ ...f, title: e.target.value })} />
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Combo label="거래처" placeholder="거래처 선택/입력" value={f.vendor} options={vendorNames} onChange={(e) => setF({ ...f, vendor: e.target.value })} />
            <Combo label="공종" placeholder="공종 선택/입력" value={f.trade} options={trades} onChange={(e) => setF({ ...f, trade: e.target.value })} />
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Input label="발주 금액 (원)" type="number" inputMode="numeric" min="0" placeholder="예: 8000000" value={f.amount} onChange={(e) => setF({ ...f, amount: e.target.value })} />
            <Select label="상태" value={f.status} onChange={(e) => setF({ ...f, status: e.target.value })}>
              {ORDER_STATES.map((s) => <option key={s} value={s}>{s}</option>)}
            </Select>
            <Input label="발주일" type="date" value={f.order_date || ''} onChange={(e) => setF({ ...f, order_date: e.target.value })} />
            <Input label="납기일" type="date" value={f.due_date || ''} onChange={(e) => setF({ ...f, due_date: e.target.value })} />
          </div>
          <div>
            <Input label="필요시기 (자재가 현장에 있어야 하는 날)" type="date" value={f.need_date || ''} onChange={(e) => setF({ ...f, need_date: e.target.value })} />
            <p className="mt-1 text-[11px] text-slate-400">🔔 이 날짜 기준 D-7 이내면 <span className="text-orange-600 font-medium">임박(주황)</span>, 지나면 <span className="text-red-600 font-medium">지남(빨강)</span>으로 강조됩니다.</p>
          </div>
          <Textarea label="메모" rows="2" placeholder="비고" value={f.memo} onChange={(e) => setF({ ...f, memo: e.target.value })} />
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit" disabled={saving}>{saving ? '저장 중...' : '저장'}</Button>
          </div>
        </form>
      );
    }
