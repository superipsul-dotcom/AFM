    // 랜덤 공유 토큰(오프라인 폴백용 — 서버는 crypto 발급). 32-hex.
    function genShareToken() {
      try {
        const a = new Uint8Array(16); (window.crypto || window.msCrypto).getRandomValues(a);
        return Array.from(a).map((b) => b.toString(16).padStart(2, '0')).join('');

        return (uid() + uid() + Date.now().toString(36)).replace(/[^a-z0-9]/gi, '').slice(0, 32);

    // 서버 응답 url('/share/<kind>/<token>')과 동일 경로를 해시로 감싼다.
    function buildShareUrl(kind, token) {

    }
    // 부팅 시 공유 경로 감지 — 해시(#/share/...) 우선, 쿼리(?share=...) · 실제 경로(/share/...)도 지원.
    function parseShareRoute() {
      const rx = /(?:^|\/)share\/(estimate|order)\/([^/?#]+)/;
      const hash = (location.hash || '').replace(/^#/, '');
      let m = hash.match(rx);
      if (m) return { kind: m[1], token: decodeURIComponent(m[2]) };
      const sv = new URLSearchParams(location.search || '').get('share');
      if (sv) { m = sv.match(/^(estimate|order)\/([^/?#]+)/); if (m) return { kind: m[1], token: decodeURIComponent(m[2]) }; }
      m = (location.pathname || '').match(rx);
      if (m) return { kind: m[1], token: decodeURIComponent(m[2]) };
      return null;

      try {
        const ta = document.createElement('textarea');
        ta.value = text; ta.setAttribute('readonly', ''); ta.style.position = 'fixed'; ta.style.top = '-1000px'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        const ok = document.execCommand('copy'); document.body.removeChild(ta); return ok;

    const pad2 = (n) => String(n).padStart(2, '0');
    const ymdLocal = (d) => `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
    // 기준일(YYYY-MM-DD, 없으면 오늘) + 기간 → YYYY-MM-DD. 주=일수 add, 월=월단위 add(말일 롤오버는 JS 표준)
    const addValidPeriod = (baseYmd, kind) => {
      const base = (baseYmd && /^\d{4}-\d{2}-\d{2}/.test(baseYmd)) ? new Date(baseYmd.slice(0, 10) + 'T00:00:00') : new Date();
      const d = new Date(base.getTime());
      if (kind === '1w') d.setDate(d.getDate() + 7);
      else if (kind === '2w') d.setDate(d.getDate() + 14);
      else if (kind === '1m') d.setMonth(d.getMonth() + 1);
      else if (kind === '3m') d.setMonth(d.getMonth() + 3);

    const effUnitPrice = (it) => {

    const orderDday = (need_date) => (need_date ? daysBetween(todayStr(), need_date) : null);

    const orderUrgency = (o) => {

      if (d == null) return null;
      if (d < 0) return 'overdue';
      if (d <= 7) return 'soon';

    };
    // 자동생성: 항목 '재료비' 산출 — 3분할(자재/노무/부자재) 있으면 Σ(material_price×qty), 없으면 Σ rowAmount
    const orderMaterialAmount = (it) => {
      const m = Number(it.material_price) || 0, l = Number(it.labor_price) || 0, s = Number(it.sub_price) || 0;
      return (m || l || s) ? Math.round((Number(it.qty) || 0) * m) : rowAmount(it);

    // 일정(process)과 견적 공종(trade) 매칭 — '목공'⊂'목공사' 등 부분일치 허용(서버는 process=공종 기준)
    const scheduleMatchesTrade = (task, trade) => {
      const p = String(task && task.process || '').trim();
      const tr = String(trade || '').trim();
      if (!p || !tr) return false;
      return p === tr || tr.indexOf(p) === 0 || p.indexOf(tr) === 0;

    // (v3) 공사원가계산서 산출 — CONTRACT v3 산출식과 1:1 (서버 totals.buildup 과 일치해야 함)
    function computeBuildup(est) {
      const items = est.items || [];
      let directMaterial = 0, directLabor = 0, subMaterial = 0;
      items.forEach((it) => {
        const q = Number(it.qty) || 0;
        directMaterial += Math.round(q * (Number(it.material_price) || 0));
        directLabor += Math.round(q * (Number(it.labor_price) || 0));
        subMaterial += Math.round(q * (Number(it.sub_price) || 0));
      });
      const r = (k) => (est[k] != null ? Number(est[k]) : BUILDUP_DEFAULTS[k]);
      const indirectMaterial = Math.round(directMaterial * r('indirect_material_rate'));
      const indirectLabor = Math.round(directLabor * r('indirect_labor_rate'));
      const materialSum = directMaterial + indirectMaterial;
      const laborSum = directLabor + indirectLabor;
      const safetyIns = Math.round(laborSum * r('safety_insurance_rate'));
      const employIns = Math.round(laborSum * r('employment_insurance_rate'));
      const safetyMgmt = Math.round((materialSum + directLabor) * r('safety_mgmt_rate'));
      const otherExp = Math.round((materialSum + laborSum) * r('other_expense_rate'));
      const expenseSum = subMaterial + safetyIns + employIns + safetyMgmt + otherExp;
      const primeCost = materialSum + laborSum + expenseSum;
      const admin = Math.round(primeCost * r('admin_rate'));
      const design = Math.round(primeCost * r('design_rate'));
      const profit = Math.round(primeCost * r('profit_rate'));
      const constructionTotal = primeCost + admin + design + profit;
      const discount = Math.max(0, Math.round(Number(est.discount) || 0));
      const afterDiscount = Math.max(0, constructionTotal - discount);
      const roundUnit = Math.max(0, Math.round(r('round_unit')));
      const proposed = roundUnit > 0 ? Math.floor(afterDiscount / roundUnit) * roundUnit : afterDiscount;
      return {

        subMaterial, safetyIns, employIns, safetyMgmt, otherExp, expenseSum, primeCost,
        admin, design, profit, constructionTotal, proposed,
      };
    }

    function computeTotals(est) {

      const discount = Math.max(0, Math.round(Number(est.discount) || 0));

        return { supplyAmount, vat, total };

        return { subtotal, discount, supplyAmount, vat, total, buildup: b };
      }
      // (v2) 기존 단순 모드 — 동작 100% 보존
      const subtotal = items.reduce((s, it) => s + calcItemAmount(it.qty, it.unit_price), 0);
      const discounted = Math.max(0, subtotal - discount);
      const { supplyAmount, vat, total } = applyVat(discounted);
      return { subtotal, discount, supplyAmount, vat, total, buildup: null };
    }

    // 금액 → 한글 (견적서 인쇄용). 조 단위까지 지원.
    function wonToKorean(num) {
      num = Math.round(Number(num) || 0);
      if (num === 0) return '영';
      const neg = num < 0; num = Math.abs(num);
      const digits = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
      const small = ['', '십', '백', '천'];
      const big = ['', '만', '억', '조', '경'];
      let result = '', gi = 0, n = num;
      while (n > 0) {
        const group = n % 10000;
        if (group > 0) {
          let gs = '', g = group;
          for (let i = 0; i < 4; i++) { const d = g % 10; if (d > 0) gs = digits[d] + small[i] + gs; g = Math.floor(g / 10); }
          result = gs + big[gi] + result;
        }
        n = Math.floor(n / 10000); gi++;
      }
      return (neg ? '마이너스 ' : '') + result;
    }

    const icsEscape = (s) => String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');
    function buildICS(siteName, tasks) {
      const pad = (x) => String(x).padStart(2, '0');
      const now = new Date();
      const stamp = `${now.getUTCFullYear()}${pad(now.getUTCMonth() + 1)}${pad(now.getUTCDate())}T${pad(now.getUTCHours())}${pad(now.getUTCMinutes())}${pad(now.getUTCSeconds())}Z`;
      const lines = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//interior-cost//KR//', 'CALSCALE:GREGORIAN', 'METHOD:PUBLISH', `X-WR-CALNAME:${icsEscape(siteName + ' 공정 일정')}`];
      (tasks || []).forEach((t) => {
        if (!t.start_date || !t.end_date) return;
        const dtstart = t.start_date.replace(/-/g, '');
        const dtend = addDays(t.end_date, 1).replace(/-/g, ''); // DTEND exclusive = 종료+1
        const summary = `[${t.process || '공정'}] ${t.title || ''}`;
        const desc = `담당자: ${t.staff || '-'}\\n상태: ${t.status || '-'}\\n계획비용: ${(Number(t.planned_cost) || 0).toLocaleString('ko-KR')}원${t.memo ? '\\n메모: ' + t.memo : ''}`;
        lines.push('BEGIN:VEVENT', `UID:schedule-${t.id}@interior-cost`, `DTSTAMP:${stamp}`,
          `DTSTART;VALUE=DATE:${dtstart}`, `DTEND;VALUE=DATE:${dtend}`,
          `SUMMARY:${icsEscape(summary)}`, `DESCRIPTION:${desc}`, 'END:VEVENT');
      });
      lines.push('END:VCALENDAR');
      return lines.join('\r\n');
    }

    function computeSummary(site, costs, estimates, schedule, orders) {
      const budget = Number(site.budget) || 0;
      const spent = costs.reduce((s, c) => s + (Number(c.amount) || 0), 0);
      const remaining = budget - spent;
      const rate = budget > 0 ? spent / budget : null;

      // ── v12: 계산서(세금계산서) 유무 → 공급가/세금포함 집계 ──
      // has_invoice ? 공급가=round(amt/1.1)·부가세=amt-공급가 : 공급가=amt·부가세=0
      let spentSupply = 0, invoicedCount = 0, invoicedAmount = 0;

      const catMap = {}, procMap = {};
      costs.forEach((c) => {
        const amt = Number(c.amount) || 0;
        catMap[c.category] = (catMap[c.category] || 0) + amt;
        if (c.process) procMap[c.process] = (procMap[c.process] || 0) + amt;
        if (c.has_invoice) { spentSupply += Math.round(amt / 1.1); invoicedCount++; invoicedAmount += amt; }
        else { spentSupply += amt; }
      });
      const spentTaxIncluded = spent;                   // = Σ amount (실제 지출 총액, 기존 spent 별칭)
      const vatTotal = spentTaxIncluded - spentSupply;  // 매입세액 합계 (환급 대상)
      const byCategory = Object.entries(catMap).map(([category, total]) => ({ category, total }));
      const byProcess = Object.entries(procMap).map(([process, total]) => ({ process, total }));

      const today = todayStr();
      const totalDays = daysBetween(site.start_date, site.end_date);
      let elapsedDays = null, remainingDays = null, progressRate = null, dday = null;
      if (site.start_date && site.end_date && totalDays != null) {
        const elapsedRaw = daysBetween(site.start_date, today);
        elapsedDays = Math.max(0, Math.min(elapsedRaw, totalDays));
        remainingDays = daysBetween(today, site.end_date);
        progressRate = totalDays > 0 ? elapsedDays / totalDays : null;
        dday = daysBetween(today, site.end_date);
      }
      // ── v2: 견적(확정) 대비 계획 + 일정 집계 ──
      let estimateTotal = null, byProcessPlan = [];
      const confirmed = (estimates || []).filter((e) => e.status === 'confirmed');
      if (confirmed.length > 0) {
        const latest = confirmed.slice().sort((a, b) => (a.created_at < b.created_at ? 1 : -1))[0];
        estimateTotal = computeTotals(latest).total;
        const pm = {};
        (latest.items || []).forEach((it) => {
          const p = it.process || '미분류';
          pm[p] = (pm[p] || 0) + calcItemAmount(it.qty, it.unit_price);
        });
        byProcessPlan = Object.entries(pm).map(([process, total]) => ({ process, total }));
      }
      const sch = schedule || [];
      const scheduleAgg = {
        taskCount: sch.length,
        plannedTotal: sch.reduce((s, t) => s + (Number(t.planned_cost) || 0), 0),
        doneCount: sch.filter((t) => t.status === '완료').length,
      };

      // ── v10: 발주 필요시기 임박/지남 집계 (계약 정의 — 미완료 발주 대상) ──
      const ords = orders || [];
      let orderDueSoon = 0, orderOverdue = 0;
      ords.forEach((o) => {
        if (ORDER_DONE_STATES.includes(o.status)) return;
        const d = orderDday(o.need_date);
        if (d == null) return;
        if (d <= 7) orderDueSoon++;   // need_date ≤ today+7 (지남 포함)
        if (d < 0) orderOverdue++;    // need_date < today
      });

      return {
        budget, spent, remaining, rate, byCategory, byProcess,
        spentSupply, spentTaxIncluded, vatTotal, invoicedCount, invoicedAmount, // v12: 공급가/세금포함/부가세/계산서건수
        schedule: { start_date: site.start_date, end_date: site.end_date, totalDays, elapsedDays, remainingDays, progressRate, dday },
        estimateTotal, byProcessPlan, scheduleAgg,
        orderDueSoon, orderOverdue,
      };
    }

    // 월별 집행 추이: [{ month:'YYYY-MM', total }]
    function computeMonthly(costs) {
      const map = {};
      costs.forEach((c) => {
        const m = (c.date || '').slice(0, 7);
        if (!m) return;
        map[m] = (map[m] || 0) + (Number(c.amount) || 0);
      });
      return Object.entries(map).map(([month, total]) => ({ month, total })).sort((a, b) => (a.month < b.month ? -1 : 1));
    }

    // ========================================
    // API 레이어 (서버 우선, 실패 시 localStorage 폴백)
    // ========================================
    // ── v13: 인증 토큰 (localStorage) ──
    const TOKEN_KEY = 'interior_token';
    function getToken() { try { return localStorage.getItem(TOKEN_KEY) || ''; } catch (e) { return ''; } }
    function setToken(t) { try { if (t) localStorage.setItem(TOKEN_KEY, t); } catch (e) {} }
    function clearToken() { try { localStorage.removeItem(TOKEN_KEY); } catch (e) {} }

    const api = {
      _useMock: false,
      _onUnauthorized: null, // v13: 보호 API가 401 응답 시 AuthGate가 등록한 콜백(세션만료 → 로그인화면)

      async _tryFetch(url, opts) {
        opts = opts || {};
        const { _skipAuthRedirect, headers: optHeaders, ...rest } = opts;
        const headers = { 'Content-Type': 'application/json', ...(optHeaders || {}) };
        const tk = getToken();
        if (tk) headers['Authorization'] = 'Bearer ' + tk; // v13: 토큰 있으면 공통 부착
        const res = await fetch(url, { ...rest, headers });
        // v13: 401 = 서버는 살아있으나 인증 필요/만료 → 토큰 삭제 + 로그인화면 전환.
        // (auth 호출은 _skipAuthRedirect 로 제외 → 잘못된 비번 등은 폼이 직접 메시지 처리)
        if (res.status === 401 && !_skipAuthRedirect) {
          clearToken();
          if (typeof api._onUnauthorized === 'function') api._onUnauthorized();
        }
        if (!res.ok) {
          let msg = 'HTTP ' + res.status;
          try { const j = await res.json(); if (j && j.error) msg = j.error; else if (j && j.message) msg = j.message; } catch {}
          const err = new Error(msg); err.status = res.status; throw err;
        }
        return res.json();
      },

      // v17: 공개 공유용 fetch — Authorization 미부착, 401(비번틀림) 시 앱 토큰/리다이렉트 건드리지 않음.
      async _publicFetch(url, opts) {
        opts = opts || {};
        const { headers: optHeaders, ...rest } = opts;
        const headers = { 'Content-Type': 'application/json', ...(optHeaders || {}) };
        const res = await fetch(url, { ...rest, headers });
        if (!res.ok) {
          let msg = 'HTTP ' + res.status;
          try { const j = await res.json(); if (j && j.error) msg = j.error; else if (j && j.message) msg = j.message; } catch {}
          const err = new Error(msg); err.status = res.status; throw err;
        }
        return res.json();
      },

      // ── v13: 인증 (서버 전용 — localStorage 폴백 없음, 4xx는 폼이 메시지 표시) ──
      async authMe() { return this._tryFetch(`${API_BASE_URL}/auth/me`, { _skipAuthRedirect: true }); },
      async authLogin(body) { return this._tryFetch(`${API_BASE_URL}/auth/login`, { method: 'POST', body: JSON.stringify(body), _skipAuthRedirect: true }); },
      async authSignup(body) { return this._tryFetch(`${API_BASE_URL}/auth/signup`, { method: 'POST', body: JSON.stringify(body), _skipAuthRedirect: true }); },

      _ensureSeed() {
        if (!localStorage.getItem(SITES_KEY)) seedSites();
        return sitesStore.read();
      },

      _sortSites(list) {
        return [...list].sort((a, b) => (a.created_at < b.created_at ? 1 : -1));
      },
      _sortCosts(list) {
        return [...list].sort((a, b) => {
          if (a.date !== b.date) return a.date < b.date ? 1 : -1;
          return (a.created_at < b.created_at) ? 1 : -1;
        });
      },
      // (v4) 현장 목록 경량 롤업 — spent(비용합)/estimateTotal(확정견적) + 신규 7필드 정규화 (폴백 클라이언트 집계)
      _rollupSites(list) {
        const allCosts = costsStore.read();
        const allEst = estimatesStore.read();
        const allClients = clientsStore.read(); // v5: client_id → client_name 해석
        return list.map((s) => {
          const spent = allCosts.filter((c) => String(c.site_id) === String(s.id)).reduce((a, c) => a + (Number(c.amount) || 0), 0);
          const confirmed = allEst.filter((e) => String(e.site_id) === String(s.id) && e.status === 'confirmed');
          let estimateTotal = null;
          if (confirmed.length) {
            const latest = confirmed.slice().sort((a, b) => (a.created_at < b.created_at ? 1 : -1))[0];
            estimateTotal = computeTotals(latest).total;
          }
          const cli = s.client_id != null ? allClients.find((c) => String(c.id) === String(s.client_id)) : null;
          return {
            ...s,
            building_type: s.building_type || '',
            floor_area: Number(s.floor_area) || 0,
            move_in_date: s.move_in_date || null,
            pm: s.pm || '', construction_manager: s.construction_manager || '', designer: s.designer || '',
            progress_status: PROGRESS_STATES.includes(s.progress_status) ? s.progress_status : '준비',
            archived: !!s.archived, // v6-1 보관 여부
            client_id: s.client_id != null ? s.client_id : null,
            client_name: cli ? cli.name : null,
            spent, estimateTotal,
          };
        });
      },

      // v9: 노션 협력업체 일괄 import (name 기준 upsert)
      async importVendors(items) {
        const arr = Array.isArray(items) ? items : (items && items.items) || [];
        try { const d = await this._tryFetch(`${API_BASE_URL}/vendors/import`, { method: 'POST', body: JSON.stringify({ items: arr }) }); this._useMock = false; return d; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          const list = vendorsStore.read(); let imported = 0, updated = 0;
          arr.forEach((it) => {
            const name = String((it && it.name) || '').trim(); if (!name) return;
            const idx = list.findIndex((v) => v.name === name);
            if (idx >= 0) {
              const patch = {}; ['kind', 'phone', 'trade', 'grade', 'memo'].forEach((k) => { if (it[k] != null) patch[k] = it[k]; });
              list[idx] = { ...list[idx], ...patch }; updated++;
            } else {
              list.push({ id: uid(), name, kind: it.kind || '', phone: it.phone || '', trade: it.trade || '', grade: it.grade || '', memo: it.memo || '', active: true, created_at: new Date().toISOString() }); imported++;

          });
          vendorsStore.write(list); return { imported, updated, total: list.length };

      // v14-3: 거래처 사용내역 — 현장별 비용/발주/계획(일정) 사용액 집계
      async vendorUsage(id) {
        try { const d = await this._tryFetch(`${API_BASE_URL}/vendors/${id}/usage`); this._useMock = false; return d; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          const vendor = vendorsStore.read().find((v) => String(v.id) === String(id));
          if (!vendor) { const err = new Error('거래처를 찾을 수 없습니다.'); err.status = 404; throw err; }
          const name = vendor.name;
          const siteName = {}; this._ensureSeed().forEach((s) => { siteName[String(s.id)] = s.name; });
          const agg = {};
          const ensure = (sid) => (agg[sid] = agg[sid] || { site_id: sid, site_name: siteName[String(sid)] || '(알 수 없는 현장)', costTotal: 0, orderTotal: 0, plannedTotal: 0, lastDate: null });
          const bump = (o, d) => { if (d && (!o.lastDate || d > o.lastDate)) o.lastDate = d; };
          costsStore.read().filter((c) => (c.vendor || '') === name).forEach((c) => { const o = ensure(String(c.site_id)); o.costTotal += Number(c.amount) || 0; bump(o, c.date); });
          ordersStore.read().filter((x) => (x.vendor || '') === name).forEach((x) => { const o = ensure(String(x.site_id)); o.orderTotal += Number(x.amount) || 0; bump(o, x.order_date || x.need_date || x.due_date); });
          scheduleStore.read().filter((t) => (t.vendor || '') === name).forEach((t) => { const o = ensure(String(t.site_id)); o.plannedTotal += Number(t.planned_cost) || 0; bump(o, t.end_date || t.start_date); });

      // v19: 폴백 전용 — kind='미팅' 일정 ↔ 연동 미팅(schedule_id) upsert/삭제 (서버 온라인 시엔 서버가 처리)
      _syncMeetingLink(schedule) {
        if (!schedule || schedule.id == null) return;

        if (schedKind(schedule) === '미팅') {
          const base = { meeting_date: schedule.start_date || null, title: schedule.title || '(미팅)', attendees: schedule.staff || '', content: schedule.memo || '' };
          if (idx >= 0) { list[idx] = { ...list[idx], ...base }; meetingsStore.write(list); } // next_action 등 기존 값 보존
          else meetingsStore.write([...list, { id: uid(), site_id: schedule.site_id, schedule_id: schedule.id, ...base, next_action: '', created_at: new Date().toISOString() }]);
        } else if (idx >= 0) {
          meetingsStore.write(list.filter((m) => String(m.schedule_id) !== String(schedule.id))); // 미팅→다른 유형: 연동 미팅 삭제

      },
      async listSchedule(siteId) {

        catch (e) {
          if (e.status) throw e; this._useMock = true;
          const tasks = scheduleStore.read().filter((t) => String(t.site_id) === String(siteId));
          const costs = costsStore.read().filter((c) => String(c.site_id) === String(siteId));
          // v6-4: 선후관계(predecessors/successors) 매핑 (현장 전체 1회 조회 후 매핑)
          const deps = scheduleDepsStore.read();
          const rel = {}; tasks.forEach((t) => { rel[String(t.id)] = { preds: [], succs: [] }; });
          deps.forEach((d) => {
            const s = String(d.successor_id), p = String(d.predecessor_id);
            if (rel[s]) rel[s].preds.push(d.predecessor_id);
            if (rel[p]) rel[p].succs.push(d.successor_id);
          });
          return withActual(tasks, costs).map((t) => ({
            ...t,
            predecessors: (rel[String(t.id)] && rel[String(t.id)].preds) || [],
            successors: (rel[String(t.id)] && rel[String(t.id)].succs) || [],
          })).sort((a, b) => {
            if (a.start_date !== b.start_date) return a.start_date < b.start_date ? -1 : 1;
            return (a.sort_order || 0) - (b.sort_order || 0);
          });

      async createSchedule(siteId, body) {
        try { const d = await this._tryFetch(`${API_BASE_URL}/sites/${siteId}/schedule`, { method: 'POST', body: JSON.stringify(body) }); this._useMock = false; return d; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          if (body.start_date && body.end_date && body.start_date > body.end_date) throw new Error('종료일은 시작일 이후여야 합니다.');
          const item = {

      async updateSchedule(id, body) {
        try { const d = await this._tryFetch(`${API_BASE_URL}/schedule/${id}`, { method: 'PUT', body: JSON.stringify(body) }); this._useMock = false; return d; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          if (body.start_date && body.end_date && body.start_date > body.end_date) throw new Error('종료일은 시작일 이후여야 합니다.');
          const { cascade, ...rest } = body;
          const patch = { ...rest };
          if (patch.planned_cost != null) patch.planned_cost = Math.round(Number(patch.planned_cost) || 0);
          const list = scheduleStore.read();
          const before = list.find((t) => String(t.id) === String(id));
          // v6-4 연쇄이동: delta = 새 start_date − 기존 start_date (UTC 자정 기준 일수)
          let shifted = [];
          let toShift = new Set();
          const delta = (cascade && before && body.start_date) ? daysBetween(before.start_date, body.start_date) : 0;
          if (cascade && delta) {
            const deps = scheduleDepsStore.read();
            const succAdj = {}; deps.forEach((d) => { const p = String(d.predecessor_id); (succAdj[p] = succAdj[p] || []).push(String(d.successor_id)); });
            const visited = new Set([String(id)]); const q = [String(id)];
            while (q.length) { const cur = q.shift(); (succAdj[cur] || []).forEach((s) => { if (!visited.has(s)) { visited.add(s); toShift.add(s); q.push(s); } }); }
          }
          const next = list.map((t) => {
            if (String(t.id) === String(id)) return { ...t, ...patch };
            if (toShift.has(String(t.id))) {
              const ns = t.start_date ? addDays(t.start_date, delta) : t.start_date;
              const ne = t.end_date ? addDays(t.end_date, delta) : t.end_date;
              shifted.push({ id: t.id, start_date: ns, end_date: ne });
              return { ...t, start_date: ns, end_date: ne };
            }
            return t;
          });
          scheduleStore.write(next);
          const updated = next.find((t) => String(t.id) === String(id));
          this._syncMeetingLink(updated); // v19 미팅 연동(kind 변경/제목·날짜 갱신 반영)
          return cascade ? { ...updated, shifted } : updated;
        }
      },
      async removeSchedule(id) {
        try { await this._tryFetch(`${API_BASE_URL}/schedule/${id}`, { method: 'DELETE' }); this._useMock = false; return { success: true }; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          scheduleStore.write(scheduleStore.read().filter((t) => String(t.id) !== String(id)));
          // v6-4: 이 일정과 연결된 선후관계도 함께 제거 (서버 ON DELETE CASCADE 대응)
          scheduleDepsStore.write(scheduleDepsStore.read().filter((d) => String(d.predecessor_id) !== String(id) && String(d.successor_id) !== String(id)));
          // 연결 비용의 schedule_id 는 null 처리 (비용 자체는 보존)
          costsStore.write(costsStore.read().map((c) => (String(c.schedule_id) === String(id) ? { ...c, schedule_id: null } : c)));
          // v19: 연동된 미팅(schedule_id 매칭) 삭제

      // ════════ v6-4: 일정 선후관계(의존성) ════════
      async addDep(succId, predId) {
        try { const d = await this._tryFetch(`${API_BASE_URL}/schedule/${succId}/deps`, { method: 'POST', body: JSON.stringify({ predecessor_id: predId }) }); this._useMock = false; return d; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          if (String(succId) === String(predId)) { const err = new Error('자기 자신은 선행으로 지정할 수 없습니다.'); err.status = 400; throw err; }
          const tasks = scheduleStore.read();
          const succ = tasks.find((t) => String(t.id) === String(succId));
          const pred = tasks.find((t) => String(t.id) === String(predId));
          if (!succ || !pred) { const err = new Error('일정을 찾을 수 없습니다.'); err.status = 404; throw err; }
          if (String(succ.site_id) !== String(pred.site_id)) { const err = new Error('같은 현장의 일정끼리만 연결할 수 있습니다.'); err.status = 400; throw err; }
          const deps = scheduleDepsStore.read();
          const dup = deps.find((d) => String(d.predecessor_id) === String(predId) && String(d.successor_id) === String(succId));
          if (dup) return dup; // 멱등
          // 사이클 가드: succ → ... → pred 경로가 이미 있으면 추가 시 순환
          const succAdj = {}; deps.forEach((d) => { const p = String(d.predecessor_id); (succAdj[p] = succAdj[p] || []).push(String(d.successor_id)); });
          const visited = new Set([String(succId)]); const q = [String(succId)];
          while (q.length) { const cur = q.shift(); for (const n of (succAdj[cur] || [])) { if (n === String(predId)) { const err = new Error('순환 의존성은 만들 수 없습니다.'); err.status = 400; throw err; } if (!visited.has(n)) { visited.add(n); q.push(n); } } }
          const item = { id: uid(), predecessor_id: predId, successor_id: succId, created_at: new Date().toISOString() };
          scheduleDepsStore.write([...deps, item]); return item;
        }
      },
      async removeDep(succId, predId) {
        try { await this._tryFetch(`${API_BASE_URL}/schedule/${succId}/deps/${predId}`, { method: 'DELETE' }); this._useMock = false; return { success: true }; }
        catch (e) {

          scheduleDepsStore.write(scheduleDepsStore.read().filter((d) => !(String(d.predecessor_id) === String(predId) && String(d.successor_id) === String(succId))));
          return { success: true };

      async autoGenerateOrders(siteId, opts = {}) {
        const replace = opts.replace ? 1 : 0;
        try {
          const d = await this._tryFetch(`${API_BASE_URL}/sites/${siteId}/orders/auto-generate${replace ? '?replace=1' : ''}`, { method: 'POST', body: JSON.stringify({ estimate_id: opts.estimateId || undefined }) });
          this._useMock = false; return d;
        } catch (e) {
          if (e.status) throw e; // 서버 응답(404 '확정된 견적이 없습니다' 등)은 그대로 전달 → UI 토스트
          this._useMock = true;
          // ── 폴백: 최신 confirmed 견적 기반 ──
          const ests = estimatesStore.read().filter((x) => String(x.site_id) === String(siteId));
          const confirmed = ests.filter((x) => x.status === 'confirmed');
          if (confirmed.length === 0) { const err = new Error('확정된 견적이 없습니다'); err.status = 404; throw err; }
          const latest = confirmed.slice().sort((a, b) => (a.created_at < b.created_at ? 1 : -1))[0];
          const sched = scheduleStore.read().filter((t) => String(t.site_id) === String(siteId));
          // 견적 항목을 공종(trade/process)별로 그룹 → 공종당 재료비 합
          const groups = {};
          (latest.items || []).forEach((it) => {
            const tr = it.trade || it.process || '미분류';
            groups[tr] = (groups[tr] || 0) + orderMaterialAmount(it);
          });
          // replace=1: 기존 자동생성(대기) 발주 삭제 후 재생성
          let cur = ordersStore.read();
          if (replace) cur = cur.filter((o) => !(String(o.site_id) === String(siteId) && o.auto_generated && o.status === '대기'));
          const created = Object.keys(groups).map((trade) => {
            const dates = sched.filter((t) => scheduleMatchesTrade(t, trade)).map((t) => t.start_date).filter(Boolean).sort();
            const need_date = dates.length ? addDays(dates[0], -3) : null; // 가장 이른 start_date − 3일(리드타임)
            const id = uid();
            return {
              id, site_id: siteId, order_no: 'PO-' + id, vendor: '', trade,
              title: trade + ' 자재 발주', amount: Math.max(0, Math.round(groups[trade])),
              order_date: null, due_date: null, need_date, status: '대기',
              auto_generated: true, memo: '', created_at: new Date().toISOString(),
            };
          });
          ordersStore.write([...cur, ...created]);
          return { generated: created.length, orders: created };
        }
      },

      // ════════ v5: 미팅 (meetings) — 프로젝트 종속 ════════
      async listMeetings(siteId) {
        try { const d = await this._tryFetch(`${API_BASE_URL}/sites/${siteId}/meetings`); this._useMock = false; return d; }

          if (e.status) throw e; this._useMock = true;

            const ad = a.meeting_date || '', bd = b.meeting_date || '';

        }

            attendees: body.attendees || '', content: body.content || '', next_action: body.next_action || '', created_at: new Date().toISOString(),

      // ════════ v20: 자료(파일) — Supabase Storage 직접 업로드 ════════
      // 흐름: signUploadDoc → (클라가 uploadUrl 로 파일 직접 PUT) → createDocument(메타)
      // 스토리지 미설정(키 없음)이면 sign-upload 가 503 → UI가 "관리자 설정 필요" 안내. 서버 다운(네트워크)이면 offline 안내.

          const next = documentsStore.read().map((x) => (String(x.id) === String(id) ? { ...x, ...patch } : x));
          documentsStore.write(next); return next.find((x) => String(x.id) === String(id));

        }

      // ════════ v20: 현장사진 — Storage 직접 업로드 (업로더·시각 자동=서버) ════════
      async signUploadPhoto(siteId, body) {
        try { const d = await this._tryFetch(`${API_BASE_URL}/sites/${siteId}/photos/sign-upload`, { method: 'POST', body: JSON.stringify(body) }); this._useMock = false; return d; }
        catch (e) {

        catch (e) {

          const item = {
            id: uid(), site_id: siteId, photo_date: body.photo_date || todayStr(),
            processes: body.processes || '', storage_path: body.storage_path || '',

        catch (e) { if (e.status) throw e; this._useMock = true; photosStore.write(photosStore.read().filter((x) => String(x.id) !== String(id))); return { success: true }; }
      },

        try { const d = await this._tryFetch(`${API_BASE_URL}/photos/${id}/download`); this._useMock = false; return d && d.url; }
        catch (e) {
          if (e.status) throw e; this._useMock = true;
          const err = new Error('데모/오프라인 모드에서는 사진을 볼 수 없습니다.'); err.offline = true; throw err;

      // 서명 업로드 URL 로 파일 직접 PUT (Supabase Storage — 앱 토큰 미부착, 원시 fetch)
      async putToSignedUrl(uploadUrl, file) {
        const res = await fetch(uploadUrl, {
          method: 'PUT',
          headers: { 'x-upsert': 'true', 'Content-Type': file.type || 'application/octet-stream' },
          body: file,
        });
        if (!res.ok) { const err = new Error('스토리지 업로드 실패 (HTTP ' + res.status + ')'); err.status = res.status; throw err; }
        return true;
      },
    };

    function Button({ variant = 'primary', size = 'md', disabled, onClick, type = 'button', className = '', children }) {
      const base = 'inline-flex items-center justify-center font-semibold rounded-xl transition focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-400',
        secondary: 'bg-slate-200 text-slate-700 hover:bg-slate-300 focus:ring-slate-400',
        danger: 'bg-red-600 text-white hover:bg-red-700 focus:ring-red-400',
        ghost: 'bg-transparent text-slate-600 hover:bg-slate-100 focus:ring-slate-300',
      };
      const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2.5 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    // 드롭다운 + 자유입력 (마스터 기반 셀렉트 + 직접 입력 fallback)
    function Combo({ label, value, onChange, options = [], error, className = '', placeholder, ...props }) {

    function Card({ className = '', children }) {

    }

    function Badge({ color = 'bg-slate-400', className = '', children }) {
      return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium text-white ${color} ${className}`}>{children}</span>;
    }

    function Modal({ isOpen, onClose, title, children, size = 'md' }) {
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [isOpen, onClose]);
      if (!isOpen) return null;
      const sizes = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-2xl', xl: 'max-w-5xl' };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true">
          <div className="absolute inset-0 bg-black/40 animate-fade-in" onClick={onClose}></div>
          <div className={`relative w-full ${sizes[size]} bg-white rounded-2xl shadow-xl animate-scale-in max-h-[90vh] overflow-y-auto`}>
            {title && (
              <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100 sticky top-0 bg-white rounded-t-2xl">
                <h3 className="text-lg font-bold text-slate-800">{title}</h3>
                <button onClick={onClose} aria-label="닫기" className="text-slate-400 hover:text-slate-600 text-xl leading-none">×</button>
              </div>
            )}
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    // ========================================
    // Toast (Context + Provider)
    // ========================================
    const ToastContext = createContext(null);
    const useToast = () => useContext(ToastContext);

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const push = useCallback((message, type = 'success') => {
        const id = uid();
        setToasts((prev) => [...prev, { id, message, type }]);
        setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 2800);
      }, []);
      const colors = { success: 'bg-emerald-600', error: 'bg-red-600', info: 'bg-slate-700' };
      const icons = { success: '✓', error: '!', info: 'ℹ' };
      return (
        <ToastContext.Provider value={push}>
          {children}
          <div className="fixed top-4 right-4 z-[60] flex flex-col gap-2 max-w-[90vw] no-print">
            {toasts.map((t) => (
              <div key={t.id} className={`flex items-center gap-2 px-4 py-3 rounded-xl text-white shadow-lg animate-slide-in ${colors[t.type]}`}>
                <span className="font-bold">{icons[t.type]}</span>
                <span className="text-sm">{t.message}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }
