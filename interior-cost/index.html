    function Badge({ color = 'bg-slate-400', className = '', children }) {
      return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium text-white ${color} ${className}`}>{children}</span>;
    }

    function Modal({ isOpen, onClose, title, children, size = 'md' }) {
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [isOpen, onClose]);
      if (!isOpen) return null;
      const sizes = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-2xl', xl: 'max-w-5xl' };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true">
          <div className="absolute inset-0 bg-black/40 animate-fade-in" onClick={onClose}></div>
          <div className={`relative w-full ${sizes[size]} bg-white rounded-2xl shadow-xl animate-scale-in max-h-[90vh] overflow-y-auto`}>
            {title && (
              <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100 sticky top-0 bg-white rounded-t-2xl">
                <h3 className="text-lg font-bold text-slate-800">{title}</h3>
                <button onClick={onClose} aria-label="닫기" className="text-slate-400 hover:text-slate-600 text-xl leading-none">×</button>
              </div>
            )}
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    // ========================================
    // Toast (Context + Provider)
    // ========================================
    const ToastContext = createContext(null);
    const useToast = () => useContext(ToastContext);

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const push = useCallback((message, type = 'success') => {
        const id = uid();
        setToasts((prev) => [...prev, { id, message, type }]);
        setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 2800);
      }, []);
      const colors = { success: 'bg-emerald-600', error: 'bg-red-600', info: 'bg-slate-700' };
      const icons = { success: '✓', error: '!', info: 'ℹ' };
      return (
        <ToastContext.Provider value={push}>
          {children}
          <div className="fixed top-4 right-4 z-[60] flex flex-col gap-2 max-w-[90vw] no-print">
            {toasts.map((t) => (
              <div key={t.id} className={`flex items-center gap-2 px-4 py-3 rounded-xl text-white shadow-lg animate-slide-in ${colors[t.type]}`}>
                <span className="font-bold">{icons[t.type]}</span>
                <span className="text-sm">{t.message}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    // ========================================
    // 🧩 현장 등록/수정 폼 (모달 내부)
    // ========================================
    function SiteForm({ editing, onSubmit, onCancel, staffNames = [] }) {
      const blank = {
        name: '', client: '', address: '', manager: '', budget: '', start_date: todayStr(), end_date: '', status: '진행', tags: '',
        building_type: '', floor_area: '', move_in_date: '', pm: '', construction_manager: '', designer: '', progress_status: '준비',
      };
      const [form, setForm] = useState(editing ? {
        name: editing.name || '', client: editing.client || '', address: editing.address || '',
        manager: editing.manager || '', budget: editing.budget != null ? String(editing.budget) : '',
        start_date: editing.start_date || todayStr(), end_date: editing.end_date || '',
        status: editing.status || '진행', tags: editing.tags || '',
        building_type: editing.building_type || '',
        floor_area: (editing.floor_area != null && Number(editing.floor_area) > 0) ? String(editing.floor_area) : '',
        move_in_date: editing.move_in_date || '',
        pm: editing.pm || '', construction_manager: editing.construction_manager || '', designer: editing.designer || '',
        progress_status: PROGRESS_STATES.includes(editing.progress_status) ? editing.progress_status : '준비',
      } : blank);
      const [errors, setErrors] = useState({});
      const [submitting, setSubmitting] = useState(false);

      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name = '현장명을 입력하세요.';
        const b = Number(form.budget);
        if (form.budget === '' || isNaN(b) || b < 0) e.budget = '견적비는 0 이상의 숫자여야 합니다.';
        if (form.floor_area !== '' && (isNaN(Number(form.floor_area)) || Number(form.floor_area) < 0)) e.floor_area = '면적은 0 이상이어야 합니다.';
        if (form.start_date && form.end_date && form.start_date > form.end_date) e.end_date = '준공일은 착공일 이후여야 합니다.';
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const handleSubmit = async (ev) => {
        ev.preventDefault();
        if (!validate()) return;
        setSubmitting(true);
        const ok = await onSubmit({
          name: form.name.trim(), client: form.client.trim(), address: form.address.trim(),
          manager: form.manager.trim(), budget: Math.round(Number(form.budget) || 0),
          start_date: form.start_date || null, end_date: form.end_date || null,
          status: form.status || '진행', tags: (form.tags || '').trim(),
          building_type: form.building_type || '',
          floor_area: form.floor_area === '' ? 0 : Math.max(0, Number(form.floor_area) || 0),
          move_in_date: form.move_in_date || null,
          pm: (form.pm || '').trim(), construction_manager: (form.construction_manager || '').trim(), designer: (form.designer || '').trim(),
          progress_status: PROGRESS_STATES.includes(form.progress_status) ? form.progress_status : '준비',
        });
        setSubmitting(false);
        // ok=true 면 부모가 모달 닫음
      };

      return (
        <form onSubmit={handleSubmit} className="space-y-4">
          <Input label="현장(프로젝트)명 *" placeholder="예: 래미안 아파트 34평 리모델링" value={form.name} error={errors.name}
            onChange={(e) => setForm({ ...form, name: e.target.value })} />
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Input label="발주처 / 고객" placeholder="예: 김철수" value={form.client}
              onChange={(e) => setForm({ ...form, client: e.target.value })} />
            <Input label="현장 담당자" placeholder="예: 박현장" value={form.manager}
              onChange={(e) => setForm({ ...form, manager: e.target.value })} />
          </div>
          <Input label="현장 주소" placeholder="예: 서울시 강남구 도곡로 123" value={form.address}
            onChange={(e) => setForm({ ...form, address: e.target.value })} />
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Input label="견적비 (예산, 원) *" type="number" inputMode="numeric" min="0" placeholder="예: 50000000"
              value={form.budget} error={errors.budget}
              onChange={(e) => setForm({ ...form, budget: e.target.value })} />
            <Select label="현장 상태" value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })}>
              {SITE_STATUSES.map((s) => <option key={s} value={s}>{s}</option>)}
            </Select>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Input label="착공일" type="date" value={form.start_date || ''}
              onChange={(e) => setForm({ ...form, start_date: e.target.value })} />
            <Input label="준공(예정)일" type="date" value={form.end_date || ''} error={errors.end_date}
              onChange={(e) => setForm({ ...form, end_date: e.target.value })} />
          </div>

          {/* v4: 프로젝트 속성 (노션 DB) */}
          <div className="pt-2 border-t border-slate-100">
            <p className="text-xs font-bold text-slate-500 mb-3">🗂 프로젝트 속성</p>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <Select label="건물 종류" value={form.building_type} onChange={(e) => setForm({ ...form, building_type: e.target.value })}>
                <option value="">선택 안 함</option>
                {BUILDING_TYPES.map((b) => <option key={b} value={b}>{b}</option>)}
              </Select>
              <Input label="바닥면적 (㎡)" type="number" inputMode="decimal" min="0" step="0.01" placeholder="예: 112.4"
                value={form.floor_area} error={errors.floor_area}
                onChange={(e) => setForm({ ...form, floor_area: e.target.value })} />
              <Input label="입주 예정일" type="date" value={form.move_in_date || ''}
                onChange={(e) => setForm({ ...form, move_in_date: e.target.value })} />
              <Select label="진행 상태 (프로젝트)" value={form.progress_status} onChange={(e) => setForm({ ...form, progress_status: e.target.value })}>
                {PROGRESS_STATES.map((p) => <option key={p} value={p}>{p}</option>)}
              </Select>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-4">
              <Combo label="PM" placeholder="담당자 선택/입력" value={form.pm} options={staffNames}
                onChange={(e) => setForm({ ...form, pm: e.target.value })} />
              <Combo label="시공책임" placeholder="담당자 선택/입력" value={form.construction_manager} options={staffNames}
                onChange={(e) => setForm({ ...form, construction_manager: e.target.value })} />
              <Combo label="디자이너" placeholder="담당자 선택/입력" value={form.designer} options={staffNames}
                onChange={(e) => setForm({ ...form, designer: e.target.value })} />
            </div>
          </div>

          <Input label="태그 (콤마로 구분)" placeholder="예: 아파트, 전체리모델링, VIP" value={form.tags}
            onChange={(e) => setForm({ ...form, tags: e.target.value })} />
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit" disabled={submitting}>{submitting ? '저장 중...' : (editing ? '수정 저장' : '현장 등록')}</Button>
          </div>
        </form>
      );
    }

    // ========================================
    // 🧩 요약 대시보드 (비용 카드 + 날짜/진행률)
    // ========================================
    function SummaryDashboard({ summary, loading }) {
      if (loading || !summary) {
        return (
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
            {[1, 2, 3, 4].map((i) => <div key={i} className="h-28 bg-white rounded-2xl border border-slate-100 animate-pulse"></div>)}
          </div>
        );
      }

      // ⚠️ 퍼센트는 프론트에서 직접 계산 (서버 rate 신뢰 X)
      const rate = summary.budget > 0 ? (summary.spent / summary.budget) * 100 : 0;
      const over = summary.budget > 0 && summary.spent > summary.budget;
      const remaining = summary.budget - summary.spent;

      const cards = [
        { label: '견적비 (예산)', value: summary.budget, color: 'text-slate-700', bg: 'from-slate-50 to-white', ring: 'border-slate-100', icon: '📋' },
        { label: '집행액', value: summary.spent, color: 'text-blue-600', bg: 'from-blue-50 to-white', ring: 'border-blue-100', icon: '💸' },
        { label: '잔여', value: remaining, color: remaining < 0 ? 'text-red-600' : 'text-emerald-600', bg: remaining < 0 ? 'from-red-50 to-white' : 'from-emerald-50 to-white', ring: remaining < 0 ? 'border-red-100' : 'border-emerald-100', icon: '🏦' },
      ];

      const sc = summary.schedule || {};
      // ⚠️ 진행률도 프론트 직접 계산
      const progress = (sc.totalDays && sc.totalDays > 0 && sc.elapsedDays != null) ? (sc.elapsedDays / sc.totalDays) * 100 : null;
      const delayed = sc.dday != null && sc.dday < 0;

      return (
        <div className="space-y-4">
          {/* 비용 카드 */}
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
            {cards.map((c) => (
              <Card key={c.label} className={`p-4 sm:p-5 bg-gradient-to-br ${c.bg} ${c.ring}`}>
                <div className="flex items-center justify-between">
                  <span className="text-sm font-medium text-slate-500">{c.label}</span>
                  <span className="text-lg">{c.icon}</span>
                </div>
                <div className={`mt-2 text-lg sm:text-xl font-extrabold ${c.color} break-all`}>{fmtWon(c.value)}</div>
              </Card>
            ))}
            {/* 집행률 카드 */}
            <Card className={`p-4 sm:p-5 bg-gradient-to-br ${over ? 'from-red-50 to-white border-red-200' : 'from-indigo-50 to-white border-indigo-100'}`}>
              <div className="flex items-center justify-between">
                <span className="text-sm font-medium text-slate-500">집행률</span>
                <span className="text-lg">{over ? '⚠️' : '📊'}</span>
              </div>
              <div className={`mt-2 text-2xl font-extrabold ${over ? 'text-red-600' : 'text-indigo-600'}`}>
                {summary.budget > 0 ? rate.toFixed(1) + '%' : '—'}
              </div>
              <div className="mt-2 h-2 bg-white/70 rounded-full overflow-hidden">
                <div className={`h-full rounded-full bar-grow ${over ? 'bg-red-500' : rate >= 80 ? 'bg-orange-400' : 'bg-indigo-500'}`}
                  style={{ width: Math.min(rate, 100) + '%' }}></div>
              </div>
              {over && <p className="mt-1.5 text-xs font-semibold text-red-600">예산 초과! {fmtWon(Math.abs(remaining))} 초과</p>}
            </Card>
          </div>

          {/* 공기 / 일정 */}
          <Card className="p-5">
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-base font-bold text-slate-800">공사 일정</h2>
              {sc.start_date && sc.end_date ? (
                delayed
                  ? <Badge color="bg-red-500">지연 ({Math.abs(sc.dday)}일 초과)</Badge>
                  : <Badge color="bg-blue-500">{sc.dday === 0 ? 'D-Day' : 'D-' + sc.dday}</Badge>
              ) : <Badge color="bg-slate-400">일정 미설정</Badge>}
            </div>

            {sc.start_date && sc.end_date ? (
              <>
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
                  {[
                    { label: '공기 (총)', value: sc.totalDays != null ? sc.totalDays + '일' : '—', sub: `${sc.start_date} ~ ${sc.end_date}` },
                    { label: '경과일', value: sc.elapsedDays != null ? sc.elapsedDays + '일' : '—', sub: null },
                    { label: '잔여일', value: sc.remainingDays != null ? (sc.remainingDays >= 0 ? sc.remainingDays + '일' : '초과') : '—', sub: null },
                    { label: 'D-day', value: sc.dday != null ? (sc.dday >= 0 ? 'D-' + sc.dday : 'D+' + Math.abs(sc.dday)) : '—', sub: null },
                  ].map((b) => (
                    <div key={b.label} className="p-3 rounded-xl bg-slate-50 border border-slate-100">
                      <p className="text-xs text-slate-500">{b.label}</p>
                      <p className={`mt-0.5 text-lg font-bold ${b.label === 'D-day' && delayed ? 'text-red-600' : 'text-slate-800'}`}>{b.value}</p>
                      {b.sub && <p className="mt-0.5 text-[11px] text-slate-400 truncate">{b.sub}</p>}
                    </div>
                  ))}
                </div>
                <div>
                  <div className="flex items-center justify-between text-xs mb-1.5">
                    <span className="font-medium text-slate-600">진행률</span>
                    <span className={`font-bold ${delayed ? 'text-red-600' : 'text-slate-700'}`}>
                      {progress != null ? Math.min(progress, 100).toFixed(0) + '%' : '—'}
                    </span>
                  </div>
                  <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full bar-grow ${delayed ? 'bg-red-500' : 'bg-blue-500'}`}
                      style={{ width: (progress != null ? Math.min(progress, 100) : 0) + '%' }}></div>
                  </div>
                </div>
              </>
            ) : (
              <p className="text-sm text-slate-400 text-center py-4">착공일/준공일을 입력하면 공기와 진행률이 표시됩니다.</p>
            )}
          </Card>
        </div>
      );
    }

    // ========================================
    // 🧩 비용 등록/수정 폼
    // ========================================
    function CostForm({ onSubmit, editing, onCancelEdit, catNames = [], procNames = [], staffNames = [], vendorNames = [], scheduleOptions = [] }) {
      const blank = { date: todayStr(), amount: '', category: '', process: '', manager: '', vendor: '', memo: '', schedule_id: '' };
      const [form, setForm] = useState(blank);
      const [errors, setErrors] = useState({});
      const [submitting, setSubmitting] = useState(false);

      useEffect(() => {
        if (editing) {
          setForm({
            date: editing.date || todayStr(), amount: String(editing.amount || ''),
            category: editing.category || '', process: editing.process || '',
            manager: editing.manager || '', vendor: editing.vendor || '', memo: editing.memo || '',
            schedule_id: editing.schedule_id != null ? String(editing.schedule_id) : '',
          });
          setErrors({});
        }
      }, [editing]);

      const validate = () => {
        const e = {};
        const amt = Number(form.amount);
        if (!form.amount || isNaN(amt) || amt <= 0) e.amount = '금액은 0보다 큰 숫자여야 합니다.';
        if (!form.category.trim()) e.category = '비용 카테고리를 선택/입력하세요.';
        if (!form.date) e.date = '날짜를 선택하세요.';
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const handleSubmit = async (ev) => {
        ev.preventDefault();
        if (!validate()) return;
        setSubmitting(true);
        const ok = await onSubmit({
          date: form.date, amount: Math.round(Number(form.amount)),
          category: form.category.trim(), process: form.process.trim() || null,
          manager: form.manager.trim(), vendor: form.vendor.trim(), memo: form.memo.trim(),
          schedule_id: form.schedule_id ? form.schedule_id : null,
        });
        setSubmitting(false);
        if (ok && !editing) setForm({ ...blank, date: form.date });
      };

      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-base font-bold text-slate-800">{editing ? '비용 수정' : '비용 등록'}</h2>
            {editing && <Button variant="ghost" size="sm" onClick={onCancelEdit}>수정 취소</Button>}
          </div>
          <form onSubmit={handleSubmit} className="space-y-4">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <Input label="날짜 *" type="date" value={form.date} error={errors.date}
                onChange={(e) => setForm({ ...form, date: e.target.value })} />
              <Input label="금액 (원) *" type="number" inputMode="numeric" min="0" placeholder="예: 1500000"
                value={form.amount} error={errors.amount}
                onChange={(e) => setForm({ ...form, amount: e.target.value })} />
              <Combo label="비용 카테고리 *" placeholder="선택 또는 직접 입력" value={form.category} error={errors.category}
                options={catNames.length ? catNames : COST_CATEGORIES}
                onChange={(e) => setForm({ ...form, category: e.target.value })} />
              <Combo label="공정 카테고리" placeholder="선택 또는 직접 입력 (선택)" value={form.process}
                options={procNames.length ? procNames : PROCESS_CATEGORIES}
                onChange={(e) => setForm({ ...form, process: e.target.value })} />
              <Combo label="담당자" placeholder="예: 박현장" value={form.manager} options={staffNames}
                onChange={(e) => setForm({ ...form, manager: e.target.value })} />
              <Combo label="거래처" placeholder="예: 한솔자재" value={form.vendor} options={vendorNames}
                onChange={(e) => setForm({ ...form, vendor: e.target.value })} />
            </div>
            {scheduleOptions.length > 0 && (
              <Select label="연결 일정 (선택)" value={form.schedule_id}
                onChange={(e) => setForm({ ...form, schedule_id: e.target.value })}>
                <option value="">연결 안 함</option>
                {scheduleOptions.map((t) => (
                  <option key={t.id} value={String(t.id)}>
                    [{t.process || '공정'}] {t.title} ({t.start_date}~{t.end_date})
                  </option>
                ))}
              </Select>
            )}
            <Textarea label="메모 (선택)" rows="2" placeholder="간단한 메모" value={form.memo}
              onChange={(e) => setForm({ ...form, memo: e.target.value })} />
            <Button type="submit" size="lg" disabled={submitting} className="w-full">
              {submitting ? '저장 중...' : (editing ? '수정 저장' : '비용 등록하기')}
            </Button>
          </form>
        </Card>
      );
    }

    // ========================================
    // 🧩 분석 (비용 카테고리별 / 공정별 비율 바)
    // ========================================
    function BreakdownBars({ title, items, keyName, colorMap, total }) {
      const sorted = [...items].sort((a, b) => b.total - a.total);
      if (sorted.length === 0) {
        return (
          <div>
            <h3 className="text-sm font-bold text-slate-700 mb-2.5">{title}</h3>
            <p className="text-sm text-slate-400 text-center py-4">데이터가 없습니다.</p>
          </div>
        );
      }
      return (
        <div>
          <div className="flex items-center justify-between mb-2.5">
            <h3 className="text-sm font-bold text-slate-700">{title}</h3>
            <span className="text-sm font-bold text-slate-700">{fmtWon(total)}</span>
          </div>
          <div className="space-y-2.5">
            {sorted.map((c) => {
              const name = c[keyName];
              const pct = total > 0 ? Math.round((c.total / total) * 100) : 0;
              const color = colorMap[name] || 'bg-slate-400';
              return (
                <div key={name}>
                  <div className="flex items-center justify-between text-xs mb-1">
                    <span className="flex items-center gap-1.5 min-w-0">
                      <span className={`w-2.5 h-2.5 rounded-full shrink-0 ${color}`}></span>
                      <span className="font-medium text-slate-600 truncate">{name}</span>
                      <span className="text-slate-400 shrink-0">{pct}%</span>
                    </span>
                    <span className="font-semibold text-slate-700 shrink-0">{fmtWon(c.total)}</span>
                  </div>
                  <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full bar-grow ${color}`} style={{ width: pct + '%' }}></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function Analysis({ summary, loading }) {
      if (loading || !summary) {
        return <Card className="p-5"><div className="h-48 bg-slate-100 rounded-xl animate-pulse"></div></Card>;
      }
      const spent = summary.spent || 0;
      return (
        <Card className="p-5">
          <h2 className="text-base font-bold text-slate-800 mb-4">집행 분석</h2>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <BreakdownBars title="비용 카테고리별" items={summary.byCategory || []} keyName="category" colorMap={COST_COLOR} total={spent} />
            <BreakdownBars title="공정별" items={summary.byProcess || []} keyName="process" colorMap={PROC_COLOR} total={spent} />
          </div>
        </Card>
      );
    }

    // ========================================
    // 🧩 월별 집행 추이 (Chart.js)
    // ========================================
    function MonthlyTrend({ costs, loading }) {
      const canvasRef = useRef(null);
      const monthly = useMemo(() => computeMonthly(costs || []), [costs]);
      const labels = monthly.map((r) => r.month);
      const data = monthly.map((r) => r.total);
      const hasData = monthly.length > 0;

      useEffect(() => {
        if (loading || !hasData || !canvasRef.current || typeof Chart === 'undefined') return;
        const ctx = canvasRef.current.getContext('2d');
        const chart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              label: '집행액', data,
              backgroundColor: 'rgba(59, 130, 246, 0.75)',
              borderRadius: 6, maxBarThickness: 40,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: (c) => fmtWon(c.parsed.y) } },
            },
            scales: {
              x: { grid: { display: false }, ticks: { font: { size: 11 } } },
              y: {
                beginAtZero: true,
                ticks: { font: { size: 11 }, callback: (v) => (v >= 10000 ? (v / 10000) + '만' : v.toLocaleString('ko-KR')) },
                grid: { color: 'rgba(148, 163, 184, 0.15)' },
              },
            },
          },
        });
        return () => chart.destroy();
      }, [loading, hasData, JSON.stringify(labels), JSON.stringify(data)]);

      return (
        <Card className="p-5">
          <h2 className="text-base font-bold text-slate-800 mb-4">월별 집행 추이</h2>
          {loading ? (
            <div className="h-56 bg-slate-100 rounded-xl animate-pulse"></div>
          ) : !hasData ? (
            <div className="text-center py-12">
              <div className="text-4xl mb-2">📊</div>
              <p className="text-sm text-slate-400">표시할 데이터가 없습니다.</p>
            </div>
          ) : (
            <div className="relative h-56 sm:h-64"><canvas ref={canvasRef} aria-label="월별 집행 추이 차트" role="img"></canvas></div>
          )}
        </Card>
      );
    }

    // ========================================
    // 🧩 비용 목록
    // ========================================
    function CostList({ costs, onEdit, onAskDelete, loading, schedule = [] }) {
      const schedMap = useMemo(() => {
        const m = {};
        (schedule || []).forEach((t) => { m[String(t.id)] = t.title; });
        return m;
      }, [schedule]);
      if (loading) {
        return (
          <Card className="p-5">
            <h2 className="text-base font-bold text-slate-800 mb-4">비용 목록</h2>
            <div className="space-y-3">{[1, 2, 3].map((i) => <div key={i} className="h-16 bg-slate-100 rounded-xl animate-pulse"></div>)}</div>
          </Card>
        );
      }
      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-base font-bold text-slate-800">비용 목록</h2>
            <span className="text-xs text-slate-400">{costs.length}건</span>
          </div>
          {costs.length === 0 ? (
            <div className="text-center py-12">
              <div className="text-4xl mb-2">📭</div>
              <p className="text-sm text-slate-400">등록된 비용이 없습니다.<br />위 폼에서 첫 비용을 추가해보세요.</p>
            </div>
          ) : (
            <>
              {/* 데스크탑: 표 */}
              <div className="hidden md:block overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                      <th className="py-2 pr-3 font-medium">날짜</th>
                      <th className="py-2 pr-3 font-medium">비용</th>
                      <th className="py-2 pr-3 font-medium">공정</th>
                      <th className="py-2 pr-3 font-medium text-right">금액</th>
                      <th className="py-2 pr-3 font-medium">담당자</th>
                      <th className="py-2 pr-3 font-medium">거래처</th>
                      <th className="py-2 font-medium text-right">관리</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {costs.map((c) => (
                      <tr key={c.id} className="group hover:bg-slate-50">
                        <td className="py-2.5 pr-3 text-slate-500 whitespace-nowrap">{c.date}</td>
                        <td className="py-2.5 pr-3"><Badge color={COST_COLOR[c.category] || 'bg-slate-400'}>{c.category}</Badge></td>
                        <td className="py-2.5 pr-3">
                          <div className="flex items-center gap-1">
                            {c.process ? <Badge color={PROC_COLOR[c.process] || 'bg-slate-400'}>{c.process}</Badge> : <span className="text-slate-300">-</span>}
                            {c.schedule_id && schedMap[String(c.schedule_id)] && (
                              <span className="text-[10px] text-indigo-500" title={'연결 일정: ' + schedMap[String(c.schedule_id)]}>🔗</span>
                            )}
                          </div>
                        </td>
                        <td className="py-2.5 pr-3 text-right font-bold text-slate-800 whitespace-nowrap">{fmtWon(c.amount)}</td>
                        <td className="py-2.5 pr-3 text-slate-600">{c.manager || <span className="text-slate-300">-</span>}</td>
                        <td className="py-2.5 pr-3 text-slate-600">{c.vendor || <span className="text-slate-300">-</span>}</td>
                        <td className="py-2.5 text-right whitespace-nowrap">
                          <button onClick={() => onEdit(c)} aria-label="수정" className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50">✏️</button>
                          <button onClick={() => onAskDelete(c)} aria-label="삭제" className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50">🗑️</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {/* 모바일: 카드 리스트 */}
              <ul className="md:hidden divide-y divide-slate-100">
                {costs.map((c) => (
                  <li key={c.id} className="py-3">
                    <div className="flex items-start justify-between gap-2">
                      <div className="flex flex-wrap items-center gap-1.5 min-w-0">
                        <Badge color={COST_COLOR[c.category] || 'bg-slate-400'}>{c.category}</Badge>
                        {c.process && <Badge color={PROC_COLOR[c.process] || 'bg-slate-400'}>{c.process}</Badge>}
                      </div>
                      <span className="text-sm font-bold text-slate-800 shrink-0">{fmtWon(c.amount)}</span>
                    </div>
                    <p className="mt-1 text-xs text-slate-400">
                      {c.date}
                      {c.manager && ` · ${c.manager}`}
                      {c.vendor && ` · ${c.vendor}`}
                    </p>
                    {c.schedule_id && schedMap[String(c.schedule_id)] && (
                      <p className="mt-0.5 text-xs text-indigo-500">🔗 {schedMap[String(c.schedule_id)]}</p>
                    )}
                    {c.memo && <p className="mt-0.5 text-xs text-slate-500 truncate">{c.memo}</p>}
                    <div className="mt-1.5 flex gap-1 justify-end">
                      <button onClick={() => onEdit(c)} aria-label="수정" className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50">✏️</button>
                      <button onClick={() => onAskDelete(c)} aria-label="삭제" className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50">🗑️</button>
                    </div>
                  </li>
                ))}
              </ul>
            </>
          )}
        </Card>
      );
    }

    // ========================================
    // 🗂 v4: 프로젝트 매니지먼트 (노션 프로젝트 DB — 칸반/테이블/헤더/인력)
    // ========================================
    // 현장 객체 → PUT body (상태만 바꿔도 다른 필드 보존되도록 전체 전송)
    const siteToBody = (s) => ({
      name: s.name, client: s.client || '', address: s.address || '', manager: s.manager || '',
      budget: Math.round(Number(s.budget) || 0),
      start_date: s.start_date || null, end_date: s.end_date || null,
      status: s.status || '진행', tags: s.tags || '',
      building_type: s.building_type || '', floor_area: Number(s.floor_area) || 0,
      move_in_date: s.move_in_date || null,
      pm: s.pm || '', construction_manager: s.construction_manager || '', designer: s.designer || '',
      progress_status: PROGRESS_STATES.includes(s.progress_status) ? s.progress_status : '준비',
    });
    // 집행률 (spent/budget, 프론트 계산)
    const execOf = (s) => {
      const budget = Number(s.budget) || 0;
      const spent = Number(s.spent) || 0;
      const rate = budget > 0 ? (spent / budget) * 100 : 0;
      return { budget, spent, rate, over: budget > 0 && spent > budget };
    };

    // 집행률 막대 (보드 카드 공용)
    function ExecBar({ site, showBudget }) {
      const { budget, spent, rate, over } = execOf(site);
      return (
        <div>
          <div className="flex items-center justify-between text-[11px] mb-0.5">
            <span className="text-slate-400">집행 {fmtNum(spent)}</span>
            <span className={`font-bold ${over ? 'text-red-600' : 'text-slate-600'}`}>{budget > 0 ? rate.toFixed(0) + '%' : '—'}</span>
          </div>
          <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden">
            <div className={`h-full rounded-full bar-grow ${over ? 'bg-red-500' : rate >= 80 ? 'bg-orange-400' : 'bg-indigo-500'}`}
              style={{ width: Math.min(rate, 100) + '%' }}></div>
          </div>
          {showBudget && <p className="mt-0.5 text-[10px] text-slate-400">예산 {fmtWon(budget)}</p>}
        </div>
      );
    }

    // 프로젝트 카드 (칸반)
    function ProjectCard({ site, onSelect, onChangeStatus, onDragStart }) {
      const period = site.start_date ? `${site.start_date} ~ ${site.end_date || '미정'}` : '기간 미정';
      return (
        <div draggable onDragStart={(e) => onDragStart(e, site)} onClick={() => onSelect(site.id)}
          role="button" tabIndex={0} onKeyDown={(e) => { if (e.key === 'Enter') onSelect(site.id); }}
          className="bg-white rounded-xl border border-slate-200 p-3 shadow-sm hover:shadow-md hover:border-blue-300 cursor-pointer transition">
          <div className="flex items-start justify-between gap-2">
            <h4 className="font-bold text-slate-800 text-sm leading-tight flex-1 break-words">{site.name}</h4>
            <Badge color={PROGRESS_STATUS_COLOR[site.progress_status] || 'bg-slate-400'}>{site.progress_status || '준비'}</Badge>
          </div>
          <div className="mt-1.5 flex flex-wrap gap-1 text-[11px] text-slate-500">
            {site.building_type && <span className="px-1.5 py-0.5 rounded bg-slate-100">{site.building_type}</span>}
            {Number(site.floor_area) > 0 && <span className="px-1.5 py-0.5 rounded bg-slate-100">{fmtNum(site.floor_area)}㎡</span>}
          </div>
          <p className="mt-1.5 text-[11px] text-slate-400 truncate">📅 {period}</p>
          {site.pm && <p className="mt-0.5 text-[11px] text-slate-400 truncate">👷 PM {site.pm}</p>}
          <div className="mt-2"><ExecBar site={site} /></div>
          <div className="mt-2" onClick={(e) => e.stopPropagation()}>
            <select value={site.progress_status || '준비'} onChange={(e) => onChangeStatus(site, e.target.value)} aria-label="진행상태 변경"
              className="w-full text-[11px] px-2 py-1 rounded-lg border border-slate-200 bg-slate-50 text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-300">
              {PROGRESS_STATES.map((p) => <option key={p} value={p}>{p}(으)로 변경</option>)}
            </select>
          </div>
        </div>
      );
    }

    // 🗂 프로젝트 보드 — 칸반(기본) / 테이블 토글
    function ProjectBoard({ sites, loading, onSelect, onNew, onChanged }) {
      const toast = useToast();
      const [view, setView] = useState('board');
      const [filter, setFilter] = useState('all');
      const [sort, setSort] = useState('default');
      const [dragId, setDragId] = useState(null);
      const [overCol, setOverCol] = useState(null);

      const changeStatus = async (site, status) => {
        if ((site.progress_status || '준비') === status) return;
        try { await api.updateSite(site.id, { ...siteToBody(site), progress_status: status }); toast(`'${site.name}' → ${status}`, 'success'); await onChanged(); }
        catch (e) { toast('상태 변경에 실패했습니다.', 'error'); }
      };
      const onDragStart = (e, site) => { setDragId(site.id); try { e.dataTransfer.effectAllowed = 'move'; } catch (err) {} };
      const onDrop = async (status) => {
        setOverCol(null);
        const site = sites.find((s) => String(s.id) === String(dragId));
        setDragId(null);
        if (site) await changeStatus(site, status);
      };

      const tableRows = useMemo(() => {
        let rows = sites.slice();
        if (filter !== 'all') rows = rows.filter((s) => (s.progress_status || '준비') === filter);
        if (sort === 'name') rows.sort((a, b) => (a.name < b.name ? -1 : 1));
        else if (sort === 'budget') rows.sort((a, b) => (Number(b.budget) || 0) - (Number(a.budget) || 0));
        else if (sort === 'rate') rows.sort((a, b) => execOf(b).rate - execOf(a).rate);
        return rows;
      }, [sites, filter, sort]);

      if (loading && (!sites || sites.length === 0)) return <Card className="p-5"><div className="h-72 bg-slate-100 rounded-xl animate-pulse"></div></Card>;

      return (
        <div className="space-y-4">
          <Card className="p-3 sm:p-4">
            <div className="flex flex-wrap items-center justify-between gap-2">
              <div>
                <h2 className="text-base font-bold text-slate-800">🗂 프로젝트 보드</h2>
                <p className="text-[11px] text-slate-400">전체 현장을 진행상태별로 관리합니다. 카드 클릭 → 해당 현장 요약 이동 · 카드를 끌어 컬럼 이동(또는 상태 드롭다운).</p>
              </div>
              <div className="flex items-center gap-2">
                <div className="inline-flex rounded-xl border border-slate-200 overflow-hidden">
                  <button onClick={() => setView('board')} className={`px-3 py-1.5 text-sm font-semibold transition ${view === 'board' ? 'bg-blue-600 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>칸반</button>
                  <button onClick={() => setView('table')} className={`px-3 py-1.5 text-sm font-semibold transition ${view === 'table' ? 'bg-blue-600 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>테이블</button>
                </div>
                <Button size="sm" onClick={onNew}>+ 새 프로젝트</Button>
              </div>
            </div>
          </Card>

          {(!sites || sites.length === 0) ? (
            <Card className="p-12 text-center">
              <div className="text-5xl mb-3">🗂</div>
              <h3 className="text-lg font-bold text-slate-700 mb-1">등록된 프로젝트가 없습니다</h3>
              <p className="text-sm text-slate-400 mb-5">새 프로젝트를 등록하면 보드에 카드로 표시됩니다.</p>
              <Button size="lg" onClick={onNew}>+ 첫 프로젝트 등록</Button>
            </Card>
          ) : view === 'board' ? (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
              {PROGRESS_STATES.map((status) => {
                const col = sites.filter((s) => (s.progress_status || '준비') === status);
                return (
                  <div key={status}
                    onDragOver={(e) => { e.preventDefault(); if (overCol !== status) setOverCol(status); }}
                    onDragLeave={() => setOverCol((c) => (c === status ? null : c))}
                    onDrop={(e) => { e.preventDefault(); onDrop(status); }}
                    className={`rounded-2xl border p-2 min-h-[140px] transition ${overCol === status ? 'border-blue-400 bg-blue-50' : 'border-slate-200 bg-slate-50'}`}>
                    <div className="flex items-center justify-between px-1.5 py-1 mb-2">
                      <span className="flex items-center gap-1.5 text-sm font-bold text-slate-700">
                        <span className={`w-2.5 h-2.5 rounded-full ${PROGRESS_STATUS_COLOR[status]}`}></span>{status}
                      </span>
                      <span className="text-xs text-slate-400 bg-white rounded-full px-2 py-0.5 border border-slate-100">{col.length}</span>
                    </div>
                    <div className="space-y-2">
                      {col.length === 0 ? (
                        <p className="text-[11px] text-slate-300 text-center py-5">여기로 카드를 끌어다 놓으세요</p>
                      ) : col.map((s) => (
                        <ProjectCard key={s.id} site={s} onSelect={onSelect} onChangeStatus={changeStatus} onDragStart={onDragStart} />
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          ) : (
            <Card className="p-4">
              <div className="flex flex-wrap items-center gap-2 mb-3">
                <select value={filter} onChange={(e) => setFilter(e.target.value)}
                  className="px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-300">
                  <option value="all">전체 상태</option>
                  {PROGRESS_STATES.map((p) => <option key={p} value={p}>{p}</option>)}
                </select>
                <select value={sort} onChange={(e) => setSort(e.target.value)}
                  className="px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-300">
                  <option value="default">정렬: 기본</option>
                  <option value="name">이름순</option>
                  <option value="budget">예산 많은순</option>
                  <option value="rate">집행률 높은순</option>
                </select>
                <span className="text-xs text-slate-400 ml-auto">{tableRows.length}개 프로젝트</span>
              </div>
              {tableRows.length === 0 ? (
                <p className="text-sm text-slate-400 text-center py-8">해당 상태의 프로젝트가 없습니다.</p>
              ) : (
                <div className="overflow-x-auto">
                  <table className="w-full text-sm" style={{ minWidth: '1040px' }}>
                    <thead>
                      <tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                        <th className="py-2 pr-3 font-medium">프로젝트명</th>
                        <th className="py-2 pr-3 font-medium">주소</th>
                        <th className="py-2 pr-3 font-medium">건물종류</th>
                        <th className="py-2 pr-3 font-medium text-right">면적</th>
                        <th className="py-2 pr-3 font-medium">입주예정</th>
                        <th className="py-2 pr-3 font-medium">공사기간</th>
                        <th className="py-2 pr-3 font-medium">진행상태</th>
                        <th className="py-2 pr-3 font-medium">PM</th>
                        <th className="py-2 pr-3 font-medium">시공책임</th>
                        <th className="py-2 pr-3 font-medium">디자이너</th>
                        <th className="py-2 pr-3 font-medium text-right">예산</th>
                        <th className="py-2 pr-3 font-medium text-right">집행</th>
                        <th className="py-2 font-medium text-right">집행률</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {tableRows.map((s) => {
                        const { rate, over, spent, budget } = execOf(s);
                        return (
                          <tr key={s.id} className="hover:bg-slate-50">
                            <td className="py-2 pr-3"><button onClick={() => onSelect(s.id)} className="font-semibold text-blue-700 hover:underline text-left">{s.name}</button></td>
                            <td className="py-2 pr-3 text-slate-500 truncate max-w-[150px]" title={s.address || ''}>{s.address || '-'}</td>
                            <td className="py-2 pr-3 text-slate-500">{s.building_type || '-'}</td>
                            <td className="py-2 pr-3 text-right text-slate-500 whitespace-nowrap">{Number(s.floor_area) > 0 ? fmtNum(s.floor_area) + '㎡' : '-'}</td>
                            <td className="py-2 pr-3 text-slate-500 whitespace-nowrap">{s.move_in_date || '-'}</td>
                            <td className="py-2 pr-3 text-slate-500 whitespace-nowrap text-xs">{s.start_date ? `${s.start_date}~${s.end_date || ''}` : '-'}</td>
                            <td className="py-2 pr-3">
                              <select value={s.progress_status || '준비'} onChange={(e) => changeStatus(s, e.target.value)} aria-label="진행상태 변경"
                                className="text-xs px-1.5 py-1 rounded-lg border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-300">
                                {PROGRESS_STATES.map((p) => <option key={p} value={p}>{p}</option>)}
                              </select>
                            </td>
                            <td className="py-2 pr-3 text-slate-600">{s.pm || '-'}</td>
                            <td className="py-2 pr-3 text-slate-600">{s.construction_manager || '-'}</td>
                            <td className="py-2 pr-3 text-slate-600">{s.designer || '-'}</td>
                            <td className="py-2 pr-3 text-right text-slate-600 whitespace-nowrap">{fmtNum(budget)}</td>
                            <td className="py-2 pr-3 text-right text-slate-600 whitespace-nowrap">{fmtNum(spent)}</td>
                            <td className={`py-2 text-right font-bold whitespace-nowrap ${over ? 'text-red-600' : 'text-slate-700'}`}>{budget > 0 ? rate.toFixed(0) + '%' : '—'}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </Card>
          )}
        </div>
      );
    }

    // 📊 요약 상단 프로젝트 헤더 카드 (노션 프로젝트 페이지 상단 느낌)
    function ProjectHeader({ site }) {
      if (!site) return null;
      const period = site.start_date ? `${site.start_date} ~ ${site.end_date || '미정'}` : '미정';
      const metas = [
        { label: '건물종류', value: site.building_type || '-' },
        { label: '바닥면적', value: Number(site.floor_area) > 0 ? fmtNum(site.floor_area) + ' ㎡' : '-' },
        { label: '공사기간', value: period },
        { label: '입주예정일', value: site.move_in_date || '-' },
      ];
      const people = [
        { label: 'PM', value: site.pm },
        { label: '시공책임', value: site.construction_manager },
        { label: '디자이너', value: site.designer },
      ];
      return (
        <Card className="p-5 bg-gradient-to-br from-slate-50 to-white">
          <div className="flex flex-wrap items-center gap-2 mb-1">
            <h2 className="text-xl font-extrabold text-slate-800 break-words">{site.name}</h2>
            <Badge color={PROGRESS_STATUS_COLOR[site.progress_status] || 'bg-slate-400'}>{site.progress_status || '준비'}</Badge>
            {site.status && <Badge color={SITE_STATUS_COLOR[site.status] || 'bg-blue-500'}>{site.status}</Badge>}
          </div>
          <p className="text-sm text-slate-500 mb-4">📍 {site.address || '주소 미입력'}{site.client ? ` · 발주처 ${site.client}` : ''}</p>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
            {metas.map((m) => (
              <div key={m.label} className="p-3 rounded-xl bg-white border border-slate-100">
                <p className="text-xs text-slate-400">{m.label}</p>
                <p className="mt-0.5 text-sm font-semibold text-slate-700 truncate" title={m.value}>{m.value}</p>
              </div>
            ))}
          </div>
          <div className="flex flex-wrap gap-2">
            {people.map((p) => (
              <span key={p.label} className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-slate-100 text-sm">
                <span className="text-xs text-slate-400">{p.label}</span>
                <span className="font-semibold text-slate-700">{p.value || '미지정'}</span>
              </span>
            ))}
          </div>
        </Card>
      );
    }

    // 🧑‍🔧 인력관리 — PM/시공책임/디자이너 + 공종별 협력업체(비용 vendor 기반)
    function PersonnelSection({ site, costs, staff }) {
      const staffMap = useMemo(() => {
        const m = {};
        (staff || []).forEach((s) => { m[s.name] = s; });
        return m;
      }, [staff]);
      const leads = [
        { label: 'PM (프로젝트 매니저)', name: site.pm },
        { label: '시공책임', name: site.construction_manager },
        { label: '디자이너', name: site.designer },
      ];
      const byProcess = useMemo(() => {
        const m = {};
        (costs || []).forEach((c) => {
          if (!c.vendor) return;
          const p = c.process || '기타';
          if (!m[p]) m[p] = {};
          m[p][c.vendor] = (m[p][c.vendor] || 0) + (Number(c.amount) || 0);
        });
        return Object.entries(m).map(([process, vendors]) => ({
          process,
          vendors: Object.entries(vendors).map(([name, total]) => ({ name, total })).sort((a, b) => b.total - a.total),
        })).sort((a, b) => (a.process < b.process ? -1 : 1));
      }, [costs]);
      return (
        <Card className="p-5">
          <h2 className="text-base font-bold text-slate-800 mb-4">👷 인력 · 협력업체</h2>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-5">
            {leads.map((l) => {
              const info = l.name ? staffMap[l.name] : null;
              return (
                <div key={l.label} className="p-3 rounded-xl bg-slate-50 border border-slate-100">
                  <p className="text-xs text-slate-400">{l.label}</p>
                  <p className="mt-0.5 font-semibold text-slate-700">{l.name || '미지정'}</p>
                  {info && (info.role || info.phone) && <p className="text-[11px] text-slate-400 mt-0.5">{[info.role, info.phone].filter(Boolean).join(' · ')}</p>}
                </div>
              );
            })}
          </div>
          <h3 className="text-sm font-bold text-slate-700 mb-2">공종별 협력업체 <span className="text-[11px] font-normal text-slate-400">(비용 내역 기준)</span></h3>
          {byProcess.length === 0 ? (
            <p className="text-sm text-slate-400 text-center py-4">비용에 거래처가 입력되면 공종별 협력업체가 표시됩니다.</p>
          ) : (
            <div className="space-y-2">
              {byProcess.map((g) => (
                <div key={g.process} className="flex flex-wrap items-center gap-2 py-1.5 border-b border-slate-50 last:border-0">
                  <Badge color={PROC_COLOR[g.process] || 'bg-slate-400'}>{g.process}</Badge>
                  <div className="flex flex-wrap gap-1.5">
                    {g.vendors.map((v) => (
                      <span key={v.name} className="inline-flex items-center gap-1 text-xs px-2 py-1 rounded-lg bg-slate-100 text-slate-600">
                        🏪 {v.name} <span className="text-slate-400">{fmtWon(v.total)}</span>
                      </span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </Card>
      );
    }

    // ========================================
    // 🧩 탭 네비게이션
    // ========================================
    const TABS = [
      { id: 'projects', label: '프로젝트', icon: '🗂' },
      { id: 'summary', label: '요약', icon: '📊' },
      { id: 'cost', label: '비용', icon: '💸' },
      { id: 'schedule', label: '일정', icon: '📅' },
      { id: 'estimate', label: '견적', icon: '📋' },
      { id: 'manage', label: '관리', icon: '⚙️' },
    ];
    function TabNav({ active, onChange }) {
      return (
        <Card className="p-1.5">
          <div className="flex gap-1 overflow-x-auto" role="tablist" aria-label="메뉴">
            {TABS.map((t) => {
              const on = active === t.id;
              return (
                <button key={t.id} role="tab" aria-selected={on} onClick={() => onChange(t.id)}
                  className={`flex-1 min-w-[68px] px-3 py-2.5 rounded-xl text-sm font-semibold transition whitespace-nowrap
                    ${on ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'}`}>
                  <span className="mr-1">{t.icon}</span>{t.label}
                </button>
              );
            })}
          </div>
        </Card>
      );
    }

    // 작은 라벨-값 행 (견적 합계 박스 등)
    function KV({ label, value, red }) {
      return (
        <div className="flex items-center justify-between">
          <span className="text-slate-500">{label}</span>
          <span className={`font-semibold ${red ? 'text-red-500' : 'text-slate-700'}`}>{value}</span>
        </div>
      );
    }

    // ========================================
    // 🧩 견적(계획) 대비 실제 — 공정별 (요약 탭)
    // ========================================
    function PlanVsActual({ summary }) {
      if (!summary || !summary.byProcessPlan || summary.byProcessPlan.length === 0) return null;
      const planMap = {}, actMap = {};
      summary.byProcessPlan.forEach((p) => { planMap[p.process] = p.total; });
      (summary.byProcess || []).forEach((p) => { actMap[p.process] = p.total; });
      const keys = Array.from(new Set([...Object.keys(planMap), ...Object.keys(actMap)]));
      keys.sort((a, b) => ((planMap[b] || 0) + (actMap[b] || 0)) - ((planMap[a] || 0) + (actMap[a] || 0)));
      const maxV = Math.max(1, ...keys.map((k) => Math.max(planMap[k] || 0, actMap[k] || 0)));
      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-base font-bold text-slate-800">견적(계획) 대비 실제 · 공정별</h2>
            {summary.estimateTotal != null && <span className="text-sm font-bold text-slate-700">확정 견적가 {fmtWon(summary.estimateTotal)}</span>}
          </div>
          <div className="space-y-3">
            {keys.map((k) => {
              const plan = planMap[k] || 0, act = actMap[k] || 0, diff = act - plan;
              return (
                <div key={k}>
                  <div className="flex flex-wrap items-center justify-between text-xs mb-1 gap-1">
                    <span className="font-medium text-slate-600 truncate">{k}</span>
                    <span className="shrink-0">
                      <span className="text-slate-400">계획 {fmtWon(plan)}</span>
                      <span className="mx-1 text-slate-300">/</span>
                      <span className="font-semibold text-slate-700">실제 {fmtWon(act)}</span>
                      {plan > 0 && (
                        <span className={`ml-1.5 font-bold ${diff > 0 ? 'text-red-500' : 'text-emerald-600'}`}>
                          {diff > 0 ? '▲' : '▼'}{fmtWon(Math.abs(diff))}
                        </span>
                      )}
                    </span>
                  </div>
                  <div className="relative h-3 bg-slate-100 rounded-full overflow-hidden">
                    <div className="absolute inset-y-0 left-0 bg-indigo-200 rounded-full bar-grow" style={{ width: (plan / maxV) * 100 + '%' }}></div>
                    <div className="absolute inset-y-0 left-0 bg-blue-500/80 rounded-full bar-grow" style={{ width: (act / maxV) * 100 + '%' }}></div>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="mt-3 flex items-center gap-4 text-[11px] text-slate-400">
            <span className="flex items-center gap-1"><span className="w-3 h-2 rounded bg-indigo-200 inline-block"></span>견적(계획)</span>
            <span className="flex items-center gap-1"><span className="w-3 h-2 rounded bg-blue-500/80 inline-block"></span>실제 집행</span>
          </div>
        </Card>
      );
    }

    // ========================================
    // 🧩 일정 — 월간 캘린더
    // ========================================
    function ScheduleCalendar({ tasks, onEditTask }) {
      const [cursor, setCursor] = useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });
      const today = todayStr();
      const startWeekday = new Date(cursor.y, cursor.m, 1).getDay();
      const daysInMonth = new Date(cursor.y, cursor.m + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < startWeekday; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(ymd(cursor.y, cursor.m, d));
      while (cells.length % 7 !== 0) cells.push(null);
      const tasksOn = (ds) => (tasks || []).filter((t) => t.start_date && t.end_date && t.start_date <= ds && ds <= t.end_date);
      const prev = () => setCursor((c) => (c.m === 0 ? { y: c.y - 1, m: 11 } : { y: c.y, m: c.m - 1 }));
      const next = () => setCursor((c) => (c.m === 11 ? { y: c.y + 1, m: 0 } : { y: c.y, m: c.m + 1 }));
      const goToday = () => { const d = new Date(); setCursor({ y: d.getFullYear(), m: d.getMonth() }); };
      const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
      return (
        <Card className="p-4 sm:p-5">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-base font-bold text-slate-800">{monthLabel(cursor.y, cursor.m)}</h2>
            <div className="flex items-center gap-1">
              <Button variant="ghost" size="sm" onClick={prev} aria-label="이전 달">◀</Button>
              <Button variant="secondary" size="sm" onClick={goToday}>오늘</Button>
              <Button variant="ghost" size="sm" onClick={next} aria-label="다음 달">▶</Button>
            </div>
          </div>
          <div className="grid grid-cols-7 mb-1">
            {weekdays.map((w, i) => (
              <div key={w} className={`text-center text-xs font-semibold py-1 ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : 'text-slate-400'}`}>{w}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-px bg-slate-100 rounded-xl overflow-hidden border border-slate-100">
            {cells.map((ds, i) => {
              if (!ds) return <div key={i} className="bg-slate-50 min-h-[78px] sm:min-h-[92px]"></div>;
              const wd = i % 7;
              const isToday = ds === today;
              const dayTasks = tasksOn(ds);
              return (
                <div key={i} className="bg-white min-h-[78px] sm:min-h-[92px] p-1 align-top">
                  <div className="flex justify-end">
                    <span className={`inline-flex items-center justify-center w-5 h-5 text-[11px] rounded-full
                      ${isToday ? 'bg-blue-600 text-white font-bold' : wd === 0 ? 'text-red-500' : wd === 6 ? 'text-blue-500' : 'text-slate-500'}`}>
                      {Number(ds.slice(8, 10))}
                    </span>
                  </div>
                  <div className="mt-0.5 space-y-0.5">
                    {dayTasks.slice(0, 3).map((t) => {
                      const isStart = t.start_date === ds, isEnd = t.end_date === ds;
                      const showLabel = isStart || wd === 0;
                      const bg = t.color || procHex(t.process);
                      return (
                        <button key={t.id} onClick={() => onEditTask(t)} title={t.title} style={{ backgroundColor: bg }}
                          className={`block w-full text-left text-[10px] leading-tight text-white px-1 py-0.5 truncate
                            ${isStart ? 'rounded-l-md' : ''} ${isEnd ? 'rounded-r-md' : ''}`}>
                          {showLabel ? t.title : ' '}
                        </button>
                      );
                    })}
                    {dayTasks.length > 3 && <span className="block text-[10px] text-slate-400 px-1">+{dayTasks.length - 3}건</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      );
    }

    // 🧩 일정 — 태스크 목록(타임라인)
    function ScheduleList({ tasks, onEdit, onAskDelete }) {
      const sorted = useMemo(() => [...(tasks || [])].sort((a, b) => (a.start_date < b.start_date ? -1 : a.start_date > b.start_date ? 1 : 0)), [tasks]);
      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-base font-bold text-slate-800">공정 일정 목록</h2>
            <span className="text-xs text-slate-400">{sorted.length}건</span>
          </div>
          {sorted.length === 0 ? (
            <div className="text-center py-10">
              <div className="text-4xl mb-2">📅</div>
              <p className="text-sm text-slate-400">등록된 일정이 없습니다.<br />위 ‘일정 추가’로 공정 태스크를 등록하세요.</p>
            </div>
          ) : (
            <ul className="divide-y divide-slate-100">
              {sorted.map((t) => {
                const plan = Number(t.planned_cost) || 0, act = Number(t.actual_cost) || 0, diff = act - plan;
                return (
                  <li key={t.id} className="py-3">
                    <div className="flex items-start justify-between gap-2">
                      <div className="min-w-0">
                        <div className="flex flex-wrap items-center gap-1.5">
                          <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: t.color || procHex(t.process) }}></span>
                          <span className="font-semibold text-slate-800 truncate">{t.title}</span>
                          {t.process && <Badge color={PROC_COLOR[t.process] || 'bg-slate-400'}>{t.process}</Badge>}
                          <Badge color={TASK_STATUS_COLOR[t.status] || 'bg-slate-400'}>{t.status}</Badge>
                        </div>
                        <p className="mt-1 text-xs text-slate-400">{t.start_date} ~ {t.end_date}{t.staff && ` · 담당 ${t.staff}`}</p>
                        <p className="mt-1 text-xs">
                          <span className="text-slate-400">계획 {fmtWon(plan)}</span>
                          <span className="mx-1 text-slate-300">/</span>
                          <span className="font-semibold text-slate-600">실제 {fmtWon(act)}</span>
                          {plan > 0 && act > 0 && (
                            <span className={`ml-1.5 font-bold ${diff > 0 ? 'text-red-500' : 'text-emerald-600'}`}>
                              {diff > 0 ? `초과 ${fmtWon(diff)}` : diff < 0 ? `절감 ${fmtWon(-diff)}` : '동일'}
                            </span>
                          )}
                        </p>
                        {t.memo && <p className="mt-0.5 text-xs text-slate-500 truncate">{t.memo}</p>}
                      </div>
                      <div className="flex gap-1 shrink-0">
                        <button onClick={() => onEdit(t)} aria-label="수정" className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50">✏️</button>
                        <button onClick={() => onAskDelete(t)} aria-label="삭제" className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50">🗑️</button>
                      </div>
                    </div>
                  </li>
                );
              })}
            </ul>
          )}
        </Card>
      );
    }

    // 🧩 일정 등록/수정 폼 (모달)
    function ScheduleForm({ editing, procNames, staffNames, onSubmit, onCancel }) {
      const blank = { title: '', process: '', start_date: todayStr(), end_date: todayStr(), status: '예정', planned_cost: '', staff: '', color: '', memo: '' };
      const [form, setForm] = useState(editing ? {
        title: editing.title || '', process: editing.process || '',
        start_date: editing.start_date || todayStr(), end_date: editing.end_date || todayStr(),
        status: editing.status || '예정', planned_cost: editing.planned_cost != null ? String(editing.planned_cost) : '',
        staff: editing.staff || '', color: editing.color || '', memo: editing.memo || '',
      } : blank);
      const [errors, setErrors] = useState({});
      const [submitting, setSubmitting] = useState(false);
      const validate = () => {
        const e = {};
        if (!form.title.trim()) e.title = '작업명을 입력하세요.';
        if (!form.start_date) e.start_date = '시작일을 선택하세요.';
        if (!form.end_date) e.end_date = '종료일을 선택하세요.';
        if (form.start_date && form.end_date && form.start_date > form.end_date) e.end_date = '종료일은 시작일 이후여야 합니다.';
        setErrors(e); return Object.keys(e).length === 0;
      };
      const handleSubmit = async (ev) => {
        ev.preventDefault();
        if (!validate()) return;
        setSubmitting(true);
        await onSubmit({
          title: form.title.trim(), process: form.process.trim(), start_date: form.start_date, end_date: form.end_date,
          status: form.status, planned_cost: Math.round(Number(form.planned_cost) || 0), staff: form.staff.trim(),
          color: form.color, memo: form.memo.trim(),
        });
        setSubmitting(false);
      };
      return (
        <form onSubmit={handleSubmit} className="space-y-4">
          <Input label="작업명 *" placeholder="예: 주방 목공" value={form.title} error={errors.title}
            onChange={(e) => setForm({ ...form, title: e.target.value })} />
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Combo label="공정" placeholder="선택 또는 직접 입력" value={form.process} options={procNames.length ? procNames : PROCESS_CATEGORIES}
              onChange={(e) => setForm({ ...form, process: e.target.value })} />
            <Select label="상태" value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })}>
              {TASK_STATUSES.map((s) => <option key={s} value={s}>{s}</option>)}
            </Select>
            <Input label="시작일 *" type="date" value={form.start_date} error={errors.start_date}
              onChange={(e) => setForm({ ...form, start_date: e.target.value })} />
            <Input label="종료일 *" type="date" value={form.end_date} error={errors.end_date}
              onChange={(e) => setForm({ ...form, end_date: e.target.value })} />
            <Combo label="담당자" placeholder="예: 박현장" value={form.staff} options={staffNames}
              onChange={(e) => setForm({ ...form, staff: e.target.value })} />
            <Input label="계획비용 (원)" type="number" inputMode="numeric" min="0" placeholder="예: 5000000"
              value={form.planned_cost} onChange={(e) => setForm({ ...form, planned_cost: e.target.value })} />
          </div>
          <div>
            <span className="block mb-1.5 text-sm font-medium text-slate-700">표시 색상</span>
            <div className="flex items-center gap-2 flex-wrap">
              {COLOR_SWATCHES.map((c) => (
                <button type="button" key={c || 'auto'} onClick={() => setForm({ ...form, color: c })} aria-label={c || '공정 자동색'}
                  className={`w-7 h-7 rounded-full border-2 flex items-center justify-center text-[9px] text-slate-600 ${form.color === c ? 'border-slate-800' : 'border-slate-200'}`}
                  style={{ backgroundColor: c || (form.process ? procHex(form.process) : '#e2e8f0') }}>
                  {c ? '' : '자동'}
                </button>
              ))}
            </div>
          </div>
          <Textarea label="메모 (선택)" rows="2" value={form.memo} onChange={(e) => setForm({ ...form, memo: e.target.value })} />
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit" disabled={submitting}>{submitting ? '저장 중...' : (editing ? '수정 저장' : '일정 추가')}</Button>
          </div>
        </form>
      );
    }

    // 🧩 일정 탭 (캘린더 + 목록 + 폼 + .ics)
    function ScheduleTab({ site, tasks, procNames, staffNames, loading, onChanged }) {
      const toast = useToast();
      const [formOpen, setFormOpen] = useState(false);
      const [editing, setEditing] = useState(null);
      const [delTarget, setDelTarget] = useState(null);
      const save = async (body) => {
        try {
          if (editing) await api.updateSchedule(editing.id, body);
          else await api.createSchedule(site.id, body);
          toast(editing ? '일정이 수정되었습니다.' : '일정이 추가되었습니다.', 'success');
          setFormOpen(false); setEditing(null);
          await onChanged();
          return true;
        } catch (e) { toast(e.message || '저장에 실패했습니다.', 'error'); return false; }
      };
      const confirmDel = async () => {
        const t = delTarget; setDelTarget(null);
        try { await api.removeSchedule(t.id); toast('일정이 삭제되었습니다.', 'info'); await onChanged(); }
        catch (e) { toast('삭제에 실패했습니다.', 'error'); }
      };
      const exportICS = async () => {
        if (!tasks || tasks.length === 0) { toast('내보낼 일정이 없습니다.', 'error'); return; }
        if (!api._useMock) {
          try {
            const res = await fetch(api.scheduleIcsUrl(site.id));
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const blob = await res.blob();
            downloadBlob(blob, `${site.name}-schedule.ics`);
            toast('일정(.ics)을 내보냈습니다.', 'success'); return;
          } catch (e) { /* 서버 실패 → 폴백 */ }
        }
        const ics = buildICS(site.name, tasks);
        downloadBlob(new Blob([ics], { type: 'text/calendar;charset=utf-8' }), `${site.name}-schedule.ics`);
        toast('일정(.ics)을 내보냈습니다. (브라우저 생성)', 'success');
      };
      return (
        <div className="space-y-6">
          <div className="flex flex-wrap items-center justify-between gap-2">
            <div>
              <h2 className="text-base font-bold text-slate-800">공정 일정 (캘린더)</h2>
              <p className="text-[11px] text-slate-400">📆 .ics 파일은 구글/네이버/아웃룩 캘린더에서 ‘가져오기’로 불러올 수 있습니다.</p>
            </div>
            <div className="flex gap-2">
              <Button variant="secondary" size="sm" onClick={exportICS}>📆 .ics 내보내기</Button>
              <Button size="sm" onClick={() => { setEditing(null); setFormOpen(true); }}>+ 일정 추가</Button>
            </div>
          </div>
          {loading ? (
            <Card className="p-5"><div className="h-72 bg-slate-100 rounded-xl animate-pulse"></div></Card>
          ) : (
            <>
              <ScheduleCalendar tasks={tasks} onEditTask={(t) => { setEditing(t); setFormOpen(true); }} />
              <ScheduleList tasks={tasks} onEdit={(t) => { setEditing(t); setFormOpen(true); }} onAskDelete={setDelTarget} />
            </>
          )}
          <Modal isOpen={formOpen} onClose={() => { setFormOpen(false); setEditing(null); }} title={editing ? '일정 수정' : '일정 추가'} size="lg">
            <ScheduleForm key={editing ? editing.id : 'new'} editing={editing} procNames={procNames} staffNames={staffNames}
              onSubmit={save} onCancel={() => { setFormOpen(false); setEditing(null); }} />
          </Modal>
          <Modal isOpen={!!delTarget} onClose={() => setDelTarget(null)} title="일정 삭제 확인" size="sm">
            {delTarget && (
              <div>
                <p className="text-sm text-slate-600">'<span className="font-semibold">{delTarget.title}</span>' 일정을 삭제하시겠습니까?<br />연결된 비용은 보존되며 연결만 해제됩니다.</p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setDelTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDel}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // ========================================
    // 🧩 견적 — 목록 / 에디터 / 인쇄
    // ========================================
    function EstimateList({ estimates, onOpen, onNew, onAskDelete }) {

        <Card className="p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-base font-bold text-slate-800">견적서 목록</h2>
            <Button size="sm" onClick={onNew}>+ 새 견적</Button>

          {(!estimates || estimates.length === 0) ? (

              <div className="text-4xl mb-2">📋</div>

            <ul className="divide-y divide-slate-100">

                      <div className="flex items-center gap-2">
                        <span className="font-semibold text-slate-800 truncate">{e.title || '견적서'}</span>
                        <Badge color={ESTIMATE_STATUS_COLOR[e.status] || 'bg-slate-400'}>{ESTIMATE_STATUS_LABEL[e.status] || e.status}</Badge>
                      </div>
                      <p className="mt-0.5 text-xs text-slate-400">

                      </p>
                    </button>
                    <div className="text-right shrink-0">
                      <p className="font-bold text-slate-800">{fmtWon(total)}</p>
                      <button onClick={() => onAskDelete(e)} className="text-xs text-slate-400 hover:text-red-600">삭제</button>
                    </div>
                  </li>
                );
              })}
            </ul>
          )}
        </Card>
      );
    }

    // (v3) 단가 카탈로그 불러오기 모달 — 공종 필터 + 검색 + 페이지네이션
    function CatalogPickerModal({ isOpen, onClose, trades, mode, onPick }) {
      const [trade, setTrade] = useState('');
      const [q, setQ] = useState('');
      const [list, setList] = useState([]);
      const [loading, setLoading] = useState(false);
      const [page, setPage] = useState(0);
      const pageSize = 20;
      useEffect(() => { if (!isOpen) { setTrade(''); setQ(''); setPage(0); } }, [isOpen]);
      useEffect(() => { setPage(0); }, [trade, q]);
      useEffect(() => {
        if (!isOpen) return;
        let alive = true;
        setLoading(true);
        const t = setTimeout(async () => {
          try { const d = await api.listCatalog({ trade: trade || undefined, q: q || undefined, limit: 1000 }); if (alive) setList(d || []); }
          catch (e) { if (alive) setList([]); }
          finally { if (alive) setLoading(false); }
        }, 200);
        return () => { alive = false; clearTimeout(t); };
      }, [isOpen, trade, q]);
      const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
      const pageItems = list.slice(page * pageSize, page * pageSize + pageSize);
      const tradeOpts = (trades && trades.length ? trades : TRADE_MASTER);

    // (v3) 공종별 그룹 소계 (총괄표)
    function TradeSubtotals({ items }) {
      const groups = useMemo(() => {
        const m = {};
        (items || []).forEach((it) => {
          if (!(it.name || '').trim()) return;
          const t = it.trade || it.process || '미분류';
          m[t] = (m[t] || 0) + (Number(it.amount) || 0);
        });
        return Object.entries(m).map(([trade, total]) => ({ trade, total })).sort((a, b) => b.total - a.total);
      }, [items]);
      const total = groups.reduce((s, g) => s + g.total, 0);
      if (groups.length === 0) return null;
      return (
        <Card className="p-4">
          <h3 className="text-sm font-bold text-slate-700 mb-3">공종별 소계 (총괄)</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <tbody className="divide-y divide-slate-100">
                {groups.map((g) => {
                  const pct = total > 0 ? Math.round((g.total / total) * 100) : 0;
                  return (
                    <tr key={g.trade}>
                      <td className="py-1.5 pr-3">
                        <span className="inline-flex items-center gap-1.5">
                          <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: tradeHex(g.trade) }}></span>
                          <span className="text-slate-700 font-medium">{g.trade}</span>
                        </span>
                      </td>
                      <td className="py-1.5 pr-3 text-right text-slate-400 w-12">{pct}%</td>
                      <td className="py-1.5 text-right font-semibold text-slate-700 whitespace-nowrap">{fmtWon(g.total)}</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr className="border-t-2 border-slate-200">
                  <td className="py-2 pr-3 font-bold text-slate-700">합계 (직접공사비)</td>
                  <td></td>
                  <td className="py-2 text-right font-extrabold text-slate-800 whitespace-nowrap">{fmtWon(total)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </Card>
      );
    }

    function EstimateEditor({ site, initial, trades, procNames, onSave, onConfirm, onUnconfirm, onDelete, onPrint, onClose }) {

          memo: (initial && initial.memo) || '',
          use_cost_buildup: !!(initial && initial.use_cost_buildup),
        };
        Object.keys(BUILDUP_DEFAULTS).forEach((k) => {
          h[k] = (initial && initial[k] != null) ? Number(initial[k]) : BUILDUP_DEFAULTS[k];
        });
        return h;
      });
      const [items, setItems] = useState(
        (initial && initial.items && initial.items.length)
          ? initial.items.map((it) => {
            const hasSplit = (Number(it.material_price) || 0) || (Number(it.labor_price) || 0) || (Number(it.sub_price) || 0);
            return {
              _k: uid(),
              trade: it.trade || it.process || '', name: it.name || '', spec: it.spec || '', unit: it.unit || '',
              qty: String(it.qty != null ? it.qty : ''),
              // 레거시 v2 단가는 재료비단가로 이관(편집/표시 가능)
              material_price: ps(hasSplit ? it.material_price : it.unit_price),
              labor_price: ps(it.labor_price), sub_price: ps(it.sub_price),
              memo: it.memo || '', catalog_id: it.catalog_id != null ? it.catalog_id : null,

        const j = idx + dir; if (j < 0 || j >= arr.length) return arr;

      });

    // 견적서 인쇄(A4) 레이아웃 — 셀 스타일
    const _pb = '1px solid #94a3b8';
    const cellTh = { border: _pb, padding: '6px 8px', fontWeight: 600, background: '#f1f5f9' };
    const cellTd = { border: _pb, padding: '6px 8px' };
    const cellTdC = { border: _pb, padding: '6px 8px', textAlign: 'center' };
    const cellTdR = { border: _pb, padding: '6px 8px', textAlign: 'right' };
    const sumTd = { border: _pb, padding: '5px 10px', background: '#f8fafc' };
    const sumTdR = { border: _pb, padding: '5px 10px', textAlign: 'right' };
    function EstimatePrint({ site, estimate, totals }) {
      if (!estimate) return null;
      const items = estimate.items || [];
      const t = totals || computeTotals(estimate);

      items.forEach((it) => { const tr = it.trade || it.process || '미분류'; gmap[tr] = (gmap[tr] || 0) + rowAmount(it); });
      const groupArr = Object.entries(gmap).map(([trade, total]) => ({ trade, total })).sort((a, b2) => b2.total - a.total);
      const directTotal = groupArr.reduce((s, g) => s + g.total, 0);
      return (
        <div className="text-slate-900" style={{ fontFamily: 'sans-serif', padding: '4px' }}>

              <h1 style={{ fontSize: '26px', fontWeight: 800, letterSpacing: '8px', margin: 0 }}>견 적 서</h1>

            </div>
