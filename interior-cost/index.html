          </div>

          <CatalogPickerModal isOpen={picker.open} onClose={() => setPicker({ open: false, targetIdx: null })}
            trades={trades} mode={picker.targetIdx == null ? 'append' : 'replace'} onPick={pickCatalog} />
        </div>
      );
    }

    function TemplateManager({ onChanged }) {
      const toast = useToast();
      const [list, setList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [trades, setTrades] = useState(TRADE_MASTER);
      const [editing, setEditing] = useState(undefined); // undefined=닫힘, null=새로, obj=수정
      const [delTarget, setDelTarget] = useState(null);
      const reload = useCallback(async () => {
        setLoading(true);
        try { setList(await api.listTemplates()); } catch (e) { toast('템플릿을 불러오지 못했습니다.', 'error'); }
        finally { setLoading(false); }
      }, [toast]);
      useEffect(() => { reload(); }, [reload]);
      useEffect(() => { let alive = true; api.listTrades().then((d) => { if (alive && d && d.length) setTrades(d); }).catch(() => {}); return () => { alive = false; }; }, []);
      const save = async (body) => {
        try {
          if (editing && editing.id) { await api.updateTemplate(editing.id, body); toast('템플릿이 수정되었습니다.', 'success'); }
          else { await api.createTemplate(body); toast('템플릿이 추가되었습니다.', 'success'); }
          setEditing(undefined); await reload(); if (onChanged) onChanged();
          return true;
        } catch (e) { toast(e.status === 400 ? (e.message || '입력을 확인하세요.') : '저장에 실패했습니다.', 'error'); return false; }
      };
      const confirmDel = async () => {
        const t = delTarget; setDelTarget(null);
        try { await api.removeTemplate(t.id); toast('삭제되었습니다.', 'info'); await reload(); if (onChanged) onChanged(); }
        catch (e) { toast('삭제에 실패했습니다.', 'error'); }
      };
      const summarize = (t) => {
        const cfg = t.config || {};
        const bits = [`${(t.items || []).length}개 항목`];
        if (cfg.use_cost_buildup) bits.push(`원가계산 · 이윤 ${Math.round((cfg.profit_rate != null ? cfg.profit_rate : BUILDUP_DEFAULTS.profit_rate) * 100)}%`);
        bits.push(VAT_MODE_LABEL[cfg.vat_mode || 'exclusive']);
        return bits.join(' · ');
      };
      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-1">
            <h2 className="text-base font-bold text-slate-800">견적 템플릿</h2>
            <Button size="sm" onClick={() => setEditing(null)}>+ 템플릿 추가</Button>
          </div>
          <p className="text-xs text-slate-400 mb-4">자주 쓰는 공종·항목·원가요율을 템플릿으로 저장하면, 견적 작성 시 <span className="font-semibold text-slate-500">🧩 템플릿으로 시작</span>으로 프리필할 수 있습니다.</p>
          {loading ? (
            <div className="h-32 bg-slate-100 rounded-xl animate-pulse"></div>
          ) : list.length === 0 ? (
            <div className="text-center py-10">
              <div className="text-4xl mb-2">🧩</div>
              <p className="text-sm text-slate-400">저장된 템플릿이 없습니다.<br />‘템플릿 추가’로 사무실 저가공사형·아파트 리모델링 중급형 등 자주 쓰는 구성을 만들어보세요.</p>
            </div>
          ) : (
            <ul className="divide-y divide-slate-100">
              {list.map((t) => (
                <li key={t.id} className="py-3 flex items-center justify-between gap-3">
                  <button className="text-left min-w-0 flex-1" onClick={() => setEditing(t)}>
                    <div className="flex items-center gap-2"><span className="font-semibold text-slate-800 truncate">{t.name}</span></div>
                    <p className="mt-0.5 text-xs text-slate-400 truncate">{t.description ? t.description + ' · ' : ''}{summarize(t)}</p>
                  </button>
                  <div className="shrink-0 whitespace-nowrap">
                    <button onClick={() => setEditing(t)} className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50" title="수정">✏️</button>
                    <button onClick={() => setDelTarget(t)} className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50" title="삭제">🗑️</button>
                  </div>
                </li>
              ))}
            </ul>
          )}
          <Modal isOpen={editing !== undefined} onClose={() => setEditing(undefined)} title={editing && editing.id ? '견적 템플릿 수정' : '새 견적 템플릿'} size="xl">
            {editing !== undefined && (
              <TemplateEditor key={editing && editing.id ? editing.id : 'new'} initial={editing} trades={trades} onSave={save} onCancel={() => setEditing(undefined)} />
            )}
          </Modal>
          <Modal isOpen={!!delTarget} onClose={() => setDelTarget(null)} title="템플릿 삭제 확인" size="sm">
            {delTarget && (
              <div>
                <p className="text-sm text-slate-600">'<span className="font-semibold">{delTarget.name}</span>' 템플릿을 삭제하시겠습니까?</p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setDelTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDel}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </Card>
      );
    }

    function ManageTab({ sites, onMastersChanged, onSitesChanged, onTemplatesChanged }) {
      const [sub, setSub] = useState('staff');
      const [staffAll, setStaffAll] = useState([]);
      const [vendorsAll, setVendorsAll] = useState([]);
      const [catsAll, setCatsAll] = useState({ cost: [], process: [] });
      const [clientsAll, setClientsAll] = useState([]); // v5: 고객/리드 마스터
      const staffNames = useMemo(() => staffAll.map((s) => s.name), [staffAll]);
      const reloadMasters = useCallback(async () => {
        try {
          const [s, v, c, cl] = await Promise.all([api.listStaff(true), api.listVendors(true), api.listCategories(true), api.listClients(true)]);
          setStaffAll(s); setVendorsAll(v); setCatsAll(c); setClientsAll(cl);
        } catch (e) { /* keep */ }
        if (onMastersChanged) onMastersChanged();
      }, [onMastersChanged]);
      useEffect(() => { reloadMasters(); }, [reloadMasters]);
      const subs = [
        { id: 'staff', label: '담당자', icon: '👷' },
        { id: 'vendors', label: '거래처', icon: '🏪' },
        { id: 'clients', label: '고객/리드', icon: '👤' },
        { id: 'categories', label: '카테고리', icon: '🏷️' },
        { id: 'catalog', label: '단가 카탈로그', icon: '📚' },
        { id: 'templates', label: '견적 템플릿', icon: '🧩' },
        { id: 'sites', label: '현장 마스터', icon: '🏗️' },
      ];
      return (
        <div className="space-y-4">
          <Card className="p-1.5">
            <div className="flex gap-1 overflow-x-auto">
              {subs.map((t) => {
                const on = sub === t.id;
                return (
                  <button key={t.id} onClick={() => setSub(t.id)}
                    className={`flex-1 min-w-[84px] px-3 py-2 rounded-xl text-sm font-semibold transition whitespace-nowrap ${on ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                    <span className="mr-1">{t.icon}</span>{t.label}
                  </button>
                );
              })}
            </div>
          </Card>
          {sub === 'staff' && <StaffManager staff={staffAll} onChanged={reloadMasters} />}
          {sub === 'vendors' && <VendorManager vendors={vendorsAll} onChanged={reloadMasters} />}
          {sub === 'clients' && <ClientManager clients={clientsAll} onChanged={reloadMasters} />}
          {sub === 'categories' && <CategoryManager cats={catsAll} onChanged={reloadMasters} />}
          {sub === 'catalog' && <CatalogManager />}
          {sub === 'templates' && <TemplateManager onChanged={onTemplatesChanged} />}
          {sub === 'sites' && <SiteMaster sites={sites} onChanged={onSitesChanged} staffNames={staffNames} />}
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App({ authUser = null, demoMode = false, onLogout = () => {} }) {
      const toast = useToast();
      const [sites, setSites] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [sitesLoading, setSitesLoading] = useState(true);
      const [usingMock, setUsingMock] = useState(false);

      const [costs, setCosts] = useState([]);
      const [summary, setSummary] = useState(null);
      const [detailLoading, setDetailLoading] = useState(false);
      const [error, setError] = useState(null);

      const [editingCost, setEditingCost] = useState(null);
      const [costDeleteTarget, setCostDeleteTarget] = useState(null);

      const [siteModalOpen, setSiteModalOpen] = useState(false);
      const [editingSite, setEditingSite] = useState(null);
      const [siteDeleteTarget, setSiteDeleteTarget] = useState(null);

      // v2: 탭 / 마스터 / 일정 / 견적 / 인쇄
      const [activeTab, setActiveTab] = useState(() => localStorage.getItem(TAB_KEY) || 'summary');
      const [staff, setStaff] = useState([]);
      const [vendors, setVendors] = useState([]);
      const [cats, setCats] = useState({ cost: [], process: [] });
      const [schedule, setSchedule] = useState([]);
      const [estimates, setEstimates] = useState([]);
      const [templates, setTemplates] = useState([]); // v18 견적 템플릿 (견적 프리필용)
      const [printData, setPrintData] = useState(null);
      const [schedulePrintData, setSchedulePrintData] = useState(null); // v6-3 일정표 PDF
      const [orderPrintData, setOrderPrintData] = useState(null); // v10 발주서 PDF
      const [estSiteModalOpen, setEstSiteModalOpen] = useState(false); // v15 견적으로 현장 만들기 모달
      const [pendingEstimateOpen, setPendingEstimateOpen] = useState(null); // v15 생성 후 견적 에디터 자동오픈 대상 id

      const formRef = useRef(null);

      const selectedSite = useMemo(() => sites.find((s) => s.id === selectedId) || null, [sites, selectedId]);

      // 마스터 기반 드롭다운용 이름 배열 (없으면 상수 폴백)
      const costCatNames = useMemo(() => (cats.cost && cats.cost.length ? cats.cost.map((c) => c.name) : COST_CATEGORIES), [cats]);
      const procCatNames = useMemo(() => (cats.process && cats.process.length ? cats.process.map((c) => c.name) : PROCESS_CATEGORIES), [cats]);
      const staffNames = useMemo(() => staff.map((s) => s.name), [staff]);
      const vendorNames = useMemo(() => vendors.map((v) => v.name), [vendors]);

      useEffect(() => { localStorage.setItem(TAB_KEY, activeTab); }, [activeTab]);

      // ── 현장 목록 로드 ──
      const loadSites = useCallback(async (preferId) => {
        setSitesLoading(true);
        setError(null);
        try {
          const data = await api.listSites();
          setSites(data);
          setUsingMock(api._useMock);
          // 선택 유지 / 복원 / 첫 항목
          const saved = preferId || localStorage.getItem(SEL_KEY);
          let next = null;
          if (saved && data.some((s) => String(s.id) === String(saved))) next = data.find((s) => String(s.id) === String(saved)).id;
          else if (data.length > 0) next = data[0].id;
          setSelectedId(next);
        } catch (e) {
          setError('현장 목록을 불러오지 못했습니다.');
        } finally {
          setSitesLoading(false);
        }
      }, []);

      useEffect(() => { loadSites(); }, [loadSites]);

      // ── 마스터(담당자/거래처/카테고리) 1회 로드 — 드롭다운 공용 ──
      const loadMasters = useCallback(async () => {
        try {
          const [st, vd, ct] = await Promise.all([api.listStaff(), api.listVendors(), api.listCategories()]);
          setStaff(st); setVendors(vd); setCats(ct); setUsingMock(api._useMock);
        } catch (e) { /* 실패 시 상수 폴백 유지 */ }
      }, []);
      useEffect(() => { loadMasters(); }, [loadMasters]);

      // v18: 견적 템플릿 1회 로드 — 견적 목록 ‘템플릿으로 시작’ · 견적으로 현장 만들기 프리필 공용
      const loadTemplates = useCallback(async () => {
        try { setTemplates(await api.listTemplates()); } catch (e) { /* 실패 시 빈 목록 유지 */ }
      }, []);
      useEffect(() => { loadTemplates(); }, [loadTemplates]);

      // ── 선택 현장 상세(비용+요약+일정+견적) 로드 ──
      const loadDetail = useCallback(async (site) => {
        if (!site) { setCosts([]); setSummary(null); setSchedule([]); setEstimates([]); return; }
        setDetailLoading(true);
        try {
          const [cs, sm, sch, est] = await Promise.all([
            api.listCosts(site.id), api.summary(site.id, site), api.listSchedule(site.id), api.listEstimates(site.id),
          ]);
          setCosts(cs); setSummary(sm); setSchedule(sch); setEstimates(est);
          setUsingMock(api._useMock);
        } catch (e) {
          toast('현장 정보를 불러오지 못했습니다.', 'error');
        } finally {
          setDetailLoading(false);
        }
      }, [toast]);

      useEffect(() => {
        if (selectedId != null) {
          localStorage.setItem(SEL_KEY, String(selectedId));
          loadDetail(selectedSite);
        } else {
          setCosts([]); setSummary(null);
        }
      }, [selectedId, selectedSite, loadDetail]);

      const refreshDetail = useCallback(() => loadDetail(selectedSite), [loadDetail, selectedSite]);

      // ── 견적 인쇄: printData 세팅 → 인쇄 → 인쇄 후 정리 ──
      const handlePrint = useCallback((estimate) => {
        setPrintData({ site: selectedSite, estimate, totals: computeTotals(estimate) });
      }, [selectedSite]);
      useEffect(() => {
        if (!printData) return;
        const t = setTimeout(() => window.print(), 80);
        const after = () => setPrintData(null);
        window.addEventListener('afterprint', after);
        return () => { clearTimeout(t); window.removeEventListener('afterprint', after); };
      }, [printData]);

      // ── 일정표 인쇄(PDF): schedulePrintData 세팅 → 인쇄 → 정리 (견적 인쇄와 영역 분리) ──
      const handlePrintSchedule = useCallback(() => {
        setSchedulePrintData({ site: selectedSite, tasks: schedule });
      }, [selectedSite, schedule]);
      useEffect(() => {
        if (!schedulePrintData) return;
        const t = setTimeout(() => window.print(), 80);
        const after = () => setSchedulePrintData(null);
        window.addEventListener('afterprint', after);
        return () => { clearTimeout(t); window.removeEventListener('afterprint', after); };
      }, [schedulePrintData]);

      // ── v10: 발주서 인쇄(PDF): orderPrintData 세팅 → 인쇄 → 정리 (견적/일정 인쇄와 영역 분리) ──
      const handlePrintOrders = useCallback((orders) => {
        setOrderPrintData({ site: selectedSite, orders });
      }, [selectedSite]);
      useEffect(() => {
        if (!orderPrintData) return;
        const t = setTimeout(() => window.print(), 80);
        const after = () => setOrderPrintData(null);
        window.addEventListener('afterprint', after);
        return () => { clearTimeout(t); window.removeEventListener('afterprint', after); };
      }, [orderPrintData]);

      // ── 현장 등록/수정 ──
      const handleSaveSite = async (body) => {
        try {
          if (editingSite) {
            await api.updateSite(editingSite.id, body);
            toast('현장 정보가 수정되었습니다.', 'success');
          } else {
            const created = await api.createSite(body);
            toast('현장이 등록되었습니다.', 'success');
            setSiteModalOpen(false);
            setEditingSite(null);
            await loadSites(created.id);
            return true;
          }
          setSiteModalOpen(false);
          setEditingSite(null);
          await loadSites(editingSite ? editingSite.id : undefined);
          return true;
        } catch (e) {
          toast(e.status === 409 ? (e.message || '이미 같은 이름의 현장이 있습니다.') : '저장에 실패했습니다.', 'error');
          return false;
        }
      };

      const confirmDeleteSite = async () => {
        if (!siteDeleteTarget) return;
        const target = siteDeleteTarget;
        setSiteDeleteTarget(null);
        try {
          await api.removeSite(target.id);
          toast('현장이 삭제되었습니다. (자료 폴더는 보존됩니다)', 'info');
          const remaining = sites.filter((s) => s.id !== target.id);
          await loadSites(remaining[0] ? remaining[0].id : undefined);
        } catch (e) {
          toast('현장 삭제에 실패했습니다.', 'error');
        }
      };

      // ── v15: 견적으로 현장 만들기 (원자적 site+estimate) → 새 현장 전역 선택 + 견적 에디터 자동 오픈(항목 입력) ──
      const handleCreateEstimateWithSite = async ({ site, estimate }) => {
        try {
          const res = await api.createEstimateWithSite({ site, estimate });
          const newSite = res.site, newEst = res.estimate;
          setUsingMock(api._useMock);
          setEstSiteModalOpen(false);
          setActiveTab('estimate');
          await loadSites(newSite.id);          // 새 현장 전역 선택(EstimateTab 키 변경 → 새 현장으로 remount)
          setPendingEstimateOpen(newEst.id);    // 선택 반영 후 견적 에디터 자동 오픈 (key 고정 상태에서 prop 변경)
          toast('현장과 견적이 생성되었습니다. 항목을 입력하세요.', 'success');
          return true;
        } catch (e) {
          toast(e.status === 409 ? (e.message || '이미 같은 이름의 현장이 있습니다.') : '현장+견적 생성에 실패했습니다.', 'error');
          return false;
        }
      };

      // ── 비용 등록/수정 ──
      const handleSubmitCost = async (body) => {
        if (!selectedSite) return false;
        try {
          if (editingCost) {
            await api.updateCost(editingCost.id, body);
            setEditingCost(null);
            toast('비용이 수정되었습니다.', 'success');
          } else {
            await api.createCost(selectedSite.id, body);
            toast('비용이 등록되었습니다.', 'success');
          }
          setUsingMock(api._useMock);
          await refreshDetail();
          return true;
        } catch (e) {
          toast('저장에 실패했습니다.', 'error');
          return false;
        }
      };

      const handleEditCost = (c) => {
        setEditingCost(c);
        if (formRef.current) formRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      const confirmDeleteCost = async () => {
        if (!costDeleteTarget) return;
        const id = costDeleteTarget.id;
        setCostDeleteTarget(null);
        try {
          await api.removeCost(id);
          if (editingCost && editingCost.id === id) setEditingCost(null);
          setUsingMock(api._useMock);
          await refreshDetail();
          toast('비용이 삭제되었습니다.', 'info');
        } catch (e) {
          toast('삭제에 실패했습니다.', 'error');
        }
      };

      // ── CSV 내보내기 ──
      const handleExport = async () => {
        if (!selectedSite) return;
        // 서버 모드: 서버 export 엔드포인트로 다운로드 시도
        if (!api._useMock) {
          try {
            const res = await fetch(api.exportUrl(selectedSite.id), { headers: getToken() ? { Authorization: 'Bearer ' + getToken() } : {} });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const blob = await res.blob();
            downloadBlob(blob, `${selectedSite.name}-비용내역.csv`);
            toast('CSV를 내보냈습니다.', 'success');
            return;
          } catch (e) {
            // 서버 실패 시 브라우저 폴백으로 진행
          }
        }
        // 폴백: 브라우저에서 CSV 생성
        const header = ['날짜', '금액', '비용카테고리', '공정', '담당자', '거래처', '메모'];
        const esc = (v) => {
          const s = (v == null ? '' : String(v));
          return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
        };
        const lines = [header.join(',')];
        costs.forEach((c) => {
          lines.push([c.date, c.amount, c.category, c.process || '', c.manager || '', c.vendor || '', c.memo || ''].map(esc).join(','));
        });
        const csv = '﻿' + lines.join('\r\n'); // UTF-8 BOM
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
        downloadBlob(blob, `${selectedSite.name}-비용내역.csv`);
        toast('CSV를 내보냈습니다. (브라우저 다운로드)', 'success');
      };

      return (
        <>
        <div className="min-h-screen no-print">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-40">
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
              <h1 className="text-lg sm:text-xl font-extrabold text-slate-800 flex items-center gap-2">
                <span>🏗️</span> <span className="hidden sm:inline">인테리어 현장 비용관리</span><span className="sm:hidden">현장 비용관리</span>
              </h1>
              {/* v13: 로그인 시 사용자·팀·로그아웃 / 데모(오프라인)면 배너 */}
              <div className="flex items-center gap-2 sm:gap-3 shrink-0">
                {demoMode ? (
                  <span className="text-[11px] font-medium px-2.5 py-1 rounded-full bg-amber-100 text-amber-700"
                    title="서버에 연결하지 않고 브라우저(localStorage) 데이터로 동작 중입니다. 로그인 없이 둘러보기 모드입니다.">
                    데모(오프라인)
                  </span>
                ) : (
                  <>
                    {usingMock && (
                      <span className="text-[11px] font-medium px-2.5 py-1 rounded-full bg-amber-100 text-amber-700"
                        title="서버 연결이 끊겨 브라우저(localStorage) 데이터로 동작 중입니다.">
                        오프라인 데모 모드
                      </span>
                    )}
                    {authUser && (
                      <>
                        <div className="text-right leading-tight hidden sm:block">
                          <p className="text-sm font-semibold text-slate-700 truncate max-w-[160px]">{authUser.name || authUser.email}</p>
                          <p className="text-[11px] text-slate-400 truncate max-w-[160px]">{authUser.team_name || '팀'}</p>
                        </div>
                        <Button variant="secondary" size="sm" onClick={onLogout}>로그아웃</Button>
                      </>
                    )}
                  </>
                )}
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-6 space-y-6">
            {/* 에러 배너 */}
            {error && (
              <Card className="p-4 bg-red-50 border-red-200">
                <div className="flex items-center justify-between">
                  <span className="text-sm text-red-700">{error}</span>
                  <Button variant="danger" size="sm" onClick={() => loadSites()}>다시 시도</Button>
                </div>
              </Card>

            {/* 현장 선택/관리 바 */}
            <Card className="p-4 sm:p-5">

                <div className="flex-1">
                  <span className="block mb-1.5 text-sm font-medium text-slate-700">현장 선택</span>
                  {sitesLoading ? (
                    <div className="h-11 bg-slate-100 rounded-xl animate-pulse"></div>
                  ) : sites.length === 0 ? (
                    <div className="h-11 flex items-center px-3.5 rounded-xl border border-dashed border-slate-300 text-sm text-slate-400">
                      등록된 현장이 없습니다.
                    </div>
                  ) : (
                    <select
                      value={selectedId != null ? String(selectedId) : ''}
                      onChange={(e) => { setSelectedId(sites.find((s) => String(s.id) === e.target.value).id); setEditingCost(null); }}
                      className="w-full px-3.5 py-2.5 rounded-xl border border-slate-300 bg-white text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition"

                      {sites.map((s) => <option key={s.id} value={String(s.id)}>{s.name}</option>)}
                    </select>
                  )}
                </div>
                <div className="flex flex-wrap gap-2">
                  {selectedSite && (
                    <>
                      <Button variant="secondary" onClick={() => { setEditingSite(selectedSite); setSiteModalOpen(true); }}>현장 수정</Button>
                      <Button variant="ghost" className="text-red-600 hover:bg-red-50" onClick={() => setSiteDeleteTarget(selectedSite)}>삭제</Button>
                    </>
                  )}
                  <Button onClick={() => { setEditingSite(null); setSiteModalOpen(true); }}>+ 현장 등록</Button>
                  <Button variant="secondary" onClick={() => setEstSiteModalOpen(true)}>+ 견적으로 현장 만들기</Button>
                </div>
              </div>

              {/* 선택 현장 메타 */}
              {selectedSite && (
                <div className="mt-4 pt-4 border-t border-slate-100 grid grid-cols-2 sm:grid-cols-4 gap-3 text-sm">
                  <div><p className="text-xs text-slate-400">발주처</p><p className="font-medium text-slate-700 truncate">{selectedSite.client || '-'}</p></div>
                  <div><p className="text-xs text-slate-400">담당자</p><p className="font-medium text-slate-700 truncate">{selectedSite.manager || '-'}</p></div>
                  <div>
                    <p className="text-xs text-slate-400">상태</p>
                    <Badge color={SITE_STATUS_COLOR[selectedSite.status] || 'bg-blue-500'}>{selectedSite.status || '진행'}</Badge>
                  </div>
                  <div>
                    <p className="text-xs text-slate-400">태그</p>
                    <div className="flex flex-wrap gap-1">
                      {(selectedSite.tags || '').split(',').map((t) => t.trim()).filter(Boolean).map((t) => (
                        <span key={t} className="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500">#{t}</span>
                      ))}
                      {!(selectedSite.tags || '').trim() && <span className="text-slate-300">-</span>}
                    </div>
                  </div>
                  <div className="col-span-2 sm:col-span-4"><p className="text-xs text-slate-400">주소</p><p className="font-medium text-slate-700 truncate">{selectedSite.address || '-'}</p></div>
                </div>
              )}
            </Card>

            {/* 탭 네비게이션 (항상 표시 — 관리 탭은 현장 없이도 접근 가능) */}
            <TabNav active={activeTab} onChange={setActiveTab} />

            {activeTab === 'projects' ? (
              <ProjectBoard sites={sites} loading={sitesLoading}
                onSelect={(id) => { setSelectedId(id); setEditingCost(null); setActiveTab('summary'); }}
                onNew={() => { setEditingSite(null); setSiteModalOpen(true); }}
                onNewFromEstimate={() => setEstSiteModalOpen(true)}
                onChanged={() => loadSites(selectedId)} />
            ) : activeTab === 'manage' ? (
              <ManageTab sites={sites} staffNames={staffNames} onMastersChanged={loadMasters} onSitesChanged={loadSites} onTemplatesChanged={loadTemplates} />
            ) : !selectedSite ? (
              <Card className="p-12 text-center">
                <div className="text-5xl mb-3">🏗️</div>
                <h2 className="text-lg font-bold text-slate-700 mb-1">{sites.length === 0 ? '현장을 먼저 등록하세요' : '현장을 선택하세요'}</h2>
                <p className="text-sm text-slate-400 mb-5">
                  현장을 {sites.length === 0 ? '등록' : '선택'}하면 요약·비용·일정·견적·발주·미팅·AS·자료·현장사진을 관리할 수 있어요.<br />
                  담당자·거래처·카테고리 마스터는 <span className="font-semibold text-slate-500">⚙️ 관리</span> 탭에서 현장 없이도 설정할 수 있습니다.
                </p>
                <div className="flex flex-wrap gap-2 justify-center">
                  {sites.length === 0 && <Button size="lg" onClick={() => { setEditingSite(null); setSiteModalOpen(true); }}>+ 첫 현장 등록하기</Button>}
                  <Button size="lg" variant={sites.length === 0 ? 'secondary' : 'primary'} onClick={() => setEstSiteModalOpen(true)}>+ 견적으로 현장 만들기</Button>
                </div>
              </Card>
            ) : (
              <>
                {activeTab === 'summary' && (
                  <div className="space-y-6">
                    <ProjectHeader site={selectedSite} />
                    <SummaryDashboard summary={summary} loading={detailLoading} />
                    <PlanVsActual summary={summary} />
                    <Analysis summary={summary} loading={detailLoading} costs={costs} />
                    <PersonnelSection site={selectedSite} costs={costs} staff={staff} />
                    <MonthlyTrend costs={costs} loading={detailLoading} />
                  </div>
                )}
                {activeTab === 'cost' && (
                  <div className="space-y-6">
                    <div ref={formRef}>
                      <CostForm onSubmit={handleSubmitCost} editing={editingCost} onCancelEdit={() => setEditingCost(null)} siteId={selectedSite.id}
                        catNames={costCatNames} procNames={procCatNames} staffNames={staffNames} vendorNames={vendorNames} scheduleOptions={schedule} />
                    </div>
                    <div className="flex items-center justify-between">
                      <h2 className="text-base font-bold text-slate-800">비용 내역</h2>
                      <Button variant="secondary" size="sm" onClick={handleExport} disabled={costs.length === 0}>⬇ CSV 내보내기</Button>
                    </div>
                    <CostList costs={costs} loading={detailLoading} onEdit={handleEditCost} onAskDelete={setCostDeleteTarget} schedule={schedule} />
                  </div>
                )}
                {activeTab === 'schedule' && (
                  <ScheduleTab key={'sch-' + selectedSite.id} site={selectedSite} tasks={schedule} loading={detailLoading}
                    procNames={procCatNames} staffNames={staffNames} vendorNames={vendorNames} onChanged={refreshDetail} onPrintSchedule={handlePrintSchedule} />
                )}
                {activeTab === 'estimate' && (
                  <EstimateTab key={'est-' + selectedSite.id} site={selectedSite} estimates={estimates} loading={detailLoading}
                    procNames={procCatNames} onChanged={() => loadSites(selectedSite.id)} onPrint={handlePrint}
                    openEstimateId={pendingEstimateOpen} onOpenConsumed={() => setPendingEstimateOpen(null)} templates={templates} />
                )}
                {activeTab === 'orders' && (
                  <OrdersTab key={'ord-' + selectedSite.id} site={selectedSite} vendorNames={vendorNames} onPrintOrders={handlePrintOrders} />
                )}
                {activeTab === 'meetings_as' && (
                  <MeetingsAsTab key={'mas-' + selectedSite.id} site={selectedSite} staffNames={staffNames} />
                )}
                {activeTab === 'documents' && (
                  <DocumentsTab key={'doc-' + selectedSite.id} site={selectedSite} demoMode={demoMode} uploaderName={authUser ? (authUser.name || authUser.email) : ''} />
                )}
                {activeTab === 'photos' && (
                  <PhotosTab key={'pho-' + selectedSite.id} site={selectedSite} demoMode={demoMode} uploaderName={authUser ? (authUser.name || authUser.email) : ''} />
                )}
              </>
            )}

            <footer className="text-center text-xs text-slate-400 py-4">
              현장 비용 · 일정(캘린더/.ics) · 견적서(인쇄/확정) · 마스터 관리 · 서버 미연결 시 localStorage 자동 폴백 · 퍼센트는 프론트에서 직접 계산
            </footer>
          </main>

          {/* 현장 등록/수정 모달 */}
          <Modal isOpen={siteModalOpen} onClose={() => { setSiteModalOpen(false); setEditingSite(null); }}
            title={editingSite ? '현장 수정' : '현장 등록'} size="lg">
            <SiteForm
              key={editingSite ? editingSite.id : 'new'}
              editing={editingSite}
              staffNames={staffNames}
              onSubmit={handleSaveSite}
              onCancel={() => { setSiteModalOpen(false); setEditingSite(null); }}
            />
          </Modal>

          {/* v15: 견적으로 현장 만들기 모달 (현장정보 + 견적제목 → 원자적 site+estimate → 견적 에디터 오픈) */}
          <Modal isOpen={estSiteModalOpen} onClose={() => setEstSiteModalOpen(false)} title="견적으로 현장 만들기" size="lg">
            <EstimateSiteForm
              staffNames={staffNames}
              templates={templates}
              onSubmit={handleCreateEstimateWithSite}
              onCancel={() => setEstSiteModalOpen(false)}
            />
          </Modal>

          {/* 현장 삭제 확인 모달 */}
          <Modal isOpen={!!siteDeleteTarget} onClose={() => setSiteDeleteTarget(null)} title="현장 삭제 확인" size="sm">
            {siteDeleteTarget && (
              <div>
                <p className="text-sm text-slate-600">
                  '<span className="font-semibold">{siteDeleteTarget.name}</span>' 현장을 삭제하시겠습니까?<br />
                  해당 현장의 <span className="font-semibold text-red-600">모든 비용 내역</span>이 함께 삭제됩니다. (자료 폴더/파일은 보존)
                </p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setSiteDeleteTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDeleteSite}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>

          {/* 비용 삭제 확인 모달 */}
          <Modal isOpen={!!costDeleteTarget} onClose={() => setCostDeleteTarget(null)} title="비용 삭제 확인" size="sm">
            {costDeleteTarget && (
              <div>
                <p className="text-sm text-slate-600">아래 비용을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.</p>
                <div className="mt-3 p-3 rounded-xl bg-slate-50 border border-slate-100 text-sm">
                  <div className="flex items-center justify-between">
                    <div className="flex flex-wrap items-center gap-1.5">
                      <Badge color={COST_COLOR[costDeleteTarget.category] || 'bg-slate-400'}>{costDeleteTarget.category}</Badge>
                      {costDeleteTarget.process && <Badge color={PROC_COLOR[costDeleteTarget.process] || 'bg-slate-400'}>{costDeleteTarget.process}</Badge>}
                    </div>
                    <span className="font-bold text-slate-800">{fmtWon(costDeleteTarget.amount)}</span>
                  </div>
                  <p className="mt-1 text-slate-500">{costDeleteTarget.memo || '메모 없음'} · {costDeleteTarget.date}</p>
                </div>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setCostDeleteTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDeleteCost}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </div>

        {/* 견적서 인쇄 영역 (화면 숨김 / 인쇄 시에만 표시) */}
        <div id="print-area" className="print-only">
          {printData && <EstimatePrint site={printData.site} estimate={printData.estimate} totals={printData.totals} />}
        </div>
        {/* 일정표 인쇄 영역 (견적과 분리 — 데이터가 세팅된 쪽만 내용이 렌더됨) */}
        <div id="schedule-print-area" className="print-only">
          {schedulePrintData && <SchedulePrint site={schedulePrintData.site} tasks={schedulePrintData.tasks} />}
        </div>
        {/* v10: 발주서 인쇄 영역 (견적/일정과 분리 — 데이터가 세팅된 쪽만 내용이 렌더됨) */}
        <div id="orders-print-area" className="print-only">
          {orderPrintData && <OrdersPrint site={orderPrintData.site} orders={orderPrintData.orders} />}
        </div>
        </>
      );
    }

    // ========================================
    // v13: 인증 화면 (로그인 / 회원가입 탭 + 초대코드)
    // ========================================
    // ========================================
    // v17: 공유 모달(앱 내) + 공개 공유 뷰(무로그인)
    // ========================================
    // 견적/발주 상세·행에서 열리는 공유 설정 모달. kind: 'estimate' | 'order'
    function ShareModal({ isOpen, onClose, kind, id, title, initialToken = null, initialHasPassword = false, onChanged }) {
      const toast = useToast();
      const [usePw, setUsePw] = useState(!!initialHasPassword);
      const [pw, setPw] = useState('');
      const [token, setToken] = useState(initialToken);
      const [hasPassword, setHasPassword] = useState(!!initialHasPassword);
      const [busy, setBusy] = useState(false);
      const [copied, setCopied] = useState(false);
      const label = kind === 'order' ? '발주서' : '견적서';

      // 다른 레코드로 열릴 때 상태 초기화
      useEffect(() => {
        if (!isOpen) return;
        setToken(initialToken); setHasPassword(!!initialHasPassword);
        setUsePw(!!initialHasPassword); setPw(''); setCopied(false);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [isOpen, id]);

      const shareUrl = token ? buildShareUrl(kind, token) : '';

      const doShare = async () => {
        if (busy) return;
        const opts = {};
        if (usePw) { if (!pw.trim()) { toast('비밀번호를 입력하거나 ‘비밀번호로 보호’를 해제하세요.', 'error'); return; } opts.password = pw; }
        else if (hasPassword) { opts.password = ''; } // 기존 비번 제거
        setBusy(true);
        try {
          const fn = kind === 'order' ? api.shareOrder : api.shareEstimate;
          const d = await fn.call(api, id, opts);
          setToken(d.share_token); setHasPassword(!!d.hasPassword);
          if (d.hasPassword) setUsePw(true);
          toast(token ? '공유 설정이 적용되었습니다.' : '공유 링크가 생성되었습니다.', 'success');
          if (onChanged) onChanged();
        } catch (e) { toast(e.status === 404 ? '대상을 찾을 수 없습니다.' : '공유에 실패했습니다.', 'error'); }
        finally { setBusy(false); }
      };

      const doUnshare = async () => {
        if (busy) return;
        setBusy(true);
        try {
          const fn = kind === 'order' ? api.unshareOrder : api.unshareEstimate;
          await fn.call(api, id);
          setToken(null); setHasPassword(false); setUsePw(false); setPw('');
          toast('공유가 해제되었습니다.', 'info');
          if (onChanged) onChanged();
        } catch (e) { toast('해제에 실패했습니다.', 'error'); }
        finally { setBusy(false); }
      };

      const doCopy = async () => {
        const ok = await copyToClipboard(shareUrl);
        if (ok) { setCopied(true); toast('공유 링크를 복사했습니다.', 'success'); setTimeout(() => setCopied(false), 1600); }
        else { toast('복사에 실패했습니다. 링크를 직접 선택해 복사하세요.', 'error'); }
      };

      return (
        <Modal isOpen={isOpen} onClose={onClose} title={`🔗 ${label} 공유`} size="md">
          <div className="space-y-4">
            <p className="text-sm text-slate-500">
              저장된 {label}를 <b className="text-slate-700">로그인 없이 열람 가능한 읽기전용 링크</b>로 외부(고객)에게 공유합니다.
              {title ? <> · <span className="text-slate-600 font-medium">{title}</span></> : null}
            </p>

            {token && (
              <div className="rounded-xl border border-emerald-200 bg-emerald-50 p-3.5 space-y-2">
                <div className="flex items-center gap-2 text-sm font-semibold text-emerald-700">
                  <span>✅ 공유 중</span>
                  <span className={`text-[11px] px-2 py-0.5 rounded-full ${hasPassword ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-500'}`}>
                    {hasPassword ? '🔒 비밀번호 보호' : '🔓 비밀번호 없음'}
                  </span>
                </div>
                <div className="flex gap-2">
                  <input readOnly value={shareUrl} onFocus={(e) => e.target.select()} aria-label="공유 링크"
                    className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-emerald-200 bg-white text-xs text-slate-700 font-mono" />
                  <Button size="sm" onClick={doCopy}>{copied ? '✓ 복사됨' : '복사'}</Button>
                </div>
                <p className="text-[11px] text-emerald-700/80">이 링크를 받은 사람은 로그인 없이 열람·인쇄(PDF)할 수 있습니다.</p>
              </div>
            )}

            <div className="rounded-xl border border-slate-200 p-3.5 space-y-2.5">
              <label className="flex items-center gap-2 cursor-pointer text-sm font-medium text-slate-700">
                <input type="checkbox" checked={usePw} onChange={(e) => { setUsePw(e.target.checked); if (!e.target.checked) setPw(''); }} />
                비밀번호로 보호
              </label>
              {usePw && (
                <Input type="password" placeholder={hasPassword ? '새 비밀번호(변경 시 입력)' : '공유 비밀번호'} value={pw}
                  onChange={(e) => setPw(e.target.value)} autoComplete="new-password" />
              )}
              {!usePw && hasPassword && token && (
                <p className="text-[11px] text-amber-600">‘설정 적용’ 시 기존 비밀번호가 <b>제거</b>되어 누구나 열람할 수 있게 됩니다.</p>
              )}
            </div>

            <div className="flex flex-wrap gap-2 justify-between items-center pt-1">
              <div>{token && <Button variant="ghost" className="text-red-600 hover:bg-red-50" onClick={doUnshare} disabled={busy}>공유 해제</Button>}</div>
              <div className="flex gap-2">
                <Button variant="secondary" onClick={onClose}>닫기</Button>
                <Button onClick={doShare} disabled={busy}>{busy ? '처리 중…' : (token ? '설정 적용' : '공유 링크 생성')}</Button>
              </div>
            </div>
          </div>
        </Modal>
      );
    }

    // 공개 공유 뷰 — 앱 부팅 시 URL이 공유 경로면 로그인 게이트 대신 렌더(무로그인/독립)
    function ShareView({ kind, token }) {
      const [phase, setPhase] = useState('loading'); // loading | password | ready | error
      const [data, setData] = useState(null);
      const [pw, setPw] = useState('');
      const [err, setErr] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const label = kind === 'order' ? '발주서' : '견적서';

      const load = useCallback(async (password) => {
        setErr('');
        try {
          const fn = kind === 'order' ? api.fetchSharedOrder : api.fetchSharedEstimate;
          const d = await fn.call(api, token, password);
          if (d && d.requiresPassword) { setPhase('password'); return; }
          setData(d); setPhase('ready');
        } catch (e) {
          if (e && e.status === 401) { setPhase('password'); if (password != null) setErr('비밀번호가 올바르지 않습니다.'); }
          else if (e && e.status === 404) { setPhase('error'); setErr('존재하지 않거나 해제된 공유 링크입니다.'); }
          else { setPhase('error'); setErr('공유 내용을 불러오지 못했습니다. 잠시 후 다시 시도하세요.'); }
        }
      }, [kind, token]);

      useEffect(() => { load(); }, [load]);

      const submitPw = async (e) => {
        e.preventDefault();
        if (!pw) { setErr('비밀번호를 입력하세요.'); return; }
        setSubmitting(true); await load(pw); setSubmitting(false);
      };

      if (phase === 'loading') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-100">
            <div className="flex flex-col items-center gap-3 text-slate-400">
              <div className="w-8 h-8 border-2 border-slate-300 border-t-blue-500 rounded-full animate-spin"></div>
              <span className="text-sm">공유 문서를 불러오는 중…</span>
            </div>
          </div>
        );
      }

      if (phase === 'error') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-100 px-4">
            <Card className="p-8 max-w-md w-full text-center">
              <div className="text-4xl mb-3">🔗</div>
              <h1 className="text-lg font-bold text-slate-800">공유 링크를 열 수 없습니다</h1>
              <p className="text-sm text-slate-500 mt-2">{err}</p>
              <p className="text-[11px] text-slate-400 mt-4">문서를 공유한 담당자에게 새 링크를 요청하세요.</p>
            </Card>
          </div>
        );
      }

      if (phase === 'password') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-100 px-4 py-10">
            <div className="w-full max-w-sm">
              <div className="text-center mb-6">
                <div className="text-4xl mb-2">🔒</div>
                <h1 className="text-lg font-extrabold text-slate-800">{SUPPLIER.name} · {label} 공유</h1>
                <p className="text-sm text-slate-400 mt-1">비밀번호로 보호된 문서입니다.</p>
              </div>
              <Card className="p-6">
                <form onSubmit={submitPw} className="space-y-4">
                  <Input label="비밀번호" type="password" autoComplete="off" value={pw}
                    onChange={(e) => setPw(e.target.value)} placeholder="공유 비밀번호를 입력하세요" autoFocus />
                  {err && <div className="text-sm text-red-600 bg-red-50 border border-red-200 rounded-xl px-3.5 py-2.5">{err}</div>}
                  <Button type="submit" size="lg" disabled={submitting} className="w-full">
                    {submitting ? '확인 중…' : '열람하기'}
                  </Button>
                </form>
              </Card>
              <p className="text-center text-[11px] text-slate-400 mt-4">비밀번호는 문서를 공유한 담당자에게 문의하세요.</p>
            </div>
          </div>
        );
      }

      // ready — 읽기전용·인쇄 가능 레이아웃 (기존 견적/발주 인쇄 컴포넌트 재사용)
      const orders = data && (data.orders || (data.order ? [data.order] : []));
      return (
        <div className="min-h-screen bg-slate-100 py-8 px-4">
          <div className="max-w-3xl mx-auto">
            <div className="no-print flex flex-wrap items-center justify-between gap-2 mb-4">
              <div className="flex items-center gap-2 text-sm text-slate-500">
                <span className="text-lg">🏗️</span>
                <span className="font-semibold text-slate-700">{SUPPLIER.name}</span>
                <span className="text-slate-300">|</span>
                <span>{label} 공유</span>
                <span className="text-[11px] px-2 py-0.5 rounded-full bg-slate-200 text-slate-500">읽기전용</span>
              </div>
              <Button size="sm" onClick={() => window.print()}>🖨 인쇄 / PDF 저장</Button>
            </div>
            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-10">
              {kind === 'order'
                ? <OrdersPrint site={data.site} orders={orders} />
                : <EstimatePrint site={data.site} estimate={data.estimate} totals={data.estimate && data.estimate.totals} />}
            </div>
            <p className="no-print text-center text-[11px] text-slate-400 mt-4">본 문서는 {SUPPLIER.name}에서 공유한 읽기전용 문서입니다.</p>
          </div>
        </div>
      );
    }

    function AuthScreen({ onAuthed }) {
      const [mode, setMode] = useState('login'); // login | signup
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');
      const [invite, setInvite] = useState('');
      const [error, setError] = useState('');
      const [submitting, setSubmitting] = useState(false);

      const switchMode = (m) => { setMode(m); setError(''); setPassword(''); };

      const submit = async (e) => {
        e.preventDefault();
        setError('');
        const em = email.trim().toLowerCase();
        if (!em) { setError('이메일을 입력하세요.'); return; }
        if (!password) { setError('비밀번호를 입력하세요.'); return; }
        if (mode === 'signup') {
          if (password.length < 6) { setError('비밀번호는 6자 이상이어야 합니다.'); return; }
          if (!invite.trim()) { setError('초대코드를 입력하세요.'); return; }
        }
        setSubmitting(true);
        try {
          const data = mode === 'login'
            ? await api.authLogin({ email: em, password })
            : await api.authSignup({ email: em, password, name: name.trim(), invite_code: invite.trim() });
          if (!data || !data.token) throw new Error('인증 응답이 올바르지 않습니다.');
          onAuthed(data.user, data.token);
        } catch (err) {
          // 서버 메시지 우선(초대코드 오류/이메일 중복/로그인 실패/짧은 비번). status 없으면 = 네트워크 실패.
          if (err && err.status) setError(err.message || '요청을 처리하지 못했습니다.');
          else setError('서버에 연결할 수 없습니다. 잠시 후 다시 시도하세요.');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-slate-100 px-4 py-10">
          <div className="w-full max-w-md">
            <div className="text-center mb-6">
              <div className="text-4xl mb-2">🏗️</div>
              <h1 className="text-xl font-extrabold text-slate-800">인테리어 현장 비용관리</h1>
              <p className="text-sm text-slate-400 mt-1">현장 비용 · 일정 · 견적 · 발주 통합 관리</p>
            </div>
            <Card className="p-6 sm:p-7">
              {/* 로그인 / 회원가입 탭 */}
              <div className="grid grid-cols-2 gap-1 p-1 bg-slate-100 rounded-xl mb-5">
                {[['login', '로그인'], ['signup', '회원가입']].map(([m, label]) => (
                  <button key={m} type="button" onClick={() => switchMode(m)}
                    className={`py-2 rounded-lg text-sm font-semibold transition ${mode === m ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                    {label}
                  </button>
                ))}
              </div>

              <form onSubmit={submit} className="space-y-4">
                <Input label="이메일" type="email" autoComplete="email" value={email}
                  onChange={(e) => setEmail(e.target.value)} placeholder="you@company.com" />
                <Input label="비밀번호" type="password"
                  autoComplete={mode === 'login' ? 'current-password' : 'new-password'}
                  value={password} onChange={(e) => setPassword(e.target.value)}
                  placeholder={mode === 'signup' ? '6자 이상' : '비밀번호'} />
                {mode === 'signup' && (
                  <>
                    <Input label="이름 (선택)" type="text" value={name}
                      onChange={(e) => setName(e.target.value)} placeholder="표시할 이름" />
                    <Input label="초대코드" type="text" value={invite}
                      onChange={(e) => setInvite(e.target.value)} placeholder="팀 초대코드 (예: ANDO-2026)" />
                  </>
                )}

                {error && (
                  <div className="text-sm text-red-600 bg-red-50 border border-red-200 rounded-xl px-3.5 py-2.5">{error}</div>
                )}

                <Button type="submit" size="lg" disabled={submitting} className="w-full">
                  {submitting ? '처리 중…' : (mode === 'login' ? '로그인' : '회원가입')}
                </Button>
              </form>

              <p className="text-center text-xs text-slate-400 mt-5">
                {mode === 'login'
                  ? <>계정이 없으신가요? <button type="button" className="text-blue-600 font-medium hover:underline" onClick={() => switchMode('signup')}>회원가입</button> (초대코드 필요)</>
                  : <>이미 계정이 있으신가요? <button type="button" className="text-blue-600 font-medium hover:underline" onClick={() => switchMode('login')}>로그인</button></>}
              </p>
            </Card>
            <p className="text-center text-[11px] text-slate-400 mt-4">초대코드는 팀 관리자에게 문의하세요.</p>
          </div>
        </div>
      );
    }

    // ========================================
    // v13: 인증 게이트 (부팅 → 토큰검사: 앱 / 로그인화면 / 오프라인 데모)
    // ========================================
    function AuthGate() {
      // v17: 공유 경로면 로그인 게이트 대신 공개 ShareView 렌더 (부팅 1회 감지)
      const [shareRoute] = useState(() => parseShareRoute());
      const [status, setStatus] = useState('checking'); // checking | guest | authed | demo
      const [user, setUser] = useState(null);
      const statusRef = useRef('checking');
      useEffect(() => { statusRef.current = status; }, [status]);

      // 보호 API 401(세션만료) 시 api 레이어가 호출 — 데모모드는 보존(오프라인 락아웃 방지)
      useEffect(() => {
        api._onUnauthorized = () => {
          if (statusRef.current === 'demo') return;
          clearToken();
          setUser(null);
          setStatus('guest');
        };
        return () => { api._onUnauthorized = null; };
      }, []);

      const boot = useCallback(async () => {
        if (parseShareRoute()) return; // 공유 경로면 인증 부팅 스킵(ShareView가 대신 렌더)
        setStatus('checking');
        try {
          const data = await api.authMe(); // 토큰 있으면 Bearer 부착; 없으면 서버가 401
          setUser(data.user || null);
          setStatus('authed');
        } catch (e) {
          if (e && e.status) {
            // 서버는 살아있고 401 등 응답 → 로그인 필요
            clearToken();
            setUser(null);
            setStatus('guest');
          } else {
            // 네트워크 실패(서버 다운) → 기존 오프라인 데모모드 (로그인 없이 localStorage)
            setStatus('demo');
          }
        }
      }, []);
      useEffect(() => { boot(); }, [boot]);

      const handleAuthed = useCallback((u, token) => {
        setToken(token);
        setUser(u || null);
        setStatus('authed');
      }, []);

      const handleLogout = useCallback(() => {
        clearToken();
        setUser(null);
        setStatus('guest');
      }, []);

      // v17: 공유 경로 → 무로그인 공개 뷰 (모든 훅 이후 분기 — 훅 순서 보존)
      if (shareRoute) return <ShareView kind={shareRoute.kind} token={shareRoute.token} />;
      if (status === 'checking') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-100">
            <div className="flex flex-col items-center gap-3 text-slate-400">
              <div className="w-8 h-8 border-2 border-slate-300 border-t-blue-500 rounded-full animate-spin"></div>
              <span className="text-sm">불러오는 중…</span>
            </div>
          </div>
        );
      }
      if (status === 'guest') return <AuthScreen onAuthed={handleAuthed} />;
      return <App authUser={user} demoMode={status === 'demo'} onLogout={handleLogout} />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(
      <ToastProvider>
        <AuthGate />
      </ToastProvider>
    );
  </script>
</body>
</html>
