        </div>
      );
    }

    function OrdersTab({ site, vendorNames = [], onPrintOrders }) {
      const toast = useToast();
      const [list, setList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [trades, setTrades] = useState(TRADE_MASTER);
      const [editorOpen, setEditorOpen] = useState(false);
      const [editing, setEditing] = useState(null);
      const [delTarget, setDelTarget] = useState(null);
      const [shareTarget, setShareTarget] = useState(null); // v17: 공유 대상 발주
      const [genLoading, setGenLoading] = useState(false);
      const [replaceConfirm, setReplaceConfirm] = useState(false);
      const reload = useCallback(async () => {
        setLoading(true);
        try { const d = await api.listOrders(site.id); setList(Array.isArray(d) ? d : []); }
        catch (e) { setList([]); }
        finally { setLoading(false); }
      }, [site.id]);
      useEffect(() => { reload(); }, [reload]);
      useEffect(() => { let alive = true; api.listTrades().then((d) => { if (alive && d && d.length) setTrades(d); }).catch(() => {}); return () => { alive = false; }; }, []);
      const total = useMemo(() => list.reduce((s, o) => s + (Number(o.amount) || 0), 0), [list]);
      // v10: 필요시기 임박/지남 집계 (미완료 발주 대상 — 계약 정의와 동일)
      const { dueSoon, overdue } = useMemo(() => {
        let ds = 0, od = 0;
        list.forEach((o) => {
          if (ORDER_DONE_STATES.includes(o.status)) return;
          const d = orderDday(o.need_date);
          if (d == null) return;
          if (d <= 7) ds++;
          if (d < 0) od++;
        });
        return { dueSoon: ds, overdue: od };
      }, [list]);
      const hasAuto = useMemo(() => list.some((o) => o.auto_generated), [list]);
      // v10: 발주 자동생성 (확정 견적 기반)
      const runAutoGen = async (replace) => {
        setReplaceConfirm(false);
        setGenLoading(true);
        try {
          const r = await api.autoGenerateOrders(site.id, { replace });
          if (r && r.generated > 0) toast(`⚡ 공종별 발주 초안 ${r.generated}건을 자동생성했습니다.`, 'success');
          else toast('생성할 공종이 없습니다. 견적 항목을 확인하세요.', 'info');
          await reload();
        } catch (e) {
          if (e.status === 404) toast(e.message || '확정된 견적이 없습니다. 견적 탭에서 견적을 확정해 주세요.', 'error');
          else toast('자동생성에 실패했습니다.', 'error');
        } finally { setGenLoading(false); }
      };
      const onAutoGenClick = () => { if (hasAuto) setReplaceConfirm(true); else runAutoGen(false); };
      // v10: 발주서 PDF (목록 전체 / 단건)
      const printAll = () => { if (!list.length) { toast('인쇄할 발주가 없습니다.', 'info'); return; } onPrintOrders && onPrintOrders(list); };
      const printOne = (o) => { onPrintOrders && onPrintOrders([o]); };
      const save = async (body) => {
        try {
          if (editing) { await api.updateOrder(editing.id, body); toast('발주서가 수정되었습니다.', 'success'); }
          else { await api.createOrder(site.id, body); toast('발주서가 추가되었습니다.', 'success'); }
          setEditorOpen(false); setEditing(null); await reload();
        } catch (e) { toast(e.status === 400 ? e.message : '저장 실패', 'error'); }
      };
      const confirmDel = async () => { const o = delTarget; setDelTarget(null); try { await api.removeOrder(o.id); toast('발주서가 삭제되었습니다.', 'info'); await reload(); } catch (e) { toast('삭제 실패', 'error'); } };
      return (
        <div className="space-y-6">
          <Card className="p-5">
            <div className="flex flex-wrap items-center justify-between gap-2 mb-4">
              <div className="min-w-0">
                <div className="flex flex-wrap items-center gap-2">
                  <h2 className="text-base font-bold text-slate-800">🧾 발주서 <span className="text-sm font-normal text-slate-400">· {site.name}</span></h2>
                  {(dueSoon > 0 || overdue > 0) && (
                    <span className={`inline-flex items-center gap-1 text-xs font-bold px-2.5 py-1 rounded-full ${overdue > 0 ? 'bg-red-100 text-red-700' : 'bg-orange-100 text-orange-700'}`}
                      title="필요시기 기준 임박/지남 발주 (입고·정산완료 제외)">
                      🔔 필요시기 임박 {dueSoon} · 지남 {overdue}
                    </span>
                  )}
                </div>
                <p className="text-xs text-slate-400 mt-0.5">발주 {list.length}건 · 합계 <span className="font-bold text-slate-600">{fmtWon(total)}</span></p>
              </div>
              <div className="flex flex-wrap gap-2">
                <Button size="sm" variant="secondary" onClick={onAutoGenClick} disabled={genLoading}
                  title="확정 견적을 공종별로 그룹핑해 발주 초안을 자동으로 만듭니다.">{genLoading ? '생성 중…' : '⚡ 발주 자동생성'}</Button>
                <Button size="sm" variant="secondary" onClick={printAll} disabled={list.length === 0}
                  title="현재 발주 목록을 A4 발주서로 인쇄/PDF 저장합니다.">🖨 발주서 PDF</Button>
                <Button size="sm" onClick={() => { setEditing(null); setEditorOpen(true); }}>+ 발주 추가</Button>
              </div>
            </div>
            {loading ? (
              <div className="h-32 bg-slate-100 rounded-xl animate-pulse"></div>
            ) : list.length === 0 ? (
              <p className="text-sm text-slate-400 text-center py-10">등록된 발주서가 없습니다. <span className="text-slate-300">+ 발주 추가</span> 또는 <span className="text-slate-300">⚡ 발주 자동생성</span>(확정 견적 기반)으로 시작하세요.</p>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead><tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                    <th className="py-2 pr-3 font-medium">발주번호</th><th className="py-2 pr-3 font-medium">거래처</th>
                    <th className="py-2 pr-3 font-medium">공종</th><th className="py-2 pr-3 font-medium">품목/내역</th>
                    <th className="py-2 pr-3 font-medium text-right">금액</th><th className="py-2 pr-3 font-medium">발주일</th>
                    <th className="py-2 pr-3 font-medium">납기일</th><th className="py-2 pr-3 font-medium">필요시기</th>
                    <th className="py-2 pr-3 font-medium">상태</th>
                    <th className="py-2 font-medium text-right">관리</th></tr></thead>
                  <tbody className="divide-y divide-slate-100">
                    {list.map((o) => {
                      const u = orderUrgency(o);
                      const rowBg = u === 'overdue' ? 'bg-red-50' : u === 'soon' ? 'bg-orange-50' : '';
                      const d = orderDday(o.need_date);
                      const done = ORDER_DONE_STATES.includes(o.status);
                      return (
                      <tr key={o.id} className={rowBg}>
                        <td className="py-2 pr-3 font-mono text-xs text-slate-500 whitespace-nowrap">
                          {o.order_no || '-'}
                          {o.auto_generated && <span className="ml-1 align-middle inline-flex items-center text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-violet-100 text-violet-700" title="견적에서 자동생성된 발주 초안">⚡자동</span>}
                        </td>
                        <td className="py-2 pr-3 text-slate-600">{o.vendor || <span className="text-slate-300">미지정</span>}</td>
                        <td className="py-2 pr-3">{o.trade ? <span className="text-xs px-2 py-0.5 rounded-full text-white whitespace-nowrap" style={{ backgroundColor: tradeHex(o.trade) }}>{o.trade}</span> : <span className="text-slate-300">-</span>}</td>
                        <td className="py-2 pr-3 font-medium text-slate-700 min-w-[150px]">{o.title}{o.memo ? <span className="block text-[11px] font-normal text-slate-400 truncate max-w-[200px]">{o.memo}</span> : null}</td>
                        <td className="py-2 pr-3 text-right font-semibold text-slate-700 whitespace-nowrap">{fmtWon(o.amount)}</td>
                        <td className="py-2 pr-3 text-slate-500 whitespace-nowrap">{o.order_date || '-'}</td>
                        <td className="py-2 pr-3 text-slate-500 whitespace-nowrap">{o.due_date || '-'}</td>
                        <td className="py-2 pr-3 whitespace-nowrap">
                          {o.need_date ? (
                            <span className="inline-flex items-center gap-1">
                              <span className={u === 'overdue' ? 'text-red-700 font-semibold' : u === 'soon' ? 'text-orange-700 font-semibold' : 'text-slate-600'}>{o.need_date}</span>
                              {!done && d != null && (
                                d < 0
                                  ? <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-red-100 text-red-700">지남 D+{Math.abs(d)}</span>
                                  : d <= 7
                                    ? <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-orange-100 text-orange-700">{d === 0 ? 'D-DAY' : 'D-' + d}</span>
                                    : <span className="text-[10px] text-slate-400">D-{d}</span>
                              )}
                            </span>
                          ) : <span className="text-slate-300">-</span>}
                        </td>
                        <td className="py-2 pr-3"><Badge color={ORDER_STATUS_COLOR[o.status] || 'bg-slate-400'}>{o.status || '대기'}</Badge></td>
                        <td className="py-2 text-right whitespace-nowrap">
                          <button onClick={() => printOne(o)} className="p-1.5 rounded-lg text-slate-400 hover:text-slate-700 hover:bg-slate-100" title="이 발주서만 PDF/인쇄">🖨</button>
                          <button onClick={() => setShareTarget(o)} className="p-1.5 rounded-lg text-slate-400 hover:text-emerald-600 hover:bg-emerald-50" title="공유 링크 생성(읽기전용)">🔗</button>
                          <button onClick={() => { setEditing(o); setEditorOpen(true); }} className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50">✏️</button>
                          <button onClick={() => setDelTarget(o)} className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50">🗑️</button>
                        </td>
                      </tr>
                      );
                    })}
                  </tbody>
                  <tfoot><tr className="border-t-2 border-slate-200">
                    <td colSpan="4" className="py-2.5 pr-3 text-right font-bold text-slate-600">합계</td>
                    <td className="py-2.5 pr-3 text-right font-extrabold text-slate-800 whitespace-nowrap">{fmtWon(total)}</td>
                    <td colSpan="5"></td>
                  </tr></tfoot>
                </table>
              </div>
            )}
          </Card>
          <Modal isOpen={editorOpen} onClose={() => { setEditorOpen(false); setEditing(null); }} title={editing ? '발주서 수정' : '새 발주서'} size="lg">
            <OrderForm key={editing ? editing.id : 'new'} initial={editing} trades={trades} vendorNames={vendorNames} onSave={save} onCancel={() => { setEditorOpen(false); setEditing(null); }} />
          </Modal>
          <Modal isOpen={!!delTarget} onClose={() => setDelTarget(null)} title="발주 삭제 확인" size="sm">
            {delTarget && (
              <div>
                <p className="text-sm text-slate-600">'<span className="font-semibold">{delTarget.title}</span>' 발주서를 삭제하시겠습니까?</p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setDelTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDel}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
          <Modal isOpen={replaceConfirm} onClose={() => setReplaceConfirm(false)} title="발주 자동생성 — 재생성" size="sm">
            <div>
              <p className="text-sm text-slate-600">이미 <span className="font-semibold text-violet-700">⚡자동</span>으로 생성된 발주가 있습니다.<br />어떻게 진행할까요?</p>
              <ul className="mt-2 text-xs text-slate-400 list-disc pl-4 space-y-0.5">
                <li><span className="font-medium text-slate-500">기존 대체</span>: 기존 자동생성(대기) 발주를 지우고 새로 만듭니다.</li>
                <li><span className="font-medium text-slate-500">추가 생성</span>: 기존은 두고 한 벌 더 만듭니다(중복 가능).</li>
              </ul>
              <div className="mt-5 flex flex-wrap gap-2 justify-end">
                <Button variant="secondary" onClick={() => setReplaceConfirm(false)}>취소</Button>
                <Button variant="ghost" className="text-slate-600 hover:bg-slate-100" onClick={() => runAutoGen(false)} disabled={genLoading}>추가 생성</Button>
                <Button variant="danger" onClick={() => runAutoGen(true)} disabled={genLoading}>기존 대체</Button>
              </div>
            </div>
          </Modal>
          <ShareModal isOpen={!!shareTarget} onClose={() => setShareTarget(null)} kind="order"
            id={shareTarget && shareTarget.id} title={shareTarget && shareTarget.title}
            initialToken={(shareTarget && shareTarget.share_token) || null}
            initialHasPassword={!!(shareTarget && (shareTarget.share_password_hash || shareTarget.has_password || shareTarget.share_password))}
            onChanged={reload} />
        </div>
      );
    }

    // ========================================
    // 📒 미팅·AS (현장 종속) — MeetingForm + ASForm + MeetingsAsTab
    // ========================================
    function MeetingForm({ initial, onSave, onCancel }) {
      const toast = useToast();
      const [f, setF] = useState(initial ? {
        meeting_date: initial.meeting_date || '', title: initial.title || '', attendees: initial.attendees || '',
        content: initial.content || '', next_action: initial.next_action || '',
      } : { meeting_date: todayStr(), title: '', attendees: '', content: '', next_action: '' });
      const [saving, setSaving] = useState(false);
      const submit = async (e) => {
        e.preventDefault();
        if (!f.title.trim()) { toast('제목을 입력하세요.', 'error'); return; }
        setSaving(true);
        await onSave({ meeting_date: f.meeting_date || null, title: f.title.trim(), attendees: f.attendees.trim(), content: f.content.trim(), next_action: f.next_action.trim() });
        setSaving(false);
      };
      return (
        <form onSubmit={submit} className="space-y-4">
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Input label="미팅 일자" type="date" value={f.meeting_date || ''} onChange={(e) => setF({ ...f, meeting_date: e.target.value })} />
            <Input label="참석자" placeholder="예: 김철수, 박현장" value={f.attendees} onChange={(e) => setF({ ...f, attendees: e.target.value })} />
          </div>
          <Input label="제목 *" placeholder="예: 착공 전 현장 미팅" value={f.title} onChange={(e) => setF({ ...f, title: e.target.value })} />
          <Textarea label="내용" rows="3" placeholder="논의 내용" value={f.content} onChange={(e) => setF({ ...f, content: e.target.value })} />
          <Textarea label="다음 액션" rows="2" placeholder="예: 자재 샘플 발송" value={f.next_action} onChange={(e) => setF({ ...f, next_action: e.target.value })} />
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit" disabled={saving}>{saving ? '저장 중...' : '저장'}</Button>
          </div>
        </form>
      );
    }

    function ASForm({ initial, staffNames, onSave, onCancel }) {
      const toast = useToast();
      const [f, setF] = useState(initial ? {
        received_date: initial.received_date || '', title: initial.title || '', detail: initial.detail || '',
        status: AS_STATES.includes(initial.status) ? initial.status : '접수', handled_date: initial.handled_date || '',
        staff: initial.staff || '', cost: initial.cost != null ? String(initial.cost) : '',
      } : { received_date: todayStr(), title: '', detail: '', status: '접수', handled_date: '', staff: '', cost: '' });
      const [saving, setSaving] = useState(false);
      const submit = async (e) => {
        e.preventDefault();
        if (!f.title.trim()) { toast('AS 내용(제목)을 입력하세요.', 'error'); return; }
        setSaving(true);
        await onSave({
          received_date: f.received_date || null, title: f.title.trim(), detail: f.detail.trim(),
          status: f.status, handled_date: f.handled_date || null, staff: f.staff.trim(), cost: Math.max(0, Math.round(Number(f.cost) || 0)),
        });
        setSaving(false);
      };
      return (
        <form onSubmit={submit} className="space-y-4">
          <Input label="AS 내용 / 제목 *" placeholder="예: 회의실 도어 흔들림" value={f.title} onChange={(e) => setF({ ...f, title: e.target.value })} />
          <Textarea label="상세 내용" rows="2" placeholder="증상/요청 상세" value={f.detail} onChange={(e) => setF({ ...f, detail: e.target.value })} />
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Input label="접수일" type="date" value={f.received_date || ''} onChange={(e) => setF({ ...f, received_date: e.target.value })} />
            <Select label="상태" value={f.status} onChange={(e) => setF({ ...f, status: e.target.value })}>
              {AS_STATES.map((s) => <option key={s} value={s}>{s}</option>)}
            </Select>
            <Input label="처리 완료일" type="date" value={f.handled_date || ''} onChange={(e) => setF({ ...f, handled_date: e.target.value })} />
            <Combo label="담당자" placeholder="담당자 선택/입력" value={f.staff} options={staffNames} onChange={(e) => setF({ ...f, staff: e.target.value })} />
          </div>
          <Input label="AS 비용 (원)" type="number" inputMode="numeric" min="0" placeholder="예: 50000" value={f.cost} onChange={(e) => setF({ ...f, cost: e.target.value })} />
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit" disabled={saving}>{saving ? '저장 중...' : '저장'}</Button>
          </div>
        </form>
      );
    }

    function MeetingsAsTab({ site, staffNames = [] }) {
      const toast = useToast();
      const [view, setView] = useState('meetings');
      const [meetings, setMeetings] = useState([]);
      const [asList, setAsList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [mEditorOpen, setMEditorOpen] = useState(false);
      const [mEditing, setMEditing] = useState(null);
      const [mDel, setMDel] = useState(null);
      const [aEditorOpen, setAEditorOpen] = useState(false);
      const [aEditing, setAEditing] = useState(null);
      const [aDel, setADel] = useState(null);
      const reload = useCallback(async () => {
        setLoading(true);
        try { const [m, a] = await Promise.all([api.listMeetings(site.id), api.listAS(site.id)]); setMeetings(Array.isArray(m) ? m : []); setAsList(Array.isArray(a) ? a : []); }
        catch (e) { setMeetings([]); setAsList([]); }
        finally { setLoading(false); }
      }, [site.id]);
      useEffect(() => { reload(); }, [reload]);
      const asCost = useMemo(() => asList.reduce((s, a) => s + (Number(a.cost) || 0), 0), [asList]);
      const openCount = useMemo(() => asList.filter((a) => a.status !== '완료').length, [asList]);
      const saveMeeting = async (body) => {
        try {
          if (mEditing) { await api.updateMeeting(mEditing.id, body); toast('미팅이 수정되었습니다.', 'success'); }
          else { await api.createMeeting(site.id, body); toast('미팅이 기록되었습니다.', 'success'); }
          setMEditorOpen(false); setMEditing(null); await reload();
        } catch (e) { toast('저장 실패', 'error'); }
      };
      const delMeeting = async () => { const m = mDel; setMDel(null); try { await api.removeMeeting(m.id); toast('미팅이 삭제되었습니다.', 'info'); await reload(); } catch (e) { toast('삭제 실패', 'error'); } };
      const saveAS = async (body) => {
        try {
          if (aEditing) { await api.updateAS(aEditing.id, body); toast('AS가 수정되었습니다.', 'success'); }
          else { await api.createAS(site.id, body); toast('AS가 접수되었습니다.', 'success'); }
          setAEditorOpen(false); setAEditing(null); await reload();
        } catch (e) { toast('저장 실패', 'error'); }
      };
      const delAS = async () => { const a = aDel; setADel(null); try { await api.removeAS(a.id); toast('AS가 삭제되었습니다.', 'info'); await reload(); } catch (e) { toast('삭제 실패', 'error'); } };
      const subBtn = (id, label, badge) => (
        <button onClick={() => setView(id)} className={`flex-1 px-3 py-2 rounded-xl text-sm font-semibold transition ${view === id ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
          {label}{badge != null && badge > 0 && <span className={`ml-1.5 text-[10px] px-1.5 py-0.5 rounded-full ${view === id ? 'bg-white/25' : 'bg-slate-200 text-slate-600'}`}>{badge}</span>}
        </button>
      );
      return (
        <div className="space-y-6">
          <Card className="p-1.5">
            <div className="flex gap-1">
              {subBtn('meetings', '📝 미팅', meetings.length)}
              {subBtn('as', '🛠 AS', openCount)}
            </div>
          </Card>

          {view === 'meetings' ? (
            <Card className="p-5">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-base font-bold text-slate-800">미팅 기록 <span className="text-sm font-normal text-slate-400">· {meetings.length}건</span></h2>
                <Button size="sm" onClick={() => { setMEditing(null); setMEditorOpen(true); }}>+ 미팅 기록</Button>
              </div>
              {loading ? (

    // ========================================
    // 📁 v20: 자료(파일) 탭 — Supabase Storage 직접 업로드
    // ========================================
    function DocEditForm({ initial, onSave, onCancel }) {
      const [name, setName] = useState(initial ? initial.name : '');
      const [docType, setDocType] = useState(initial ? initial.doc_type : '기타');
      const [memo, setMemo] = useState(initial ? (initial.memo || '') : '');
      const [err, setErr] = useState('');
      const submit = (e) => {
        e.preventDefault();
        if (!name.trim()) { setErr('자료명을 입력하세요.'); return; }
        onSave({ name: name.trim(), doc_type: docType, memo: memo.trim() });
      };
      return (
        <form onSubmit={submit} className="space-y-4">
          <Input label="자료명" value={name} onChange={(e) => { setName(e.target.value); if (err) setErr(''); }} error={err} placeholder="예: 3층 평면도 최종본" />
          <Select label="자료 유형" value={docType} onChange={(e) => setDocType(e.target.value)}>
            {DOC_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
          </Select>
          <Textarea label="메모 (선택)" rows={3} value={memo} onChange={(e) => setMemo(e.target.value)} placeholder="버전/비고 등" />
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit">저장</Button>
          </div>
        </form>
      );
    }

    function DocumentsTab({ site, demoMode = false, uploaderName = '' }) {
      const toast = useToast();
      const [list, setList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [uploading, setUploading] = useState(false);
      const [form, setForm] = useState({ name: '', doc_type: '기타', memo: '' });
      const [file, setFile] = useState(null);
      const [editing, setEditing] = useState(null);
      const [delTarget, setDelTarget] = useState(null);
      const [dlId, setDlId] = useState(null);
      const fileRef = useRef(null);

      const reload = useCallback(async () => {
        setLoading(true);
        try { const d = await api.listDocuments(site.id); setList(Array.isArray(d) ? d : []); }
        catch (e) { setList([]); }
        finally { setLoading(false); }
      }, [site.id]);
      useEffect(() => { reload(); }, [reload]);

      const onPick = (ev) => {
        const f = ev.target.files && ev.target.files[0];
        ev.target.value = '';
        if (!f) return;
        setFile(f);
        setForm((p) => ({ ...p, name: p.name.trim() ? p.name : f.name.replace(/\.[^.]+$/, '') })); // 자료명 비어있으면 파일명으로 프리필
      };

      const handleUpload = async () => {
        if (demoMode) { toast('데모(오프라인) 모드에서는 파일 업로드를 사용할 수 없습니다. 서버 연결이 필요합니다.', 'error'); return; }
        if (!file) { toast('업로드할 파일을 먼저 선택하세요.', 'error'); return; }
        setUploading(true);
        try {
          const sign = await api.signUploadDoc(site.id, { file_name: file.name, content_type: file.type || 'application/octet-stream' });
          await api.putToSignedUrl(sign.upload_url, file);
          await api.createDocument(site.id, {
            name: form.name.trim() || file.name, doc_type: form.doc_type,
            storage_path: sign.storage_path, file_name: file.name, file_size: file.size,
            memo: form.memo.trim(), uploader: uploaderName,
          });
          toast('자료가 업로드되었습니다.', 'success');
          setForm({ name: '', doc_type: '기타', memo: '' }); setFile(null);
          await reload();
        } catch (e) {
          if (e.status === 503) toast('스토리지가 설정되지 않았습니다. 관리자 설정이 필요합니다. (Supabase 키)', 'error');
          else if (e.offline) toast(e.message, 'error');
          else toast((e && e.message ? e.message + ' · ' : '') + '업로드에 실패했습니다.', 'error');
        } finally { setUploading(false); }
      };

      const handleDownload = async (doc) => {
        setDlId(doc.id);
        try {
          const url = await api.docDownloadUrl(doc.id);
          if (url) window.open(url, '_blank', 'noopener'); else toast('다운로드 URL을 가져오지 못했습니다.', 'error');
        } catch (e) {
          if (e.status === 503) toast('스토리지가 설정되지 않았습니다. 관리자 설정이 필요합니다.', 'error');
          else toast(e && e.message ? e.message : '다운로드에 실패했습니다.', 'error');
        } finally { setDlId(null); }
      };

      const saveEdit = async (body) => {
        try { await api.updateDocument(editing.id, body); toast('자료 정보가 수정되었습니다.', 'success'); setEditing(null); await reload(); }
        catch (e) { toast('수정에 실패했습니다.', 'error'); }
      };
      const confirmDel = async () => { const d = delTarget; setDelTarget(null); try { await api.removeDocument(d.id); toast('자료가 삭제되었습니다.', 'info'); await reload(); } catch (e) { toast('삭제에 실패했습니다.', 'error'); } };

      return (
        <div className="space-y-6">
          {/* 업로드 */}
          <Card className="p-5">
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-base font-bold text-slate-800">📁 자료 업로드 <span className="text-sm font-normal text-slate-400">· {site.name}</span></h2>
            </div>
            {demoMode && (
              <div className="mb-4 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">
                데모(오프라인) 모드에서는 파일 업로드를 사용할 수 없습니다. 서버에 연결하면 Supabase Storage로 직접 업로드됩니다.
              </div>
            )}
            <input ref={fileRef} type="file" className="hidden" onChange={onPick} aria-hidden="true" tabIndex={-1} />
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div className="sm:col-span-2 flex flex-wrap items-center gap-3">
                <Button type="button" variant="secondary" disabled={demoMode || uploading}
                  onClick={() => fileRef.current && fileRef.current.click()} aria-label="파일 선택">📎 파일 선택</Button>
                {file ? (
                  <span className="text-sm text-slate-600 min-w-0 truncate">
                    <b className="text-slate-800">{file.name}</b> <span className="text-slate-400">· {fmtBytes(file.size)}</span>
                  </span>
                ) : <span className="text-sm text-slate-400">CAD·도면·제안서·스펙·견적·계약 등 (선택 후 업로드)</span>}
              </div>
              <Input label="자료명" value={form.name} onChange={(e) => setForm((p) => ({ ...p, name: e.target.value }))} placeholder="예: 3층 평면도 최종본" disabled={demoMode} />
              <Select label="자료 유형" value={form.doc_type} onChange={(e) => setForm((p) => ({ ...p, doc_type: e.target.value }))} disabled={demoMode}>
                {DOC_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
              </Select>
              <div className="sm:col-span-2">
                <Textarea label="메모 (선택)" rows={2} value={form.memo} onChange={(e) => setForm((p) => ({ ...p, memo: e.target.value }))} placeholder="버전/비고 등" disabled={demoMode} />
              </div>
              <div className="sm:col-span-2 flex justify-end">
                <Button onClick={handleUpload} disabled={demoMode || uploading || !file}>
                  {uploading ? (
                    <span className="inline-flex items-center gap-2">
                      <span className="inline-block w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin" aria-hidden="true"></span>업로드 중…
                    </span>
                  ) : '⬆ 업로드'}
                </Button>
              </div>
            </div>
          </Card>

          {/* 목록 */}
          <Card className="p-5">
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-base font-bold text-slate-800">자료 목록</h2>
              <span className="text-xs text-slate-400">{list.length}건</span>
            </div>
            {loading ? (
              <div className="h-32 bg-slate-100 rounded-xl animate-pulse"></div>
            ) : list.length === 0 ? (
              <p className="text-sm text-slate-400 text-center py-10">등록된 자료가 없습니다. 위에서 파일을 업로드하세요.</p>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead><tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                    <th className="py-2 pr-3 font-medium">자료명</th><th className="py-2 pr-3 font-medium">유형</th>
                    <th className="py-2 pr-3 font-medium">파일명</th><th className="py-2 pr-3 font-medium text-right">크기</th>
                    <th className="py-2 pr-3 font-medium">업로더</th><th className="py-2 pr-3 font-medium">일시</th>
                    <th className="py-2 font-medium text-right">관리</th></tr></thead>
                  <tbody className="divide-y divide-slate-100">
                    {list.map((d) => (
                      <tr key={d.id}>
                        <td className="py-2 pr-3 font-medium text-slate-700 min-w-[140px]">{d.name}{d.memo ? <span className="block text-[11px] font-normal text-slate-400 truncate max-w-[220px]">{d.memo}</span> : null}</td>
                        <td className="py-2 pr-3"><Badge color={DOC_TYPE_COLOR[d.doc_type] || 'bg-slate-400'}>{d.doc_type || '기타'}</Badge></td>
                        <td className="py-2 pr-3 text-slate-500 truncate max-w-[180px]" title={d.file_name}>{d.file_name || <span className="text-slate-300">-</span>}</td>
                        <td className="py-2 pr-3 text-right text-slate-500 whitespace-nowrap">{fmtBytes(d.file_size)}</td>
                        <td className="py-2 pr-3 text-slate-500 whitespace-nowrap">{d.uploader || <span className="text-slate-300">-</span>}</td>
                        <td className="py-2 pr-3 text-slate-400 whitespace-nowrap text-xs">{d.created_at ? String(d.created_at).slice(0, 10) : '-'}</td>
                        <td className="py-2 text-right whitespace-nowrap">
                          <button onClick={() => handleDownload(d)} disabled={dlId === d.id} className="p-1.5 rounded-lg text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 disabled:opacity-40" title="다운로드(서명 URL)">{dlId === d.id ? '…' : '⬇'}</button>
                          <button onClick={() => setEditing(d)} className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50" title="정보 수정">✏️</button>
                          <button onClick={() => setDelTarget(d)} className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50" title="삭제">🗑️</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </Card>

          <Modal isOpen={!!editing} onClose={() => setEditing(null)} title="자료 정보 수정" size="md">
            {editing && <DocEditForm key={editing.id} initial={editing} onSave={saveEdit} onCancel={() => setEditing(null)} />}
          </Modal>
          <Modal isOpen={!!delTarget} onClose={() => setDelTarget(null)} title="자료 삭제 확인" size="sm">
            {delTarget && (
              <div>
                <p className="text-sm text-slate-600">'<span className="font-semibold">{delTarget.name}</span>' 자료를 삭제하시겠습니까? <span className="text-slate-400">스토리지 파일도 함께 삭제됩니다.</span></p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setDelTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDel}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // ========================================
    // 📷 v20: 현장사진 탭 — 모바일 카메라 업로드 + 갤러리
    // ========================================
    function PhotoThumb({ photo, onOpen }) {
      const [url, setUrl] = useState(null);
      const [err, setErr] = useState(false);
      useEffect(() => {
        let alive = true;
        api.photoDownloadUrl(photo.id)
          .then((u) => { if (!alive) return; if (u) setUrl(u); else setErr(true); })
          .catch(() => { if (alive) setErr(true); });
        return () => { alive = false; };
      }, [photo.id]);
      return (
        <button type="button" onClick={() => url && onOpen(url)} disabled={!url}
          className="group relative block w-full aspect-square rounded-xl overflow-hidden bg-slate-100 border border-slate-200 disabled:cursor-default"
          title={url ? '원본 보기' : ''}>
          {url ? (
            <img src={url} alt={photo.file_name || '현장사진'} className="w-full h-full object-cover transition group-hover:scale-105" loading="lazy" />
          ) : err ? (
            <span className="absolute inset-0 flex flex-col items-center justify-center text-slate-300 text-xs gap-1"><span className="text-2xl">🖼️</span>미리보기 없음</span>
          ) : (
            <span className="absolute inset-0 flex items-center justify-center"><span className="w-6 h-6 border-2 border-slate-300 border-t-slate-500 rounded-full animate-spin"></span></span>
          )}
        </button>
      );
    }

    function PhotosTab({ site, demoMode = false, uploaderName = '' }) {
      const toast = useToast();
      const [list, setList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [uploading, setUploading] = useState(false);
      const [prog, setProg] = useState({ done: 0, total: 0 });
      const [pDate, setPDate] = useState(todayStr());
      const [pProcs, setPProcs] = useState([]);
      const [pMemo, setPMemo] = useState('');
      const [fDate, setFDate] = useState('');
      const [fProc, setFProc] = useState('');
      const [delTarget, setDelTarget] = useState(null);
      const cameraRef = useRef(null);
      const galleryRef = useRef(null);

      const reload = useCallback(async () => {
        setLoading(true);
        try { const d = await api.listPhotos(site.id); setList(Array.isArray(d) ? d : []); }
        catch (e) { setList([]); }
        finally { setLoading(false); }
      }, [site.id]);
      useEffect(() => { reload(); }, [reload]);

      const toggleProc = (p) => setPProcs((prev) => (prev.includes(p) ? prev.filter((x) => x !== p) : [...prev, p]));

      const onPick = async (ev) => {
        const files = Array.from(ev.target.files || []);
        ev.target.value = '';
        if (!files.length) return;
        if (demoMode) { toast('데모(오프라인) 모드에서는 사진 업로드를 사용할 수 없습니다. 서버 연결이 필요합니다.', 'error'); return; }
        const processes = pProcs.join(',');
        setUploading(true); setProg({ done: 0, total: files.length });
        let ok = 0, fail = 0, cfgErr = false;
        for (let i = 0; i < files.length; i++) {
          const f = files[i];
          try {
            const sign = await api.signUploadPhoto(site.id, { file_name: f.name || ('photo_' + Date.now() + '.jpg'), content_type: f.type || 'image/jpeg' });
            await api.putToSignedUrl(sign.upload_url, f);
            await api.createPhoto(site.id, { photo_date: pDate, processes, storage_path: sign.storage_path, file_name: f.name || '', memo: pMemo.trim(), uploader: uploaderName });
            ok++;
          } catch (e) { fail++; if (e.status === 503) cfgErr = true; }
          setProg({ done: i + 1, total: files.length });
        }
        setUploading(false); setProg({ done: 0, total: 0 });
        if (cfgErr && ok === 0) toast('스토리지가 설정되지 않았습니다. 관리자 설정이 필요합니다. (Supabase 키)', 'error');
        else if (ok) toast(`사진 ${ok}장을 업로드했습니다.` + (fail ? ` (${fail}장 실패)` : ''), fail ? 'info' : 'success');
        else toast('사진 업로드에 실패했습니다.', 'error');
        if (ok) { setPMemo(''); await reload(); }
      };

      const confirmDel = async () => { const p = delTarget; setDelTarget(null); try { await api.removePhoto(p.id); toast('사진이 삭제되었습니다.', 'info'); await reload(); } catch (e) { toast('삭제에 실패했습니다.', 'error'); } };
      const openOriginal = (url) => window.open(url, '_blank', 'noopener');

      const dates = useMemo(() => Array.from(new Set(list.map((p) => p.photo_date).filter(Boolean))).sort().reverse(), [list]);
      const filtered = useMemo(() => list.filter((p) => {
        if (fDate && p.photo_date !== fDate) return false;
        if (fProc && !(p.processes || '').split(',').map((s) => s.trim()).filter(Boolean).includes(fProc)) return false;
        return true;
      }), [list, fDate, fProc]);

      return (
        <div className="space-y-6">
          {/* 업로드 */}
          <Card className="p-5">
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-base font-bold text-slate-800">📷 현장사진 업로드 <span className="text-sm font-normal text-slate-400">· {site.name}</span></h2>
            </div>
            {demoMode && (
              <div className="mb-4 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">
                데모(오프라인) 모드에서는 사진 업로드를 사용할 수 없습니다. 서버에 연결하면 촬영/선택 즉시 Storage로 업로드됩니다.
              </div>
            )}
            <div className="space-y-4">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <Input type="date" label="촬영일" value={pDate} onChange={(e) => setPDate(e.target.value)} disabled={demoMode} />
                <div>
                  <span className="block mb-1.5 text-sm font-medium text-slate-700">공정 (다중 선택)</span>
                  <div className="flex flex-wrap gap-1.5">
                    {PHOTO_PROCESSES.map((p) => {
                      const on = pProcs.includes(p);
                      return (
                        <button key={p} type="button" disabled={demoMode} onClick={() => toggleProc(p)}
                          className={`text-xs px-2.5 py-1 rounded-full border transition disabled:opacity-40 ${on ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>
                          {p}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
              <Textarea label="특이사항 (선택)" rows={2} value={pMemo} onChange={(e) => setPMemo(e.target.value)} placeholder="예: 타일 균열 발견 · 하자 재시공 필요" disabled={demoMode} />
              <input ref={cameraRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={onPick} aria-hidden="true" tabIndex={-1} />
              <input ref={galleryRef} type="file" accept="image/*" multiple className="hidden" onChange={onPick} aria-hidden="true" tabIndex={-1} />
              <div className="flex flex-wrap items-center gap-3">
                <Button type="button" disabled={demoMode || uploading} onClick={() => cameraRef.current && cameraRef.current.click()}>📷 촬영</Button>
                <Button type="button" variant="secondary" disabled={demoMode || uploading} onClick={() => galleryRef.current && galleryRef.current.click()}>🖼 갤러리에서 선택</Button>
                {uploading && (
                  <span className="inline-flex items-center gap-2 text-sm text-slate-500">
                    <span className="inline-block w-4 h-4 border-2 border-slate-300 border-t-blue-600 rounded-full animate-spin" aria-hidden="true"></span>
                    업로드 중… {prog.done}/{prog.total}
                  </span>
                )}
                <span className="text-xs text-slate-400">업로더·촬영시각은 자동 기록됩니다.</span>
              </div>
            </div>
          </Card>

          {/* 갤러리 */}
          <Card className="p-5">
            <div className="flex flex-wrap items-center justify-between gap-2 mb-3">
              <h2 className="text-base font-bold text-slate-800">현장사진 <span className="text-sm font-normal text-slate-400">· {filtered.length}/{list.length}장</span></h2>
              <div className="flex flex-wrap items-center gap-2">
                <select value={fDate} onChange={(e) => setFDate(e.target.value)} className="text-xs px-2.5 py-1.5 rounded-lg border border-slate-300 bg-white text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-400">
                  <option value="">전체 날짜</option>
                  {dates.map((d) => <option key={d} value={d}>{d}</option>)}
                </select>
                <select value={fProc} onChange={(e) => setFProc(e.target.value)} className="text-xs px-2.5 py-1.5 rounded-lg border border-slate-300 bg-white text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-400">
                  <option value="">전체 공정</option>
                  {PHOTO_PROCESSES.map((p) => <option key={p} value={p}>{p}</option>)}
                </select>
                {(fDate || fProc) && <button onClick={() => { setFDate(''); setFProc(''); }} className="text-xs text-slate-400 hover:text-slate-600 underline">필터 해제</button>}
              </div>
            </div>
            {loading ? (
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                {[0, 1, 2, 3].map((i) => <div key={i} className="aspect-square bg-slate-100 rounded-xl animate-pulse"></div>)}
              </div>
            ) : filtered.length === 0 ? (
              <p className="text-sm text-slate-400 text-center py-10">{list.length === 0 ? '등록된 현장사진이 없습니다. 위에서 촬영/업로드하세요.' : '필터에 해당하는 사진이 없습니다.'}</p>
            ) : (
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                {filtered.map((p) => {
                  const procs = (p.processes || '').split(',').map((s) => s.trim()).filter(Boolean);
                  return (
                    <div key={p.id} className="group relative">
                      <PhotoThumb photo={p} onOpen={openOriginal} />
                      <button onClick={() => setDelTarget(p)} className="absolute top-1.5 right-1.5 w-7 h-7 rounded-full bg-black/50 text-white text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition hover:bg-red-600" title="삭제">🗑️</button>
                      <div className="mt-1.5 px-0.5">
                        <div className="flex items-center justify-between gap-1">
                          <span className="text-[11px] font-medium text-slate-500">{p.photo_date || '-'}</span>
                          {p.uploader && <span className="text-[10px] text-slate-400 truncate max-w-[80px]">{p.uploader}</span>}
                        </div>
                        {procs.length > 0 && (
                          <div className="flex flex-wrap gap-1 mt-0.5">
                            {procs.slice(0, 3).map((pr) => <span key={pr} className="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500">{pr}</span>)}
                            {procs.length > 3 && <span className="text-[10px] text-slate-400">+{procs.length - 3}</span>}
                          </div>
                        )}
                        {p.memo && <p className="text-[10px] text-slate-400 mt-0.5 truncate" title={p.memo}>{p.memo}</p>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </Card>

          <Modal isOpen={!!delTarget} onClose={() => setDelTarget(null)} title="사진 삭제 확인" size="sm">
            {delTarget && (
              <div>
                <p className="text-sm text-slate-600">이 사진을 삭제하시겠습니까? <span className="text-slate-400">스토리지 파일도 함께 삭제됩니다.</span></p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setDelTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDel}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    function StaffManager({ staff, onChanged }) {
      const toast = useToast();
      const [form, setForm] = useState({ name: '', role: '', phone: '' });
      const [editing, setEditing] = useState(null);

      const add = async (e) => {
        e.preventDefault();
        if (!form.name.trim()) { toast('이름을 입력하세요.', 'error'); return; }
        try { await api.createStaff({ name: form.name.trim(), role: form.role.trim(), phone: form.phone.trim() }); setForm({ name: '', role: '', phone: '' }); toast('담당자 추가됨', 'success'); await onChanged(); }
        catch (err) { toast(err.status === 409 ? err.message : '추가 실패', 'error'); }
      };
      const startEdit = (s) => { setEditing(s); setEForm({ name: s.name, role: s.role || '', phone: s.phone || '', active: s.active !== false }); };
      const saveEdit = async () => {
        if (!eForm.name.trim()) { toast('이름을 입력하세요.', 'error'); return; }
        try { await api.updateStaff(editing.id, { name: eForm.name.trim(), role: eForm.role.trim(), phone: eForm.phone.trim(), active: eForm.active }); setEditing(null); toast('수정됨', 'success'); await onChanged(); }
        catch (err) { toast(err.status === 409 ? err.message : '수정 실패', 'error'); }
      };
      const toggle = async (s) => { try { await api.updateStaff(s.id, { name: s.name, role: s.role || '', phone: s.phone || '', active: !(s.active !== false) }); await onChanged(); } catch (e) { toast('변경 실패', 'error'); } };
      const remove = async (s) => { try { await api.removeStaff(s.id); toast('삭제됨', 'info'); await onChanged(); } catch (e) { toast('삭제 실패', 'error'); } };
      return (
        <Card className="p-5">
          <h2 className="text-base font-bold text-slate-800 mb-4">담당자 마스터</h2>
          <form onSubmit={add} className="grid grid-cols-1 sm:grid-cols-[1fr_1fr_1fr_auto] gap-2 mb-4">
            <Input placeholder="이름 *" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} />
            <Combo placeholder="직책" value={form.role} options={STAFF_ROLES} onChange={(e) => setForm({ ...form, role: e.target.value })} />
            <Input placeholder="연락처" value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} />
            <Button type="submit">추가</Button>
          </form>
          {staff.length === 0 ? <p className="text-sm text-slate-400 text-center py-6">등록된 담당자가 없습니다.</p> : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead><tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                  <th className="py-2 pr-3 font-medium">이름</th><th className="py-2 pr-3 font-medium">직책</th>
                  <th className="py-2 pr-3 font-medium">연락처</th><th className="py-2 pr-3 font-medium">상태</th>
                  <th className="py-2 font-medium text-right">관리</th></tr></thead>
                <tbody className="divide-y divide-slate-100">
                  {staff.map((s) => (
                    <tr key={s.id} className={s.active === false ? 'opacity-50' : ''}>
                      <td className="py-2 pr-3 font-medium text-slate-700">{s.name}</td>
                      <td className="py-2 pr-3 text-slate-500">{s.role || '-'}</td>
                      <td className="py-2 pr-3 text-slate-500">{s.phone || '-'}</td>
                      <td className="py-2 pr-3"><button onClick={() => toggle(s)}><Badge color={s.active === false ? 'bg-slate-400' : 'bg-emerald-500'}>{s.active === false ? '비활성' : '활성'}</Badge></button></td>
                      <td className="py-2 text-right whitespace-nowrap">
                        <button onClick={() => startEdit(s)} className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50">✏️</button>
                        <button onClick={() => remove(s)} className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50">🗑️</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          <Modal isOpen={!!editing} onClose={() => setEditing(null)} title="담당자 수정" size="md">
            {editing && (
              <div className="space-y-3">
                <Input label="이름 *" value={eForm.name} onChange={(e) => setEForm({ ...eForm, name: e.target.value })} />
                <Combo label="직책" value={eForm.role} options={STAFF_ROLES} onChange={(e) => setEForm({ ...eForm, role: e.target.value })} />
                <Input label="연락처" value={eForm.phone} onChange={(e) => setEForm({ ...eForm, phone: e.target.value })} />
                <label className="flex items-center gap-2 text-sm text-slate-700">
                  <input type="checkbox" checked={eForm.active} onChange={(e) => setEForm({ ...eForm, active: e.target.checked })} /> 활성
                </label>
                <div className="flex gap-2 justify-end pt-1">
                  <Button variant="secondary" onClick={() => setEditing(null)}>취소</Button>
                  <Button onClick={saveEdit}>저장</Button>
                </div>
              </div>
            )}
          </Modal>
        </Card>
      );
    }

    function CategoryColumn({ title, kind, items, onChanged }) {
      const toast = useToast();
      const [newName, setNewName] = useState('');
      const [editId, setEditId] = useState(null);
      const [editName, setEditName] = useState('');
      const sorted = [...(items || [])].sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
      const add = async (e) => {
        e.preventDefault(); if (!newName.trim()) return;
        try { await api.createCategory({ kind, name: newName.trim() }); setNewName(''); await onChanged(); }
        catch (err) { toast(err.status === 409 ? err.message : '추가 실패', 'error'); }
      };
      const saveName = async (c) => { if (!editName.trim()) { setEditId(null); return; } try { await api.updateCategory(c.id, { name: editName.trim() }); setEditId(null); await onChanged(); } catch (e) { toast('수정 실패', 'error'); } };
      const toggle = async (c) => { try { await api.updateCategory(c.id, { active: !(c.active !== false) }); await onChanged(); } catch (e) { toast('변경 실패', 'error'); } };
      const remove = async (c) => { try { await api.removeCategory(c.id); await onChanged(); } catch (e) { toast('삭제 실패', 'error'); } };
      const move = async (c, dir) => {
        const idx = sorted.findIndex((x) => String(x.id) === String(c.id));
        const j = idx + dir; if (j < 0 || j >= sorted.length) return;
        const other = sorted[j];
        try { await api.updateCategory(c.id, { sort_order: other.sort_order }); await api.updateCategory(other.id, { sort_order: c.sort_order }); await onChanged(); }
        catch (e) { toast('순서 변경 실패', 'error'); }
      };
      return (
        <div>
          <h3 className="text-sm font-bold text-slate-700 mb-2">{title}</h3>
          <form onSubmit={add} className="flex gap-2 mb-3">
            <input className="flex-1 px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" placeholder="새 카테고리" value={newName} onChange={(e) => setNewName(e.target.value)} />
            <Button size="sm" type="submit">추가</Button>
          </form>
          <ul className="space-y-1">
            {sorted.map((c, i) => (
              <li key={c.id} className={`flex items-center gap-2 px-2 py-1.5 rounded-lg border border-slate-100 ${c.active === false ? 'opacity-50' : ''}`}>
                <div className="flex flex-col">
                  <button onClick={() => move(c, -1)} disabled={i === 0} className="text-[9px] leading-none text-slate-400 disabled:opacity-30" aria-label="위로">▲</button>
                  <button onClick={() => move(c, 1)} disabled={i === sorted.length - 1} className="text-[9px] leading-none text-slate-400 disabled:opacity-30" aria-label="아래로">▼</button>
                </div>
                {editId === c.id ? (
                  <input autoFocus className="flex-1 px-2 py-1 rounded border border-slate-300 text-sm" value={editName}
                    onChange={(e) => setEditName(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') saveName(c); if (e.key === 'Escape') setEditId(null); }} />
                ) : (
                  <span className="flex-1 text-sm text-slate-700 truncate">{c.name}</span>
                )}
                {editId === c.id ? (
                  <button onClick={() => saveName(c)} className="text-xs text-blue-600 font-semibold">저장</button>
                ) : (
                  <button onClick={() => { setEditId(c.id); setEditName(c.name); }} className="text-slate-400 hover:text-blue-600" aria-label="이름수정">✏️</button>
                )}
                <button onClick={() => toggle(c)} aria-label="활성토글"><Badge color={c.active === false ? 'bg-slate-400' : 'bg-emerald-500'}>{c.active === false ? '비활성' : '활성'}</Badge></button>
                <button onClick={() => remove(c)} className="text-slate-400 hover:text-red-600" aria-label="삭제">🗑️</button>
              </li>
            ))}
          </ul>
        </div>
      );
    }

      const pageSize = 25;
      const [form, setForm] = useState(blank);
      const [editing, setEditing] = useState(null);
      const [eForm, setEForm] = useState(blank);
      const [delTarget, setDelTarget] = useState(null);

      useEffect(() => { api.listTrades().then((d) => { if (d && d.length) setTrades(d); }).catch(() => {}); }, []);
      const reload = useCallback(async () => {
        setLoading(true);
        try { const d = await api.listCatalog({ trade: trade || undefined, q: q || undefined, all: true, limit: 1000 }); setList(d || []); }
        catch (e) { setList([]); }
        finally { setLoading(false); }
      }, [trade, q]);
      useEffect(() => { setPage(0); const t = setTimeout(reload, 200); return () => clearTimeout(t); }, [reload]);

      const tradeOpts = (trades && trades.length ? trades : TRADE_MASTER);
      const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
      const pageItems = list.slice(page * pageSize, page * pageSize + pageSize);
      const sumOf = (c) => (Number(c.material_price) || 0) + (Number(c.labor_price) || 0) + (Number(c.sub_price) || 0);

      const add = async (e) => {
        e.preventDefault();
        if (!form.trade) { toast('공종을 선택하세요.', 'error'); return; }
        if (!form.name.trim()) { toast('품목명을 입력하세요.', 'error'); return; }
        try {
          await api.createCatalog({
            trade: form.trade, name: form.name.trim(), unit: form.unit.trim(),
            material_price: form.material_price, labor_price: form.labor_price, sub_price: form.sub_price,
            grp: form.grp.trim(), product_name: form.product_name.trim(), vendor: form.vendor.trim(), code: form.code.trim(),
          });
          setForm({ ...blank, trade: form.trade }); toast('카탈로그 항목 추가됨', 'success'); await reload();
        } catch (err) { toast(err.status === 400 ? err.message : '추가 실패', 'error'); }
      };
      const startEdit = (c) => {
        setEditing(c);
        setEForm({ trade: c.trade || '', name: c.name || '', unit: c.unit || '', material_price: String(c.material_price || 0), labor_price: String(c.labor_price || 0), sub_price: String(c.sub_price || 0), grp: c.grp || '', product_name: c.product_name || '', vendor: c.vendor || '', code: c.code || '', active: c.active !== false });
      };
      const saveEdit = async () => {
        if (!eForm.trade) { toast('공종을 선택하세요.', 'error'); return; }
        if (!eForm.name.trim()) { toast('품목명을 입력하세요.', 'error'); return; }
        try {
          await api.updateCatalog(editing.id, {
            trade: eForm.trade, name: eForm.name.trim(), unit: eForm.unit.trim(),
            material_price: eForm.material_price, labor_price: eForm.labor_price, sub_price: eForm.sub_price,
            grp: eForm.grp.trim(), product_name: eForm.product_name.trim(), vendor: eForm.vendor.trim(), code: eForm.code.trim(), active: eForm.active,
          });
          setEditing(null); toast('수정됨', 'success'); await reload();
        } catch (err) { toast('수정 실패', 'error'); }
      };
      const toggle = async (c) => { try { await api.updateCatalog(c.id, { active: !(c.active !== false) }); await reload(); } catch (e) { toast('변경 실패', 'error'); } };
      const confirmDel = async () => { const c = delTarget; setDelTarget(null); try { await api.removeCatalog(c.id); toast('삭제됨', 'info'); await reload(); } catch (e) { toast('삭제 실패', 'error'); } };

      const numCls = 'w-full px-2 py-2 rounded-lg border border-slate-300 text-sm text-right focus:outline-none focus:ring-2 focus:ring-blue-300';
      const txtCls = 'w-full px-2 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300';
      return (
        <Card className="p-5">
          <h2 className="text-base font-bold text-slate-800 mb-1">단가 카탈로그 (price book)</h2>
          <p className="text-xs text-slate-400 mb-4">견적 에디터의 ‘단가 카탈로그 불러오기’에서 사용됩니다. 공종·재료/노무/부자재 단가를 관리하세요.</p>

          {/* 추가 폼 */}
          <form onSubmit={add} className="space-y-2 mb-4 p-3 rounded-xl bg-slate-50 border border-slate-100">
            <div className="grid grid-cols-2 sm:grid-cols-6 gap-2">
              <select className={txtCls + ' col-span-2 sm:col-span-1'} value={form.trade} onChange={(e) => setForm({ ...form, trade: e.target.value })}>
                <option value="">공종 *</option>
                {tradeOpts.map((t) => <option key={t} value={t}>{t}</option>)}
              </select>
              <input className={txtCls + ' col-span-2'} placeholder="품목명 *" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} />
              <input className={txtCls} placeholder="단위" value={form.unit} onChange={(e) => setForm({ ...form, unit: e.target.value })} />
              <input type="number" min="0" className={numCls} placeholder="재료비" value={form.material_price} onChange={(e) => setForm({ ...form, material_price: e.target.value })} />
              <input type="number" min="0" className={numCls} placeholder="노무비" value={form.labor_price} onChange={(e) => setForm({ ...form, labor_price: e.target.value })} />
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-6 gap-2">
              <input type="number" min="0" className={numCls} placeholder="부자재" value={form.sub_price} onChange={(e) => setForm({ ...form, sub_price: e.target.value })} />
              <input className={txtCls} placeholder="공사내용(그룹)" value={form.grp} onChange={(e) => setForm({ ...form, grp: e.target.value })} />
              <input className={txtCls + ' col-span-2'} placeholder="품명/스펙" value={form.product_name} onChange={(e) => setForm({ ...form, product_name: e.target.value })} />
              <input className={txtCls} placeholder="업체" value={form.vendor} onChange={(e) => setForm({ ...form, vendor: e.target.value })} />
              <Button type="submit">+ 추가</Button>
            </div>
          </form>

          {/* 필터 */}
          <div className="flex flex-col sm:flex-row gap-2 mb-3">
            <select className={txtCls + ' sm:w-44'} value={trade} onChange={(e) => setTrade(e.target.value)}>
              <option value="">전체 공종</option>
              {tradeOpts.map((t) => <option key={t} value={t}>{t}</option>)}
            </select>
            <input className={txtCls + ' flex-1'} placeholder="품목·제품·업체 검색" value={q} onChange={(e) => setQ(e.target.value)} />
          </div>
          <div className="flex items-center justify-between text-xs text-slate-400 mb-2">
            <span>{loading ? '불러오는 중…' : `${fmtNum(list.length)}개 항목`}{api._useMock && ' · 오프라인 데모(내장 샘플)'}</span>
            {list.length > pageSize && <span>{page + 1} / {totalPages} 페이지</span>}
          </div>

          {list.length === 0 ? (
            <p className="text-sm text-slate-400 text-center py-8">{loading ? '불러오는 중…' : '카탈로그 항목이 없습니다.'}</p>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm" style={{ minWidth: '760px' }}>
                <thead><tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                  <th className="py-2 pr-2 font-medium">공종</th><th className="py-2 pr-2 font-medium">품목</th>
                  <th className="py-2 pr-2 font-medium">단위</th>
                  <th className="py-2 pr-2 font-medium text-right">재료비</th><th className="py-2 pr-2 font-medium text-right">노무비</th>
                  <th className="py-2 pr-2 font-medium text-right">부자재</th><th className="py-2 pr-2 font-medium text-right">합산</th>
                  <th className="py-2 pr-2 font-medium">상태</th><th className="py-2 font-medium text-right">관리</th>
                </tr></thead>
                <tbody className="divide-y divide-slate-100">
                  {pageItems.map((c) => (
                    <tr key={c.id} className={c.active === false ? 'opacity-50' : ''}>
                      <td className="py-2 pr-2"><span className="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium text-white" style={{ backgroundColor: tradeHex(c.trade) }}>{c.trade}</span></td>
                      <td className="py-2 pr-2 text-slate-700">
                        <span className="font-medium">{c.name}</span>
                        {c.product_name && <span className="block text-[11px] text-slate-400 truncate max-w-[220px]">{c.product_name}</span>}
                        {((c.source && c.source !== 'manual') || c.price_date) && (
                          <span className="flex flex-wrap items-center gap-1 mt-0.5">
                            {c.source && c.source !== 'manual' && <span className="inline-flex items-center px-1.5 py-0.5 rounded bg-amber-50 text-amber-600 text-[10px] font-medium">{c.source === 'research' ? '🔎 리서치' : c.source}</span>}
                            {c.price_date && <span className="text-[10px] text-slate-400">{c.price_date} 기준</span>}
                          </span>
                        )}
                      </td>
                      <td className="py-2 pr-2 text-slate-500">{c.unit || '-'}</td>
                      <td className="py-2 pr-2 text-right text-slate-600">{fmtNum(c.material_price)}</td>
                      <td className="py-2 pr-2 text-right text-slate-600">{fmtNum(c.labor_price)}</td>
                      <td className="py-2 pr-2 text-right text-slate-600">{fmtNum(c.sub_price)}</td>
                      <td className="py-2 pr-2 text-right font-semibold text-slate-700">{fmtNum(sumOf(c))}</td>
                      <td className="py-2 pr-2"><button onClick={() => toggle(c)}><Badge color={c.active === false ? 'bg-slate-400' : 'bg-emerald-500'}>{c.active === false ? '비활성' : '활성'}</Badge></button></td>
                      <td className="py-2 text-right whitespace-nowrap">
                        <button onClick={() => startEdit(c)} className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50">✏️</button>
                        <button onClick={() => setDelTarget(c)} className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50">🗑️</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          {list.length > pageSize && (
            <div className="flex items-center justify-center gap-2 mt-3">
              <Button size="sm" variant="secondary" disabled={page === 0} onClick={() => setPage((p) => Math.max(0, p - 1))}>◀ 이전</Button>
              <span className="text-xs text-slate-500">{page + 1} / {totalPages}</span>
              <Button size="sm" variant="secondary" disabled={page >= totalPages - 1} onClick={() => setPage((p) => Math.min(totalPages - 1, p + 1))}>다음 ▶</Button>
            </div>
          )}

          {/* 수정 모달 */}
          <Modal isOpen={!!editing} onClose={() => setEditing(null)} title="카탈로그 수정" size="lg">
            {editing && (
              <div className="space-y-3">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <Select label="공종 *" value={eForm.trade} onChange={(e) => setEForm({ ...eForm, trade: e.target.value })}>
                    <option value="">선택</option>
                    {tradeOpts.map((t) => <option key={t} value={t}>{t}</option>)}
                  </Select>
                  <Input label="품목명 *" value={eForm.name} onChange={(e) => setEForm({ ...eForm, name: e.target.value })} />
                  <Input label="단위" value={eForm.unit} onChange={(e) => setEForm({ ...eForm, unit: e.target.value })} />
                  <Input label="공사내용(그룹)" value={eForm.grp} onChange={(e) => setEForm({ ...eForm, grp: e.target.value })} />
                  <Input label="재료비단가 (원)" type="number" min="0" value={eForm.material_price} onChange={(e) => setEForm({ ...eForm, material_price: e.target.value })} />
                  <Input label="노무비단가 (원)" type="number" min="0" value={eForm.labor_price} onChange={(e) => setEForm({ ...eForm, labor_price: e.target.value })} />
                  <Input label="부자재단가 (원)" type="number" min="0" value={eForm.sub_price} onChange={(e) => setEForm({ ...eForm, sub_price: e.target.value })} />
                  <Input label="품명/스펙" value={eForm.product_name} onChange={(e) => setEForm({ ...eForm, product_name: e.target.value })} />
                  <Input label="업체" value={eForm.vendor} onChange={(e) => setEForm({ ...eForm, vendor: e.target.value })} />
                  <Input label="코드" value={eForm.code} onChange={(e) => setEForm({ ...eForm, code: e.target.value })} />
                </div>
                <label className="flex items-center gap-2 text-sm text-slate-700">
                  <input type="checkbox" checked={eForm.active} onChange={(e) => setEForm({ ...eForm, active: e.target.checked })} /> 활성
                </label>
                <div className="flex gap-2 justify-end pt-1">
                  <Button variant="secondary" onClick={() => setEditing(null)}>취소</Button>
                  <Button onClick={saveEdit}>저장</Button>
                </div>
              </div>
            )}
          </Modal>
          <Modal isOpen={!!delTarget} onClose={() => setDelTarget(null)} title="카탈로그 삭제" size="sm">
            {delTarget && (
              <div>
                <p className="text-sm text-slate-600">'<span className="font-semibold">{delTarget.name}</span>' 항목을 삭제하시겠습니까?<br />이미 작성된 견적 항목은 값 복사본이라 영향받지 않습니다.</p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setDelTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDel}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </Card>
      );
    }

    // ========================================
    // 🧩 v18: 견적 템플릿 (편집기 = 견적 축소판: 항목 그리드 + 원가계산 요율) + 관리
    // ========================================
    function TemplateEditor({ initial, trades, onSave, onCancel }) {
      const toast = useToast();
      const ps = (n) => (Number(n) ? String(Number(n)) : '');
      const mkRow = () => ({ _k: uid(), trade: '', name: '', spec: '', unit: '', qty: '1', material_price: '', labor_price: '', sub_price: '', memo: '' });
      const [name, setName] = useState((initial && initial.name) || '');
      const [description, setDescription] = useState((initial && initial.description) || '');
      const [header, setHeader] = useState(() => templateConfigToHeader(initial && initial.config));
      const [items, setItems] = useState(
        (initial && initial.items && initial.items.length)
          ? initial.items.map((it) => ({ _k: uid(), trade: it.trade || '', name: it.name || '', spec: it.spec || '', unit: it.unit || '', qty: ps(it.qty), material_price: ps(it.material_price), labor_price: ps(it.labor_price), sub_price: ps(it.sub_price), memo: it.memo || '' }))
          : [mkRow()]
      );
      const [saving, setSaving] = useState(false);
      const [picker, setPicker] = useState({ open: false, targetIdx: null });
      const setItem = (idx, patch) => setItems((arr) => arr.map((it, i) => (i === idx ? { ...it, ...patch } : it)));
      const addRow = () => setItems((arr) => [...arr, mkRow()]);
      const delRow = (idx) => setItems((arr) => (arr.length <= 1 ? [mkRow()] : arr.filter((_, i) => i !== idx)));
      const pickCatalog = (c) => {
        const patch = { trade: c.trade || '', name: c.name || '', unit: c.unit || '', spec: c.product_name || c.grp || '', material_price: ps(c.material_price), labor_price: ps(c.labor_price), sub_price: ps(c.sub_price) };
        if (picker.targetIdx == null) { setItems((arr) => [...arr, { _k: uid(), qty: '1', memo: '', ...patch }]); toast(`'${c.name}' 추가됨`, 'success'); }
        else { setItem(picker.targetIdx, patch); setPicker({ open: false, targetIdx: null }); }
      };
      const inputCls = 'w-full px-2 py-1.5 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300';
      const tradeBase = (trades && trades.length ? trades : TRADE_MASTER);
      // 원가계산서 실시간 표시용 synthetic 견적 (EstimateEditor.toEstimate 축소판)
      const est = useMemo(() => {
        const its = items.filter((it) => (it.name || '').trim()).map((it, i) => {
          const m = Math.round(Number(it.material_price) || 0), l = Math.round(Number(it.labor_price) || 0), s = Math.round(Number(it.sub_price) || 0);
          const up = effUnitPrice({ material_price: m, labor_price: l, sub_price: s });
          return { trade: it.trade, process: it.trade, name: it.name, spec: it.spec, unit: it.unit, qty: Number(it.qty) || 0, material_price: m, labor_price: l, sub_price: s, unit_price: up, amount: calcItemAmount(it.qty, up), sort_order: i };
        });
        const e = { vat_mode: header.vat_mode, vat_rate: Number(header.vat_rate), discount: Math.round(Number(header.discount) || 0), use_cost_buildup: header.use_cost_buildup, items: its };
        Object.keys(BUILDUP_DEFAULTS).forEach((k) => { e[k] = Number(header[k]); });
        return e;
      }, [items, header]);
      const totals = useMemo(() => computeTotals(est), [est]);
      const doSave = async () => {
        if (!name.trim()) { toast('템플릿명을 입력하세요.', 'error'); return; }
        setSaving(true);
        const body = {
          name: name.trim(), description: description.trim(),
          config: headerToTemplateConfig(header),
          items: items.filter((it) => (it.name || '').trim()).map((it, i) => ({
            trade: it.trade || '', name: it.name.trim(), spec: it.spec || '', unit: it.unit || '', qty: Number(it.qty) || 0,
            material_price: Math.round(Number(it.material_price) || 0), labor_price: Math.round(Number(it.labor_price) || 0), sub_price: Math.round(Number(it.sub_price) || 0),
            memo: it.memo || '', sort_order: i,
          })),
        };
        await onSave(body);
        setSaving(false);
      };
      return (
        <div className="space-y-5">
          <div className="rounded-xl bg-indigo-50 border border-indigo-100 px-3.5 py-2.5 text-xs text-indigo-700">
            🧩 템플릿은 <span className="font-semibold">공종·항목·수량·3분할단가</span>와 <span className="font-semibold">원가계산 요율</span>을 저장합니다. 견적 작성 시 ‘템플릿으로 시작’으로 프리필돼요.
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-[1fr_1.4fr] gap-3">
            <Input label="템플릿명 *" placeholder="예: 사무실 저가공사형" value={name} onChange={(e) => setName(e.target.value)} />
            <Input label="설명" placeholder="예: 30평 이하 사무실 기본 구성" value={description} onChange={(e) => setDescription(e.target.value)} />
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <Select label="부가세" value={header.vat_mode} onChange={(e) => setHeader({ ...header, vat_mode: e.target.value })}>
              {VAT_MODES.map((m) => <option key={m.value} value={m.value}>{m.label}</option>)}
            </Select>
            <Input label="기본 할인액 (원)" type="number" min="0" value={header.discount} onChange={(e) => setHeader({ ...header, discount: e.target.value })} />
          </div>
          <div>
            <div className="flex flex-wrap items-center justify-between gap-2 mb-2">
              <h3 className="text-sm font-bold text-slate-700">기본 공종 항목 <span className="text-[11px] font-normal text-slate-400">공종/품목/수량/재료·노무·부자재 단가</span></h3>
              <div className="flex flex-wrap gap-2">
                <Button size="sm" variant="secondary" onClick={() => setPicker({ open: true, targetIdx: null })}>📚 단가 카탈로그</Button>
                <Button size="sm" variant="secondary" onClick={addRow}>+ 행 추가</Button>
              </div>
            </div>
            <div className="overflow-x-auto -mx-1 px-1">
              <table className="w-full text-sm" style={{ minWidth: '1080px' }}>
                <thead>
                  <tr className="text-left text-xs text-slate-400">
                    <th className="py-1 pr-2 font-medium w-6">#</th>
                    <th className="py-1 pr-2 font-medium w-36">공종</th>
                    <th className="py-1 pr-2 font-medium">품목명 *</th>
                    <th className="py-1 pr-2 font-medium w-28">규격</th>
                    <th className="py-1 pr-2 font-medium w-12">단위</th>
                    <th className="py-1 pr-2 font-medium w-16 text-right">수량</th>
                    <th className="py-1 pr-2 font-medium w-24 text-right">재료비</th>
                    <th className="py-1 pr-2 font-medium w-24 text-right">노무비</th>
                    <th className="py-1 pr-2 font-medium w-24 text-right">부자재</th>
                    <th className="py-1 pr-2 font-medium w-28 text-right">행합계</th>
                    <th className="py-1 font-medium w-16 text-center">관리</th>
                  </tr>
                </thead>
                <tbody>
                  {items.map((it, idx) => {
                    const inList = !it.trade || tradeBase.includes(it.trade);
                    return (
                      <tr key={it._k} className="align-top">
                        <td className="py-1 pr-2 text-slate-400">{idx + 1}</td>
                        <td className="py-1 pr-2">
                          <select className={inputCls} value={it.trade} onChange={(e) => setItem(idx, { trade: e.target.value })}>
                            <option value="">공종</option>
                            {!inList && <option value={it.trade}>{it.trade}</option>}
                            {tradeBase.map((t) => <option key={t} value={t}>{t}</option>)}
                          </select>
                        </td>
                        <td className="py-1 pr-2"><input className={inputCls} value={it.name} onChange={(e) => setItem(idx, { name: e.target.value })} placeholder="예: 강마루 시공" /></td>

                        <td className="py-1 pr-2"><input type="number" min="0" className={inputCls + ' text-right'} value={it.material_price} onChange={(e) => setItem(idx, { material_price: e.target.value })} /></td>
                        <td className="py-1 pr-2"><input type="number" min="0" className={inputCls + ' text-right'} value={it.labor_price} onChange={(e) => setItem(idx, { labor_price: e.target.value })} /></td>
                        <td className="py-1 pr-2"><input type="number" min="0" className={inputCls + ' text-right'} value={it.sub_price} onChange={(e) => setItem(idx, { sub_price: e.target.value })} /></td>
                        <td className="py-1 pr-2 text-right font-semibold text-slate-700 whitespace-nowrap">{fmtNum(rowAmount({ qty: it.qty, material_price: it.material_price, labor_price: it.labor_price, sub_price: it.sub_price }))}</td>

                          <div className="flex items-center justify-center gap-0.5">
                            <button type="button" onClick={() => setPicker({ open: true, targetIdx: idx })} className="p-1 rounded text-slate-400 hover:text-blue-600" title="단가 카탈로그에서 이 행 채우기">📖</button>
                            <button type="button" onClick={() => delRow(idx)} className="p-1 rounded text-slate-400 hover:text-red-600" aria-label="삭제">✕</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <p className="mt-2 text-[11px] text-slate-400">품목명이 있는 행만 템플릿에 저장됩니다. 단가는 프리필 후 견적에서 자유롭게 조정할 수 있습니다.</p>
          </div>

          <CostBuildupPanel header={header} setHeader={setHeader} totals={totals} />

          <div className="flex flex-wrap gap-2 justify-end pt-3 border-t border-slate-100">
