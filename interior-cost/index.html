                  <p className="mt-0.5 font-semibold text-slate-700">{l.name || '미지정'}</p>
                  {info && (info.role || info.phone) && <p className="text-[11px] text-slate-400 mt-0.5">{[info.role, info.phone].filter(Boolean).join(' · ')}</p>}
                </div>
              );
            })}
          </div>
          <h3 className="text-sm font-bold text-slate-700 mb-2">공종별 협력업체 <span className="text-[11px] font-normal text-slate-400">(비용 내역 기준)</span></h3>
          {byProcess.length === 0 ? (
            <p className="text-sm text-slate-400 text-center py-4">비용에 거래처가 입력되면 공종별 협력업체가 표시됩니다.</p>
          ) : (
            <div className="space-y-2">
              {byProcess.map((g) => (
                <div key={g.process} className="flex flex-wrap items-center gap-2 py-1.5 border-b border-slate-50 last:border-0">
                  <Badge color={PROC_COLOR[g.process] || 'bg-slate-400'}>{g.process}</Badge>
                  <div className="flex flex-wrap gap-1.5">
                    {g.vendors.map((v) => (
                      <span key={v.name} className="inline-flex items-center gap-1 text-xs px-2 py-1 rounded-lg bg-slate-100 text-slate-600">
                        🏪 {v.name} <span className="text-slate-400">{fmtWon(v.total)}</span>
                      </span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </Card>
      );
    }

    // ========================================
    // 🧩 탭 네비게이션
    // ========================================
    const TABS = [
      { id: 'projects', label: '프로젝트', icon: '🗂' },
      { id: 'summary', label: '요약', icon: '📊' },
      { id: 'cost', label: '비용', icon: '💸' },
      { id: 'schedule', label: '일정', icon: '📅' },
      { id: 'estimate', label: '견적', icon: '📋' },
      { id: 'orders', label: '발주', icon: '🧾' },
      { id: 'meetings_as', label: '미팅·AS', icon: '📒' },
      { id: 'manage', label: '관리', icon: '⚙️' },
    ];
    function TabNav({ active, onChange }) {
      return (
        <Card className="p-1.5">
          <div className="flex gap-1 overflow-x-auto" role="tablist" aria-label="메뉴">
            {TABS.map((t) => {
              const on = active === t.id;
              return (
                <button key={t.id} role="tab" aria-selected={on} onClick={() => onChange(t.id)}
                  className={`flex-1 min-w-[68px] px-3 py-2.5 rounded-xl text-sm font-semibold transition whitespace-nowrap
                    ${on ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'}`}>
                  <span className="mr-1">{t.icon}</span>{t.label}
                </button>
              );
            })}
          </div>
        </Card>
      );
    }

    // 작은 라벨-값 행 (견적 합계 박스 등)
    function KV({ label, value, red }) {
      return (
        <div className="flex items-center justify-between">
          <span className="text-slate-500">{label}</span>
          <span className={`font-semibold ${red ? 'text-red-500' : 'text-slate-700'}`}>{value}</span>
        </div>
      );
    }

    // ========================================
    // 🧩 견적(계획) 대비 실제 — 공정별 (요약 탭)
    // ========================================
    function PlanVsActual({ summary }) {
      if (!summary || !summary.byProcessPlan || summary.byProcessPlan.length === 0) return null;
      const planMap = {}, actMap = {};
      summary.byProcessPlan.forEach((p) => { planMap[p.process] = p.total; });
      (summary.byProcess || []).forEach((p) => { actMap[p.process] = p.total; });
      const keys = Array.from(new Set([...Object.keys(planMap), ...Object.keys(actMap)]));
      keys.sort((a, b) => ((planMap[b] || 0) + (actMap[b] || 0)) - ((planMap[a] || 0) + (actMap[a] || 0)));
      const maxV = Math.max(1, ...keys.map((k) => Math.max(planMap[k] || 0, actMap[k] || 0)));
      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-base font-bold text-slate-800">견적(계획) 대비 실제 · 공정별</h2>
            {summary.estimateTotal != null && <span className="text-sm font-bold text-slate-700">확정 견적가 {fmtWon(summary.estimateTotal)}</span>}
          </div>
          <div className="space-y-3">
            {keys.map((k) => {
              const plan = planMap[k] || 0, act = actMap[k] || 0, diff = act - plan;
              return (
                <div key={k}>
                  <div className="flex flex-wrap items-center justify-between text-xs mb-1 gap-1">
                    <span className="font-medium text-slate-600 truncate">{k}</span>
                    <span className="shrink-0">
                      <span className="text-slate-400">계획 {fmtWon(plan)}</span>
                      <span className="mx-1 text-slate-300">/</span>
                      <span className="font-semibold text-slate-700">실제 {fmtWon(act)}</span>
                      {plan > 0 && (
                        <span className={`ml-1.5 font-bold ${diff > 0 ? 'text-red-500' : 'text-emerald-600'}`}>
                          {diff > 0 ? '▲' : '▼'}{fmtWon(Math.abs(diff))}
                        </span>
                      )}
                    </span>
                  </div>
                  <div className="relative h-3 bg-slate-100 rounded-full overflow-hidden">
                    <div className="absolute inset-y-0 left-0 bg-indigo-200 rounded-full bar-grow" style={{ width: (plan / maxV) * 100 + '%' }}></div>
                    <div className="absolute inset-y-0 left-0 bg-blue-500/80 rounded-full bar-grow" style={{ width: (act / maxV) * 100 + '%' }}></div>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="mt-3 flex items-center gap-4 text-[11px] text-slate-400">
            <span className="flex items-center gap-1"><span className="w-3 h-2 rounded bg-indigo-200 inline-block"></span>견적(계획)</span>
            <span className="flex items-center gap-1"><span className="w-3 h-2 rounded bg-blue-500/80 inline-block"></span>실제 집행</span>
          </div>
        </Card>
      );
    }

    // ========================================
    // 🧩 일정 — 월간 캘린더
    // ========================================
    function ScheduleCalendar({ tasks, onEditTask, onRangeSelect }) {
      const [cursor, setCursor] = useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });
      const today = todayStr();
      // v6-3: 드래그로 기간 선택 (mousedown → mousemove(enter) → mouseup)
      const [dragStart, setDragStart] = useState(null);
      const [dragEnd, setDragEnd] = useState(null);
      const dragging = dragStart != null;
      const normRange = (a, b) => (a <= b ? [a, b] : [b, a]);
      const inDragRange = (ds) => { if (!dragging) return false; const [s, e] = normRange(dragStart, dragEnd || dragStart); return s <= ds && ds <= e; };
      useEffect(() => {
        if (!dragging) return;
        const up = () => {
          const [s, e] = normRange(dragStart, dragEnd || dragStart);
          setDragStart(null); setDragEnd(null);
          if (onRangeSelect) onRangeSelect(s, e);
        };
        window.addEventListener('mouseup', up);
        return () => window.removeEventListener('mouseup', up);
      }, [dragging, dragStart, dragEnd, onRangeSelect]);
      const startWeekday = new Date(cursor.y, cursor.m, 1).getDay();
      const daysInMonth = new Date(cursor.y, cursor.m + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < startWeekday; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(ymd(cursor.y, cursor.m, d));
      while (cells.length % 7 !== 0) cells.push(null);
      const tasksOn = (ds) => (tasks || []).filter((t) => t.start_date && t.end_date && t.start_date <= ds && ds <= t.end_date);
      const prev = () => setCursor((c) => (c.m === 0 ? { y: c.y - 1, m: 11 } : { y: c.y, m: c.m - 1 }));
      const next = () => setCursor((c) => (c.m === 11 ? { y: c.y + 1, m: 0 } : { y: c.y, m: c.m + 1 }));
      const goToday = () => { const d = new Date(); setCursor({ y: d.getFullYear(), m: d.getMonth() }); };
      const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
      return (
        <Card className="p-4 sm:p-5">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-base font-bold text-slate-800">{monthLabel(cursor.y, cursor.m)}</h2>
            <div className="flex items-center gap-1">
              <Button variant="ghost" size="sm" onClick={prev} aria-label="이전 달">◀</Button>
              <Button variant="secondary" size="sm" onClick={goToday}>오늘</Button>
              <Button variant="ghost" size="sm" onClick={next} aria-label="다음 달">▶</Button>
            </div>
          </div>
          <div className="grid grid-cols-7 mb-1">
            {weekdays.map((w, i) => (
              <div key={w} className={`text-center text-xs font-semibold py-1 ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : 'text-slate-400'}`}>{w}</div>
            ))}
          </div>
          <p className="text-[11px] text-slate-400 mb-1">🖱️ 날짜를 드래그하면 그 기간으로 새 일정을 만들 수 있어요. (단일 클릭 = 하루)</p>
          <div className="grid grid-cols-7 gap-px bg-slate-100 rounded-xl overflow-hidden border border-slate-100 select-none">
            {cells.map((ds, i) => {
              if (!ds) return <div key={i} className="bg-slate-50 min-h-[78px] sm:min-h-[92px]"></div>;
              const wd = i % 7;
              const isToday = ds === today;
              const dayTasks = tasksOn(ds);
              const sel = inDragRange(ds);
              return (
                <div key={i}
                  onMouseDown={(e) => { e.preventDefault(); setDragStart(ds); setDragEnd(ds); }}
                  onMouseEnter={() => { if (dragging) setDragEnd(ds); }}
                  className={`min-h-[78px] sm:min-h-[92px] p-1 align-top cursor-pointer transition-colors ${sel ? 'bg-blue-100 ring-1 ring-inset ring-blue-300' : 'bg-white hover:bg-slate-50'}`}>
                  <div className="flex justify-end">
                    <span className={`inline-flex items-center justify-center w-5 h-5 text-[11px] rounded-full
                      ${isToday ? 'bg-blue-600 text-white font-bold' : wd === 0 ? 'text-red-500' : wd === 6 ? 'text-blue-500' : 'text-slate-500'}`}>
                      {Number(ds.slice(8, 10))}
                    </span>
                  </div>
                  <div className="mt-0.5 space-y-0.5">
                    {dayTasks.slice(0, 3).map((t) => {
                      const isStart = t.start_date === ds, isEnd = t.end_date === ds;
                      const showLabel = isStart || wd === 0;
                      const bg = t.color || procHex(t.process);
                      return (
                        <button key={t.id} onMouseDown={(e) => e.stopPropagation()} onClick={() => onEditTask(t)} title={t.title} style={{ backgroundColor: bg }}
                          className={`block w-full text-left text-[10px] leading-tight text-white px-1 py-0.5 truncate
                            ${isStart ? 'rounded-l-md' : ''} ${isEnd ? 'rounded-r-md' : ''}`}>
                          {showLabel ? t.title : ' '}
                        </button>
                      );
                    })}
                    {dayTasks.length > 3 && <span className="block text-[10px] text-slate-400 px-1">+{dayTasks.length - 3}건</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      );
    }

    // 🧩 일정 — 태스크 목록(타임라인)
    function ScheduleList({ tasks, onEdit, onAskDelete, taskMap = {}, onAddDep, onRemoveDep }) {
      const sorted = useMemo(() => [...(tasks || [])].sort((a, b) => (a.start_date < b.start_date ? -1 : a.start_date > b.start_date ? 1 : 0)), [tasks]);
      const titleOf = (id) => (taskMap[String(id)] ? taskMap[String(id)].title : '(삭제됨)');
      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-base font-bold text-slate-800">공정 일정 목록</h2>
            <span className="text-xs text-slate-400">{sorted.length}건</span>
          </div>
          {sorted.length === 0 ? (
            <div className="text-center py-10">
              <div className="text-4xl mb-2">📅</div>
              <p className="text-sm text-slate-400">등록된 일정이 없습니다.<br />위 ‘일정 추가’로 공정 태스크를 등록하세요.</p>
            </div>
          ) : (
            <ul className="divide-y divide-slate-100">
              {sorted.map((t) => {
                const plan = Number(t.planned_cost) || 0, act = Number(t.actual_cost) || 0, diff = act - plan;
                return (
                  <li key={t.id} className="py-3">
                    <div className="flex items-start justify-between gap-2">
                      <div className="min-w-0">
                        <div className="flex flex-wrap items-center gap-1.5">
                          <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: t.color || procHex(t.process) }}></span>
                          <span className="font-semibold text-slate-800 truncate">{t.title}</span>
                          {t.process && <Badge color={PROC_COLOR[t.process] || 'bg-slate-400'}>{t.process}</Badge>}
                          <Badge color={TASK_STATUS_COLOR[t.status] || 'bg-slate-400'}>{t.status}</Badge>
                        </div>
                        <p className="mt-1 text-xs text-slate-400">{t.start_date} ~ {t.end_date}{t.staff && ` · 담당 ${t.staff}`}</p>
                        <p className="mt-1 text-xs">
                          <span className="text-slate-400">계획 {fmtWon(plan)}</span>
                          <span className="mx-1 text-slate-300">/</span>
                          <span className="font-semibold text-slate-600">실제 {fmtWon(act)}</span>
                          {plan > 0 && act > 0 && (
                            <span className={`ml-1.5 font-bold ${diff > 0 ? 'text-red-500' : 'text-emerald-600'}`}>
                              {diff > 0 ? `초과 ${fmtWon(diff)}` : diff < 0 ? `절감 ${fmtWon(-diff)}` : '동일'}
                            </span>
                          )}
                        </p>
                        {t.memo && <p className="mt-0.5 text-xs text-slate-500 truncate">{t.memo}</p>}
                        {/* v6-4: 선후관계(선행·후행) */}
                        {(onAddDep || (t.predecessors && t.predecessors.length) || (t.successors && t.successors.length)) && (
                          <div className="mt-1.5 flex flex-wrap items-center gap-1.5">
                            <span className="text-[11px] text-slate-400">선행</span>
                            {(t.predecessors || []).length === 0 && <span className="text-[11px] text-slate-300">없음</span>}
                            {(t.predecessors || []).map((pid) => (
                              <span key={'p' + pid} className="inline-flex items-center gap-1 text-[11px] px-1.5 py-0.5 rounded-full bg-indigo-50 text-indigo-700 border border-indigo-100">
                                {titleOf(pid)}
                                {onRemoveDep && <button onClick={() => onRemoveDep(t.id, pid)} className="text-indigo-300 hover:text-red-500" aria-label="선행 해제" title="선행 연결 해제">✕</button>}
                              </span>
                            ))}
                            {onAddDep && <button onClick={() => onAddDep(t)} className="text-[11px] px-1.5 py-0.5 rounded-full border border-dashed border-slate-300 text-slate-500 hover:bg-slate-50">+ 선행</button>}
                            {(t.successors || []).length > 0 && (
                              <>
                                <span className="text-[11px] text-slate-400 ml-1">→ 후행</span>
                                {(t.successors || []).map((sid) => (
                                  <span key={'s' + sid} className="text-[11px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-600">{titleOf(sid)}</span>
                                ))}
                              </>
                            )}
                          </div>
                        )}
                      </div>
                      <div className="flex gap-1 shrink-0">
                        <button onClick={() => onEdit(t)} aria-label="수정" className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50">✏️</button>
                        <button onClick={() => onAskDelete(t)} aria-label="삭제" className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50">🗑️</button>
                      </div>
                    </div>
                  </li>
                );
              })}
            </ul>
          )}
        </Card>
      );
    }

    // 🧩 일정 등록/수정 폼 (모달)
    function ScheduleForm({ editing, prefill, hasSuccessors, onSubmit, onCancel, procNames, staffNames }) {
      // v6-3: 캘린더 드래그로 받은 prefill(start/end)을 신규 폼 기본값으로
      const blank = { title: '', process: '', start_date: (prefill && prefill.start) || todayStr(), end_date: (prefill && prefill.end) || todayStr(), status: '예정', planned_cost: '', staff: '', color: '', memo: '' };
      const [form, setForm] = useState(editing ? {
        title: editing.title || '', process: editing.process || '',
        start_date: editing.start_date || todayStr(), end_date: editing.end_date || todayStr(),
        status: editing.status || '예정', planned_cost: editing.planned_cost != null ? String(editing.planned_cost) : '',
        staff: editing.staff || '', color: editing.color || '', memo: editing.memo || '',
      } : blank);
      const [cascade, setCascade] = useState(false); // v6-4 연결된 후속 일정 함께 이동
      const dateChanged = !!editing && (form.start_date !== (editing.start_date || '') || form.end_date !== (editing.end_date || ''));
      const [errors, setErrors] = useState({});
      const [submitting, setSubmitting] = useState(false);
      const validate = () => {
        const e = {};
        if (!form.title.trim()) e.title = '작업명을 입력하세요.';
        if (!form.start_date) e.start_date = '시작일을 선택하세요.';
        if (!form.end_date) e.end_date = '종료일을 선택하세요.';
        if (form.start_date && form.end_date && form.start_date > form.end_date) e.end_date = '종료일은 시작일 이후여야 합니다.';
        setErrors(e); return Object.keys(e).length === 0;
      };
      const handleSubmit = async (ev) => {
        ev.preventDefault();
        if (!validate()) return;
        setSubmitting(true);
        await onSubmit({
          title: form.title.trim(), process: form.process.trim(), start_date: form.start_date, end_date: form.end_date,
          status: form.status, planned_cost: Math.round(Number(form.planned_cost) || 0), staff: form.staff.trim(),
          color: form.color, memo: form.memo.trim(),
          ...(editing && hasSuccessors && cascade && dateChanged ? { cascade: true } : {}),
        });
        setSubmitting(false);
      };
      return (
        <form onSubmit={handleSubmit} className="space-y-4">
          <Input label="작업명 *" placeholder="예: 주방 목공" value={form.title} error={errors.title}
            onChange={(e) => setForm({ ...form, title: e.target.value })} />
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Combo label="공정" placeholder="선택 또는 직접 입력" value={form.process} options={procNames.length ? procNames : PROCESS_CATEGORIES}
              onChange={(e) => setForm({ ...form, process: e.target.value })} />
            <Select label="상태" value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })}>
              {TASK_STATUSES.map((s) => <option key={s} value={s}>{s}</option>)}
            </Select>
            <Input label="시작일 *" type="date" value={form.start_date} error={errors.start_date}
              onChange={(e) => setForm({ ...form, start_date: e.target.value })} />
            <Input label="종료일 *" type="date" value={form.end_date} error={errors.end_date}
              onChange={(e) => setForm({ ...form, end_date: e.target.value })} />
            <Combo label="담당자" placeholder="예: 박현장" value={form.staff} options={staffNames}
              onChange={(e) => setForm({ ...form, staff: e.target.value })} />
            <Input label="계획비용 (원)" type="number" inputMode="numeric" min="0" placeholder="예: 5000000"
              value={form.planned_cost} onChange={(e) => setForm({ ...form, planned_cost: e.target.value })} />
          </div>
          <div>
            <span className="block mb-1.5 text-sm font-medium text-slate-700">표시 색상</span>
            <div className="flex items-center gap-2 flex-wrap">
              {COLOR_SWATCHES.map((c) => (
                <button type="button" key={c || 'auto'} onClick={() => setForm({ ...form, color: c })} aria-label={c || '공정 자동색'}
                  className={`w-7 h-7 rounded-full border-2 flex items-center justify-center text-[9px] text-slate-600 ${form.color === c ? 'border-slate-800' : 'border-slate-200'}`}
                  style={{ backgroundColor: c || (form.process ? procHex(form.process) : '#e2e8f0') }}>
                  {c ? '' : '자동'}
                </button>
              ))}
            </div>
          </div>
          <Textarea label="메모 (선택)" rows="2" value={form.memo} onChange={(e) => setForm({ ...form, memo: e.target.value })} />
          {editing && hasSuccessors && (
            <label className={`flex items-start gap-2 p-3 rounded-xl border text-sm cursor-pointer transition ${dateChanged ? 'border-blue-200 bg-blue-50' : 'border-slate-200 bg-slate-50 opacity-70'}`}>
              <input type="checkbox" className="mt-0.5" checked={cascade} onChange={(e) => setCascade(e.target.checked)} disabled={!dateChanged} />
              <span>
                <span className="font-medium text-slate-700">연결된 후속 일정도 함께 이동</span>
                <span className="block text-[11px] text-slate-400">선행(이 일정)의 날짜 변경분만큼 후속 일정을 자동으로 밀어줍니다. {dateChanged ? '' : '(날짜를 변경하면 활성화됩니다)'}</span>
              </span>
            </label>
          )}
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit" disabled={submitting}>{submitting ? '저장 중...' : (editing ? '수정 저장' : '일정 추가')}</Button>
          </div>
        </form>
      );
    }

    // 🧩 일정 탭 (캘린더 + 목록 + 폼 + .ics + 선후관계 + 일정표 PDF)
    function ScheduleTab({ site, tasks, procNames, staffNames, loading, onChanged, onPrintSchedule }) {
      const toast = useToast();
      const [formOpen, setFormOpen] = useState(false);
      const [editing, setEditing] = useState(null);
      const [prefill, setPrefill] = useState(null); // v6-3 드래그 기간 프리필
      const [delTarget, setDelTarget] = useState(null);
      const [depTarget, setDepTarget] = useState(null); // v6-4 선행 추가 대상(=successor)
      const [depPredId, setDepPredId] = useState('');
      const [showDepList, setShowDepList] = useState(false);

      const taskMap = useMemo(() => { const m = {}; (tasks || []).forEach((t) => { m[String(t.id)] = t; }); return m; }, [tasks]);
      const depPairs = useMemo(() => {
        const pairs = [];
        (tasks || []).forEach((t) => { (t.successors || []).forEach((sid) => { if (taskMap[String(sid)]) pairs.push({ pred: t, succ: taskMap[String(sid)] }); }); });
        return pairs;
      }, [tasks, taskMap]);

      const closeForm = () => { setFormOpen(false); setEditing(null); setPrefill(null); };
      const openAdd = () => { setEditing(null); setPrefill(null); setFormOpen(true); };
      const openEdit = (t) => { setEditing(t); setPrefill(null); setFormOpen(true); };
      const onRangeSelect = (s, e) => { setEditing(null); setPrefill({ start: s, end: e }); setFormOpen(true); };

      const save = async (body) => {
        try {
          let res;
          if (editing) res = await api.updateSchedule(editing.id, body);
          else res = await api.createSchedule(site.id, body);
          let msg = editing ? '일정이 수정되었습니다.' : '일정이 추가되었습니다.';
          if (res && res.shifted && res.shifted.length) msg = `일정 수정 · 후속 ${res.shifted.length}개 함께 이동`;
          toast(msg, 'success');
          closeForm();
          await onChanged();
          return true;
        } catch (e) { toast(e.message || '저장에 실패했습니다.', 'error'); return false; }
      };
      const confirmDel = async () => {
        const t = delTarget; setDelTarget(null);
        try { await api.removeSchedule(t.id); toast('일정이 삭제되었습니다.', 'info'); await onChanged(); }
        catch (e) { toast('삭제에 실패했습니다.', 'error'); }
      };
      // v6-4 선후관계
      const addDep = async () => {
        if (!depTarget || !depPredId) return;
        try { await api.addDep(depTarget.id, depPredId); toast('선행 일정을 연결했습니다.', 'success'); setDepTarget(null); setDepPredId(''); await onChanged(); }
        catch (e) { toast(e.message || '연결에 실패했습니다.', 'error'); }
      };
      const removeDep = async (succId, predId) => {
        try { await api.removeDep(succId, predId); toast('선후관계를 해제했습니다.', 'info'); await onChanged(); }
        catch (e) { toast('해제에 실패했습니다.', 'error'); }
      };
      const exportICS = async () => {
        if (!tasks || tasks.length === 0) { toast('내보낼 일정이 없습니다.', 'error'); return; }
        if (!api._useMock) {
          try {
            const res = await fetch(api.scheduleIcsUrl(site.id));
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const blob = await res.blob();
            downloadBlob(blob, `${site.name}-schedule.ics`);
            toast('일정(.ics)을 내보냈습니다.', 'success'); return;
          } catch (e) { /* 서버 실패 → 폴백 */ }
        }
        const ics = buildICS(site.name, tasks);
        downloadBlob(new Blob([ics], { type: 'text/calendar;charset=utf-8' }), `${site.name}-schedule.ics`);
        toast('일정(.ics)을 내보냈습니다. (브라우저 생성)', 'success');
      };
      const printSchedule = () => {
        if (!tasks || tasks.length === 0) { toast('인쇄할 일정이 없습니다.', 'error'); return; }
        if (onPrintSchedule) onPrintSchedule();
      };
      // 선행 추가 모달 후보: 자기 자신·이미 선행인 것 제외
      const depCandidates = depTarget ? (tasks || []).filter((t) => String(t.id) !== String(depTarget.id) && !(depTarget.predecessors || []).map(String).includes(String(t.id))) : [];

      return (
        <div className="space-y-6">
          <div className="flex flex-wrap items-center justify-between gap-2">
            <div>
              <h2 className="text-base font-bold text-slate-800">공정 일정 (캘린더)</h2>
              <p className="text-[11px] text-slate-400">📆 .ics 파일은 구글/네이버/아웃룩 캘린더에서 ‘가져오기’로 불러올 수 있습니다.</p>
            </div>
            <div className="flex flex-wrap gap-2">
              <Button variant="secondary" size="sm" onClick={printSchedule}>🖨 일정표 PDF</Button>
              <Button variant="secondary" size="sm" onClick={exportICS}>📆 .ics 내보내기</Button>
              <Button size="sm" onClick={openAdd}>+ 일정 추가</Button>
            </div>
          </div>
          {loading ? (
            <Card className="p-5"><div className="h-72 bg-slate-100 rounded-xl animate-pulse"></div></Card>
          ) : (
            <>
              <ScheduleCalendar tasks={tasks} onEditTask={openEdit} onRangeSelect={onRangeSelect} />
              <ScheduleList tasks={tasks} onEdit={openEdit} onAskDelete={setDelTarget}
                taskMap={taskMap} onAddDep={setDepTarget} onRemoveDep={removeDep} />
              {/* v6-4 선후관계 리스트 뷰 */}
              <Card className="p-5">
                <div className="flex items-center justify-between">
                  <h3 className="text-sm font-bold text-slate-700">🔗 선후관계 <span className="text-[11px] font-normal text-slate-400">(선행 → 후행 {depPairs.length}건)</span></h3>
                  <button onClick={() => setShowDepList((v) => !v)} className="text-xs text-blue-600 hover:underline">{showDepList ? '접기' : '펼치기'}</button>
                </div>
                {showDepList && (
                  depPairs.length === 0 ? (
                    <p className="mt-3 text-sm text-slate-400 text-center py-4">등록된 선후관계가 없습니다.<br />일정 목록의 ‘+ 선행’ 버튼으로 연결하세요.</p>
                  ) : (
                    <ul className="mt-3 space-y-1.5">
                      {depPairs.map((p) => (
                        <li key={p.pred.id + '-' + p.succ.id} className="flex items-center gap-2 text-sm py-1.5 border-b border-slate-50 last:border-0">
                          <span className="inline-flex items-center gap-1.5 min-w-0">
                            <span className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: p.pred.color || procHex(p.pred.process) }}></span>
                            <span className="font-medium text-slate-700 truncate">{p.pred.title}</span>
                          </span>
                          <span className="text-slate-300 shrink-0">→</span>
                          <span className="inline-flex items-center gap-1.5 min-w-0">
                            <span className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: p.succ.color || procHex(p.succ.process) }}></span>
                            <span className="font-medium text-slate-700 truncate">{p.succ.title}</span>
                          </span>
                          <button onClick={() => removeDep(p.succ.id, p.pred.id)} className="ml-auto shrink-0 text-slate-400 hover:text-red-500 p-1" aria-label="해제" title="선후관계 해제">✕</button>
                        </li>
                      ))}
                    </ul>
                  )
                )}
              </Card>
            </>
          )}
          <Modal isOpen={formOpen} onClose={closeForm} title={editing ? '일정 수정' : '일정 추가'} size="lg">
            <ScheduleForm key={editing ? editing.id : ('new' + (prefill ? prefill.start + prefill.end : ''))}
              editing={editing} prefill={prefill} hasSuccessors={!!(editing && editing.successors && editing.successors.length)}
              procNames={procNames} staffNames={staffNames} onSubmit={save} onCancel={closeForm} />
          </Modal>
          {/* v6-4 선행 추가 모달 */}
          <Modal isOpen={!!depTarget} onClose={() => { setDepTarget(null); setDepPredId(''); }} title="선행 일정 추가" size="sm">
            {depTarget && (
              <div className="space-y-4">
                <p className="text-sm text-slate-600">'<span className="font-semibold">{depTarget.title}</span>' 보다 <span className="font-semibold">먼저 끝나야 하는</span> 선행 일정을 선택하세요.</p>
                <Select label="선행 일정" value={depPredId} onChange={(e) => setDepPredId(e.target.value)}>
                  <option value="">선택하세요</option>
                  {depCandidates.map((t) => <option key={t.id} value={t.id}>{t.title} ({t.start_date}~{t.end_date})</option>)}
                </Select>
                {depCandidates.length === 0 && <p className="text-xs text-slate-400">연결 가능한 다른 일정이 없습니다.</p>}
                <div className="flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => { setDepTarget(null); setDepPredId(''); }}>취소</Button>
                  <Button onClick={addDep} disabled={!depPredId}>연결</Button>
                </div>
              </div>
            )}
          </Modal>
          <Modal isOpen={!!delTarget} onClose={() => setDelTarget(null)} title="일정 삭제 확인" size="sm">
            {delTarget && (
              <div>
                <p className="text-sm text-slate-600">'<span className="font-semibold">{delTarget.title}</span>' 일정을 삭제하시겠습니까?<br />연결된 비용은 보존되며 연결만 해제됩니다. 선후관계도 함께 해제됩니다.</p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setDelTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDel}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // 🧩 일정표 인쇄(A4) — 현장명·공사기간 + 리스트 + 간트형 막대 (v6-3)
    function SchedulePrint({ site, tasks }) {
      if (!site) return null;
      const pb = '1px solid #94a3b8';
      const th = { border: pb, padding: '6px 8px', fontWeight: 600, background: '#f1f5f9' };
      const td = { border: pb, padding: '6px 8px' };
      const tdC = { border: pb, padding: '6px 8px', textAlign: 'center' };
      const sorted = [...(tasks || [])].sort((a, b) => (a.start_date < b.start_date ? -1 : a.start_date > b.start_date ? 1 : 0));
      const dates = sorted.flatMap((t) => [t.start_date, t.end_date]).filter(Boolean);
      const minD = dates.length ? dates.reduce((a, b) => (a < b ? a : b)) : null;
      const maxD = dates.length ? dates.reduce((a, b) => (a > b ? a : b)) : null;
      const span = (minD && maxD) ? Math.max(1, daysBetween(minD, maxD) + 1) : 1;
      const projPeriod = (minD && maxD) ? `${minD} ~ ${maxD} (${span}일)` : (site.start_date ? `${site.start_date} ~ ${site.end_date || '미정'}` : '미정');
      return (

    // (v3) 단가 카탈로그 불러오기 모달 — 공종 필터 + 검색 + 페이지네이션
    function CatalogPickerModal({ isOpen, onClose, trades, mode, onPick }) {
      const [trade, setTrade] = useState('');
      const [q, setQ] = useState('');
      const [list, setList] = useState([]);
      const [loading, setLoading] = useState(false);
      const [page, setPage] = useState(0);
      const pageSize = 20;
      useEffect(() => { if (!isOpen) { setTrade(''); setQ(''); setPage(0); } }, [isOpen]);
      useEffect(() => { setPage(0); }, [trade, q]);
      useEffect(() => {
        if (!isOpen) return;
        let alive = true;
        setLoading(true);
        const t = setTimeout(async () => {
          try { const d = await api.listCatalog({ trade: trade || undefined, q: q || undefined, limit: 1000 }); if (alive) setList(d || []); }
          catch (e) { if (alive) setList([]); }
          finally { if (alive) setLoading(false); }
        }, 200);
        return () => { alive = false; clearTimeout(t); };
      }, [isOpen, trade, q]);
      const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
      const pageItems = list.slice(page * pageSize, page * pageSize + pageSize);
      const tradeOpts = (trades && trades.length ? trades : TRADE_MASTER);
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="단가 카탈로그 불러오기" size="xl">
          <div className="space-y-3">
            <div className="flex flex-col sm:flex-row gap-2">
              <select value={trade} onChange={(e) => setTrade(e.target.value)}
                className="px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-300 sm:w-44">
                <option value="">전체 공종</option>
                {tradeOpts.map((t) => <option key={t} value={t}>{t}</option>)}
              </select>
              <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="품목·제품·업체 검색"
                className="flex-1 px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
            </div>
            <div className="flex items-center justify-between text-xs text-slate-400">
              <span>{loading ? '불러오는 중…' : `${fmtNum(list.length)}개 항목`}{mode === 'append' && ' · 클릭하면 행으로 추가됩니다'}</span>
              {list.length > pageSize && <span>{page + 1} / {totalPages} 페이지</span>}
            </div>
            <div className="border border-slate-100 rounded-xl overflow-hidden">
              {loading ? (
                <div className="p-8 text-center text-sm text-slate-400">불러오는 중…</div>
              ) : list.length === 0 ? (
                <div className="p-8 text-center text-sm text-slate-400">
                  {api._useMock ? '오프라인 데모: 내장 샘플 카탈로그만 표시됩니다.' : '검색 결과가 없습니다.'}
                </div>
              ) : (
                <ul className="divide-y divide-slate-100 max-h-[46vh] overflow-y-auto">
                  {pageItems.map((c) => {
                    const sum = (Number(c.material_price) || 0) + (Number(c.labor_price) || 0) + (Number(c.sub_price) || 0);
                    return (
                      <li key={c.id}>
                        <button type="button" onClick={() => onPick(c)} className="w-full text-left px-3 py-2.5 hover:bg-blue-50 transition">
                          <div className="flex items-center justify-between gap-2">
                            <div className="min-w-0 flex items-center gap-2 flex-wrap">
                              <span className="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium text-white shrink-0" style={{ backgroundColor: tradeHex(c.trade) }}>{c.trade}</span>
                              <span className="font-medium text-slate-800 truncate">{c.name}</span>
                              {c.unit && <span className="text-[11px] text-slate-400">/{c.unit}</span>}
                            </div>
                            <span className="font-bold text-slate-700 shrink-0">{fmtNum(sum)}원</span>
                          </div>
                          <p className="mt-0.5 text-[11px] text-slate-400 truncate">
                            재 {fmtNum(c.material_price)} · 노 {fmtNum(c.labor_price)} · 부 {fmtNum(c.sub_price)}
                            {c.product_name ? ` · ${c.product_name}` : (c.grp ? ` · ${c.grp}` : '')}{c.vendor ? ` · ${c.vendor}` : ''}
                          </p>
                        </button>
                      </li>
                    );
                  })}
                </ul>
              )}
            </div>
            {list.length > pageSize && (
              <div className="flex items-center justify-center gap-2">
                <Button size="sm" variant="secondary" disabled={page === 0} onClick={() => setPage((p) => Math.max(0, p - 1))}>◀ 이전</Button>
                <span className="text-xs text-slate-500">{page + 1} / {totalPages}</span>
                <Button size="sm" variant="secondary" disabled={page >= totalPages - 1} onClick={() => setPage((p) => Math.min(totalPages - 1, p + 1))}>다음 ▶</Button>
              </div>
            )}
            <div className="flex justify-end pt-1"><Button variant="secondary" onClick={onClose}>닫기</Button></div>
          </div>
        </Modal>
      );
    }

    // (v3) 공종별 그룹 소계 (총괄표)
    function TradeSubtotals({ items }) {
      const groups = useMemo(() => {
        const m = {};
        (items || []).forEach((it) => {
          if (!(it.name || '').trim()) return;
          const t = it.trade || it.process || '미분류';
          m[t] = (m[t] || 0) + (Number(it.amount) || 0);
        });
        return Object.entries(m).map(([trade, total]) => ({ trade, total })).sort((a, b) => b.total - a.total);
      }, [items]);
      const total = groups.reduce((s, g) => s + g.total, 0);
      if (groups.length === 0) return null;
      return (
        <Card className="p-4">
          <h3 className="text-sm font-bold text-slate-700 mb-3">공종별 소계 (총괄)</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <tbody className="divide-y divide-slate-100">
                {groups.map((g) => {
                  const pct = total > 0 ? Math.round((g.total / total) * 100) : 0;
                  return (
                    <tr key={g.trade}>
                      <td className="py-1.5 pr-3">
                        <span className="inline-flex items-center gap-1.5">
                          <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: tradeHex(g.trade) }}></span>
                          <span className="text-slate-700 font-medium">{g.trade}</span>
                        </span>
                      </td>
                      <td className="py-1.5 pr-3 text-right text-slate-400 w-12">{pct}%</td>
                      <td className="py-1.5 text-right font-semibold text-slate-700 whitespace-nowrap">{fmtWon(g.total)}</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr className="border-t-2 border-slate-200">
                  <td className="py-2 pr-3 font-bold text-slate-700">합계 (직접공사비)</td>
                  <td></td>
                  <td className="py-2 text-right font-extrabold text-slate-800 whitespace-nowrap">{fmtWon(total)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </Card>
      );
    }

          <span className={`${indent ? 'pl-3 text-slate-500' : strong ? 'font-bold text-slate-700' : 'text-slate-600'} text-sm`}>
            {label}{sub && <span className="text-[11px] text-slate-400 ml-1">{sub}</span>}
          </span>
          <span className={`whitespace-nowrap ${big ? 'text-lg font-extrabold text-blue-600' : accent ? 'font-bold text-emerald-700' : strong ? 'font-bold text-slate-800' : 'font-medium text-slate-700'}`}>{fmtWon(value)}</span>

              _k: uid(),
              trade: it.trade || it.process || '', name: it.name || '', spec: it.spec || '', unit: it.unit || '',
              qty: String(it.qty != null ? it.qty : ''),
              // 레거시 v2 단가는 재료비단가로 이관(편집/표시 가능)
              material_price: ps(hasSplit ? it.material_price : it.unit_price),
              labor_price: ps(it.labor_price), sub_price: ps(it.sub_price),
              memo: it.memo || '', catalog_id: it.catalog_id != null ? it.catalog_id : null,
            };
          })
          : [mk()]
      );
      const [saving, setSaving] = useState(false);
      const [picker, setPicker] = useState({ open: false, targetIdx: null });
      const setItem = (idx, patch) => setItems((arr) => arr.map((it, i) => (i === idx ? { ...it, ...patch } : it)));
      const addRow = () => setItems((arr) => [...arr, mk()]);
      const delRow = (idx) => setItems((arr) => (arr.length <= 1 ? [mk()] : arr.filter((_, i) => i !== idx)));
      // (v6-2) 행 이동은 공종 그룹 내부에서만 — moveInGroup 으로 대체
      // 카탈로그 항목 → 행 채우기
      const pickCatalog = (c) => {
        const patch = {
          trade: c.trade || '', name: c.name || '', unit: c.unit || '',
          spec: c.product_name || c.grp || '',
          material_price: ps(c.material_price), labor_price: ps(c.labor_price), sub_price: ps(c.sub_price),
          catalog_id: c.id != null ? c.id : null,
        };
        if (picker.targetIdx == null) {
          setItems((arr) => [...arr, { _k: uid(), qty: '1', memo: '', ...patch }]);
          toast(`'${c.name}' 추가됨`, 'success');
        } else {
          setItem(picker.targetIdx, patch);
          setPicker({ open: false, targetIdx: null });
        }
      };
      const parseItem = (it, i) => {
        const m = Math.round(Number(it.material_price) || 0), l = Math.round(Number(it.labor_price) || 0), s = Math.round(Number(it.sub_price) || 0);
        const up = effUnitPrice({ material_price: m, labor_price: l, sub_price: s });
        return {
          trade: it.trade, process: it.trade, name: it.name, spec: it.spec, unit: it.unit,
          qty: Number(it.qty) || 0, material_price: m, labor_price: l, sub_price: s,
          unit_price: up, amount: calcItemAmount(it.qty, up), catalog_id: it.catalog_id, memo: it.memo, sort_order: i,
        };
      };
      const toEstimate = () => {
        const e = {
          title: header.title, client_name: header.client_name, client_contact: header.client_contact,
          estimate_date: header.estimate_date, valid_until: header.valid_until, vat_mode: header.vat_mode,
          vat_rate: Number(header.vat_rate), discount: Math.round(Number(header.discount) || 0), memo: header.memo,
          use_cost_buildup: header.use_cost_buildup,
          site_id: site && site.id, id: initial && initial.id, status: initial && initial.status,
          items: items.map(parseItem),
        };
        Object.keys(BUILDUP_DEFAULTS).forEach((k) => { e[k] = Number(header[k]); });
        return e;
      };
      const est = useMemo(() => toEstimate(), [items, header]);
      const totals = useMemo(() => computeTotals(est), [est]);
      const buildBody = () => {
        const e = toEstimate();
        const body = {
          title: header.title || '견적서', client_name: header.client_name, client_contact: header.client_contact,
          estimate_date: header.estimate_date, valid_until: header.valid_until, vat_mode: header.vat_mode,
          vat_rate: Number(header.vat_rate), discount: Math.round(Number(header.discount) || 0), memo: header.memo,
          use_cost_buildup: header.use_cost_buildup,
          items: e.items.filter((it) => (it.name || '').trim()),
        };
        Object.keys(BUILDUP_DEFAULTS).forEach((k) => { body[k] = Number(header[k]); });
        return body;
      };
      const inputCls = 'w-full px-2 py-1.5 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300';
      const tradeBase = (trades && trades.length ? trades : TRADE_MASTER);

      // ── v6-2: 작성 중 자동 임시저장(draft) ──
      const draftKey = `interior_estimate_draft_${(site && site.id) || 'x'}_${(initial && initial.id) || 'new'}`;
      const [pendingDraft] = useState(() => { try { const r = localStorage.getItem(draftKey); return r ? JSON.parse(r) : null; } catch { return null; } });
      const [showDraftBanner, setShowDraftBanner] = useState(!!pendingDraft);
      const firstAutosave = useRef(true);
      useEffect(() => {
        if (firstAutosave.current) { firstAutosave.current = false; return; } // 진입 직후엔 저장 안 함(빈 draft 방지)
        const t = setTimeout(() => { try { localStorage.setItem(draftKey, JSON.stringify({ header, items, savedAt: new Date().toISOString() })); } catch (err) {} }, 600);
        return () => clearTimeout(t);
      }, [header, items]);
      const restoreDraft = () => {
        if (pendingDraft) { if (pendingDraft.header) setHeader(pendingDraft.header); if (pendingDraft.items) setItems(pendingDraft.items); }
        setShowDraftBanner(false); toast('임시저장을 복원했습니다.', 'success');
      };
      const ignoreDraft = () => setShowDraftBanner(false);
      const saveDraftManual = () => {
        try { localStorage.setItem(draftKey, JSON.stringify({ header, items, savedAt: new Date().toISOString() })); toast('임시저장했습니다.', 'success'); }
        catch (err) { toast('임시저장에 실패했습니다.', 'error'); }
      };
      const handleSave = async () => {
        setSaving(true); const ok = await onSave(buildBody()); setSaving(false);
        if (ok) { try { localStorage.removeItem(draftKey); } catch (err) {} setShowDraftBanner(false); } // 서버 저장 성공 시 draft 삭제
      };

      // ── v6-2: 공종 그룹 / 접기(accordion) / 점프 / 페이지 분할 ──
      const [collapsed, setCollapsed] = useState(() => new Set());
      const [pageBreakByTrade, setPageBreakByTrade] = useState(false);
      const sectionRefs = useRef({});
      const grouped = useMemo(() => {
        const order = []; const map = {};
        items.forEach((it, idx) => { const k = it.trade || '미분류'; if (!map[k]) { map[k] = []; order.push(k); } map[k].push(idx); });
        return order.map((k) => [k, map[k]]);
      }, [items]);
      const toggleGroup = (k) => setCollapsed((s) => { const n = new Set(s); n.has(k) ? n.delete(k) : n.add(k); return n; });
      const jumpTo = (k) => { setCollapsed((s) => { const n = new Set(s); n.delete(k); return n; }); setTimeout(() => { const el = sectionRefs.current[k]; if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 30); };
      const addRowTo = (k) => setItems((arr) => [...arr, { ...mk(), trade: k === '미분류' ? '' : k }]);
      const moveInGroup = (idx, dir) => setItems((arr) => {
        const key = (x) => x.trade || '미분류'; const cur = key(arr[idx]);
        let j = idx + dir; while (j >= 0 && j < arr.length && key(arr[j]) !== cur) j += dir;
        if (j < 0 || j >= arr.length) return arr;
        const next = arr.slice(); const tmp = next[idx]; next[idx] = next[j]; next[j] = tmp; return next;
      });
      const groupTotal = (idxs) => idxs.reduce((s, i) => s + rowAmount({ qty: items[i].qty, material_price: items[i].material_price, labor_price: items[i].labor_price, sub_price: items[i].sub_price }), 0);
      const renderRow = (idx) => {
        const it = items[idx];
        const inList = !it.trade || tradeBase.includes(it.trade);
        return (
          <tr key={it._k} className="align-top">
            <td className="py-1 pr-2 text-slate-400">{idx + 1}</td>
            <td className="py-1 pr-2">
              <select className={inputCls} value={it.trade} onChange={(e) => setItem(idx, { trade: e.target.value })}>
                <option value="">공종 선택</option>
                {!inList && <option value={it.trade}>{it.trade}</option>}
                {tradeBase.map((t) => <option key={t} value={t}>{t}</option>)}
              </select>
            </td>
            <td className="py-1 pr-2"><input className={inputCls} value={it.name} onChange={(e) => setItem(idx, { name: e.target.value })} placeholder="예: 강마루 시공" /></td>
            <td className="py-1 pr-2"><input className={inputCls} value={it.spec} onChange={(e) => setItem(idx, { spec: e.target.value })} placeholder="규격" /></td>
            <td className="py-1 pr-2"><input className={inputCls} value={it.unit} onChange={(e) => setItem(idx, { unit: e.target.value })} placeholder="개" /></td>
            <td className="py-1 pr-2"><input type="number" min="0" className={inputCls + ' text-right'} value={it.qty} onChange={(e) => setItem(idx, { qty: e.target.value })} /></td>
            <td className="py-1 pr-2"><input type="number" min="0" className={inputCls + ' text-right'} value={it.material_price} onChange={(e) => setItem(idx, { material_price: e.target.value })} /></td>
            <td className="py-1 pr-2"><input type="number" min="0" className={inputCls + ' text-right'} value={it.labor_price} onChange={(e) => setItem(idx, { labor_price: e.target.value })} /></td>
            <td className="py-1 pr-2"><input type="number" min="0" className={inputCls + ' text-right'} value={it.sub_price} onChange={(e) => setItem(idx, { sub_price: e.target.value })} /></td>
            <td className="py-1 pr-2 text-right font-semibold text-slate-700 whitespace-nowrap">{fmtNum(rowAmount({ qty: it.qty, material_price: it.material_price, labor_price: it.labor_price, sub_price: it.sub_price }))}</td>
            <td className="py-1">
              <div className="flex items-center justify-center gap-0.5">
                <button type="button" onClick={() => setPicker({ open: true, targetIdx: idx })} className="p-1 rounded text-slate-400 hover:text-blue-600" aria-label="카탈로그에서 채우기" title="단가 카탈로그에서 이 행 채우기">📖</button>
                <button type="button" onClick={() => moveInGroup(idx, -1)} className="p-1 rounded text-slate-400 hover:text-slate-700" aria-label="위로">▲</button>
                <button type="button" onClick={() => moveInGroup(idx, 1)} className="p-1 rounded text-slate-400 hover:text-slate-700" aria-label="아래로">▼</button>
                <button type="button" onClick={() => delRow(idx)} className="p-1 rounded text-slate-400 hover:text-red-600" aria-label="삭제">✕</button>
              </div>
            </td>
          </tr>
        );
      };
      return (
        <div className="space-y-5">
          {confirmed && (
            <div className="px-3 py-2 rounded-xl bg-emerald-50 border border-emerald-200 text-xs text-emerald-700">
              ✅ 확정된 견적입니다. 편집했다면 다시 ‘확정’을 눌러 현장 예산에 반영하세요.
            </div>
          )}
          {showDraftBanner && (
            <div className="px-3 py-2.5 rounded-xl bg-amber-50 border border-amber-200 flex flex-wrap items-center justify-between gap-2">
              <span className="text-xs text-amber-800">📝 작성 중이던 임시저장 내용이 있습니다{pendingDraft && pendingDraft.savedAt ? ` (${String(pendingDraft.savedAt).slice(0, 16).replace('T', ' ')})` : ''}. 복원하시겠어요?</span>
              <span className="flex gap-1.5">
                <Button size="sm" onClick={restoreDraft}>복원</Button>
                <Button size="sm" variant="ghost" onClick={ignoreDraft}>무시</Button>
              </span>
            </div>
          )}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <Input label="견적 제목" value={header.title} onChange={(e) => setHeader({ ...header, title: e.target.value })} />
            <Input label="고객명" value={header.client_name} onChange={(e) => setHeader({ ...header, client_name: e.target.value })} />
            <Input label="고객 연락처" value={header.client_contact} onChange={(e) => setHeader({ ...header, client_contact: e.target.value })} />
            <Input label="견적일" type="date" value={header.estimate_date} onChange={(e) => setHeader({ ...header, estimate_date: e.target.value })} />
            <Input label="유효기간" type="date" value={header.valid_until} onChange={(e) => setHeader({ ...header, valid_until: e.target.value })} />
            <Select label="부가세" value={header.vat_mode} onChange={(e) => setHeader({ ...header, vat_mode: e.target.value })}>
              {VAT_MODES.map((m) => <option key={m.value} value={m.value}>{m.label}</option>)}
            </Select>
          </div>
          <div>
            <div className="flex flex-wrap items-center justify-between gap-2 mb-2">
              <h3 className="text-sm font-bold text-slate-700">견적 항목 <span className="text-[11px] font-normal text-slate-400">공종별 그룹 · 재료/노무/부자재 3분할</span></h3>
              <div className="flex flex-wrap gap-2">
                <Button size="sm" variant="ghost" onClick={saveDraftManual}>💾 임시저장</Button>
                <Button size="sm" variant="secondary" onClick={() => setPicker({ open: true, targetIdx: null })}>📚 단가 카탈로그</Button>
                <Button size="sm" variant="secondary" onClick={addRow}>+ 행 추가</Button>
              </div>
            </div>
            {/* 공종 점프 칩 네비 */}
            {grouped.length > 0 && (
              <div className="flex flex-wrap gap-1.5 mb-3">
                {grouped.map(([k, idxs]) => (
                  <button type="button" key={k} onClick={() => jumpTo(k)}
                    className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs border border-slate-200 bg-slate-50 hover:bg-slate-100 text-slate-600">
                    <span className="w-2 h-2 rounded-full" style={{ backgroundColor: tradeHex(k === '미분류' ? '' : k) }}></span>
                    {k}<span className="text-slate-400">{idxs.length}</span>
                  </button>
                ))}
              </div>
            )}
            {/* 공종별 접기 섹션(accordion) */}
            <div className="space-y-3">
              {grouped.map(([k, idxs]) => {
                const isCol = collapsed.has(k);
                return (
                  <div key={k} ref={(el) => { sectionRefs.current[k] = el; }} className="rounded-xl border border-slate-200 overflow-hidden">
                    <div className="flex items-center justify-between gap-2 px-3 py-2 bg-slate-50">
                      <button type="button" onClick={() => toggleGroup(k)} className="flex items-center gap-2 min-w-0 text-left">
                        <span className="text-slate-400 text-xs w-3 shrink-0">{isCol ? '▶' : '▼'}</span>
                        <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: tradeHex(k === '미분류' ? '' : k) }}></span>
                        <span className="font-semibold text-slate-700 truncate">{k}</span>
                        <span className="text-[11px] text-slate-400 shrink-0">{idxs.length}개</span>
                      </button>
                      <span className="text-sm font-bold text-slate-700 whitespace-nowrap">{fmtWon(groupTotal(idxs))}</span>
                    </div>
                    {!isCol && (
                      <div className="p-2">
                        <div className="overflow-x-auto -mx-1 px-1">
                          <table className="w-full text-sm" style={{ minWidth: '1180px' }}>
                            <thead>
                              <tr className="text-left text-xs text-slate-400">
                                <th className="py-1 pr-2 font-medium w-6">#</th>
                                <th className="py-1 pr-2 font-medium w-32">공종</th>
                                <th className="py-1 pr-2 font-medium">품목명 *</th>
                                <th className="py-1 pr-2 font-medium w-28">규격</th>
                                <th className="py-1 pr-2 font-medium w-12">단위</th>
                                <th className="py-1 pr-2 font-medium w-16 text-right">수량</th>
                                <th className="py-1 pr-2 font-medium w-24 text-right">재료비단가</th>
                                <th className="py-1 pr-2 font-medium w-24 text-right">노무비단가</th>
                                <th className="py-1 pr-2 font-medium w-24 text-right">부자재단가</th>
                                <th className="py-1 pr-2 font-medium w-28 text-right">행합계</th>
                                <th className="py-1 font-medium w-24 text-center">관리</th>
                              </tr>
                            </thead>
                            <tbody>
                              {idxs.map((idx) => renderRow(idx))}
                            </tbody>
                          </table>
                        </div>
                        <button type="button" onClick={() => addRowTo(k)} className="mt-1 text-xs text-blue-600 hover:underline">+ ‘{k}’에 행 추가</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <p className="mt-2 text-[11px] text-slate-400">행합계 = 수량 × (재료비 + 노무비 + 부자재). 행의 공종을 바꾸면 해당 그룹으로 이동합니다. 작성 내용은 자동 임시저장됩니다.</p>
          </div>

          <TradeSubtotals items={est.items} />

          <CostBuildupPanel header={header} setHeader={setHeader} totals={totals} />

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div className="space-y-3">
              <Input label="할인액 (원)" type="number" min="0" value={header.discount} onChange={(e) => setHeader({ ...header, discount: e.target.value })} />
              <Textarea label="비고 / 특이사항" rows="3" value={header.memo} onChange={(e) => setHeader({ ...header, memo: e.target.value })} />
            </div>
            <div className="rounded-xl bg-slate-50 border border-slate-100 p-4 space-y-2 text-sm self-start">
              {header.use_cost_buildup ? (
                <>
                  <KV label="직접공사비(소계)" value={fmtWon(totals.subtotal)} />
                  {totals.buildup && <KV label="순공사원가" value={fmtWon(totals.buildup.primeCost)} />}
                  {totals.buildup && <KV label="공사비합계" value={fmtWon(totals.buildup.constructionTotal)} />}
                  {totals.discount > 0 && <KV label="할인" value={'- ' + fmtWon(totals.discount)} red />}
                  <KV label="제안가" value={totals.buildup ? fmtWon(totals.buildup.proposed) : '-'} />
                  <KV label={`부가세 (${Math.round(Number(header.vat_rate) * 100)}%)`} value={fmtWon(totals.vat)} />
                </>
              ) : (
                <>
                  <KV label="공급가액(소계)" value={fmtWon(totals.subtotal)} />
                  {totals.discount > 0 && <KV label="할인" value={'- ' + fmtWon(totals.discount)} red />}
                  <KV label={`공급가 (${VAT_MODE_LABEL[header.vat_mode]})`} value={fmtWon(totals.supplyAmount)} />
                  <KV label={`부가세 (${Math.round(Number(header.vat_rate) * 100)}%)`} value={fmtWon(totals.vat)} />
                </>
              )}
              <div className="pt-2 border-t border-slate-200 flex items-center justify-between">
                <span className="font-bold text-slate-700">합계 금액</span>
                <span className="text-lg font-extrabold text-blue-600">{fmtWon(totals.total)}</span>
              </div>
            </div>
          </div>
          <div className="flex flex-wrap gap-2 justify-between pt-3 border-t border-slate-100">
            <div>{isSaved && <Button variant="ghost" className="text-red-600 hover:bg-red-50" onClick={onDelete}>삭제</Button>}</div>
            <div className="flex flex-wrap gap-2 justify-end items-center">
              <label className="inline-flex items-center gap-1.5 text-xs text-slate-500 mr-1 cursor-pointer" title="인쇄 시 공종 그룹마다 새 페이지로 나눕니다.">
                <input type="checkbox" checked={pageBreakByTrade} onChange={(e) => setPageBreakByTrade(e.target.checked)} />
                공종별 페이지 분할
              </label>
              <Button variant="secondary" onClick={() => onPrint({ ...toEstimate(), _splitByTrade: pageBreakByTrade })}>🖨 인쇄(PDF)</Button>
              {isSaved && (confirmed
                ? <Button variant="ghost" onClick={onUnconfirm}>초안으로</Button>
                : <Button variant="ghost" className="text-emerald-700 hover:bg-emerald-50" onClick={onConfirm} title="확정 시 현장 예산이 이 견적 합계로 갱신됩니다.">✅ 확정</Button>)}
              <Button onClick={handleSave} disabled={saving}>{saving ? '저장 중...' : (isSaved ? '저장' : '견적 생성')}</Button>
              <Button variant="secondary" onClick={onClose}>닫기</Button>
            </div>
          </div>
          {!isSaved && <p className="text-[11px] text-slate-400 text-right">먼저 ‘견적 생성’으로 저장하면 확정/예산 연동을 사용할 수 있습니다.</p>}

          <CatalogPickerModal isOpen={picker.open} onClose={() => setPicker({ open: false, targetIdx: null })}
            trades={trades} mode={picker.targetIdx == null ? 'append' : 'replace'} onPick={pickCatalog} />
        </div>
      );
    }

    // 견적서 인쇄(A4) 레이아웃 — 셀 스타일
    const _pb = '1px solid #94a3b8';
    const cellTh = { border: _pb, padding: '6px 8px', fontWeight: 600, background: '#f1f5f9' };
    const cellTd = { border: _pb, padding: '6px 8px' };
    const cellTdC = { border: _pb, padding: '6px 8px', textAlign: 'center' };
    const cellTdR = { border: _pb, padding: '6px 8px', textAlign: 'right' };
    const sumTd = { border: _pb, padding: '5px 10px', background: '#f8fafc' };
    const sumTdR = { border: _pb, padding: '5px 10px', textAlign: 'right' };
    function EstimatePrint({ site, estimate, totals }) {
      if (!estimate) return null;
      const items = estimate.items || [];
      const t = totals || computeTotals(estimate);
      const b = t.buildup;
      // 공종별 소계 (총괄)
      const gmap = {};
      items.forEach((it) => { const tr = it.trade || it.process || '미분류'; gmap[tr] = (gmap[tr] || 0) + rowAmount(it); });
      const groupArr = Object.entries(gmap).map(([trade, total]) => ({ trade, total })).sort((a, b2) => b2.total - a.total);
      const directTotal = groupArr.reduce((s, g) => s + g.total, 0);
      // v6-2: 공종별 페이지 분할 인쇄 — 그룹마다 별도 표 + page-break-before
      const splitByTrade = !!estimate._splitByTrade;
      const itemsByTrade = splitByTrade ? groupArr.map((g) => ({ trade: g.trade, rows: items.filter((it) => (it.trade || it.process || '미분류') === g.trade) })) : null;
      return (
