    // ========================================
    // 🧩 견적(계획) 대비 실제 — 공정별 (요약 탭)
    // ========================================
    function PlanVsActual({ summary }) {
      if (!summary || !summary.byProcessPlan || summary.byProcessPlan.length === 0) return null;
      const planMap = {}, actMap = {};
      summary.byProcessPlan.forEach((p) => { planMap[p.process] = p.total; });
      (summary.byProcess || []).forEach((p) => { actMap[p.process] = p.total; });
      const keys = Array.from(new Set([...Object.keys(planMap), ...Object.keys(actMap)]));
      keys.sort((a, b) => ((planMap[b] || 0) + (actMap[b] || 0)) - ((planMap[a] || 0) + (actMap[a] || 0)));
      const maxV = Math.max(1, ...keys.map((k) => Math.max(planMap[k] || 0, actMap[k] || 0)));
      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-base font-bold text-slate-800">견적(계획) 대비 실제 · 공정별</h2>
            {summary.estimateTotal != null && <span className="text-sm font-bold text-slate-700">확정 견적가 {fmtWon(summary.estimateTotal)}</span>}
          </div>
          <div className="space-y-3">
            {keys.map((k) => {
              const plan = planMap[k] || 0, act = actMap[k] || 0, diff = act - plan;
              return (
                <div key={k}>
                  <div className="flex flex-wrap items-center justify-between text-xs mb-1 gap-1">
                    <span className="font-medium text-slate-600 truncate">{k}</span>
                    <span className="shrink-0">
                      <span className="text-slate-400">계획 {fmtWon(plan)}</span>
                      <span className="mx-1 text-slate-300">/</span>
                      <span className="font-semibold text-slate-700">실제 {fmtWon(act)}</span>
                      {plan > 0 && (
                        <span className={`ml-1.5 font-bold ${diff > 0 ? 'text-red-500' : 'text-emerald-600'}`}>
                          {diff > 0 ? '▲' : '▼'}{fmtWon(Math.abs(diff))}
                        </span>
                      )}
                    </span>
                  </div>
                  <div className="relative h-3 bg-slate-100 rounded-full overflow-hidden">
                    <div className="absolute inset-y-0 left-0 bg-indigo-200 rounded-full bar-grow" style={{ width: (plan / maxV) * 100 + '%' }}></div>
                    <div className="absolute inset-y-0 left-0 bg-blue-500/80 rounded-full bar-grow" style={{ width: (act / maxV) * 100 + '%' }}></div>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="mt-3 flex items-center gap-4 text-[11px] text-slate-400">
            <span className="flex items-center gap-1"><span className="w-3 h-2 rounded bg-indigo-200 inline-block"></span>견적(계획)</span>
            <span className="flex items-center gap-1"><span className="w-3 h-2 rounded bg-blue-500/80 inline-block"></span>실제 집행</span>
          </div>
        </Card>
      );
    }

    // ========================================
    // 🧩 일정 — 월간 캘린더
    // ========================================
    function ScheduleCalendar({ tasks, onEditTask, onRangeSelect, onMoveTask }) {
      const [cursor, setCursor] = useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });
      const today = todayStr();
      // v6-3: 드래그로 기간 선택 (mousedown → mousemove(enter) → mouseup)
      const [dragStart, setDragStart] = useState(null);
      const [dragEnd, setDragEnd] = useState(null);
      const dragging = dragStart != null;
      const normRange = (a, b) => (a <= b ? [a, b] : [b, a]);
      const inDragRange = (ds) => { if (!dragging) return false; const [s, e] = normRange(dragStart, dragEnd || dragStart); return s <= ds && ds <= e; };
      useEffect(() => {
        if (!dragging) return;
        const up = () => {
          const [s, e] = normRange(dragStart, dragEnd || dragStart);
          setDragStart(null); setDragEnd(null);
          if (onRangeSelect) onRangeSelect(s, e);
        };
        window.addEventListener('mouseup', up);
        return () => window.removeEventListener('mouseup', up);
      }, [dragging, dragStart, dragEnd, onRangeSelect]);

      // v11-1: 일정 막대 드래그(이동/리사이즈). 막대 mousedown=이동/리사이즈, 빈 셀 mousedown=신규(위 로직). 막대 클릭(이동 없음)=수정.
      const [barDrag, setBarDrag] = useState(null); // { id, mode:'move'|'l'|'r', grabDate, hoverDate, origStart, origEnd, moved }
      const [expanded, setExpanded] = useState({}); // 날짜별 "+N 더보기" 펼침
      const startBarDrag = (t, cellDs, mode, e) => {
        e.preventDefault(); e.stopPropagation();
        setBarDrag({ id: t.id, mode, grabDate: cellDs, hoverDate: cellDs, origStart: t.start_date, origEnd: t.end_date, moved: false });
      };
      const previewOf = (d) => {
        if (!d) return null;
        const { mode, grabDate, hoverDate, origStart, origEnd } = d;
        let s = origStart, e = origEnd;
        if (mode === 'move') { const k = daysBetween(grabDate, hoverDate) || 0; s = addDays(origStart, k); e = addDays(origEnd, k); }
        else if (mode === 'l') { s = hoverDate <= origEnd ? hoverDate : origEnd; e = origEnd; }
        else if (mode === 'r') { e = hoverDate >= origStart ? hoverDate : origStart; s = origStart; }
        return { s, e };
      };
      const dragPv = previewOf(barDrag);
      const viewTasks = (barDrag && dragPv)
        ? (tasks || []).map((t) => (String(t.id) === String(barDrag.id) ? { ...t, start_date: dragPv.s, end_date: dragPv.e } : t))
        : (tasks || []);
      const inPreview = (ds) => dragPv && dragPv.s <= ds && ds <= dragPv.e;
      useEffect(() => {
        if (!barDrag) return;
        const up = (ev) => {
          const d = barDrag; setBarDrag(null);
          const task = (tasks || []).find((t) => String(t.id) === String(d.id));
          if (!task) return;
          if (!d.moved) { if (d.mode === 'move' && onEditTask) onEditTask(task); return; } // 드래그 없이 클릭 = 수정
          const pv = previewOf(d); if (!pv) return;
          if (pv.s === task.start_date && pv.e === task.end_date) return;
          if (onMoveTask) onMoveTask(task, pv.s, pv.e, d.mode === 'move' && ev.shiftKey); // Shift=후속 연쇄(cascade)
        };
        window.addEventListener('mouseup', up);
        return () => window.removeEventListener('mouseup', up);
      }, [barDrag, tasks, onEditTask, onMoveTask]);

      const startWeekday = new Date(cursor.y, cursor.m, 1).getDay();
      const daysInMonth = new Date(cursor.y, cursor.m + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < startWeekday; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(ymd(cursor.y, cursor.m, d));
      while (cells.length % 7 !== 0) cells.push(null);
      const tasksOn = (ds) => viewTasks.filter((t) => t.start_date && t.end_date && t.start_date <= ds && ds <= t.end_date);
      const prev = () => setCursor((c) => (c.m === 0 ? { y: c.y - 1, m: 11 } : { y: c.y, m: c.m - 1 }));
      const next = () => setCursor((c) => (c.m === 11 ? { y: c.y + 1, m: 0 } : { y: c.y, m: c.m + 1 }));
      const goToday = () => { const d = new Date(); setCursor({ y: d.getFullYear(), m: d.getMonth() }); };
      const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
      return (
        <Card className="p-4 sm:p-5">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-base font-bold text-slate-800">{monthLabel(cursor.y, cursor.m)}</h2>
            <div className="flex items-center gap-1">
              <Button variant="ghost" size="sm" onClick={prev} aria-label="이전 달">◀</Button>
              <Button variant="secondary" size="sm" onClick={goToday}>오늘</Button>
              <Button variant="ghost" size="sm" onClick={next} aria-label="다음 달">▶</Button>
            </div>
          </div>
          <div className="grid grid-cols-7 mb-1">
            {weekdays.map((w, i) => (
              <div key={w} className={`text-center text-xs font-semibold py-1 ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : 'text-slate-400'}`}>{w}</div>
            ))}
          </div>
          <p className="text-[11px] text-slate-400 mb-1">🖱️ 빈 날짜를 드래그=새 일정 생성. 일정 막대를 드래그=이동(Shift=후속도 함께), 막대 양 끝을 끌면 기간 조절. 막대 클릭=수정.</p>
          <div className="grid grid-cols-7 gap-px bg-slate-100 rounded-xl overflow-hidden border border-slate-100 select-none">
            {cells.map((ds, i) => {
              if (!ds) return <div key={i} className="bg-slate-50 min-h-[78px] sm:min-h-[92px]"></div>;
              const wd = i % 7;
              const isToday = ds === today;
              const isWeekend = wd === 0 || wd === 6;
              const dayTasks = tasksOn(ds);
              const sel = inDragRange(ds);
              const pvHi = barDrag && inPreview(ds);
              const limit = expanded[ds] ? dayTasks.length : 3;
              return (
                <div key={i}
                  onMouseDown={(e) => { e.preventDefault(); setDragStart(ds); setDragEnd(ds); }}
                  onMouseEnter={() => {
                    if (barDrag) setBarDrag((d) => (d ? { ...d, hoverDate: ds, moved: d.moved || ds !== d.grabDate } : d));
                    else if (dragging) setDragEnd(ds);
                  }}
                  className={`min-h-[78px] sm:min-h-[92px] p-1 align-top cursor-pointer transition-colors
                    ${sel ? 'bg-blue-100 ring-1 ring-inset ring-blue-300' : pvHi ? 'bg-blue-50 ring-2 ring-inset ring-blue-400' : isToday ? 'bg-blue-50/40' : isWeekend ? 'bg-slate-50/70' : 'bg-white hover:bg-slate-50'}`}>
                  <div className="flex justify-end">
                    <span className={`inline-flex items-center justify-center w-5 h-5 text-[11px] rounded-full
                      ${isToday ? 'bg-blue-600 text-white font-bold' : wd === 0 ? 'text-red-500' : wd === 6 ? 'text-blue-500' : 'text-slate-500'}`}>
                      {Number(ds.slice(8, 10))}
                    </span>
                  </div>
                  <div className="mt-0.5 space-y-0.5">
                    {dayTasks.slice(0, limit).map((t) => {
                      const isStart = t.start_date === ds, isEnd = t.end_date === ds;
                      const showLabel = isStart || wd === 0;
                      const bg = schedBarColor(t); // v19 유형색(지원/미팅) 또는 기존 공정/커스텀색
                      const isDragId = barDrag && String(barDrag.id) === String(t.id);
                      return (
                        <div key={t.id} className="relative group" onMouseDown={(e) => e.stopPropagation()}>
                          {isStart && (
                            <div onMouseDown={(e) => startBarDrag(t, ds, 'l', e)} title="시작일 조절"
                              className="absolute left-0 top-0 bottom-0 w-1.5 z-10 cursor-ew-resize rounded-l-md bg-black/25 opacity-0 group-hover:opacity-100"></div>
                          )}
                          <button type="button" onMouseDown={(e) => startBarDrag(t, ds, 'move', e)} title={`${t.title} (${t.start_date}~${t.end_date})${t.vendor ? ' · 🏢 ' + t.vendor : ''} · 드래그 이동/클릭 수정`} style={{ backgroundColor: bg }}
                            className={`block w-full text-left text-[10px] leading-tight text-white px-1 py-0.5 truncate cursor-grab active:cursor-grabbing transition hover:brightness-110 hover:-translate-y-px
                              ${isStart ? 'rounded-l-md' : ''} ${isEnd ? 'rounded-r-md' : ''} ${isDragId ? 'ring-2 ring-blue-400 shadow-lg relative z-20' : ''}`}>
                          {showLabel ? kindPrefix(t) + t.title : ' '}
                          </button>
                          {isEnd && (
                            <div onMouseDown={(e) => startBarDrag(t, ds, 'r', e)} title="종료일 조절"
                              className="absolute right-0 top-0 bottom-0 w-1.5 z-10 cursor-ew-resize rounded-r-md bg-black/25 opacity-0 group-hover:opacity-100"></div>
                          )}
                        </div>
                      );
                    })}
                    {dayTasks.length > 3 && (
                      <button type="button" onMouseDown={(e) => e.stopPropagation()} onClick={() => setExpanded((m) => ({ ...m, [ds]: !m[ds] }))}
                        className="block text-[10px] text-slate-400 hover:text-blue-600 px-1">
                        {expanded[ds] ? '접기' : `+${dayTasks.length - 3} 더보기`}
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      );
    }

    // 🧩 일정 — 노션식 타임라인(간트) 뷰 (v11-2)
    //  · 좌측 고정 패널 = 공종(process) 그룹 + 일정명, 우측 = 가로 날짜축 + start~end 막대(가로 스크롤)
    //  · 오늘 세로선 · 선후관계 연결선(점선+화살표) · 막대 드래그 이동(Shift=후속도)·리사이즈·클릭=수정
    function ScheduleTimeline({ tasks, site, onEditTask, onMoveTask, onLink, onUnlink }) {
      const ROW_H = 34, GROUP_H = 30, LEFT_W = 176, HEAD_H = 46, BAR_H = 22;
      // ── 훅은 early-return 보다 먼저 (Rules of Hooks) ──
      // v16-1: 타임라인 스케일(월/2주/주) → 하루 픽셀폭(dayW)
      const [scale, setScale] = useState('month'); // 'month' | 'twoweek' | 'week'
      const DAY_W = scale === 'week' ? 90 : scale === 'twoweek' ? 46 : 26;
      const scrollRef = useRef(null);
      const bodyRef = useRef(null);        // v16-2 연결 드래그 좌표 기준(본문 div)
      const initScrolled = useRef(false);
      const desiredScroll = useRef(0);
      const anchorDaysRef = useRef(null);  // v16-1 스케일 전환 시 좌측 기준일(일수) 보존
      const [tlDrag, setTlDrag] = useState(null); // { id, mode:'move'|'l'|'r', startX, origStart, origEnd, dd, moved }
      const [connect, setConnect] = useState(null); // v16-2 { fromId, x1, y1, curX, curY, overId }
      const byId = useMemo(() => { const m = {}; (tasks || []).forEach((t) => { m[String(t.id)] = t; }); return m; }, [tasks]);
      const tlPrev = (d) => {
        if (!d) return null;
        let s = d.origStart, e = d.origEnd;
        if (d.mode === 'move') { s = addDays(d.origStart, d.dd); e = addDays(d.origEnd, d.dd); }
        else if (d.mode === 'l') { s = addDays(d.origStart, d.dd); if (s > d.origEnd) s = d.origEnd; }
        else if (d.mode === 'r') { e = addDays(d.origEnd, d.dd); if (e < d.origStart) e = d.origStart; }
        return { s, e };
      };
      useEffect(() => {
        if (!tlDrag) return;
        const mv = (ev) => {
          const dd = Math.round((ev.clientX - tlDrag.startX) / DAY_W);
          if (dd !== tlDrag.dd) setTlDrag((d) => (d ? { ...d, dd, moved: d.moved || dd !== 0 } : d));
        };
        const up = (ev) => {
          const d = tlDrag; setTlDrag(null);
          const task = byId[String(d.id)]; if (!task) return;
          if (!d.moved) { if (onEditTask) onEditTask(task); return; } // 클릭 = 수정
          const pv = tlPrev(d); if (!pv || (pv.s === task.start_date && pv.e === task.end_date)) return;
          // v16-2: 타임라인 이동은 기본 cascade(연결 후행 함께 이동), 리사이즈(l/r)는 해당 태스크만
          if (onMoveTask) onMoveTask(task, pv.s, pv.e, d.mode === 'move');
        };
        window.addEventListener('mousemove', mv); window.addEventListener('mouseup', up);
        return () => { window.removeEventListener('mousemove', mv); window.removeEventListener('mouseup', up); };
      }, [tlDrag, byId, onEditTask, onMoveTask, DAY_W]);
      useEffect(() => { // v16-2 의존성 연결 드래그(우측 종료점 → 다른 막대)
        if (!connect) return;
        const hitId = (ev) => {
          const el = document.elementFromPoint(ev.clientX, ev.clientY);
          const barEl = el && el.closest ? el.closest('[data-taskid]') : null;
          return barEl ? barEl.getAttribute('data-taskid') : null;
        };
        const mv = (ev) => {
          const rect = bodyRef.current && bodyRef.current.getBoundingClientRect();
          if (!rect) return;
          const overId = hitId(ev);
          setConnect((c) => (c ? { ...c, curX: ev.clientX - rect.left, curY: ev.clientY - rect.top, overId } : c));
        };
        const up = (ev) => {
          const c = connect; setConnect(null);
          const toId = hitId(ev);
          if (toId && String(toId) !== String(c.fromId) && onLink) onLink(c.fromId, toId); // fromId=선행, toId=후행
        };
        window.addEventListener('mousemove', mv); window.addEventListener('mouseup', up);
        return () => { window.removeEventListener('mousemove', mv); window.removeEventListener('mouseup', up); };
      }, [connect, onLink]);
      useEffect(() => { // 최초 마운트 시 오늘 근처로 스크롤
        if (!initScrolled.current && scrollRef.current) { scrollRef.current.scrollLeft = desiredScroll.current; anchorDaysRef.current = desiredScroll.current / DAY_W; initScrolled.current = true; }
      }, []);
      useLayoutEffect(() => { // v16-1 스케일 전환 시 좌측 기준일 유지(스크롤 재계산)
        if (initScrolled.current && scrollRef.current && anchorDaysRef.current != null) {
          scrollRef.current.scrollLeft = Math.max(0, anchorDaysRef.current * DAY_W);
        }
      }, [scale]);

      const placed = (tasks || []).filter((t) => t.start_date && t.end_date);
      const today = todayStr();
      let rs = site && site.start_date ? site.start_date : null;
      let re = site && site.end_date ? site.end_date : null;
      const allDs = placed.flatMap((t) => [t.start_date, t.end_date]);
      if (allDs.length) {
        const mn = allDs.reduce((a, b) => (a < b ? a : b)), mx = allDs.reduce((a, b) => (a > b ? a : b));
        rs = rs && rs < mn ? rs : mn; re = re && re > mx ? re : mx;
      }
      if (placed.length === 0 || !rs || !re) {
        return (
          <Card className="p-5">
            <div className="text-center py-12">
              <div className="text-4xl mb-2">📊</div>
              <p className="text-sm text-slate-400">타임라인에 표시할 일정이 없습니다.<br />‘+ 일정 추가’ 또는 캘린더에서 일정을 등록하면 가로 막대로 표시됩니다.</p>
            </div>
          </Card>
        );
      }

      // ── 표시 구간 (앞 2일·뒤 5일 여백) ──
      const rangeStart = addDays(rs, -2), rangeEnd = addDays(re, 5);
      const totalDays = Math.max(1, daysBetween(rangeStart, rangeEnd) + 1);
      const days = []; for (let i = 0; i < totalDays; i++) days.push(addDays(rangeStart, i));
      const xOf = (d) => daysBetween(rangeStart, d) * DAY_W;
      const todayX = (today >= rangeStart && today <= rangeEnd) ? xOf(today) : null;
      desiredScroll.current = Math.max(0, (todayX != null ? todayX : 0) - 120);

      // ── 공종(process)별 그룹핑 → 행(rows) 배치 ──
      const byProc = {}; placed.forEach((t) => { const k = t.process || '미지정'; (byProc[k] = byProc[k] || []).push(t); });
      const order = [...PROCESS_CATEGORIES, '미지정'];
      const gkeys = Object.keys(byProc).sort((a, b) => { const ia = order.indexOf(a), ib = order.indexOf(b); return (ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib); });
      const rows = []; let y = 0;
      gkeys.forEach((k) => {
        rows.push({ type: 'group', process: k, y, h: GROUP_H, count: byProc[k].length }); y += GROUP_H;
        byProc[k].slice().sort((a, b) => (a.start_date < b.start_date ? -1 : a.start_date > b.start_date ? 1 : 0)).forEach((t) => {
          rows.push({ type: 'task', task: t, y, h: ROW_H }); y += ROW_H;
        });
      });
      const bodyH = y;
      const rowOf = {}; rows.forEach((r) => { if (r.type === 'task') rowOf[String(r.task.id)] = r; });

      // ── 상단 월 밴드(연속 같은 월 묶기) ──
      const months = []; days.forEach((d) => {
        const ym = d.slice(0, 7); const last = months[months.length - 1];
        if (last && last.ym === ym) last.span += 1; else months.push({ ym, span: 1 });
      });
      // ── v16-1: 날짜 셀 + 주(week) 밴드(일요일 wd 0 에서 새 주 시작) ──
      const WD = '일월화수목금토';
      const dayCells = days.map((ds, i) => {
        const wd = new Date(ds + 'T00:00:00').getDay();
        return { ds, i, wd, isToday: ds === today, dayNum: Number(ds.slice(8, 10)), mLabel: Number(ds.slice(5, 7)) + '/' + Number(ds.slice(8, 10)), wdName: WD[wd] };
      });
      const weeks = [];
      dayCells.forEach((c) => { const last = weeks[weeks.length - 1]; if (!last || c.wd === 0) weeks.push({ startIdx: c.i, span: 1, label: c.mLabel }); else last.span += 1; });

      // ── 선후관계 연결선(predecessor 끝 → successor 시작) ──
      const links = [];
      placed.forEach((t) => (t.successors || []).forEach((sid) => {
        const pr = rowOf[String(t.id)], sr = rowOf[String(sid)], su = byId[String(sid)];
        if (pr && sr && su && su.start_date) {
          const x1 = xOf(t.end_date) + DAY_W, y1 = pr.y + ROW_H / 2, x2 = xOf(su.start_date), y2 = sr.y + ROW_H / 2, mx = (x1 + x2) / 2;
          links.push({ key: t.id + '-' + sid, predId: t.id, succId: sid, x1, y1, x2, y2, d: `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}` });
        }
      }));

      const startTl = (t, mode, e) => { e.preventDefault(); e.stopPropagation(); setTlDrag({ id: t.id, mode, startX: e.clientX, origStart: t.start_date, origEnd: t.end_date, dd: 0, moved: false }); };
      // v16-2: 우측 종료점 mousedown → 연결 드래그 시작(이 태스크=선행)
      const startConnect = (t, e) => {
        e.preventDefault(); e.stopPropagation();
        const rr = rowOf[String(t.id)]; const x1 = xOf(t.end_date) + DAY_W, y1 = (rr ? rr.y : 0) + ROW_H / 2;
        setConnect({ fromId: t.id, x1, y1, curX: x1, curY: y1, overId: null });
      };
      const scrollToToday = () => { if (scrollRef.current) { const s = Math.max(0, (todayX != null ? todayX : 0) - 120); scrollRef.current.scrollLeft = s; anchorDaysRef.current = s / DAY_W; } };
      const onTlScroll = (e) => { anchorDaysRef.current = e.currentTarget.scrollLeft / DAY_W; };
      const scaleBtn = (on) => `px-2.5 py-1 text-xs font-semibold rounded-md transition ${on ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`;

      return (
        <Card className="p-0 overflow-hidden">
          <div className="flex flex-wrap items-center justify-between gap-2 p-4 pb-2">
            <div>
              <h2 className="text-base font-bold text-slate-800">공정 타임라인</h2>
              <p className="text-[11px] text-slate-400">📊 막대 몸통 드래그=이동(연결된 후속 함께 이동), 양 끝=기간 조절, 클릭=수정. 막대 끝 <b className="text-indigo-500">연결점</b>을 다른 막대로 끌면 선후 연결(🔗), 커넥터 클릭=해제.</p>
            </div>
            <div className="flex items-center gap-2">
              {/* v16-1: 스케일 토글(월/2주/주) */}
              <div className="inline-flex items-center gap-0.5 bg-slate-100 p-0.5 rounded-lg">
                {[['month', '월'], ['twoweek', '2주'], ['week', '주']].map(([v, l]) => (
                  <button key={v} type="button" onClick={() => setScale(v)} className={scaleBtn(scale === v)}>{l}</button>
                ))}
              </div>
              <Button variant="secondary" size="sm" onClick={scrollToToday}>오늘로</Button>
            </div>
          </div>
          <div className="flex border-t border-slate-100">
            {/* 좌측 고정 패널: 공종 그룹 + 일정명 */}
            <div className="shrink-0 border-r border-slate-200 bg-white" style={{ width: LEFT_W }}>
              <div style={{ height: HEAD_H }} className="flex items-end px-3 pb-1.5 text-[11px] font-semibold text-slate-400 border-b border-slate-100">작업 / 공종</div>
              {rows.map((r, i) => r.type === 'group' ? (
                <div key={'g' + i} style={{ height: r.h }} className="flex items-center gap-1.5 px-3 bg-slate-50 border-b border-slate-100">
                  <span className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: procHex(r.process) }}></span>
                  <span className="text-xs font-bold text-slate-600 truncate">{r.process}</span>
                  <span className="text-[10px] text-slate-400">{r.count}</span>
                </div>
              ) : (
                <div key={'t' + i} style={{ height: r.h }} className="flex items-center gap-1.5 px-3 border-b border-slate-50">
                  <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{ backgroundColor: schedBarColor(r.task) }}></span>
                  <button onClick={() => onEditTask && onEditTask(r.task)} className="text-xs text-slate-700 truncate text-left hover:text-blue-600" title={r.task.title}>{kindPrefix(r.task)}{r.task.title}</button>
                </div>
              ))}
            </div>
            {/* 우측 가로 스크롤 타임라인 */}
            <div className="overflow-x-auto flex-1" ref={scrollRef} onScroll={onTlScroll}>
              <div style={{ width: totalDays * DAY_W, position: 'relative' }}>
                {/* v16-1 헤더: 스케일별 2단 눈금(월→월/주, 2주→주/일, 주→일/요일) */}
                <div style={{ height: HEAD_H }} className="border-b border-slate-100">
                  {/* 상단 눈금 */}
                  <div className="flex" style={{ height: 22 }}>
                    {scale === 'week'
                      ? dayCells.map((c) => (
                        <div key={'h1' + c.i} style={{ width: DAY_W }} className={`text-[10px] text-center pt-0.5 border-r border-slate-100 whitespace-nowrap overflow-hidden ${c.isToday ? 'bg-red-50 text-red-600 font-bold' : c.wd === 0 ? 'text-red-400 bg-slate-50/60' : c.wd === 6 ? 'text-blue-400 bg-slate-50/60' : 'text-slate-500'}`}>{c.mLabel}</div>
                      ))
                      : scale === 'twoweek'
                        ? weeks.map((w, i) => (
                          <div key={'h1' + i} style={{ width: w.span * DAY_W }} className="text-[11px] font-semibold text-slate-500 px-1.5 flex items-center border-r border-slate-100 bg-slate-50/60 whitespace-nowrap overflow-hidden">{w.label} 주</div>
                        ))
                        : months.map((mo, i) => (
                          <div key={'h1' + i} style={{ width: mo.span * DAY_W }} className="text-[11px] font-semibold text-slate-500 px-1.5 flex items-center border-r border-slate-100 bg-slate-50/60 whitespace-nowrap overflow-hidden">
                            {Number(mo.ym.slice(5, 7))}월 <span className="text-slate-300 ml-1">'{mo.ym.slice(2, 4)}</span>
                          </div>
                        ))}
                  </div>
                  {/* 하단 눈금 */}
                  <div className="flex" style={{ height: 24 }}>
                    {scale === 'month'
                      ? weeks.map((w, i) => (
                        <div key={'h2' + i} style={{ width: w.span * DAY_W }} className="text-[10px] text-slate-400 px-1 flex items-center border-r border-slate-50 whitespace-nowrap overflow-hidden">{w.label}</div>
                      ))
                      : dayCells.map((c) => (
                        <div key={'h2' + c.i} style={{ width: DAY_W }} className={`text-[10px] text-center pt-0.5 border-r border-slate-50 ${c.isToday ? 'bg-red-50 text-red-600 font-bold' : c.wd === 0 ? 'text-red-400 bg-slate-50/60' : c.wd === 6 ? 'text-blue-400 bg-slate-50/60' : 'text-slate-400'}`}>{scale === 'week' ? c.wdName : c.dayNum}</div>
                      ))}
                  </div>
                </div>
                {/* 본문: 막대 영역 */}
                <div ref={bodyRef} style={{ height: bodyH, position: 'relative' }}>
                  {/* 주말 세로 톤 */}
                  {days.map((d, i) => {
                    const wd = new Date(d + 'T00:00:00').getDay();
                    if (wd !== 0 && wd !== 6) return null;
                    return <div key={'w' + i} style={{ left: i * DAY_W, width: DAY_W }} className="absolute top-0 bottom-0 bg-slate-50/70"></div>;
                  })}
                  {/* 행 배경(그룹 음영 + 구분선) */}
                  {rows.map((r, i) => (
                    <div key={'r' + i} style={{ top: r.y, height: r.h }} className={`absolute left-0 right-0 border-b ${r.type === 'group' ? 'bg-slate-50/80 border-slate-100' : 'border-slate-50'}`}></div>
                  ))}
                  {/* 오늘 세로선 */}
                  {todayX != null && <div style={{ left: todayX }} className="absolute top-0 bottom-0 w-0.5 bg-red-400 z-20"></div>}
                  {/* 선후관계 연결선(점 + 곡선 + 화살표, 커넥터 클릭=해제) */}
                  {links.length > 0 && (
                    <svg width={totalDays * DAY_W} height={bodyH} className="absolute top-0 left-0 z-10" style={{ pointerEvents: 'none' }}>
                      <defs>
                        <marker id="tl-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
                          <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8" />
                        </marker>
                      </defs>
                      {links.map((l) => (
                        <g key={l.key}>
                          <path d={l.d} fill="none" stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="3 2" markerEnd="url(#tl-arrow)" />
                          <circle cx={l.x1} cy={l.y1} r="2.5" fill="#94a3b8" />
                          <circle cx={l.x2} cy={l.y2} r="2.5" fill="#94a3b8" />
                          <path d={l.d} fill="none" stroke="transparent" strokeWidth="12" style={{ pointerEvents: 'stroke', cursor: 'pointer' }} onClick={() => onUnlink && onUnlink(l.predId, l.succId)}>
                            <title>클릭하여 선후 연결 해제</title>
                          </path>
                        </g>
                      ))}
                    </svg>
                  )}
                  {/* 일정 막대 */}
                  {rows.filter((r) => r.type === 'task').map((r) => {
                    const t = r.task;
                    const drag = tlDrag && String(tlDrag.id) === String(t.id) ? tlPrev(tlDrag) : null;
                    const bs = drag ? drag.s : t.start_date, be = drag ? drag.e : t.end_date;
                    const left = xOf(bs), width = Math.max(DAY_W - 2, (daysBetween(bs, be) + 1) * DAY_W - 2);
                    const bg = schedBarColor(t); // v19 유형색(지원/미팅) 또는 기존 공정/커스텀색
                    const hasPred = (t.predecessors || []).length > 0;
                    const isOver = connect && String(connect.overId) === String(t.id) && String(connect.fromId) !== String(t.id);
                    const isSource = connect && String(connect.fromId) === String(t.id);
                    return (
                      <div key={t.id} data-taskid={t.id} style={{ left, top: r.y + (ROW_H - BAR_H) / 2, width, height: BAR_H, backgroundColor: bg }}
                        title={`${t.title} (${bs}~${be})${t.status ? ' · ' + t.status : ''}`}
                        className={`absolute rounded-md text-white text-[10px] leading-none flex items-center px-1.5 shadow-sm cursor-grab active:cursor-grabbing transition hover:brightness-110 group z-10 ${drag ? 'ring-2 ring-blue-400 shadow-lg z-30' : ''} ${isOver ? 'ring-2 ring-indigo-500 z-30' : ''} ${isSource ? 'ring-2 ring-indigo-300' : ''}`}
                        onMouseDown={(e) => startTl(t, 'move', e)}>
                        <div onMouseDown={(e) => startTl(t, 'l', e)} className="absolute left-0 top-0 bottom-0 w-1.5 cursor-ew-resize rounded-l-md bg-black/25 opacity-0 group-hover:opacity-100"></div>
                        {hasPred && <span className="mr-0.5 shrink-0" title="선행 일정 있음">🔗</span>}
                        {KIND_ICON[schedKind(t)] && <span className="mr-0.5 shrink-0" title={schedKind(t)}>{KIND_ICON[schedKind(t)]}</span>}
                        <span className="truncate">{t.title}</span>
                        <div onMouseDown={(e) => startTl(t, 'r', e)} className="absolute right-0 top-0 bottom-0 w-1.5 cursor-ew-resize rounded-r-md bg-black/25 opacity-0 group-hover:opacity-100"></div>
                        {/* v16-2 좌측 연결점(시작=연결 대상) */}
                        <div style={{ right: '100%', marginRight: 4, top: '50%', transform: 'translateY(-50%)', borderColor: bg }}
                          className={`absolute w-3 h-3 rounded-full bg-white border-2 z-40 transition-opacity ${isOver ? 'opacity-100 ring-2 ring-indigo-400' : 'opacity-0 group-hover:opacity-100'}`}
                          title="연결 대상(시작점)"></div>
                        {/* v16-2 우측 연결점(종료) — 드래그하여 후행 연결 */}
                        <div onMouseDown={(e) => startConnect(t, e)} title="드래그하여 후행 일정으로 연결"
                          style={{ left: '100%', marginLeft: 4, top: '50%', transform: 'translateY(-50%)', borderColor: bg }}
                          className="absolute w-3 h-3 rounded-full bg-white border-2 z-40 cursor-crosshair opacity-0 group-hover:opacity-100 hover:ring-2 hover:ring-indigo-300 transition-opacity"></div>
                      </div>
                    );
                  })}
                  {/* v16-2 연결 드래그 고스트(점선 + 화살표) */}
                  {connect && (
                    <svg width={totalDays * DAY_W} height={bodyH} className="absolute top-0 left-0 z-40" style={{ pointerEvents: 'none' }}>
                      <defs>
                        <marker id="tl-arrow-live" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto">
                          <path d="M0,0 L6,3 L0,6 Z" fill="#6366f1" />
                        </marker>
                      </defs>
                      <circle cx={connect.x1} cy={connect.y1} r="3" fill="#6366f1" />
                      <path d={`M ${connect.x1} ${connect.y1} L ${connect.curX} ${connect.curY}`} fill="none" stroke="#6366f1" strokeWidth="2" strokeDasharray="5 3" markerEnd="url(#tl-arrow-live)" />
                    </svg>
                  )}
                </div>
              </div>
            </div>
          </div>
        </Card>
      );
    }

    // 🧩 일정 — 태스크 목록(타임라인)
    function ScheduleList({ tasks, onEdit, onAskDelete, taskMap = {}, onAddDep, onRemoveDep }) {
      const sorted = useMemo(() => [...(tasks || [])].sort((a, b) => (a.start_date < b.start_date ? -1 : a.start_date > b.start_date ? 1 : 0)), [tasks]);
      const titleOf = (id) => (taskMap[String(id)] ? taskMap[String(id)].title : '(삭제됨)');
      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-base font-bold text-slate-800">공정 일정 목록</h2>
            <span className="text-xs text-slate-400">{sorted.length}건</span>
          </div>
          {sorted.length === 0 ? (
            <div className="text-center py-10">
              <div className="text-4xl mb-2">📅</div>
              <p className="text-sm text-slate-400">등록된 일정이 없습니다.<br />위 ‘일정 추가’로 공정 태스크를 등록하세요.</p>
            </div>
          ) : (
            <ul className="divide-y divide-slate-100">
              {sorted.map((t) => {
                const plan = Number(t.planned_cost) || 0, act = Number(t.actual_cost) || 0, diff = act - plan;
                return (
                  <li key={t.id} className="py-3">
                    <div className="flex items-start justify-between gap-2">
                      <div className="min-w-0">
                        <div className="flex flex-wrap items-center gap-1.5">
                          <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: schedBarColor(t) }}></span>
                          <span className="font-semibold text-slate-800 truncate">{t.title}</span>
                          {schedKind(t) !== '공사' && <Badge color={KIND_LABEL_COLOR[schedKind(t)]}>{KIND_ICON[schedKind(t)]} {schedKind(t)}</Badge>}
                          {t.process && <Badge color={PROC_COLOR[t.process] || 'bg-slate-400'}>{t.process}</Badge>}
                          <Badge color={TASK_STATUS_COLOR[t.status] || 'bg-slate-400'}>{t.status}</Badge>
                        </div>
                        <p className="mt-1 text-xs text-slate-400">{t.start_date} ~ {t.end_date}{t.staff && ` · 담당 ${t.staff}`}{t.vendor && ` · 🏢 ${t.vendor}`}</p>
                        <p className="mt-1 text-xs">
                          <span className="text-slate-400">계획 {fmtWon(plan)}</span>
                          <span className="mx-1 text-slate-300">/</span>
                          <span className="font-semibold text-slate-600">실제 {fmtWon(act)}</span>
                          {plan > 0 && act > 0 && (
                            <span className={`ml-1.5 font-bold ${diff > 0 ? 'text-red-500' : 'text-emerald-600'}`}>
                              {diff > 0 ? `초과 ${fmtWon(diff)}` : diff < 0 ? `절감 ${fmtWon(-diff)}` : '동일'}
                            </span>
                          )}
                        </p>
                        {t.memo && <p className="mt-0.5 text-xs text-slate-500 truncate">{t.memo}</p>}
                        {/* v6-4: 선후관계(선행·후행) */}
                        {(onAddDep || (t.predecessors && t.predecessors.length) || (t.successors && t.successors.length)) && (
                          <div className="mt-1.5 flex flex-wrap items-center gap-1.5">
                            <span className="text-[11px] text-slate-400">선행</span>
                            {(t.predecessors || []).length === 0 && <span className="text-[11px] text-slate-300">없음</span>}
                            {(t.predecessors || []).map((pid) => (
                              <span key={'p' + pid} className="inline-flex items-center gap-1 text-[11px] px-1.5 py-0.5 rounded-full bg-indigo-50 text-indigo-700 border border-indigo-100">
                                {titleOf(pid)}
                                {onRemoveDep && <button onClick={() => onRemoveDep(t.id, pid)} className="text-indigo-300 hover:text-red-500" aria-label="선행 해제" title="선행 연결 해제">✕</button>}
                              </span>
                            ))}
                            {onAddDep && <button onClick={() => onAddDep(t)} className="text-[11px] px-1.5 py-0.5 rounded-full border border-dashed border-slate-300 text-slate-500 hover:bg-slate-50">+ 선행</button>}
                            {(t.successors || []).length > 0 && (
                              <>
                                <span className="text-[11px] text-slate-400 ml-1">→ 후행</span>
                                {(t.successors || []).map((sid) => (
                                  <span key={'s' + sid} className="text-[11px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-600">{titleOf(sid)}</span>
                                ))}
                              </>
                            )}
                          </div>
                        )}
                      </div>
                      <div className="flex gap-1 shrink-0">
                        <button onClick={() => onEdit(t)} aria-label="수정" className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50">✏️</button>
                        <button onClick={() => onAskDelete(t)} aria-label="삭제" className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50">🗑️</button>
                      </div>
                    </div>
                  </li>
                );
              })}
            </ul>
          )}
        </Card>
      );
    }

    // 🧩 일정 등록/수정 폼 (모달)
    function ScheduleForm({ editing, prefill, hasSuccessors, onSubmit, onCancel, procNames, staffNames, vendorNames = [] }) {
      // v6-3: 캘린더 드래그로 받은 prefill(start/end)을 신규 폼 기본값으로
      const blank = { title: '', process: '', kind: '공사', start_date: (prefill && prefill.start) || todayStr(), end_date: (prefill && prefill.end) || todayStr(), status: '예정', planned_cost: '', staff: '', vendor: '', color: '', memo: '' };
      const [form, setForm] = useState(editing ? {
        title: editing.title || '', process: editing.process || '', kind: schedKind(editing),
        start_date: editing.start_date || todayStr(), end_date: editing.end_date || todayStr(),
        status: editing.status || '예정', planned_cost: editing.planned_cost != null ? String(editing.planned_cost) : '',
        staff: editing.staff || '', vendor: editing.vendor || '', color: editing.color || '', memo: editing.memo || '',
      } : blank);
      const [cascade, setCascade] = useState(false); // v6-4 연결된 후속 일정 함께 이동
      const dateChanged = !!editing && (form.start_date !== (editing.start_date || '') || form.end_date !== (editing.end_date || ''));
      const [errors, setErrors] = useState({});
      const [submitting, setSubmitting] = useState(false);
      const validate = () => {
        const e = {};
        if (!form.title.trim()) e.title = '작업명을 입력하세요.';
        if (!form.start_date) e.start_date = '시작일을 선택하세요.';
        if (!form.end_date) e.end_date = '종료일을 선택하세요.';
        if (form.start_date && form.end_date && form.start_date > form.end_date) e.end_date = '종료일은 시작일 이후여야 합니다.';
        setErrors(e); return Object.keys(e).length === 0;
      };
      const handleSubmit = async (ev) => {
        ev.preventDefault();
        if (!validate()) return;
        setSubmitting(true);
        await onSubmit({
          title: form.title.trim(), process: form.process.trim(), start_date: form.start_date, end_date: form.end_date,
          status: form.status, planned_cost: Math.round(Number(form.planned_cost) || 0), staff: form.staff.trim(),
          vendor: form.vendor.trim(), color: form.color, memo: form.memo.trim(), kind: form.kind,
          ...(editing && hasSuccessors && cascade && dateChanged ? { cascade: true } : {}),
        });
        setSubmitting(false);
      };
      return (
        <form onSubmit={handleSubmit} className="space-y-4">
          <Input label="작업명 *" placeholder="예: 주방 목공" value={form.title} error={errors.title}
            onChange={(e) => setForm({ ...form, title: e.target.value })} />
          {/* v19: 일정 유형(공사/지원/미팅) */}
          <div>
            <span className="block mb-1.5 text-sm font-medium text-slate-700">유형</span>
            <div className="inline-flex items-center gap-1 bg-slate-100 p-1 rounded-xl">
              {SCHEDULE_KINDS.map((k) => (
                <button type="button" key={k} onClick={() => setForm({ ...form, kind: k })}
                  className={`px-3 py-1.5 text-sm font-semibold rounded-lg transition ${form.kind === k ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                  {KIND_ICON[k] ? KIND_ICON[k] + ' ' : ''}{k}
                </button>
              ))}
            </div>
            {form.kind === '미팅' && <p className="mt-1.5 text-[11px] text-violet-600">📅 ‘미팅’ 유형은 미팅·AS 탭에도 자동 표시됩니다. (미팅 내용은 이 일정에서 수정)</p>}
            {form.kind === '지원' && <p className="mt-1.5 text-[11px] text-teal-600">🤝 ‘지원’ 유형은 공정 외 지원 업무입니다. [지원] 필터로 모아볼 수 있습니다.</p>}
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Combo label="공정" placeholder="선택 또는 직접 입력" value={form.process} options={procNames.length ? procNames : PROCESS_CATEGORIES}
              onChange={(e) => setForm({ ...form, process: e.target.value })} />
            <Select label="상태" value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })}>
              {TASK_STATUSES.map((s) => <option key={s} value={s}>{s}</option>)}
            </Select>
            <Input label="시작일 *" type="date" value={form.start_date} error={errors.start_date}
              onChange={(e) => setForm({ ...form, start_date: e.target.value })} />
            <Input label="종료일 *" type="date" value={form.end_date} error={errors.end_date}
              onChange={(e) => setForm({ ...form, end_date: e.target.value })} />
            <Combo label="담당자" placeholder="예: 박현장" value={form.staff} options={staffNames}
              onChange={(e) => setForm({ ...form, staff: e.target.value })} />
            <Combo label="협력업체" placeholder="거래처 검색/직접 입력" value={form.vendor} options={vendorNames}
              onChange={(e) => setForm({ ...form, vendor: e.target.value })} />
            <Input label="계획비용 (원)" type="number" inputMode="numeric" min="0" placeholder="예: 5000000"
              value={form.planned_cost} onChange={(e) => setForm({ ...form, planned_cost: e.target.value })} />
          </div>
          <div>
            <span className="block mb-1.5 text-sm font-medium text-slate-700">표시 색상</span>
            <div className="flex items-center gap-2 flex-wrap">
              {COLOR_SWATCHES.map((c) => (
                <button type="button" key={c || 'auto'} onClick={() => setForm({ ...form, color: c })} aria-label={c || '공정 자동색'}
                  className={`w-7 h-7 rounded-full border-2 flex items-center justify-center text-[9px] text-slate-600 ${form.color === c ? 'border-slate-800' : 'border-slate-200'}`}
                  style={{ backgroundColor: c || (form.process ? procHex(form.process) : '#e2e8f0') }}>
                  {c ? '' : '자동'}
                </button>
              ))}
            </div>
          </div>
          <Textarea label="메모 (선택)" rows="2" value={form.memo} onChange={(e) => setForm({ ...form, memo: e.target.value })} />
          {editing && hasSuccessors && (
            <label className={`flex items-start gap-2 p-3 rounded-xl border text-sm cursor-pointer transition ${dateChanged ? 'border-blue-200 bg-blue-50' : 'border-slate-200 bg-slate-50 opacity-70'}`}>
              <input type="checkbox" className="mt-0.5" checked={cascade} onChange={(e) => setCascade(e.target.checked)} disabled={!dateChanged} />
              <span>
                <span className="font-medium text-slate-700">연결된 후속 일정도 함께 이동</span>
                <span className="block text-[11px] text-slate-400">선행(이 일정)의 날짜 변경분만큼 후속 일정을 자동으로 밀어줍니다. {dateChanged ? '' : '(날짜를 변경하면 활성화됩니다)'}</span>
              </span>
            </label>
          )}
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit" disabled={submitting}>{submitting ? '저장 중...' : (editing ? '수정 저장' : '일정 추가')}</Button>
          </div>
        </form>
      );
    }

    // 🧩 일정 탭 (캘린더 + 목록 + 폼 + .ics + 선후관계 + 일정표 PDF)
    function ScheduleTab({ site, tasks, procNames, staffNames, vendorNames = [], loading, onChanged, onPrintSchedule }) {
      const toast = useToast();
      const [formOpen, setFormOpen] = useState(false);
      const [editing, setEditing] = useState(null);
      const [prefill, setPrefill] = useState(null); // v6-3 드래그 기간 프리필
      const [delTarget, setDelTarget] = useState(null);
      const [depTarget, setDepTarget] = useState(null); // v6-4 선행 추가 대상(=successor)
      const [depPredId, setDepPredId] = useState('');
      const [showDepList, setShowDepList] = useState(false);
      const [viewMode, setViewMode] = useState('calendar'); // v11-2 캘린더 / 타임라인 토글
      const [kindFilter, setKindFilter] = useState('전체'); // v19 유형 필터 [공정|지원|전체] (기본 전체=기존 동작 보존)

      // v11-1: 드래그 이동/리사이즈 낙관적 UI — tasks(prop) 미러 + 즉시 패치, 실패 시 롤백
      const [localTasks, setLocalTasks] = useState(tasks || []);
      useEffect(() => { setLocalTasks(tasks || []); }, [tasks]);
      // v19: 유형 필터 적용된 표시용 목록(캘린더/타임라인/목록 공통). 공정=kind '공사', 지원=kind '지원', 전체=미팅 포함 전부.
      const filteredTasks = useMemo(() => {
        if (kindFilter === '전체') return localTasks;
        const want = kindFilter === '공정' ? '공사' : '지원';
        return (localTasks || []).filter((t) => schedKind(t) === want);
      }, [localTasks, kindFilter]);
      const kindCounts = useMemo(() => {
        const c = { 공사: 0, 지원: 0, 미팅: 0 };
        (localTasks || []).forEach((t) => { c[schedKind(t)]++; });
        return c;
      }, [localTasks]);
      const segCls = (on) => `px-3 py-1.5 text-sm font-semibold rounded-lg transition ${on ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`;

      const taskMap = useMemo(() => { const m = {}; (localTasks || []).forEach((t) => { m[String(t.id)] = t; }); return m; }, [localTasks]);
      const depPairs = useMemo(() => {
        const pairs = [];
        (localTasks || []).forEach((t) => { (t.successors || []).forEach((sid) => { if (taskMap[String(sid)]) pairs.push({ pred: t, succ: taskMap[String(sid)] }); }); });
        return pairs;
      }, [localTasks, taskMap]);

      const closeForm = () => { setFormOpen(false); setEditing(null); setPrefill(null); };
      const openAdd = () => { setEditing(null); setPrefill(null); setFormOpen(true); };
      const openEdit = (t) => { setEditing(t); setPrefill(null); setFormOpen(true); };
      const onRangeSelect = (s, e) => { setEditing(null); setPrefill({ start: s, end: e }); setFormOpen(true); };

      const save = async (body) => {
        try {
          let res;
          if (editing) res = await api.updateSchedule(editing.id, body);
          else res = await api.createSchedule(site.id, body);
          let msg = editing ? '일정이 수정되었습니다.' : '일정이 추가되었습니다.';
          if (res && res.shifted && res.shifted.length) msg = `일정 수정 · 후속 ${res.shifted.length}개 함께 이동`;
          toast(msg, 'success');
          closeForm();
          await onChanged();
          return true;
        } catch (e) { toast(e.message || '저장에 실패했습니다.', 'error'); return false; }
      };
      // v11-1: 캘린더/타임라인 막대 드래그 이동·리사이즈 → 낙관적 UI 후 PUT(전체 필드, 날짜만 변경), 실패 시 롤백
      const successorClosure = (id, list) => {
        const m = {}; (list || []).forEach((t) => { m[String(t.id)] = (t.successors || []).map(String); });
        const seen = new Set(); const q = [String(id)];
        while (q.length) { const cur = q.shift(); (m[cur] || []).forEach((s) => { if (!seen.has(s)) { seen.add(s); q.push(s); } }); }
        return seen;
      };
      const moveTask = async (task, newStart, newEnd, cascade) => {
        let s = newStart, e = newEnd;
        if (s > e) { const tmp = s; s = e; e = tmp; } // start ≤ end 정규화
        if (s === task.start_date && e === task.end_date) return; // 변화 없음
        const delta = daysBetween(task.start_date, s);
        const succ = cascade ? successorClosure(task.id, localTasks) : new Set();
        const prev = localTasks;
        const optimistic = localTasks.map((t) => {
          if (String(t.id) === String(task.id)) return { ...t, start_date: s, end_date: e };
          if (succ.has(String(t.id)) && t.start_date && t.end_date) return { ...t, start_date: addDays(t.start_date, delta), end_date: addDays(t.end_date, delta) };
          return t;
        });
        setLocalTasks(optimistic); // 즉시 이동(낙관적)
        try {
          // 서버 PUT 은 전체 필드 풀-리플레이스(title 필수) → 기존 값 보존하고 날짜만 교체
          const body = {
            title: task.title, process: task.process || '', start_date: s, end_date: e,
            status: task.status || '예정', planned_cost: task.planned_cost != null ? task.planned_cost : 0,
            staff: task.staff || '', vendor: task.vendor || '', color: task.color || '', memo: task.memo || '',
            kind: schedKind(task), sort_order: task.sort_order != null ? task.sort_order : 0,
            ...(cascade ? { cascade: true } : {}),
          };
          const res = await api.updateSchedule(task.id, body);
          const n = res && res.shifted ? res.shifted.length : 0;
          // v14-1: 드래그 직후 onChanged()(부모 전체 refetch → 캘린더/타임라인 재마운트=깜빡임·월/스크롤 리셋) 호출 제거.
          //         대신 이동한 항목(+cascade 후속)만 서버응답으로 조용히 동기화 → 현재 월/스크롤/펼침 상태 보존.
          setLocalTasks((cur) => {
            const shiftMap = {}; ((res && res.shifted) || []).forEach((sh) => { shiftMap[String(sh.id)] = sh; });
            return cur.map((t) => {
              if (String(t.id) === String(task.id)) {
                return res ? { ...t, ...res, predecessors: t.predecessors || [], successors: t.successors || [], actual_cost: (res.actual_cost != null ? res.actual_cost : t.actual_cost) } : t;
              }
              if (shiftMap[String(t.id)]) return { ...t, start_date: shiftMap[String(t.id)].start_date, end_date: shiftMap[String(t.id)].end_date };
              return t;
            });
          });
          toast(n ? `일정 이동 · 후속 ${n}개 함께 이동` : '일정을 이동했습니다.', 'success');
        } catch (err) {
          setLocalTasks(prev); // 롤백
          toast(err.message || '일정 이동에 실패했습니다.', 'error');
        }
      };
      const confirmDel = async () => {
        const t = delTarget; setDelTarget(null);
        try { await api.removeSchedule(t.id); toast('일정이 삭제되었습니다.', 'info'); await onChanged(); }
        catch (e) { toast('삭제에 실패했습니다.', 'error'); }
      };
      // v6-4 선후관계
      const addDep = async () => {
        if (!depTarget || !depPredId) return;
        try { await api.addDep(depTarget.id, depPredId); toast('선행 일정을 연결했습니다.', 'success'); setDepTarget(null); setDepPredId(''); await onChanged(); }
        catch (e) { toast(e.message || '연결에 실패했습니다.', 'error'); }
      };
      const removeDep = async (succId, predId) => {
        try { await api.removeDep(succId, predId); toast('선후관계를 해제했습니다.', 'info'); await onChanged(); }
        catch (e) { toast('해제에 실패했습니다.', 'error'); }
      };
      // v16-2: 타임라인 드래그-연결/해제 — 무-리프레시(localTasks 관계만 조용히 머지, onChanged 미호출)
      const linkTasks = async (fromId, toId) => { // fromId=선행(우측 종료점) → toId=후행
        try {
          await api.addDep(toId, fromId); // POST /schedule/<후행>/deps {predecessor_id:<선행>}
          setLocalTasks((cur) => cur.map((t) => {
            if (String(t.id) === String(toId) && !(t.predecessors || []).map(String).includes(String(fromId))) return { ...t, predecessors: [...(t.predecessors || []), fromId] };
            if (String(t.id) === String(fromId) && !(t.successors || []).map(String).includes(String(toId))) return { ...t, successors: [...(t.successors || []), toId] };
            return t;
          }));
          toast('선행 → 후행으로 연결했습니다.', 'success');
        } catch (e) { toast(e.message || '연결에 실패했습니다. (사이클/타현장 등)', 'error'); }
      };
      const unlinkTasks = async (predId, succId) => {
        try {
          await api.removeDep(succId, predId);
          setLocalTasks((cur) => cur.map((t) => {
            if (String(t.id) === String(succId)) return { ...t, predecessors: (t.predecessors || []).filter((p) => String(p) !== String(predId)) };
            if (String(t.id) === String(predId)) return { ...t, successors: (t.successors || []).filter((s) => String(s) !== String(succId)) };
            return t;
          }));
          toast('선후관계를 해제했습니다.', 'info');
        } catch (e) { toast('해제에 실패했습니다.', 'error'); }
      };
      const exportICS = async () => {
        if (!tasks || tasks.length === 0) { toast('내보낼 일정이 없습니다.', 'error'); return; }
        if (!api._useMock) {
          try {
            const res = await fetch(api.scheduleIcsUrl(site.id), { headers: getToken() ? { Authorization: 'Bearer ' + getToken() } : {} });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const blob = await res.blob();
            downloadBlob(blob, `${site.name}-schedule.ics`);
            toast('일정(.ics)을 내보냈습니다.', 'success'); return;
          } catch (e) { /* 서버 실패 → 폴백 */ }
        }
        const ics = buildICS(site.name, tasks);
        downloadBlob(new Blob([ics], { type: 'text/calendar;charset=utf-8' }), `${site.name}-schedule.ics`);
        toast('일정(.ics)을 내보냈습니다. (브라우저 생성)', 'success');
      };
      const printSchedule = () => {
        if (!tasks || tasks.length === 0) { toast('인쇄할 일정이 없습니다.', 'error'); return; }
        if (onPrintSchedule) onPrintSchedule();
      };
      // 선행 추가 모달 후보: 자기 자신·이미 선행인 것 제외
      const depCandidates = depTarget ? (localTasks || []).filter((t) => String(t.id) !== String(depTarget.id) && !(depTarget.predecessors || []).map(String).includes(String(t.id))) : [];

      return (
        <div className="space-y-6">
          <div className="flex flex-wrap items-center justify-between gap-2">
            <div>
              <h2 className="text-base font-bold text-slate-800">공정 일정 ({viewMode === 'calendar' ? '캘린더' : '타임라인'})</h2>
              <p className="text-[11px] text-slate-400">📆 .ics 파일은 구글/네이버/아웃룩 캘린더에서 ‘가져오기’로 불러올 수 있습니다.</p>
            </div>
            <div className="flex flex-wrap gap-2">
              <Button variant="secondary" size="sm" onClick={printSchedule}>🖨 일정표 PDF</Button>
              <Button variant="secondary" size="sm" onClick={exportICS}>📆 .ics 내보내기</Button>
              <Button size="sm" onClick={openAdd}>+ 일정 추가</Button>
            </div>
          </div>
          {loading ? (
            <Card className="p-5"><div className="h-72 bg-slate-100 rounded-xl animate-pulse"></div></Card>
          ) : (
            <>
              {/* v11-2 뷰 토글 + v19 유형 필터 [공정|지원|전체] + 색 범례 */}
              <div className="flex flex-wrap items-center gap-2">
                <div className="inline-flex items-center gap-1 bg-slate-100 p-1 rounded-xl w-max">
                  <button onClick={() => setViewMode('calendar')} className={segCls(viewMode === 'calendar')}>📅 캘린더</button>
                  <button onClick={() => setViewMode('timeline')} className={segCls(viewMode === 'timeline')}>📊 타임라인</button>
                </div>
                <div className="inline-flex items-center gap-1 bg-slate-100 p-1 rounded-xl w-max" role="group" aria-label="일정 유형 필터">
                  {[['공정', kindCounts['공사']], ['지원', kindCounts['지원']], ['전체', null]].map(([v, n]) => (
                    <button key={v} onClick={() => setKindFilter(v)} className={segCls(kindFilter === v)} aria-pressed={kindFilter === v}>
                      {v}{n != null && <span className="ml-1 text-[10px] opacity-60">{n}</span>}
                    </button>
                  ))}
                </div>
                <div className="hidden sm:flex items-center gap-2.5 text-[11px] text-slate-400 ml-auto">
                  <span className="inline-flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm bg-slate-400"></span>공사=공정색</span>
                  <span className="inline-flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm" style={{ backgroundColor: KIND_HEX['지원'] }}></span>🤝 지원</span>
                  <span className="inline-flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm" style={{ backgroundColor: KIND_HEX['미팅'] }}></span>📅 미팅</span>
                </div>
              </div>
              {viewMode === 'calendar'
                ? <ScheduleCalendar tasks={filteredTasks} onEditTask={openEdit} onRangeSelect={onRangeSelect} onMoveTask={moveTask} />
                : <ScheduleTimeline tasks={filteredTasks} site={site} onEditTask={openEdit} onMoveTask={moveTask} onLink={linkTasks} onUnlink={unlinkTasks} />}
              <ScheduleList tasks={filteredTasks} onEdit={openEdit} onAskDelete={setDelTarget}
                taskMap={taskMap} onAddDep={setDepTarget} onRemoveDep={removeDep} />
              {/* v6-4 선후관계 리스트 뷰 */}
              <Card className="p-5">
                <div className="flex items-center justify-between">
                  <h3 className="text-sm font-bold text-slate-700">🔗 선후관계 <span className="text-[11px] font-normal text-slate-400">(선행 → 후행 {depPairs.length}건)</span></h3>
                  <button onClick={() => setShowDepList((v) => !v)} className="text-xs text-blue-600 hover:underline">{showDepList ? '접기' : '펼치기'}</button>
                </div>
                {showDepList && (
                  depPairs.length === 0 ? (
                    <p className="mt-3 text-sm text-slate-400 text-center py-4">등록된 선후관계가 없습니다.<br />일정 목록의 ‘+ 선행’ 버튼으로 연결하세요.</p>
                  ) : (
                    <ul className="mt-3 space-y-1.5">
                      {depPairs.map((p) => (
                        <li key={p.pred.id + '-' + p.succ.id} className="flex items-center gap-2 text-sm py-1.5 border-b border-slate-50 last:border-0">
                          <span className="inline-flex items-center gap-1.5 min-w-0">
                            <span className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: p.pred.color || procHex(p.pred.process) }}></span>
                            <span className="font-medium text-slate-700 truncate">{p.pred.title}</span>
                          </span>
                          <span className="text-slate-300 shrink-0">→</span>
                          <span className="inline-flex items-center gap-1.5 min-w-0">
                            <span className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: p.succ.color || procHex(p.succ.process) }}></span>
                            <span className="font-medium text-slate-700 truncate">{p.succ.title}</span>
                          </span>
                          <button onClick={() => removeDep(p.succ.id, p.pred.id)} className="ml-auto shrink-0 text-slate-400 hover:text-red-500 p-1" aria-label="해제" title="선후관계 해제">✕</button>
                        </li>
                      ))}
                    </ul>
                  )
                )}
              </Card>
            </>
          )}
          <Modal isOpen={formOpen} onClose={closeForm} title={editing ? '일정 수정' : '일정 추가'} size="lg">
            <ScheduleForm key={editing ? editing.id : ('new' + (prefill ? prefill.start + prefill.end : ''))}
              editing={editing} prefill={prefill} hasSuccessors={!!(editing && editing.successors && editing.successors.length)}
              procNames={procNames} staffNames={staffNames} vendorNames={vendorNames} onSubmit={save} onCancel={closeForm} />
          </Modal>
          {/* v6-4 선행 추가 모달 */}
          <Modal isOpen={!!depTarget} onClose={() => { setDepTarget(null); setDepPredId(''); }} title="선행 일정 추가" size="sm">
            {depTarget && (
              <div className="space-y-4">
                <p className="text-sm text-slate-600">'<span className="font-semibold">{depTarget.title}</span>' 보다 <span className="font-semibold">먼저 끝나야 하는</span> 선행 일정을 선택하세요.</p>
                <Select label="선행 일정" value={depPredId} onChange={(e) => setDepPredId(e.target.value)}>
                  <option value="">선택하세요</option>
                  {depCandidates.map((t) => <option key={t.id} value={t.id}>{t.title} ({t.start_date}~{t.end_date})</option>)}
                </Select>
                {depCandidates.length === 0 && <p className="text-xs text-slate-400">연결 가능한 다른 일정이 없습니다.</p>}
                <div className="flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => { setDepTarget(null); setDepPredId(''); }}>취소</Button>
                  <Button onClick={addDep} disabled={!depPredId}>연결</Button>
                </div>
              </div>
            )}
          </Modal>
          <Modal isOpen={!!delTarget} onClose={() => setDelTarget(null)} title="일정 삭제 확인" size="sm">
            {delTarget && (
              <div>
                <p className="text-sm text-slate-600">'<span className="font-semibold">{delTarget.title}</span>' 일정을 삭제하시겠습니까?<br />연결된 비용은 보존되며 연결만 해제됩니다. 선후관계도 함께 해제됩니다.</p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setDelTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDel}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // 🧩 일정표 인쇄(A4) — 현장명·공사기간 + 리스트 + 간트형 막대 (v6-3)
    function SchedulePrint({ site, tasks }) {
      if (!site) return null;
      const pb = '1px solid #94a3b8';
      const th = { border: pb, padding: '6px 8px', fontWeight: 600, background: '#f1f5f9' };
      const td = { border: pb, padding: '6px 8px' };
      const tdC = { border: pb, padding: '6px 8px', textAlign: 'center' };
      const sorted = [...(tasks || [])].sort((a, b) => (a.start_date < b.start_date ? -1 : a.start_date > b.start_date ? 1 : 0));
      const dates = sorted.flatMap((t) => [t.start_date, t.end_date]).filter(Boolean);
      const minD = dates.length ? dates.reduce((a, b) => (a < b ? a : b)) : null;
      const maxD = dates.length ? dates.reduce((a, b) => (a > b ? a : b)) : null;
      const span = (minD && maxD) ? Math.max(1, daysBetween(minD, maxD) + 1) : 1;
      const projPeriod = (minD && maxD) ? `${minD} ~ ${maxD} (${span}일)` : (site.start_date ? `${site.start_date} ~ ${site.end_date || '미정'}` : '미정');
      return (
        <div className="text-slate-900" style={{ fontFamily: 'sans-serif', padding: '4px' }}>
          <div className="flex items-start justify-between" style={{ borderBottom: '2px solid #1e293b', paddingBottom: '10px', marginBottom: '14px' }}>
            <div>
              <h1 style={{ fontSize: '24px', fontWeight: 800, letterSpacing: '6px', margin: 0 }}>공 정 일 정 표</h1>
              <p style={{ fontSize: '11px', color: '#64748b', margin: '4px 0 0' }}>WORK SCHEDULE</p>
            </div>
            <div style={{ textAlign: 'right' }}>
              <p style={{ fontSize: '18px', fontWeight: 700, margin: 0 }}>{SUPPLIER.name} <span style={{ fontSize: '11px', fontWeight: 400, color: '#64748b' }}>{SUPPLIER.en}</span></p>
              <p style={{ fontSize: '11px', color: '#475569', margin: '2px 0 0' }}>{SUPPLIER.biz}</p>
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2px 32px', fontSize: '13px', marginBottom: '14px' }}>
            <div><span style={{ color: '#64748b' }}>현장명: </span><b>{site.name}</b></div>
            <div><span style={{ color: '#64748b' }}>공사기간: </span><b>{projPeriod}</b></div>
            <div><span style={{ color: '#64748b' }}>현장주소: </span>{site.address || '-'}</div>
            <div><span style={{ color: '#64748b' }}>총 작업: </span>{sorted.length}건</div>
          </div>
          <table className="print-table" style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
            <thead>
              <tr>
                <th style={th}>No</th><th style={th}>작업명</th><th style={th}>공종</th>
                <th style={th}>시작일</th><th style={th}>종료일</th><th style={th}>기간(일)</th><th style={th}>상태</th><th style={th}>담당자</th>
              </tr>
            </thead>
            <tbody>
              {sorted.length === 0 ? (
                <tr><td style={{ ...tdC, color: '#94a3b8' }} colSpan="8">등록된 일정 없음</td></tr>
              ) : sorted.map((t, i) => {
                const len = (t.start_date && t.end_date) ? (daysBetween(t.start_date, t.end_date) + 1) : '-';
                return (
                  <tr key={i}>
                    <td style={tdC}>{i + 1}</td>
                    <td style={td}>{t.title}</td>
                    <td style={td}>{t.process || '-'}</td>
                    <td style={tdC}>{t.start_date || '-'}</td>
                    <td style={tdC}>{t.end_date || '-'}</td>
                    <td style={tdC}>{len}</td>
                    <td style={tdC}>{t.status || '-'}</td>
                    <td style={td}>{t.staff || '-'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {sorted.length > 0 && minD && (
            <div style={{ marginTop: '18px' }}>
              <p style={{ fontWeight: 700, fontSize: '12.5px', margin: '0 0 6px' }}>간트 차트</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '3px' }}>
                {sorted.map((t, i) => {
                  const off = daysBetween(minD, t.start_date) || 0;
                  const len = (daysBetween(t.start_date, t.end_date) || 0) + 1;
                  const left = (off / span) * 100, width = Math.max((len / span) * 100, 1.5);
                  return (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', fontSize: '10px' }}>
                      <div style={{ width: '120px', flexShrink: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', paddingRight: '6px' }}>{t.title}</div>
                      <div style={{ position: 'relative', flex: 1, height: '14px', background: '#f1f5f9', borderRadius: '3px' }}>
                        <div style={{ position: 'absolute', top: 0, bottom: 0, left: left + '%', width: width + '%', background: t.color || procHex(t.process), borderRadius: '3px' }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <p style={{ fontSize: '10px', color: '#94a3b8', margin: '6px 0 0' }}>기간 기준 {minD} ~ {maxD}</p>
            </div>
          )}
          <p style={{ marginTop: '28px', textAlign: 'center', fontSize: '11px', color: '#94a3b8' }}>본 일정표는 {SUPPLIER.name}에서 발행되었습니다.</p>
        </div>
      );
    }

    // ========================================
    // 🧩 견적 — 목록 / 에디터 / 인쇄
    // ========================================
    function EstimateList({ estimates, onOpen, onNew, onAskDelete, onNewFromTemplate, templates = [] }) {
      // v18: 버전 계열 묶음 — 제목에서 -vN 제거한 base 로 그룹핑, 그룹 내 version 내림차순, 그룹은 최신 생성순.
      const groups = useMemo(() => {
        const map = new Map();
        (estimates || []).forEach((e) => {
          const key = stripVersionSuffix(e.title) || ('__solo_' + e.id);
          if (!map.has(key)) map.set(key, []);
          map.get(key).push(e);
        });
        const arr = Array.from(map.entries()).map(([key, list]) => {
          const sorted = list.slice().sort((a, b) => ((Number(b.version) || 1) - (Number(a.version) || 1)) || (a.created_at < b.created_at ? 1 : -1));
          const recent = list.reduce((mx, x) => ((x.created_at || '') > mx ? (x.created_at || '') : mx), '');
          return { key, base: stripVersionSuffix(list[0].title) || (list[0].title || '견적서'), list: sorted, recent };
        });
        arr.sort((a, b) => (a.recent < b.recent ? 1 : -1));
        return arr;
      }, [estimates]);
      const renderRow = (e) => {
        const total = e.totals ? e.totals.total : 0;
        return (
          <li key={e.id} className="py-3 flex items-center justify-between gap-3">
            <button className="text-left min-w-0 flex-1" onClick={() => onOpen(e)}>
              <div className="flex items-center gap-2 flex-wrap">
                <Badge color="bg-indigo-500">v{Number(e.version) || 1}</Badge>
                <span className="font-semibold text-slate-800 truncate">{e.title || '견적서'}</span>
                <Badge color={ESTIMATE_STATUS_COLOR[e.status] || 'bg-slate-400'}>{ESTIMATE_STATUS_LABEL[e.status] || e.status}</Badge>
              </div>
              <p className="mt-0.5 text-xs text-slate-400">
                {e.client_name || '고객 미지정'} · {e.estimate_date || '-'}{e.itemCount != null ? ` · ${e.itemCount}개 항목` : ''}
              </p>
            </button>
            <div className="text-right shrink-0">
              <p className="font-bold text-slate-800">{fmtWon(total)}</p>
              <button onClick={() => onAskDelete(e)} className="text-xs text-slate-400 hover:text-red-600">삭제</button>
            </div>
          </li>
        );
      };
      return (
        <Card className="p-5">
          <div className="flex flex-wrap items-center justify-between gap-2 mb-4">
            <h2 className="text-base font-bold text-slate-800">견적서 목록</h2>
            <div className="flex items-center gap-2">
              {templates && templates.length > 0 && onNewFromTemplate && (
                <select value="" onChange={(e) => { const t = templates.find((x) => String(x.id) === e.target.value); if (t) onNewFromTemplate(t); }}
                  className="text-sm rounded-xl border border-slate-300 bg-white px-3 py-1.5 text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-300"
                  title="저장한 견적 템플릿의 항목·원가요율을 새 견적에 프리필합니다.">
                  <option value="">🧩 템플릿으로 시작…</option>
                  {templates.map((t) => <option key={t.id} value={t.id}>{t.name}{t.items ? ` (${t.items.length}개 항목)` : ''}</option>)}
                </select>
              )}
              <Button size="sm" onClick={onNew}>+ 새 견적</Button>
            </div>
          </div>
          {(!estimates || estimates.length === 0) ? (
            <div className="text-center py-10">
              <div className="text-4xl mb-2">📋</div>
              <p className="text-sm text-slate-400">작성된 견적서가 없습니다.<br />‘새 견적’으로 엑셀 없이 견적서를 만들어보세요.</p>
            </div>
          ) : (
            <div className="space-y-2.5">
              {groups.map((g) => (
                g.list.length > 1 ? (
                  <div key={g.key} className="rounded-xl border border-indigo-100 bg-indigo-50/30 overflow-hidden">
                    <div className="flex items-center justify-between gap-2 px-3 py-2 bg-indigo-50 border-b border-indigo-100">
                      <span className="text-xs font-semibold text-indigo-700 truncate">🔁 {g.base} <span className="font-normal text-indigo-400">· {g.list.length}개 버전</span></span>
                      <span className="text-[11px] text-indigo-500 shrink-0">최신 v{Number(g.list[0].version) || 1}</span>
                    </div>
                    <ul className="divide-y divide-slate-100 px-3">{g.list.map((e) => renderRow(e))}</ul>
                  </div>
                ) : (
                  <ul key={g.key} className="divide-y divide-slate-100 px-0">{renderRow(g.list[0])}</ul>
                )
              ))}
            </div>
          )}
        </Card>
      );
    }

    // (v3) 단가 카탈로그 불러오기 모달 — 공종 필터 + 검색 + 페이지네이션
    function CatalogPickerModal({ isOpen, onClose, trades, mode, onPick }) {
      const [trade, setTrade] = useState('');
      const [q, setQ] = useState('');
      const [list, setList] = useState([]);
      const [loading, setLoading] = useState(false);
      const [page, setPage] = useState(0);
      const pageSize = 20;
      useEffect(() => { if (!isOpen) { setTrade(''); setQ(''); setPage(0); } }, [isOpen]);
      useEffect(() => { setPage(0); }, [trade, q]);
      useEffect(() => {
        if (!isOpen) return;
        let alive = true;
        setLoading(true);
        const t = setTimeout(async () => {
          try { const d = await api.listCatalog({ trade: trade || undefined, q: q || undefined, limit: 1000 }); if (alive) setList(d || []); }
          catch (e) { if (alive) setList([]); }
          finally { if (alive) setLoading(false); }
        }, 200);
        return () => { alive = false; clearTimeout(t); };
      }, [isOpen, trade, q]);
      const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
      const pageItems = list.slice(page * pageSize, page * pageSize + pageSize);
      const tradeOpts = (trades && trades.length ? trades : TRADE_MASTER);
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="단가 카탈로그 불러오기" size="xl">
          <div className="space-y-3">
            <div className="flex flex-col sm:flex-row gap-2">
              <select value={trade} onChange={(e) => setTrade(e.target.value)}
                className="px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-300 sm:w-44">
                <option value="">전체 공종</option>
                {tradeOpts.map((t) => <option key={t} value={t}>{t}</option>)}
              </select>
              <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="품목·제품·업체 검색"
