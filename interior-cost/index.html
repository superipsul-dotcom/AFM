          <div className="flex items-start justify-between" style={{ borderBottom: '2px solid #1e293b', paddingBottom: '10px', marginBottom: '14px' }}>
            <div>
              <h1 style={{ fontSize: '26px', fontWeight: 800, letterSpacing: '8px', margin: 0 }}>견 적 서</h1>
              <p style={{ fontSize: '11px', color: '#64748b', margin: '4px 0 0' }}>ESTIMATE</p>
            </div>
            <div style={{ textAlign: 'right' }}>
              <p style={{ fontSize: '18px', fontWeight: 700, margin: 0 }}>{SUPPLIER.name} <span style={{ fontSize: '11px', fontWeight: 400, color: '#64748b' }}>{SUPPLIER.en}</span></p>
              <p style={{ fontSize: '11px', color: '#475569', margin: '2px 0 0' }}>{SUPPLIER.biz}</p>
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2px 32px', fontSize: '13px', marginBottom: '14px' }}>
            <div><span style={{ color: '#64748b' }}>고객명: </span><b>{estimate.client_name || '-'}</b></div>
            <div><span style={{ color: '#64748b' }}>현장: </span><b>{site ? site.name : '-'}</b></div>
            <div><span style={{ color: '#64748b' }}>연락처: </span>{estimate.client_contact || '-'}</div>
            <div><span style={{ color: '#64748b' }}>현장주소: </span>{(site && site.address) || '-'}</div>
            <div><span style={{ color: '#64748b' }}>견적일: </span>{estimate.estimate_date || '-'}</div>
            <div><span style={{ color: '#64748b' }}>유효기간: </span>{estimate.valid_until || '-'}</div>
          </div>
          <div style={{ background: '#f1f5f9', textAlign: 'center', padding: '8px', fontSize: '14px', marginBottom: '10px' }}>
            합계금액(부가세 {VAT_MODE_LABEL[estimate.vat_mode || 'exclusive']}) : <b>일금 {wonToKorean(t.total)}원정 (₩{fmtNum(t.total)})</b>
          </div>
          {splitByTrade ? (
            itemsByTrade.map((grp, gi) => (
              <div key={grp.trade} style={gi > 0 ? { pageBreakBefore: 'always' } : undefined}>
                <p style={{ fontWeight: 700, fontSize: '13px', margin: gi > 0 ? '0 0 5px' : '0 0 5px' }}>■ {grp.trade}</p>
                <table className="print-table" style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px', marginBottom: '6px' }}>
                  <thead>
                    <tr>
                      <th style={cellTh}>No</th><th style={cellTh}>공종</th><th style={cellTh}>품목</th><th style={cellTh}>규격</th>
                      <th style={cellTh}>수량</th><th style={cellTh}>단위</th><th style={cellTh}>단가</th><th style={cellTh}>금액</th>
                    </tr>
                  </thead>
                  <tbody>
                    {grp.rows.map((it, i) => (
                      <tr key={i}>
                        <td style={cellTdC}>{i + 1}</td>
                        <td style={cellTd}>{it.trade || it.process || ''}</td>
                        <td style={cellTd}>{it.name}</td>
                        <td style={cellTd}>{it.spec || ''}</td>
                        <td style={cellTdR}>{fmtNum(it.qty)}</td>
                        <td style={cellTdC}>{it.unit || ''}</td>
                        <td style={cellTdR}>{fmtNum(effUnitPrice(it))}</td>
                        <td style={cellTdR}>{fmtNum(rowAmount(it))}</td>
                      </tr>
                    ))}
                    <tr>
                      <td style={{ ...cellTd, fontWeight: 700, background: '#f8fafc' }} colSpan="7">{grp.trade} 소계</td>
                      <td style={{ ...cellTdR, fontWeight: 700, background: '#f8fafc' }}>{fmtNum(grp.rows.reduce((s, it) => s + rowAmount(it), 0))}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            ))
          ) : (
            <table className="print-table" style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
              <thead>
                <tr>
                  <th style={cellTh}>No</th><th style={cellTh}>공종</th><th style={cellTh}>품목</th><th style={cellTh}>규격</th>
                  <th style={cellTh}>수량</th><th style={cellTh}>단위</th><th style={cellTh}>단가</th><th style={cellTh}>금액</th>
                </tr>
              </thead>
              <tbody>
                {items.length === 0 ? (
                  <tr><td style={{ ...cellTdC, color: '#94a3b8' }} colSpan="8">항목 없음</td></tr>
                ) : items.map((it, i) => (
                  <tr key={i}>
                    <td style={cellTdC}>{i + 1}</td>
                    <td style={cellTd}>{it.trade || it.process || ''}</td>
                    <td style={cellTd}>{it.name}</td>
                    <td style={cellTd}>{it.spec || ''}</td>
                    <td style={cellTdR}>{fmtNum(it.qty)}</td>
                    <td style={cellTdC}>{it.unit || ''}</td>
                    <td style={cellTdR}>{fmtNum(effUnitPrice(it))}</td>
                    <td style={cellTdR}>{fmtNum(rowAmount(it))}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}

          {/* 공종별 소계 (총괄표) */}
          {groupArr.length > 0 && (
            <div style={{ marginTop: '14px' }}>
              <p style={{ fontWeight: 700, fontSize: '12.5px', margin: '0 0 4px' }}>공종별 소계</p>
              <table className="print-table" style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
                <thead><tr><th style={cellTh}>공종</th><th style={cellTh}>금액</th></tr></thead>
                <tbody>
                  {groupArr.map((g) => (
                    <tr key={g.trade}><td style={cellTd}>{g.trade}</td><td style={cellTdR}>{fmtNum(g.total)} 원</td></tr>
                  ))}
                  <tr><td style={{ ...cellTd, fontWeight: 700, background: '#f1f5f9' }}>직접공사비 합계</td><td style={{ ...cellTdR, fontWeight: 700, background: '#f1f5f9' }}>{fmtNum(directTotal)} 원</td></tr>
                </tbody>
              </table>
            </div>
          )}

          {/* 원가계산 요약 (원가계산서 모드) */}
          {estimate.use_cost_buildup && b && (
            <div style={{ marginTop: '14px' }}>
              <p style={{ fontWeight: 700, fontSize: '12.5px', margin: '0 0 4px' }}>공사원가계산 요약</p>
              <table className="print-table" style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
                <tbody>
                  <tr><td style={cellTd}>재료비 소계 (직접 {fmtNum(b.directMaterial)} + 간접 {fmtNum(b.indirectMaterial)})</td><td style={cellTdR}>{fmtNum(b.materialSum)} 원</td></tr>
                  <tr><td style={cellTd}>노무비 소계 (직접 {fmtNum(b.directLabor)} + 간접 {fmtNum(b.indirectLabor)})</td><td style={cellTdR}>{fmtNum(b.laborSum)} 원</td></tr>
                  <tr><td style={cellTd}>경비 소계 (부자재·보험료·안전·기타)</td><td style={cellTdR}>{fmtNum(b.expenseSum)} 원</td></tr>
                  <tr><td style={{ ...cellTd, fontWeight: 700, background: '#f8fafc' }}>순공사원가</td><td style={{ ...cellTdR, fontWeight: 700, background: '#f8fafc' }}>{fmtNum(b.primeCost)} 원</td></tr>
                  <tr><td style={cellTd}>일반관리비 + 디자인 + 이윤</td><td style={cellTdR}>{fmtNum(b.admin + b.design + b.profit)} 원</td></tr>
                  <tr><td style={{ ...cellTd, fontWeight: 700, background: '#f1f5f9' }}>공사비합계</td><td style={{ ...cellTdR, fontWeight: 700, background: '#f1f5f9' }}>{fmtNum(b.constructionTotal)} 원</td></tr>
                  <tr><td style={{ ...cellTd, fontWeight: 700 }}>제안가</td><td style={{ ...cellTdR, fontWeight: 700 }}>{fmtNum(b.proposed)} 원</td></tr>
                </tbody>
              </table>
            </div>
          )}
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: '12px' }}>
            <table style={{ borderCollapse: 'collapse', fontSize: '13px', minWidth: '260px' }}>
              <tbody>
                <tr><td style={sumTd}>공급가액</td><td style={sumTdR}>{fmtNum(t.supplyAmount)} 원</td></tr>
                {t.discount > 0 && <tr><td style={sumTd}>할인</td><td style={sumTdR}>- {fmtNum(t.discount)} 원</td></tr>}
                <tr><td style={sumTd}>부가세</td><td style={sumTdR}>{fmtNum(t.vat)} 원</td></tr>
                <tr><td style={{ ...sumTd, fontWeight: 700, background: '#e2e8f0' }}>합계</td><td style={{ ...sumTdR, fontWeight: 700, background: '#e2e8f0' }}>{fmtNum(t.total)} 원</td></tr>
              </tbody>
            </table>
          </div>
          {estimate.memo && (
            <div style={{ marginTop: '16px', fontSize: '12.5px' }}>
              <p style={{ fontWeight: 700, borderBottom: '1px solid #cbd5e1', paddingBottom: '3px', margin: '0 0 4px' }}>비고</p>
              <p style={{ whiteSpace: 'pre-wrap', color: '#334155', margin: 0 }}>{estimate.memo}</p>
            </div>
          )}
          <p style={{ marginTop: '28px', textAlign: 'center', fontSize: '11px', color: '#94a3b8' }}>본 견적서는 {SUPPLIER.name}에서 발행되었습니다.</p>
        </div>
      );
    }

    // 🧩 견적 탭
    function EstimateTab({ site, estimates, procNames, loading, onChanged, onPrint }) {
      const toast = useToast();
      const [editorOpen, setEditorOpen] = useState(false);
      const [detail, setDetail] = useState(null);
      const [loadingDetail, setLoadingDetail] = useState(false);
      const [delTarget, setDelTarget] = useState(null);
      const [trades, setTrades] = useState(TRADE_MASTER);
      useEffect(() => { let alive = true; api.listTrades().then((d) => { if (alive && d && d.length) setTrades(d); }).catch(() => {}); return () => { alive = false; }; }, []);
      const openNew = () => { setDetail(null); setEditorOpen(true); };
      const openEdit = async (e) => {
        setEditorOpen(true); setDetail(null); setLoadingDetail(true);
        try { const d = await api.getEstimate(e.id); setDetail(d); }
        catch (err) { toast('견적을 불러오지 못했습니다.', 'error'); setEditorOpen(false); }
        finally { setLoadingDetail(false); }
      };
      const close = () => { setEditorOpen(false); setDetail(null); };
      const save = async (body) => {
        try {
          let saved;
          if (detail && detail.id) { saved = await api.updateEstimate(detail.id, body); toast('견적이 저장되었습니다.', 'success'); }
          else { saved = await api.createEstimate(site.id, body); toast('견적이 생성되었습니다.', 'success'); }
          const fresh = await api.getEstimate(saved.id); setDetail(fresh);
          await onChanged();
          return true; // v6-2: 성공 시 에디터에서 draft 삭제
        } catch (e) { toast('저장에 실패했습니다.', 'error'); return false; }
      };
      const doConfirm = async () => {
        if (!detail || !detail.id) return;
        try { await api.confirmEstimate(detail.id); toast('견적이 확정되어 현장 예산에 반영되었습니다.', 'success'); const fresh = await api.getEstimate(detail.id); setDetail(fresh); await onChanged(); }
        catch (e) { toast('확정에 실패했습니다.', 'error'); }
      };
      const doUnconfirm = async () => {
        if (!detail || !detail.id) return;
        try { await api.unconfirmEstimate(detail.id); toast('초안으로 되돌렸습니다. (예산은 보존)', 'info'); const fresh = await api.getEstimate(detail.id); setDetail(fresh); await onChanged(); }
        catch (e) { toast('실패했습니다.', 'error'); }
      };
      const confirmDel = async () => {
        const e = delTarget; setDelTarget(null);
        try { await api.removeEstimate(e.id); toast('견적이 삭제되었습니다.', 'info'); if (detail && detail.id === e.id) close(); await onChanged(); }
        catch (err) { toast('삭제에 실패했습니다.', 'error'); }
      };
      return (
        <div className="space-y-6">
          {loading ? (
            <Card className="p-5"><div className="h-40 bg-slate-100 rounded-xl animate-pulse"></div></Card>
          ) : (
            <EstimateList estimates={estimates} onOpen={openEdit} onNew={openNew} onAskDelete={setDelTarget} />
          )}
          <Modal isOpen={editorOpen} onClose={close} title={detail && detail.id ? '견적서 편집' : '새 견적서'} size="xl">
            {loadingDetail ? (
              <div className="h-40 bg-slate-100 rounded-xl animate-pulse"></div>
            ) : (
              <EstimateEditor key={detail && detail.id ? detail.id : 'new'} site={site} initial={detail} trades={trades} procNames={procNames}
                onSave={save} onConfirm={doConfirm} onUnconfirm={doUnconfirm} onDelete={() => { if (detail && detail.id) setDelTarget(detail); }}
                onPrint={onPrint} onClose={close} />
            )}
          </Modal>
          <Modal isOpen={!!delTarget} onClose={() => setDelTarget(null)} title="견적 삭제 확인" size="sm">
            {delTarget && (
              <div>
                <p className="text-sm text-slate-600">'<span className="font-semibold">{delTarget.title || '견적서'}</span>' 견적을 삭제하시겠습니까?</p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setDelTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDel}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // ========================================
    // 🧾 발주 (현장 종속) — OrderForm + OrdersTab
    // ========================================
    function OrderForm({ initial, trades, vendorNames, onSave, onCancel }) {
      const toast = useToast();
      const [f, setF] = useState(initial ? {
        vendor: initial.vendor || '', trade: initial.trade || '', title: initial.title || '',
        amount: initial.amount != null ? String(initial.amount) : '', order_date: initial.order_date || '',
        due_date: initial.due_date || '', status: ORDER_STATES.includes(initial.status) ? initial.status : '대기', memo: initial.memo || '',
      } : { vendor: '', trade: '', title: '', amount: '', order_date: todayStr(), due_date: '', status: '대기', memo: '' });
      const [saving, setSaving] = useState(false);
      const submit = async (e) => {
        e.preventDefault();
        if (!f.title.trim()) { toast('발주 품목(내역)을 입력하세요.', 'error'); return; }
        setSaving(true);
        await onSave({
          vendor: f.vendor.trim(), trade: f.trade.trim(), title: f.title.trim(),
          amount: Math.max(0, Math.round(Number(f.amount) || 0)),
          order_date: f.order_date || null, due_date: f.due_date || null, status: f.status, memo: f.memo.trim(),
        });
        setSaving(false);
      };
      return (
        <form onSubmit={submit} className="space-y-4">
          <Input label="발주 품목 / 내역 *" placeholder="예: 합판/각재 일괄 발주" value={f.title} onChange={(e) => setF({ ...f, title: e.target.value })} />
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Combo label="거래처" placeholder="거래처 선택/입력" value={f.vendor} options={vendorNames} onChange={(e) => setF({ ...f, vendor: e.target.value })} />
            <Combo label="공종" placeholder="공종 선택/입력" value={f.trade} options={trades} onChange={(e) => setF({ ...f, trade: e.target.value })} />
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Input label="발주 금액 (원)" type="number" inputMode="numeric" min="0" placeholder="예: 8000000" value={f.amount} onChange={(e) => setF({ ...f, amount: e.target.value })} />
            <Select label="상태" value={f.status} onChange={(e) => setF({ ...f, status: e.target.value })}>
              {ORDER_STATES.map((s) => <option key={s} value={s}>{s}</option>)}
            </Select>
            <Input label="발주일" type="date" value={f.order_date || ''} onChange={(e) => setF({ ...f, order_date: e.target.value })} />
            <Input label="납기일" type="date" value={f.due_date || ''} onChange={(e) => setF({ ...f, due_date: e.target.value })} />
          </div>
          <Textarea label="메모" rows="2" placeholder="비고" value={f.memo} onChange={(e) => setF({ ...f, memo: e.target.value })} />
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit" disabled={saving}>{saving ? '저장 중...' : '저장'}</Button>
          </div>
        </form>
      );
    }

    function OrdersTab({ site, vendorNames = [] }) {
      const toast = useToast();
      const [list, setList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [trades, setTrades] = useState(TRADE_MASTER);
      const [editorOpen, setEditorOpen] = useState(false);
      const [editing, setEditing] = useState(null);
      const [delTarget, setDelTarget] = useState(null);
      const reload = useCallback(async () => {
        setLoading(true);
        try { const d = await api.listOrders(site.id); setList(Array.isArray(d) ? d : []); }
        catch (e) { setList([]); }
        finally { setLoading(false); }
      }, [site.id]);
      useEffect(() => { reload(); }, [reload]);
      useEffect(() => { let alive = true; api.listTrades().then((d) => { if (alive && d && d.length) setTrades(d); }).catch(() => {}); return () => { alive = false; }; }, []);
      const total = useMemo(() => list.reduce((s, o) => s + (Number(o.amount) || 0), 0), [list]);
      const save = async (body) => {
        try {
          if (editing) { await api.updateOrder(editing.id, body); toast('발주서가 수정되었습니다.', 'success'); }
          else { await api.createOrder(site.id, body); toast('발주서가 추가되었습니다.', 'success'); }
          setEditorOpen(false); setEditing(null); await reload();
        } catch (e) { toast(e.status === 400 ? e.message : '저장 실패', 'error'); }
      };
      const confirmDel = async () => { const o = delTarget; setDelTarget(null); try { await api.removeOrder(o.id); toast('발주서가 삭제되었습니다.', 'info'); await reload(); } catch (e) { toast('삭제 실패', 'error'); } };

                <p className="text-xs text-slate-400 mt-0.5">발주 {list.length}건 · 합계 <span className="font-bold text-slate-600">{fmtWon(total)}</span></p>
              </div>
              <Button size="sm" onClick={() => { setEditing(null); setEditorOpen(true); }}>+ 발주 추가</Button>
            </div>
            {loading ? (
              <div className="h-32 bg-slate-100 rounded-xl animate-pulse"></div>
            ) : list.length === 0 ? (
              <p className="text-sm text-slate-400 text-center py-10">등록된 발주서가 없습니다. <span className="text-slate-300">+ 발주 추가로 시작하세요.</span></p>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead><tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                    <th className="py-2 pr-3 font-medium">발주번호</th><th className="py-2 pr-3 font-medium">거래처</th>
                    <th className="py-2 pr-3 font-medium">공종</th><th className="py-2 pr-3 font-medium">품목/내역</th>
                    <th className="py-2 pr-3 font-medium text-right">금액</th><th className="py-2 pr-3 font-medium">발주일</th>
                    <th className="py-2 pr-3 font-medium">납기일</th><th className="py-2 pr-3 font-medium">상태</th>
                    <th className="py-2 font-medium text-right">관리</th></tr></thead>
                  <tbody className="divide-y divide-slate-100">

                      <tr key={o.id}>

                        <td className="py-2 pr-3"><Badge color={ORDER_STATUS_COLOR[o.status] || 'bg-slate-400'}>{o.status || '대기'}</Badge></td>

                      </tr>
                    ))}
                  </tbody>
                  <tfoot><tr className="border-t-2 border-slate-200">
                    <td colSpan="4" className="py-2.5 pr-3 text-right font-bold text-slate-600">합계</td>
                    <td className="py-2.5 pr-3 text-right font-extrabold text-slate-800 whitespace-nowrap">{fmtWon(total)}</td>
                    <td colSpan="4"></td>
                  </tr></tfoot>
                </table>
              </div>
            )}

    // 📒 미팅·AS (현장 종속) — MeetingForm + ASForm + MeetingsAsTab
    // ========================================
    function MeetingForm({ initial, onSave, onCancel }) {
      const toast = useToast();
      const [f, setF] = useState(initial ? {
        meeting_date: initial.meeting_date || '', title: initial.title || '', attendees: initial.attendees || '',
        content: initial.content || '', next_action: initial.next_action || '',
      } : { meeting_date: todayStr(), title: '', attendees: '', content: '', next_action: '' });
      const [saving, setSaving] = useState(false);
      const submit = async (e) => {
        e.preventDefault();
        if (!f.title.trim()) { toast('제목을 입력하세요.', 'error'); return; }
        setSaving(true);
        await onSave({ meeting_date: f.meeting_date || null, title: f.title.trim(), attendees: f.attendees.trim(), content: f.content.trim(), next_action: f.next_action.trim() });
        setSaving(false);
      };
      return (
        <form onSubmit={submit} className="space-y-4">
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Input label="미팅 일자" type="date" value={f.meeting_date || ''} onChange={(e) => setF({ ...f, meeting_date: e.target.value })} />
            <Input label="참석자" placeholder="예: 김철수, 박현장" value={f.attendees} onChange={(e) => setF({ ...f, attendees: e.target.value })} />
          </div>
          <Input label="제목 *" placeholder="예: 착공 전 현장 미팅" value={f.title} onChange={(e) => setF({ ...f, title: e.target.value })} />
          <Textarea label="내용" rows="3" placeholder="논의 내용" value={f.content} onChange={(e) => setF({ ...f, content: e.target.value })} />
          <Textarea label="다음 액션" rows="2" placeholder="예: 자재 샘플 발송" value={f.next_action} onChange={(e) => setF({ ...f, next_action: e.target.value })} />
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit" disabled={saving}>{saving ? '저장 중...' : '저장'}</Button>
          </div>
        </form>
      );
    }

    function ASForm({ initial, staffNames, onSave, onCancel }) {
      const toast = useToast();
      const [f, setF] = useState(initial ? {
        received_date: initial.received_date || '', title: initial.title || '', detail: initial.detail || '',
        status: AS_STATES.includes(initial.status) ? initial.status : '접수', handled_date: initial.handled_date || '',
        staff: initial.staff || '', cost: initial.cost != null ? String(initial.cost) : '',
      } : { received_date: todayStr(), title: '', detail: '', status: '접수', handled_date: '', staff: '', cost: '' });
      const [saving, setSaving] = useState(false);
      const submit = async (e) => {
        e.preventDefault();
        if (!f.title.trim()) { toast('AS 내용(제목)을 입력하세요.', 'error'); return; }
        setSaving(true);
        await onSave({
          received_date: f.received_date || null, title: f.title.trim(), detail: f.detail.trim(),
          status: f.status, handled_date: f.handled_date || null, staff: f.staff.trim(), cost: Math.max(0, Math.round(Number(f.cost) || 0)),
        });
        setSaving(false);
      };
      return (
        <form onSubmit={submit} className="space-y-4">
          <Input label="AS 내용 / 제목 *" placeholder="예: 회의실 도어 흔들림" value={f.title} onChange={(e) => setF({ ...f, title: e.target.value })} />
          <Textarea label="상세 내용" rows="2" placeholder="증상/요청 상세" value={f.detail} onChange={(e) => setF({ ...f, detail: e.target.value })} />
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Input label="접수일" type="date" value={f.received_date || ''} onChange={(e) => setF({ ...f, received_date: e.target.value })} />
            <Select label="상태" value={f.status} onChange={(e) => setF({ ...f, status: e.target.value })}>
              {AS_STATES.map((s) => <option key={s} value={s}>{s}</option>)}
            </Select>
            <Input label="처리 완료일" type="date" value={f.handled_date || ''} onChange={(e) => setF({ ...f, handled_date: e.target.value })} />
            <Combo label="담당자" placeholder="담당자 선택/입력" value={f.staff} options={staffNames} onChange={(e) => setF({ ...f, staff: e.target.value })} />
          </div>
          <Input label="AS 비용 (원)" type="number" inputMode="numeric" min="0" placeholder="예: 50000" value={f.cost} onChange={(e) => setF({ ...f, cost: e.target.value })} />
          <div className="flex gap-2 justify-end pt-1">
            <Button variant="secondary" onClick={onCancel}>취소</Button>
            <Button type="submit" disabled={saving}>{saving ? '저장 중...' : '저장'}</Button>
          </div>
        </form>
      );
    }

    function MeetingsAsTab({ site, staffNames = [] }) {
      const toast = useToast();
      const [view, setView] = useState('meetings');
      const [meetings, setMeetings] = useState([]);
      const [asList, setAsList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [mEditorOpen, setMEditorOpen] = useState(false);
      const [mEditing, setMEditing] = useState(null);
      const [mDel, setMDel] = useState(null);
      const [aEditorOpen, setAEditorOpen] = useState(false);
      const [aEditing, setAEditing] = useState(null);
      const [aDel, setADel] = useState(null);
      const reload = useCallback(async () => {
        setLoading(true);
        try { const [m, a] = await Promise.all([api.listMeetings(site.id), api.listAS(site.id)]); setMeetings(Array.isArray(m) ? m : []); setAsList(Array.isArray(a) ? a : []); }
        catch (e) { setMeetings([]); setAsList([]); }
        finally { setLoading(false); }
      }, [site.id]);
      useEffect(() => { reload(); }, [reload]);
      const asCost = useMemo(() => asList.reduce((s, a) => s + (Number(a.cost) || 0), 0), [asList]);
      const openCount = useMemo(() => asList.filter((a) => a.status !== '완료').length, [asList]);
      const saveMeeting = async (body) => {
        try {
          if (mEditing) { await api.updateMeeting(mEditing.id, body); toast('미팅이 수정되었습니다.', 'success'); }
          else { await api.createMeeting(site.id, body); toast('미팅이 기록되었습니다.', 'success'); }
          setMEditorOpen(false); setMEditing(null); await reload();
        } catch (e) { toast('저장 실패', 'error'); }
      };
      const delMeeting = async () => { const m = mDel; setMDel(null); try { await api.removeMeeting(m.id); toast('미팅이 삭제되었습니다.', 'info'); await reload(); } catch (e) { toast('삭제 실패', 'error'); } };
      const saveAS = async (body) => {
        try {
          if (aEditing) { await api.updateAS(aEditing.id, body); toast('AS가 수정되었습니다.', 'success'); }
          else { await api.createAS(site.id, body); toast('AS가 접수되었습니다.', 'success'); }
          setAEditorOpen(false); setAEditing(null); await reload();
        } catch (e) { toast('저장 실패', 'error'); }
      };
      const delAS = async () => { const a = aDel; setADel(null); try { await api.removeAS(a.id); toast('AS가 삭제되었습니다.', 'info'); await reload(); } catch (e) { toast('삭제 실패', 'error'); } };
      const subBtn = (id, label, badge) => (
        <button onClick={() => setView(id)} className={`flex-1 px-3 py-2 rounded-xl text-sm font-semibold transition ${view === id ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
          {label}{badge != null && badge > 0 && <span className={`ml-1.5 text-[10px] px-1.5 py-0.5 rounded-full ${view === id ? 'bg-white/25' : 'bg-slate-200 text-slate-600'}`}>{badge}</span>}
        </button>
      );
      return (
        <div className="space-y-6">
          <Card className="p-1.5">
            <div className="flex gap-1">
              {subBtn('meetings', '📝 미팅', meetings.length)}
              {subBtn('as', '🛠 AS', openCount)}
            </div>
          </Card>

          {view === 'meetings' ? (
            <Card className="p-5">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-base font-bold text-slate-800">미팅 기록 <span className="text-sm font-normal text-slate-400">· {meetings.length}건</span></h2>
                <Button size="sm" onClick={() => { setMEditing(null); setMEditorOpen(true); }}>+ 미팅 기록</Button>
              </div>
              {loading ? (
                <div className="h-32 bg-slate-100 rounded-xl animate-pulse"></div>
              ) : meetings.length === 0 ? (
                <p className="text-sm text-slate-400 text-center py-10">기록된 미팅이 없습니다.</p>
              ) : (
                <ol className="relative border-l-2 border-slate-100 ml-2 space-y-5">
                  {meetings.map((m) => (
                    <li key={m.id} className="ml-5">
                      <span className="absolute -left-[7px] mt-1.5 w-3 h-3 rounded-full bg-blue-500 border-2 border-white"></span>
                      <div className="p-3 rounded-xl border border-slate-100 bg-slate-50/50">
                        <div className="flex items-start justify-between gap-2">
                          <div className="min-w-0">
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="text-xs font-mono text-slate-400">{m.meeting_date || '날짜 미정'}</span>
                              <span className="font-bold text-slate-800">{m.title}</span>
                            </div>
                            {m.attendees && <p className="text-xs text-slate-500 mt-1">👥 {m.attendees}</p>}
                            {m.content && <p className="text-sm text-slate-600 mt-1 whitespace-pre-wrap">{m.content}</p>}
                            {m.next_action && <p className="text-sm text-blue-600 mt-1.5">➡️ <span className="font-medium">다음 액션:</span> {m.next_action}</p>}
                          </div>
                          <div className="shrink-0 flex gap-1">
                            <button onClick={() => { setMEditing(m); setMEditorOpen(true); }} className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50">✏️</button>
                            <button onClick={() => setMDel(m)} className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50">🗑️</button>
                          </div>
                        </div>
                      </div>
                    </li>
                  ))}
                </ol>
              )}
            </Card>
          ) : (
            <Card className="p-5">
              <div className="flex flex-wrap items-center justify-between gap-2 mb-4">
                <div>
                  <h2 className="text-base font-bold text-slate-800">AS 관리 <span className="text-sm font-normal text-slate-400">· {asList.length}건</span></h2>
                  <p className="text-xs text-slate-400 mt-0.5">미완료 {openCount}건 · AS 비용 합계 <span className="font-bold text-slate-600">{fmtWon(asCost)}</span></p>
                </div>
                <Button size="sm" onClick={() => { setAEditing(null); setAEditorOpen(true); }}>+ AS 접수</Button>
              </div>
              {loading ? (
                <div className="h-32 bg-slate-100 rounded-xl animate-pulse"></div>
              ) : asList.length === 0 ? (
                <p className="text-sm text-slate-400 text-center py-10">접수된 AS가 없습니다.</p>
              ) : (
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead><tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                      <th className="py-2 pr-3 font-medium">접수일</th><th className="py-2 pr-3 font-medium">내용</th>
                      <th className="py-2 pr-3 font-medium">상태</th><th className="py-2 pr-3 font-medium">처리완료일</th>
                      <th className="py-2 pr-3 font-medium">담당자</th><th className="py-2 pr-3 font-medium text-right">비용</th>
                      <th className="py-2 font-medium text-right">관리</th></tr></thead>
                    <tbody className="divide-y divide-slate-100">
                      {asList.map((a) => (

                          <td className="py-2 pr-3"><Badge color={AS_STATUS_COLOR[a.status] || 'bg-slate-400'}>{a.status || '접수'}</Badge></td>
                          <td className="py-2 pr-3 text-slate-500 whitespace-nowrap">{a.handled_date || '-'}</td>

                          <td className="py-2 text-right whitespace-nowrap">

          <Modal isOpen={mEditorOpen} onClose={() => { setMEditorOpen(false); setMEditing(null); }} title={mEditing ? '미팅 수정' : '새 미팅 기록'} size="lg">
            <MeetingForm key={mEditing ? mEditing.id : 'new'} initial={mEditing} onSave={saveMeeting} onCancel={() => { setMEditorOpen(false); setMEditing(null); }} />
          </Modal>
          <Modal isOpen={!!mDel} onClose={() => setMDel(null)} title="미팅 삭제 확인" size="sm">
            {mDel && (

    // 🧩 관리 (마스터, 전역)

    function StaffManager({ staff, onChanged }) {
      const toast = useToast();
      const [form, setForm] = useState({ name: '', role: '', phone: '' });
      const [editing, setEditing] = useState(null);
      const [eForm, setEForm] = useState({ name: '', role: '', phone: '', active: true });
      const add = async (e) => {
        e.preventDefault();
        if (!form.name.trim()) { toast('이름을 입력하세요.', 'error'); return; }
        try { await api.createStaff({ name: form.name.trim(), role: form.role.trim(), phone: form.phone.trim() }); setForm({ name: '', role: '', phone: '' }); toast('담당자 추가됨', 'success'); await onChanged(); }
        catch (err) { toast(err.status === 409 ? err.message : '추가 실패', 'error'); }
      };
      const startEdit = (s) => { setEditing(s); setEForm({ name: s.name, role: s.role || '', phone: s.phone || '', active: s.active !== false }); };
      const saveEdit = async () => {
        if (!eForm.name.trim()) { toast('이름을 입력하세요.', 'error'); return; }
        try { await api.updateStaff(editing.id, { name: eForm.name.trim(), role: eForm.role.trim(), phone: eForm.phone.trim(), active: eForm.active }); setEditing(null); toast('수정됨', 'success'); await onChanged(); }
        catch (err) { toast(err.status === 409 ? err.message : '수정 실패', 'error'); }
      };
      const toggle = async (s) => { try { await api.updateStaff(s.id, { name: s.name, role: s.role || '', phone: s.phone || '', active: !(s.active !== false) }); await onChanged(); } catch (e) { toast('변경 실패', 'error'); } };
      const remove = async (s) => { try { await api.removeStaff(s.id); toast('삭제됨', 'info'); await onChanged(); } catch (e) { toast('삭제 실패', 'error'); } };
      return (
        <Card className="p-5">
          <h2 className="text-base font-bold text-slate-800 mb-4">담당자 마스터</h2>
          <form onSubmit={add} className="grid grid-cols-1 sm:grid-cols-[1fr_1fr_1fr_auto] gap-2 mb-4">
            <Input placeholder="이름 *" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} />
            <Combo placeholder="직책" value={form.role} options={STAFF_ROLES} onChange={(e) => setForm({ ...form, role: e.target.value })} />
            <Input placeholder="연락처" value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} />
            <Button type="submit">추가</Button>
          </form>
          {staff.length === 0 ? <p className="text-sm text-slate-400 text-center py-6">등록된 담당자가 없습니다.</p> : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead><tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                  <th className="py-2 pr-3 font-medium">이름</th><th className="py-2 pr-3 font-medium">직책</th>
                  <th className="py-2 pr-3 font-medium">연락처</th><th className="py-2 pr-3 font-medium">상태</th>
                  <th className="py-2 font-medium text-right">관리</th></tr></thead>
                <tbody className="divide-y divide-slate-100">
                  {staff.map((s) => (
                    <tr key={s.id} className={s.active === false ? 'opacity-50' : ''}>
                      <td className="py-2 pr-3 font-medium text-slate-700">{s.name}</td>
                      <td className="py-2 pr-3 text-slate-500">{s.role || '-'}</td>
                      <td className="py-2 pr-3 text-slate-500">{s.phone || '-'}</td>
                      <td className="py-2 pr-3"><button onClick={() => toggle(s)}><Badge color={s.active === false ? 'bg-slate-400' : 'bg-emerald-500'}>{s.active === false ? '비활성' : '활성'}</Badge></button></td>
                      <td className="py-2 text-right whitespace-nowrap">
                        <button onClick={() => startEdit(s)} className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50">✏️</button>
                        <button onClick={() => remove(s)} className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50">🗑️</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          <Modal isOpen={!!editing} onClose={() => setEditing(null)} title="담당자 수정" size="md">
            {editing && (
              <div className="space-y-3">
                <Input label="이름 *" value={eForm.name} onChange={(e) => setEForm({ ...eForm, name: e.target.value })} />
                <Combo label="직책" value={eForm.role} options={STAFF_ROLES} onChange={(e) => setEForm({ ...eForm, role: e.target.value })} />

    function CategoryColumn({ title, kind, items, onChanged }) {
      const toast = useToast();
      const [newName, setNewName] = useState('');
      const [editId, setEditId] = useState(null);
      const [editName, setEditName] = useState('');
      const sorted = [...(items || [])].sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
      const add = async (e) => {
        e.preventDefault(); if (!newName.trim()) return;
        try { await api.createCategory({ kind, name: newName.trim() }); setNewName(''); await onChanged(); }
        catch (err) { toast(err.status === 409 ? err.message : '추가 실패', 'error'); }
      };
      const saveName = async (c) => { if (!editName.trim()) { setEditId(null); return; } try { await api.updateCategory(c.id, { name: editName.trim() }); setEditId(null); await onChanged(); } catch (e) { toast('수정 실패', 'error'); } };
      const toggle = async (c) => { try { await api.updateCategory(c.id, { active: !(c.active !== false) }); await onChanged(); } catch (e) { toast('변경 실패', 'error'); } };
      const remove = async (c) => { try { await api.removeCategory(c.id); await onChanged(); } catch (e) { toast('삭제 실패', 'error'); } };
      const move = async (c, dir) => {
        const idx = sorted.findIndex((x) => String(x.id) === String(c.id));
        const j = idx + dir; if (j < 0 || j >= sorted.length) return;
        const other = sorted[j];
        try { await api.updateCategory(c.id, { sort_order: other.sort_order }); await api.updateCategory(other.id, { sort_order: c.sort_order }); await onChanged(); }
        catch (e) { toast('순서 변경 실패', 'error'); }
      };
      return (
        <div>
          <h3 className="text-sm font-bold text-slate-700 mb-2">{title}</h3>
          <form onSubmit={add} className="flex gap-2 mb-3">
            <input className="flex-1 px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" placeholder="새 카테고리" value={newName} onChange={(e) => setNewName(e.target.value)} />
            <Button size="sm" type="submit">추가</Button>
          </form>
          <ul className="space-y-1">
            {sorted.map((c, i) => (
              <li key={c.id} className={`flex items-center gap-2 px-2 py-1.5 rounded-lg border border-slate-100 ${c.active === false ? 'opacity-50' : ''}`}>
                <div className="flex flex-col">
                  <button onClick={() => move(c, -1)} disabled={i === 0} className="text-[9px] leading-none text-slate-400 disabled:opacity-30" aria-label="위로">▲</button>
                  <button onClick={() => move(c, 1)} disabled={i === sorted.length - 1} className="text-[9px] leading-none text-slate-400 disabled:opacity-30" aria-label="아래로">▼</button>
                </div>
                {editId === c.id ? (
                  <input autoFocus className="flex-1 px-2 py-1 rounded border border-slate-300 text-sm" value={editName}
                    onChange={(e) => setEditName(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') saveName(c); if (e.key === 'Escape') setEditId(null); }} />
                ) : (
                  <span className="flex-1 text-sm text-slate-700 truncate">{c.name}</span>
                )}
                {editId === c.id ? (
                  <button onClick={() => saveName(c)} className="text-xs text-blue-600 font-semibold">저장</button>
                ) : (
                  <button onClick={() => { setEditId(c.id); setEditName(c.name); }} className="text-slate-400 hover:text-blue-600" aria-label="이름수정">✏️</button>
                )}
                <button onClick={() => toggle(c)} aria-label="활성토글"><Badge color={c.active === false ? 'bg-slate-400' : 'bg-emerald-500'}>{c.active === false ? '비활성' : '활성'}</Badge></button>
                <button onClick={() => remove(c)} className="text-slate-400 hover:text-red-600" aria-label="삭제">🗑️</button>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // (v3) 단가 카탈로그 관리 (전역 마스터)

                  <th className="py-2 pr-2 font-medium">단위</th>

                      <td className="py-2 pr-2 text-right text-slate-600">{fmtNum(c.sub_price)}</td>

                  <Input label="노무비단가 (원)" type="number" min="0" value={eForm.labor_price} onChange={(e) => setEForm({ ...eForm, labor_price: e.target.value })} />
                  <Input label="부자재단가 (원)" type="number" min="0" value={eForm.sub_price} onChange={(e) => setEForm({ ...eForm, sub_price: e.target.value })} />
                  <Input label="품명/스펙" value={eForm.product_name} onChange={(e) => setEForm({ ...eForm, product_name: e.target.value })} />
                  <Input label="업체" value={eForm.vendor} onChange={(e) => setEForm({ ...eForm, vendor: e.target.value })} />
                  <Input label="코드" value={eForm.code} onChange={(e) => setEForm({ ...eForm, code: e.target.value })} />
                </div>
                <label className="flex items-center gap-2 text-sm text-slate-700">
                  <input type="checkbox" checked={eForm.active} onChange={(e) => setEForm({ ...eForm, active: e.target.checked })} /> 활성
                </label>
                <div className="flex gap-2 justify-end pt-1">
                  <Button variant="secondary" onClick={() => setEditing(null)}>취소</Button>
                  <Button onClick={saveEdit}>저장</Button>
                </div>
              </div>
            )}
          </Modal>
          <Modal isOpen={!!delTarget} onClose={() => setDelTarget(null)} title="카탈로그 삭제" size="sm">
            {delTarget && (
              <div>
                <p className="text-sm text-slate-600">'<span className="font-semibold">{delTarget.name}</span>' 항목을 삭제하시겠습니까?<br />이미 작성된 견적 항목은 값 복사본이라 영향받지 않습니다.</p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setDelTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDel}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </Card>
      );

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const toast = useToast();
      const [sites, setSites] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [sitesLoading, setSitesLoading] = useState(true);
      const [usingMock, setUsingMock] = useState(false);

      const [costs, setCosts] = useState([]);
      const [summary, setSummary] = useState(null);
      const [detailLoading, setDetailLoading] = useState(false);
      const [error, setError] = useState(null);

      const [editingCost, setEditingCost] = useState(null);
      const [costDeleteTarget, setCostDeleteTarget] = useState(null);

      const [siteModalOpen, setSiteModalOpen] = useState(false);
      const [editingSite, setEditingSite] = useState(null);
      const [siteDeleteTarget, setSiteDeleteTarget] = useState(null);

      // v2: 탭 / 마스터 / 일정 / 견적 / 인쇄
      const [activeTab, setActiveTab] = useState(() => localStorage.getItem(TAB_KEY) || 'summary');
      const [staff, setStaff] = useState([]);
      const [vendors, setVendors] = useState([]);
      const [cats, setCats] = useState({ cost: [], process: [] });
      const [schedule, setSchedule] = useState([]);
      const [estimates, setEstimates] = useState([]);
      const [printData, setPrintData] = useState(null);
      const [schedulePrintData, setSchedulePrintData] = useState(null); // v6-3 일정표 PDF

      const formRef = useRef(null);

      const selectedSite = useMemo(() => sites.find((s) => s.id === selectedId) || null, [sites, selectedId]);

      // 마스터 기반 드롭다운용 이름 배열 (없으면 상수 폴백)
      const costCatNames = useMemo(() => (cats.cost && cats.cost.length ? cats.cost.map((c) => c.name) : COST_CATEGORIES), [cats]);
      const procCatNames = useMemo(() => (cats.process && cats.process.length ? cats.process.map((c) => c.name) : PROCESS_CATEGORIES), [cats]);
      const staffNames = useMemo(() => staff.map((s) => s.name), [staff]);
      const vendorNames = useMemo(() => vendors.map((v) => v.name), [vendors]);

      useEffect(() => { localStorage.setItem(TAB_KEY, activeTab); }, [activeTab]);

      // ── 현장 목록 로드 ──
      const loadSites = useCallback(async (preferId) => {
        setSitesLoading(true);
        setError(null);
        try {
          const data = await api.listSites();
          setSites(data);
          setUsingMock(api._useMock);
          // 선택 유지 / 복원 / 첫 항목
          const saved = preferId || localStorage.getItem(SEL_KEY);
          let next = null;
          if (saved && data.some((s) => String(s.id) === String(saved))) next = data.find((s) => String(s.id) === String(saved)).id;
          else if (data.length > 0) next = data[0].id;
          setSelectedId(next);
        } catch (e) {
          setError('현장 목록을 불러오지 못했습니다.');
        } finally {
          setSitesLoading(false);
        }
      }, []);

      useEffect(() => { loadSites(); }, [loadSites]);

      // ── 마스터(담당자/거래처/카테고리) 1회 로드 — 드롭다운 공용 ──
      const loadMasters = useCallback(async () => {
        try {
          const [st, vd, ct] = await Promise.all([api.listStaff(), api.listVendors(), api.listCategories()]);
          setStaff(st); setVendors(vd); setCats(ct); setUsingMock(api._useMock);
        } catch (e) { /* 실패 시 상수 폴백 유지 */ }
      }, []);
      useEffect(() => { loadMasters(); }, [loadMasters]);

      // ── 선택 현장 상세(비용+요약+일정+견적) 로드 ──
      const loadDetail = useCallback(async (site) => {
        if (!site) { setCosts([]); setSummary(null); setSchedule([]); setEstimates([]); return; }
        setDetailLoading(true);
        try {
          const [cs, sm, sch, est] = await Promise.all([
            api.listCosts(site.id), api.summary(site.id, site), api.listSchedule(site.id), api.listEstimates(site.id),
          ]);
          setCosts(cs); setSummary(sm); setSchedule(sch); setEstimates(est);
          setUsingMock(api._useMock);
        } catch (e) {
          toast('현장 정보를 불러오지 못했습니다.', 'error');
        } finally {
          setDetailLoading(false);
        }
      }, [toast]);

      useEffect(() => {
        if (selectedId != null) {
          localStorage.setItem(SEL_KEY, String(selectedId));
          loadDetail(selectedSite);
        } else {
          setCosts([]); setSummary(null);
        }
      }, [selectedId, selectedSite, loadDetail]);

      const refreshDetail = useCallback(() => loadDetail(selectedSite), [loadDetail, selectedSite]);

      // ── 견적 인쇄: printData 세팅 → 인쇄 → 인쇄 후 정리 ──
      const handlePrint = useCallback((estimate) => {
        setPrintData({ site: selectedSite, estimate, totals: computeTotals(estimate) });
      }, [selectedSite]);
      useEffect(() => {
        if (!printData) return;
        const t = setTimeout(() => window.print(), 80);
        const after = () => setPrintData(null);
        window.addEventListener('afterprint', after);
        return () => { clearTimeout(t); window.removeEventListener('afterprint', after); };
      }, [printData]);

      // ── 일정표 인쇄(PDF): schedulePrintData 세팅 → 인쇄 → 정리 (견적 인쇄와 영역 분리) ──
      const handlePrintSchedule = useCallback(() => {
        setSchedulePrintData({ site: selectedSite, tasks: schedule });
      }, [selectedSite, schedule]);
      useEffect(() => {
        if (!schedulePrintData) return;
        const t = setTimeout(() => window.print(), 80);
        const after = () => setSchedulePrintData(null);
        window.addEventListener('afterprint', after);
        return () => { clearTimeout(t); window.removeEventListener('afterprint', after); };
      }, [schedulePrintData]);

      // ── 현장 등록/수정 ──
      const handleSaveSite = async (body) => {
        try {
          if (editingSite) {
            await api.updateSite(editingSite.id, body);
            toast('현장 정보가 수정되었습니다.', 'success');
          } else {
            const created = await api.createSite(body);
            toast('현장이 등록되었습니다.', 'success');
            setSiteModalOpen(false);
            setEditingSite(null);
            await loadSites(created.id);
            return true;
          }
          setSiteModalOpen(false);
          setEditingSite(null);
          await loadSites(editingSite ? editingSite.id : undefined);
          return true;
        } catch (e) {
          toast(e.status === 409 ? (e.message || '이미 같은 이름의 현장이 있습니다.') : '저장에 실패했습니다.', 'error');
          return false;
        }
      };

      const confirmDeleteSite = async () => {
        if (!siteDeleteTarget) return;
        const target = siteDeleteTarget;
        setSiteDeleteTarget(null);
        try {
          await api.removeSite(target.id);
          toast('현장이 삭제되었습니다. (자료 폴더는 보존됩니다)', 'info');
          const remaining = sites.filter((s) => s.id !== target.id);
          await loadSites(remaining[0] ? remaining[0].id : undefined);
        } catch (e) {
          toast('현장 삭제에 실패했습니다.', 'error');
        }
      };

      // ── 비용 등록/수정 ──
      const handleSubmitCost = async (body) => {
        if (!selectedSite) return false;
        try {
          if (editingCost) {
            await api.updateCost(editingCost.id, body);
            setEditingCost(null);
            toast('비용이 수정되었습니다.', 'success');
          } else {
            await api.createCost(selectedSite.id, body);
            toast('비용이 등록되었습니다.', 'success');
          }
          setUsingMock(api._useMock);
          await refreshDetail();
          return true;
        } catch (e) {
          toast('저장에 실패했습니다.', 'error');
          return false;
        }
      };

      const handleEditCost = (c) => {
        setEditingCost(c);
        if (formRef.current) formRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      const confirmDeleteCost = async () => {
        if (!costDeleteTarget) return;
        const id = costDeleteTarget.id;
        setCostDeleteTarget(null);
        try {
          await api.removeCost(id);
          if (editingCost && editingCost.id === id) setEditingCost(null);
          setUsingMock(api._useMock);
          await refreshDetail();
          toast('비용이 삭제되었습니다.', 'info');
        } catch (e) {
          toast('삭제에 실패했습니다.', 'error');
        }
      };

      // ── CSV 내보내기 ──
      const handleExport = async () => {
        if (!selectedSite) return;
        // 서버 모드: 서버 export 엔드포인트로 다운로드 시도
        if (!api._useMock) {
          try {
            const res = await fetch(api.exportUrl(selectedSite.id));
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const blob = await res.blob();
            downloadBlob(blob, `${selectedSite.name}-비용내역.csv`);
            toast('CSV를 내보냈습니다.', 'success');
            return;
          } catch (e) {
            // 서버 실패 시 브라우저 폴백으로 진행
          }
        }
        // 폴백: 브라우저에서 CSV 생성
        const header = ['날짜', '금액', '비용카테고리', '공정', '담당자', '거래처', '메모'];
        const esc = (v) => {
          const s = (v == null ? '' : String(v));
          return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
        };
        const lines = [header.join(',')];
        costs.forEach((c) => {
          lines.push([c.date, c.amount, c.category, c.process || '', c.manager || '', c.vendor || '', c.memo || ''].map(esc).join(','));
        });
        const csv = '﻿' + lines.join('\r\n'); // UTF-8 BOM
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
        downloadBlob(blob, `${selectedSite.name}-비용내역.csv`);
        toast('CSV를 내보냈습니다. (브라우저 다운로드)', 'success');
      };

      return (
        <>
        <div className="min-h-screen no-print">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-40">
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
              <h1 className="text-lg sm:text-xl font-extrabold text-slate-800 flex items-center gap-2">
                <span>🏗️</span> <span className="hidden sm:inline">인테리어 현장 비용관리</span><span className="sm:hidden">현장 비용관리</span>
              </h1>
              {usingMock && (
                <span className="text-[11px] font-medium px-2.5 py-1 rounded-full bg-amber-100 text-amber-700 shrink-0"
                  title="서버 연결 없이 브라우저(localStorage) 데이터로 동작 중입니다.">
                  오프라인 데모 모드
                </span>
              )}
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-6 space-y-6">
            {/* 에러 배너 */}
            {error && (
              <Card className="p-4 bg-red-50 border-red-200">
                <div className="flex items-center justify-between">
                  <span className="text-sm text-red-700">{error}</span>
                  <Button variant="danger" size="sm" onClick={() => loadSites()}>다시 시도</Button>
                </div>
              </Card>
            )}

            {/* 현장 선택/관리 바 */}
            <Card className="p-4 sm:p-5">
              <div className="flex flex-col sm:flex-row sm:items-end gap-3">
                <div className="flex-1">
                  <span className="block mb-1.5 text-sm font-medium text-slate-700">현장 선택</span>
                  {sitesLoading ? (
                    <div className="h-11 bg-slate-100 rounded-xl animate-pulse"></div>
                  ) : sites.length === 0 ? (
                    <div className="h-11 flex items-center px-3.5 rounded-xl border border-dashed border-slate-300 text-sm text-slate-400">
                      등록된 현장이 없습니다.
                    </div>
                  ) : (
                    <select
                      value={selectedId != null ? String(selectedId) : ''}
                      onChange={(e) => { setSelectedId(sites.find((s) => String(s.id) === e.target.value).id); setEditingCost(null); }}
                      className="w-full px-3.5 py-2.5 rounded-xl border border-slate-300 bg-white text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition"
                    >
                      {sites.map((s) => <option key={s.id} value={String(s.id)}>{s.name}</option>)}
                    </select>
                  )}
                </div>
                <div className="flex gap-2">
                  {selectedSite && (
                    <>
                      <Button variant="secondary" onClick={() => { setEditingSite(selectedSite); setSiteModalOpen(true); }}>현장 수정</Button>
                      <Button variant="ghost" className="text-red-600 hover:bg-red-50" onClick={() => setSiteDeleteTarget(selectedSite)}>삭제</Button>
                    </>
                  )}
                  <Button onClick={() => { setEditingSite(null); setSiteModalOpen(true); }}>+ 현장 등록</Button>
                </div>
              </div>

              {/* 선택 현장 메타 */}
              {selectedSite && (
                <div className="mt-4 pt-4 border-t border-slate-100 grid grid-cols-2 sm:grid-cols-4 gap-3 text-sm">
                  <div><p className="text-xs text-slate-400">발주처</p><p className="font-medium text-slate-700 truncate">{selectedSite.client || '-'}</p></div>
                  <div><p className="text-xs text-slate-400">담당자</p><p className="font-medium text-slate-700 truncate">{selectedSite.manager || '-'}</p></div>
                  <div>
                    <p className="text-xs text-slate-400">상태</p>
                    <Badge color={SITE_STATUS_COLOR[selectedSite.status] || 'bg-blue-500'}>{selectedSite.status || '진행'}</Badge>
                  </div>
                  <div>
                    <p className="text-xs text-slate-400">태그</p>
                    <div className="flex flex-wrap gap-1">
                      {(selectedSite.tags || '').split(',').map((t) => t.trim()).filter(Boolean).map((t) => (
                        <span key={t} className="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500">#{t}</span>
                      ))}
                      {!(selectedSite.tags || '').trim() && <span className="text-slate-300">-</span>}
                    </div>
                  </div>
                  <div className="col-span-2 sm:col-span-4"><p className="text-xs text-slate-400">주소</p><p className="font-medium text-slate-700 truncate">{selectedSite.address || '-'}</p></div>
                </div>
              )}
            </Card>

            {/* 탭 네비게이션 (항상 표시 — 관리 탭은 현장 없이도 접근 가능) */}
            <TabNav active={activeTab} onChange={setActiveTab} />

            {activeTab === 'projects' ? (
              <ProjectBoard sites={sites} loading={sitesLoading}
                onSelect={(id) => { setSelectedId(id); setEditingCost(null); setActiveTab('summary'); }}
                onNew={() => { setEditingSite(null); setSiteModalOpen(true); }}
                onChanged={() => loadSites(selectedId)} />
            ) : activeTab === 'manage' ? (
              <ManageTab sites={sites} staffNames={staffNames} onMastersChanged={loadMasters} onSitesChanged={loadSites} />
            ) : !selectedSite ? (
              <Card className="p-12 text-center">
                <div className="text-5xl mb-3">🏗️</div>
                <h2 className="text-lg font-bold text-slate-700 mb-1">{sites.length === 0 ? '현장을 먼저 등록하세요' : '현장을 선택하세요'}</h2>
                <p className="text-sm text-slate-400 mb-5">
                  현장을 {sites.length === 0 ? '등록' : '선택'}하면 요약·비용·일정·견적·발주·미팅·AS를 관리할 수 있어요.<br />
                  담당자·거래처·카테고리 마스터는 <span className="font-semibold text-slate-500">⚙️ 관리</span> 탭에서 현장 없이도 설정할 수 있습니다.
                </p>
                {sites.length === 0 && <Button size="lg" onClick={() => { setEditingSite(null); setSiteModalOpen(true); }}>+ 첫 현장 등록하기</Button>}
              </Card>
            ) : (
              <>
                {activeTab === 'summary' && (
                  <div className="space-y-6">
                    <ProjectHeader site={selectedSite} />
                    <SummaryDashboard summary={summary} loading={detailLoading} />
                    <PlanVsActual summary={summary} />
                    <Analysis summary={summary} loading={detailLoading} />
                    <PersonnelSection site={selectedSite} costs={costs} staff={staff} />
                    <MonthlyTrend costs={costs} loading={detailLoading} />
                  </div>
                )}
                {activeTab === 'cost' && (
                  <div className="space-y-6">
                    <div ref={formRef}>
                      <CostForm onSubmit={handleSubmitCost} editing={editingCost} onCancelEdit={() => setEditingCost(null)} siteId={selectedSite.id}
                        catNames={costCatNames} procNames={procCatNames} staffNames={staffNames} vendorNames={vendorNames} scheduleOptions={schedule} />
                    </div>
                    <div className="flex items-center justify-between">
                      <h2 className="text-base font-bold text-slate-800">비용 내역</h2>
                      <Button variant="secondary" size="sm" onClick={handleExport} disabled={costs.length === 0}>⬇ CSV 내보내기</Button>
                    </div>
                    <CostList costs={costs} loading={detailLoading} onEdit={handleEditCost} onAskDelete={setCostDeleteTarget} schedule={schedule} />
                  </div>
                )}
                {activeTab === 'schedule' && (
                  <ScheduleTab key={'sch-' + selectedSite.id} site={selectedSite} tasks={schedule} loading={detailLoading}
                    procNames={procCatNames} staffNames={staffNames} onChanged={refreshDetail} onPrintSchedule={handlePrintSchedule} />
                )}
                {activeTab === 'estimate' && (
                  <EstimateTab key={'est-' + selectedSite.id} site={selectedSite} estimates={estimates} loading={detailLoading}
                    procNames={procCatNames} onChanged={() => loadSites(selectedSite.id)} onPrint={handlePrint} />
                )}
                {activeTab === 'orders' && (
                  <OrdersTab key={'ord-' + selectedSite.id} site={selectedSite} vendorNames={vendorNames} />
                )}
                {activeTab === 'meetings_as' && (
                  <MeetingsAsTab key={'mas-' + selectedSite.id} site={selectedSite} staffNames={staffNames} />
                )}
              </>
            )}

            <footer className="text-center text-xs text-slate-400 py-4">
              현장 비용 · 일정(캘린더/.ics) · 견적서(인쇄/확정) · 마스터 관리 · 서버 미연결 시 localStorage 자동 폴백 · 퍼센트는 프론트에서 직접 계산
            </footer>
          </main>

          {/* 현장 등록/수정 모달 */}
          <Modal isOpen={siteModalOpen} onClose={() => { setSiteModalOpen(false); setEditingSite(null); }}
            title={editingSite ? '현장 수정' : '현장 등록'} size="lg">
            <SiteForm
              key={editingSite ? editingSite.id : 'new'}
              editing={editingSite}
              staffNames={staffNames}
              onSubmit={handleSaveSite}
              onCancel={() => { setSiteModalOpen(false); setEditingSite(null); }}
            />
          </Modal>

          {/* 현장 삭제 확인 모달 */}
          <Modal isOpen={!!siteDeleteTarget} onClose={() => setSiteDeleteTarget(null)} title="현장 삭제 확인" size="sm">
            {siteDeleteTarget && (
              <div>
                <p className="text-sm text-slate-600">
                  '<span className="font-semibold">{siteDeleteTarget.name}</span>' 현장을 삭제하시겠습니까?<br />
                  해당 현장의 <span className="font-semibold text-red-600">모든 비용 내역</span>이 함께 삭제됩니다. (자료 폴더/파일은 보존)
                </p>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setSiteDeleteTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDeleteSite}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>

          {/* 비용 삭제 확인 모달 */}
          <Modal isOpen={!!costDeleteTarget} onClose={() => setCostDeleteTarget(null)} title="비용 삭제 확인" size="sm">
            {costDeleteTarget && (
              <div>
                <p className="text-sm text-slate-600">아래 비용을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.</p>
                <div className="mt-3 p-3 rounded-xl bg-slate-50 border border-slate-100 text-sm">
                  <div className="flex items-center justify-between">
                    <div className="flex flex-wrap items-center gap-1.5">
                      <Badge color={COST_COLOR[costDeleteTarget.category] || 'bg-slate-400'}>{costDeleteTarget.category}</Badge>
                      {costDeleteTarget.process && <Badge color={PROC_COLOR[costDeleteTarget.process] || 'bg-slate-400'}>{costDeleteTarget.process}</Badge>}
                    </div>
                    <span className="font-bold text-slate-800">{fmtWon(costDeleteTarget.amount)}</span>
                  </div>
                  <p className="mt-1 text-slate-500">{costDeleteTarget.memo || '메모 없음'} · {costDeleteTarget.date}</p>
                </div>
                <div className="mt-5 flex gap-2 justify-end">
                  <Button variant="secondary" onClick={() => setCostDeleteTarget(null)}>취소</Button>
                  <Button variant="danger" onClick={confirmDeleteCost}>삭제</Button>
                </div>
              </div>
            )}
          </Modal>
        </div>

        {/* 견적서 인쇄 영역 (화면 숨김 / 인쇄 시에만 표시) */}
        <div id="print-area" className="print-only">
          {printData && <EstimatePrint site={printData.site} estimate={printData.estimate} totals={printData.totals} />}
        </div>
        {/* 일정표 인쇄 영역 (견적과 분리 — 데이터가 세팅된 쪽만 내용이 렌더됨) */}
        <div id="schedule-print-area" className="print-only">
          {schedulePrintData && <SchedulePrint site={schedulePrintData.site} tasks={schedulePrintData.tasks} />}
        </div>
        </>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(
      <ToastProvider>
        <App />
      </ToastProvider>
    );
  </script>
</body>
</html>
