<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세바스찬 - 집사 비서 챗봇</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 타이핑 인디케이터 점 애니메이션 (Tailwind로 표현하기 어려운 지연 애니메이션) */
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }
    .typing-dot {
      animation: typingBounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* 메시지 등장 애니메이션 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-enter {
      animation: fadeInUp 0.3s ease-out;
    }

    /* 골드 톤 스크롤바 */
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb {
      background: rgba(245, 200, 110, 0.3);
      border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-stone-950">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks 추출
    // ========================================
    const { useState, useEffect, useRef, useCallback } = React;

    // ========================================
    // 💾 localStorage 영속화 (대화 저장)
    // ========================================
    const STORAGE_KEY = 'sebastian-conversations-v1'; // 대화 목록 전체
    const ACTIVE_KEY = 'sebastian-active-id-v1';       // 현재 보고 있는 대화 id

    const WELCOME_TEXT =
      '주인님, 돌아오셨군요. 🎩\n주인님의 집사 세바스찬, 대령했습니다. 오늘의 일정이든 정리할 일이든, 무엇이든 분부만 내려 주십시오.';

    // 고유 id 생성
    function uid(prefix) {
      return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
    }

    // 시간 포맷 (오전/오후 h:mm)
    function formatTime(date) {
      let h = date.getHours();
      const m = date.getMinutes().toString().padStart(2, '0');
      const period = h < 12 ? '오전' : '오후';
      h = h % 12;
      if (h === 0) h = 12;
      return `${period} ${h}:${m}`;
    }

    // 세바스찬의 환영 메시지 (새 대화마다 첫 메시지로 삽입)
    function createWelcomeMessage() {
      return { id: uid('w'), sender: 'bot', text: WELCOME_TEXT, time: formatTime(new Date()) };
    }

    // 새 대화 객체
    function createConversation() {
      return {
        id: uid('c'),
        title: '', // 첫 사용자 메시지로 자동 설정 (비어 있으면 '새 대화'로 표시)
        messages: [createWelcomeMessage()],
        createdAt: Date.now(),
        updatedAt: Date.now(),
      };
    }

    // localStorage에서 대화 목록 로드 (없거나 깨졌으면 새 대화 1개)
    function loadConversations() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const arr = JSON.parse(raw);
          if (Array.isArray(arr) && arr.length > 0) return arr;
        }
      } catch (_) {
        /* 파싱 실패 시 무시 */
      }
      return [createConversation()];
    }

    // 저장돼 있던 활성 대화 id 복원
    function loadActiveId() {
      try {
        const saved = localStorage.getItem(ACTIVE_KEY);
        const raw = localStorage.getItem(STORAGE_KEY);
        const arr = raw ? JSON.parse(raw) : null;
        if (saved && Array.isArray(arr) && arr.some((c) => c.id === saved)) return saved;
        if (Array.isArray(arr) && arr.length > 0) return arr[0].id;
      } catch (_) {
        /* 무시 */
      }
      return null;
    }

    // ========================================
    // 🌐 백엔드 API 호출 (POST /api/chat)
    // ========================================
    // 화면에 표시되는 메시지 목록(sender: 'bot' | 'user')을
    // OpenAI 형식(role: 'assistant' | 'user')으로 변환해 서버로 전송한다.
    async function fetchReply(historyMessages) {
      const apiMessages = historyMessages.map((m) => ({
        role: m.sender === 'bot' ? 'assistant' : 'user',
        content: m.text,
      }));

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: apiMessages }),
      });

      let body = null;
      try {
        body = await res.json();
      } catch (_) {
        /* JSON 파싱 실패 */
      }

      if (!res.ok || !body || !body.success) {
        const message = (body && body.message) || '응답을 받지 못했습니다.';
        throw new Error(message);
      }
      return body.data.reply;
    }

    // API 호출 실패 시 사용자에게 보여줄 집사다운 안내 메시지
    const ERROR_REPLY =
      '송구합니다, 주인님. 🎩\n잠시 응답을 가져오지 못했습니다. 잠시 후 다시 분부해 주시겠습니까?';

    // ========================================
    // 🎨 아이콘 (인라인 SVG)
    // ========================================
    const Icon = {
      Menu: (p) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={p.className}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      ),
      Close: (p) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={p.className}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M6 6l12 12M18 6L6 18" />
        </svg>
      ),
      Plus: (p) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" className={p.className}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M12 5v14M5 12h14" />
        </svg>
      ),
      Trash: (p) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={p.className}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M6 7h12M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2m-1 0v12a1 1 0 01-1 1H9a1 1 0 01-1-1V7" />
        </svg>
      ),
      Send: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" className={p.className} viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
        </svg>
      ),
    };

    // ========================================
    // 🎨 Design System Components
    // ========================================

    // 집사 아바타 (실크햇)
    function Avatar({ size = 'md', className = '' }) {
      const sizeMap = { sm: 'w-8 h-8 text-base', md: 'w-11 h-11 text-xl', lg: 'w-14 h-14 text-2xl' };
      return (
        <div
          className={`${sizeMap[size]} rounded-full bg-gradient-to-br from-amber-400 to-yellow-600 flex items-center justify-center shadow-sm ring-1 ring-amber-300/40 shrink-0 ${className}`}
          aria-hidden="true"
        >
          <span>🎩</span>
        </div>
      );
    }

    // 빠른 응답 칩 버튼
    function QuickReplyChip({ label, onClick, disabled }) {
      return (
        <button
          type="button"
          onClick={() => onClick(label)}
          disabled={disabled}
          className="whitespace-nowrap px-4 py-2 rounded-full bg-stone-800/80 border border-amber-700/40 text-amber-200/90 text-sm font-medium shadow-sm hover:bg-stone-700/80 hover:border-amber-500/60 active:scale-95 transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {label}
        </button>
      );
    }

    // 메시지 말풍선
    function MessageBubble({ message }) {
      const isBot = message.sender === 'bot';
      return (
        <div className={`msg-enter flex gap-2.5 ${isBot ? 'justify-start' : 'justify-end'}`}>
          {isBot && <Avatar size="sm" className="mt-1" />}
          <div className={`flex flex-col max-w-[78%] sm:max-w-[70%] ${isBot ? 'items-start' : 'items-end'}`}>
            <div
              className={
                isBot
                  ? 'px-4 py-3 rounded-2xl rounded-tl-md bg-stone-800 text-stone-100 shadow-sm border border-amber-900/40 leading-relaxed'
                  : 'px-4 py-3 rounded-2xl rounded-tr-md bg-gradient-to-br from-amber-400 to-yellow-600 text-stone-900 font-medium shadow-sm leading-relaxed'
              }
            >
              <p className="whitespace-pre-wrap break-words text-[15px]">{message.text}</p>
            </div>
            <span className="text-[11px] text-stone-500 mt-1 px-1">{message.time}</span>
          </div>
        </div>
      );
    }

    // 타이핑 인디케이터
    function TypingIndicator() {
      return (
        <div className="msg-enter flex gap-2.5 justify-start" aria-label="세바스찬이 입력 중입니다">
          <Avatar size="sm" className="mt-1" />
          <div className="px-4 py-4 rounded-2xl rounded-tl-md bg-stone-800 shadow-sm border border-amber-900/40 flex items-center gap-1.5">
            <span className="typing-dot w-2 h-2 rounded-full bg-amber-400 inline-block"></span>
            <span className="typing-dot w-2 h-2 rounded-full bg-amber-400 inline-block"></span>
            <span className="typing-dot w-2 h-2 rounded-full bg-amber-400 inline-block"></span>
          </div>
        </div>
      );
    }

    // ========================================
    // 📚 Sidebar (대화 목록 + 새 대화)
    // ========================================
    function ConversationItem({ conv, active, onSelect, onDelete }) {
      const last = conv.messages[conv.messages.length - 1];
      const preview = (last ? last.text : '').replace(/\n/g, ' ');
      const title = conv.title || '새 대화';
      return (
        <div
          onClick={() => onSelect(conv.id)}
          className={`group flex items-center gap-2 px-3 py-2.5 rounded-xl cursor-pointer transition ${
            active ? 'bg-stone-800 border border-amber-700/40' : 'border border-transparent hover:bg-stone-800/50'
          }`}
        >
          <div className="flex-1 min-w-0">
            <p className={`text-sm font-medium truncate ${active ? 'text-amber-100' : 'text-stone-200'}`}>{title}</p>
            <p className="text-[11px] text-stone-500 truncate">{preview || '대화를 시작해 보세요'}</p>
          </div>
          <button
            type="button"
            onClick={(e) => {
              e.stopPropagation();
              onDelete(conv.id);
            }}
            aria-label="대화 삭제"
            className="shrink-0 p-1 rounded-md text-stone-500 hover:text-red-400 hover:bg-stone-700/50 transition opacity-60 lg:opacity-0 lg:group-hover:opacity-100"
          >
            <Icon.Trash className="w-4 h-4" />
          </button>
        </div>
      );
    }

    function Sidebar({ conversations, activeId, onSelect, onNew, onDelete, isOpen, onClose }) {
      return (
        <React.Fragment>
          {/* 모바일 오버레이 */}
          {isOpen && (
            <div className="fixed inset-0 bg-black/60 z-20 lg:hidden" onClick={onClose} aria-hidden="true"></div>
          )}

          <aside
            className={`fixed lg:static inset-y-0 left-0 z-30 w-72 shrink-0 flex flex-col bg-neutral-950 border-r border-amber-900/30 transform transition-transform duration-300 lg:translate-x-0 ${
              isOpen ? 'translate-x-0' : '-translate-x-full'
            }`}
          >
            {/* 로고 + 모바일 닫기 */}
            <div className="p-3 flex items-center justify-between border-b border-amber-900/30">
              <div className="flex items-center gap-2">
                <Avatar size="sm" />
                <span className="font-serif font-bold text-amber-50 tracking-wide">세바스찬</span>
              </div>
              <button
                type="button"
                onClick={onClose}
                aria-label="사이드바 닫기"
                className="lg:hidden p-1.5 rounded-lg text-stone-400 hover:text-amber-100 hover:bg-stone-800 transition"
              >
                <Icon.Close className="w-5 h-5" />
              </button>
            </div>

            {/* 새 대화 버튼 */}
            <div className="p-3">
              <button
                type="button"
                onClick={onNew}
                className="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl bg-gradient-to-br from-amber-400 to-yellow-600 text-stone-900 font-semibold shadow hover:shadow-lg hover:shadow-amber-900/30 active:scale-[0.98] transition"
              >
                <Icon.Plus className="w-5 h-5" />
                새 대화
              </button>
            </div>

            {/* 대화 목록 */}
            <div className="flex-1 overflow-y-auto chat-scroll px-2 pb-3 space-y-1">
              <p className="px-2 py-1 text-[11px] uppercase tracking-wider text-stone-600 font-semibold">대화 목록</p>
              {conversations.map((conv) => (
                <ConversationItem
                  key={conv.id}
                  conv={conv}
                  active={conv.id === activeId}
                  onSelect={onSelect}
                  onDelete={onDelete}
                />
              ))}
            </div>

            {/* 푸터 */}
            <div className="p-3 border-t border-amber-900/30">
              <p className="text-[11px] text-stone-600 text-center leading-snug">
                🔒 대화는 이 브라우저에만 저장됩니다
              </p>
            </div>
          </aside>
        </React.Fragment>
      );
    }

    // ========================================
    // 🧩 Header (집사 정보 + 햄버거 버튼)
    // ========================================
    function ChatHeader({ onOpenSidebar }) {
      return (
        <header className="shrink-0 bg-stone-900/80 backdrop-blur-md border-b border-amber-800/40">
          <div className="px-4 py-3 flex items-center gap-3">
            {/* 모바일 햄버거 */}
            <button
              type="button"
              onClick={onOpenSidebar}
              aria-label="대화 목록 열기"
              className="lg:hidden p-1.5 -ml-1 rounded-lg text-amber-200/90 hover:bg-stone-800 transition"
            >
              <Icon.Menu className="w-6 h-6" />
            </button>
            <div className="relative">
              <Avatar size="md" />
              <span className="absolute bottom-0 right-0 w-3.5 h-3.5 bg-amber-400 border-2 border-stone-900 rounded-full" aria-hidden="true"></span>
            </div>
            <div className="flex-1 min-w-0">
              <h1 className="font-serif font-bold text-amber-50 text-lg leading-tight tracking-wide">세바스찬</h1>
              <p className="text-xs text-amber-500/90 font-medium flex items-center gap-1">
                <span className="w-1.5 h-1.5 bg-amber-400 rounded-full inline-block"></span>
                대령 중 · 라이프 비서
              </p>
            </div>
          </div>
          {/* 안내 배너 */}
          <div className="px-4 py-2 bg-amber-950/40 border-t border-amber-900/30">
            <p className="text-[11px] text-amber-200/70 leading-snug text-center">
              🎩 세바스찬은 일정·할 일 정리를 돕는 AI 비서입니다. 실제 캘린더·알림을 직접 제어하지는 않으니, 정리와 제안으로 모시겠습니다.
            </p>
          </div>
        </header>
      );
    }

    // ========================================
    // 📄 ChatPage (활성 대화 표시 + 입력)
    // ========================================
    const QUICK_REPLIES = ['오늘 일정 정리해줘', '할 일 우선순위 매겨줘', '아침 루틴 추천해줘', '이번 주 목표 세우기', '주말 계획 짜줘'];

    function ChatPage({ conversation, isTyping, onSend, onOpenSidebar }) {
      const [input, setInput] = useState('');
      const scrollRef = useRef(null);
      const inputRef = useRef(null);

      const messages = conversation.messages;

      // 새 메시지/타이핑/대화 전환 시 자동 스크롤
      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [messages, isTyping, conversation.id]);

      const submit = (text) => {
        const trimmed = text.trim();
        if (!trimmed || isTyping) return;
        onSend(trimmed);
        setInput('');
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        submit(input);
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          submit(input);
        }
      };

      const handleQuickReply = (label) => {
        submit(label);
        if (inputRef.current) inputRef.current.focus();
      };

      return (
        <div className="flex flex-col h-full bg-gradient-to-b from-stone-900 via-neutral-900 to-stone-950">
          <ChatHeader onOpenSidebar={onOpenSidebar} />

          {/* 메시지 영역 */}
          <main ref={scrollRef} className="chat-scroll flex-1 overflow-y-auto px-4 py-5" aria-live="polite">
            <div className="max-w-2xl mx-auto w-full space-y-4">
              {messages.map((m) => (
                <MessageBubble key={m.id} message={m} />
              ))}
              {isTyping && <TypingIndicator />}
            </div>
          </main>

          {/* 빠른 응답 칩 */}
          <div className="shrink-0 px-4 pt-2 pb-1">
            <div className="max-w-2xl mx-auto w-full overflow-x-auto">
              <div className="flex gap-2 w-max">
                {QUICK_REPLIES.map((q) => (
                  <QuickReplyChip key={q} label={q} onClick={handleQuickReply} disabled={isTyping} />
                ))}
              </div>
            </div>
          </div>

          {/* 입력창 */}
          <footer className="shrink-0 bg-stone-900/80 backdrop-blur-md border-t border-amber-800/40 px-3 py-3">
            <form onSubmit={handleSubmit} className="max-w-2xl mx-auto w-full flex items-end gap-2">
              <textarea
                ref={inputRef}
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                rows={1}
                placeholder="세바스찬에게 분부하실 내용을 적어 주십시오..."
                aria-label="메시지 입력"
                className="flex-1 resize-none max-h-28 px-4 py-2.5 rounded-2xl border border-amber-800/40 bg-stone-800 text-stone-100 text-[15px] placeholder-stone-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-transparent leading-relaxed"
              />
              <button
                type="submit"
                disabled={!input.trim() || isTyping}
                aria-label="메시지 전송"
                className="shrink-0 w-11 h-11 rounded-full bg-gradient-to-br from-amber-400 to-yellow-600 text-stone-900 flex items-center justify-center shadow-md hover:shadow-lg hover:shadow-amber-900/30 active:scale-95 transition disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100"
              >
                <Icon.Send className="w-5 h-5" />
              </button>
            </form>
          </footer>
        </div>
      );
    }

    // ========================================
    // 🚀 App (대화 상태 관리 + localStorage 동기화)
    // ========================================
    function App() {
      const [conversations, setConversations] = useState(loadConversations);
      const [activeId, setActiveId] = useState(loadActiveId);
      const [typingConvId, setTypingConvId] = useState(null); // 응답 대기 중인 대화 id
      const [sidebarOpen, setSidebarOpen] = useState(false);

      // 대화 목록이 바뀔 때마다 localStorage에 저장
      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
        } catch (_) {
          /* 저장 실패 시 무시 */
        }
      }, [conversations]);

      // 활성 대화 id 저장
      useEffect(() => {
        try {
          if (activeId) localStorage.setItem(ACTIVE_KEY, activeId);
        } catch (_) {
          /* 무시 */
        }
      }, [activeId]);

      // activeId가 유효하지 않으면 첫 대화로 보정
      useEffect(() => {
        if (conversations.length > 0 && (!activeId || !conversations.some((c) => c.id === activeId))) {
          setActiveId(conversations[0].id);
        }
      }, [conversations, activeId]);

      const activeConv = conversations.find((c) => c.id === activeId) || conversations[0];

      // 새 대화 시작
      const handleNew = useCallback(() => {
        const conv = createConversation();
        setConversations((prev) => [conv, ...prev]);
        setActiveId(conv.id);
        setSidebarOpen(false);
      }, []);

      // 대화 선택
      const handleSelect = useCallback((id) => {
        setActiveId(id);
        setSidebarOpen(false);
      }, []);

      // 대화 삭제 (마지막 하나를 지우면 빈 대화 1개로 대체)
      const handleDelete = useCallback(
        (id) => {
          const conv = conversations.find((c) => c.id === id);
          const name = (conv && conv.title) || '이 대화';
          if (!window.confirm(`'${name}'를 삭제할까요?`)) return;
          setConversations((prev) => {
            const next = prev.filter((c) => c.id !== id);
            return next.length > 0 ? next : [createConversation()];
          });
        },
        [conversations]
      );

      // 메시지 전송 → 사용자 메시지 추가 → 서버 호출 → 응답 추가
      const handleSend = useCallback(
        async (text) => {
          const convId = activeConv.id;
          if (typingConvId === convId) return; // 같은 대화에서 응답 대기 중이면 무시

          const userMsg = { id: uid('u'), sender: 'user', text, time: formatTime(new Date()) };

          // 현재 대화 맥락(사용자 메시지 포함) 확보
          const baseConv = conversations.find((c) => c.id === convId);
          const history = [...(baseConv ? baseConv.messages : []), userMsg];

          // 사용자 메시지 추가 + (제목이 비어 있으면 첫 메시지로 제목 설정)
          setConversations((prev) =>
            prev.map((c) => {
              if (c.id !== convId) return c;
              const title = c.title || text.slice(0, 28);
              return { ...c, title, messages: [...c.messages, userMsg], updatedAt: Date.now() };
            })
          );
          setTypingConvId(convId);

          try {
            const reply = await fetchReply(history);
            const botMsg = { id: uid('b'), sender: 'bot', text: reply, time: formatTime(new Date()) };
            setConversations((prev) =>
              prev.map((c) =>
                c.id === convId ? { ...c, messages: [...c.messages, botMsg], updatedAt: Date.now() } : c
              )
            );
          } catch (err) {
            const errorMsg = { id: uid('e'), sender: 'bot', text: ERROR_REPLY, time: formatTime(new Date()) };
            setConversations((prev) =>
              prev.map((c) =>
                c.id === convId ? { ...c, messages: [...c.messages, errorMsg], updatedAt: Date.now() } : c
              )
            );
          } finally {
            setTypingConvId((t) => (t === convId ? null : t));
          }
        },
        [activeConv, conversations, typingConvId]
      );

      return (
        <div className="flex h-[100dvh] w-full bg-stone-950 text-stone-100 overflow-hidden">
          <Sidebar
            conversations={conversations}
            activeId={activeId}
            onSelect={handleSelect}
            onNew={handleNew}
            onDelete={handleDelete}
            isOpen={sidebarOpen}
            onClose={() => setSidebarOpen(false)}
          />
          <div className="flex-1 min-w-0 flex flex-col">
            <ChatPage
              key={activeConv.id}
              conversation={activeConv}
              isTyping={typingConvId === activeConv.id}
              onSend={handleSend}
              onOpenSidebar={() => setSidebarOpen(true)}
            />
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
