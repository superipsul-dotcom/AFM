<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🪙 실시간 암호화폐 시세 추적기</title>
    <style>
      /* ===== 기본 / 다크 테마 ===== */
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-2: #1c2330;
        --border: #2a3340;
        --text: #e6edf3;
        --text-dim: #8b949e;
        --up: #2ecc71;
        --up-bg: rgba(46, 204, 113, 0.12);
        --down: #ff5c5c;
        --down-bg: rgba(255, 92, 92, 0.12);
        --flat: #8b949e;
        --accent: #f0b90b; /* 코인 골드 */
        --accent-2: #4c8dff;
        --shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        background: radial-gradient(1200px 600px at 50% -10%, #1a2233 0%, var(--bg) 60%);
        color: var(--text);
        min-height: 100vh;
        padding: 24px 16px 64px;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
      }

      /* ===== 헤더 ===== */
      header.top {
        text-align: center;
        margin-bottom: 24px;
      }
      header.top h1 {
        font-size: 28px;
        margin: 0 0 6px;
        letter-spacing: -0.5px;
      }
      header.top p {
        margin: 0;
        color: var(--text-dim);
        font-size: 14px;
      }

      /* ===== 컨트롤 바 ===== */
      .controls {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: var(--shadow);
        margin-bottom: 24px;
      }

      .search-row {
        position: relative;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .search-input {
        flex: 1 1 240px;
        min-width: 0;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        color: var(--text);
        font-size: 15px;
        outline: none;
        transition: border-color 0.15s;
      }
      .search-input:focus {
        border-color: var(--accent-2);
      }

      button {
        cursor: pointer;
        font-family: inherit;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        transition: transform 0.08s, background 0.15s, opacity 0.15s;
      }
      button:active {
        transform: scale(0.97);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-add {
        background: var(--accent);
        color: #1a1a1a;
        padding: 12px 18px;
        white-space: nowrap;
      }
      .btn-refresh {
        background: var(--accent-2);
        color: #fff;
        padding: 12px 18px;
        white-space: nowrap;
      }

      .meta-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .last-updated {
        color: var(--text-dim);
        font-size: 13px;
      }
      .last-updated b {
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }

      /* ===== 기간(추이) 선택 탭 ===== */
      .range-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 14px;
        flex-wrap: wrap;
      }
      .range-label {
        color: var(--text-dim);
        font-size: 13px;
      }
      .range-tabs {
        display: inline-flex;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 3px;
        gap: 2px;
      }
      .range-tab {
        background: transparent;
        color: var(--text-dim);
        padding: 6px 18px;
      }
      .range-tab.active {
        background: var(--accent-2);
        color: #fff;
      }

      /* ===== 검색 드롭다운 ===== */
      .suggest {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow);
        max-height: 320px;
        overflow-y: auto;
        z-index: 30;
        display: none;
      }
      .suggest.show {
        display: block;
      }
      .suggest-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
      }
      .suggest-item:last-child {
        border-bottom: none;
      }
      .suggest-item:hover {
        background: #243043;
      }
      .suggest-item img {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .suggest-item .s-name {
        font-weight: 600;
        font-size: 14px;
      }
      .suggest-item .s-sym {
        color: var(--text-dim);
        font-size: 12px;
        margin-left: 4px;
      }
      .suggest-item .s-rank {
        margin-left: auto;
        font-size: 12px;
        color: var(--text-dim);
        background: #2a3340;
        padding: 2px 8px;
        border-radius: 999px;
      }
      .suggest-empty,
      .suggest-loading {
        padding: 14px;
        text-align: center;
        color: var(--text-dim);
        font-size: 13px;
      }
      .suggest-item.added {
        opacity: 0.45;
        cursor: default;
      }

      /* ===== 카드 그리드 ===== */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        box-shadow: var(--shadow);
        position: relative;
        transition: border-color 0.2s, background 0.4s;
      }
      .card.up {
        border-color: rgba(46, 204, 113, 0.35);
      }
      .card.down {
        border-color: rgba(255, 92, 92, 0.35);
      }

      .card-head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        padding-right: 66px; /* 우상단 별표 + 삭제 버튼 공간 확보 */
      }
      .card-head img {
        width: 34px;
        height: 34px;
        border-radius: 50%;
      }
      .card-name {
        font-weight: 700;
        font-size: 16px;
        line-height: 1.2;
      }
      .card-symbol {
        color: var(--text-dim);
        font-size: 12px;
        text-transform: uppercase;
      }

      .card-price {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
        font-variant-numeric: tabular-nums;
        margin-bottom: 8px;
      }

      .card-change {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 14px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 999px;
        font-variant-numeric: tabular-nums;
      }
      .card-change.up {
        color: var(--up);
        background: var(--up-bg);
      }
      .card-change.down {
        color: var(--down);
        background: var(--down-bg);
      }
      .card-change.flat {
        color: var(--flat);
        background: rgba(139, 148, 158, 0.12);
      }

      .card-del {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: #2a3340;
        color: var(--text-dim);
        font-size: 14px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }
      .card-del:hover {
        background: var(--down);
        color: #fff;
      }

      /* 즐겨찾기 별표 버튼 (삭제 버튼 왼쪽) */
      .card-fav {
        position: absolute;
        top: 12px;
        right: 44px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: #2a3340;
        color: var(--text-dim);
        font-size: 14px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }
      .card-fav:hover {
        background: #3a4456;
        color: var(--accent);
      }
      .card-fav.on {
        color: var(--accent);
        background: rgba(240, 185, 11, 0.18);
      }

      /* 즐겨찾기된 카드: 은은한 골드 틴트 (gradient = background-image 라 등락 깜빡임과 충돌 없음) */
      .card.fav {
        background: linear-gradient(
            180deg,
            rgba(240, 185, 11, 0.08),
            rgba(22, 27, 34, 0) 55%
          ),
          var(--panel);
      }

      /* 가격 추이 스파크라인 */
      .spark {
        width: 100%;
        height: 42px;
        display: block;
        margin-top: 14px;
      }
      .spark-empty {
        height: 42px;
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-dim);
        font-size: 11px;
        opacity: 0.6;
      }
      /* 등락률 옆 기간 라벨 (예: / 7일) */
      .change-period {
        color: var(--text-dim);
        font-size: 12px;
        margin-left: 8px;
        font-weight: 600;
        vertical-align: middle;
      }

      /* 가격 갱신 시 깜빡임 피드백 */
      @keyframes flashUp {
        0% { background-color: var(--up-bg); }
        100% { background-color: transparent; }
      }
      @keyframes flashDown {
        0% { background-color: var(--down-bg); }
        100% { background-color: transparent; }
      }
      .card.flash-up {
        animation: flashUp 0.9s ease-out;
      }
      .card.flash-down {
        animation: flashDown 0.9s ease-out;
      }

      /* ===== 상태 영역 (로딩/에러/빈목록) ===== */
      .state {
        text-align: center;
        padding: 48px 16px;
        color: var(--text-dim);
        font-size: 15px;
        line-height: 1.6;
      }
      .state .emoji {
        font-size: 40px;
        display: block;
        margin-bottom: 12px;
      }
      .banner {
        background: var(--down-bg);
        border: 1px solid rgba(255, 92, 92, 0.4);
        color: #ffb3b3;
        border-radius: 12px;
        padding: 12px 16px;
        margin-bottom: 16px;
        font-size: 14px;
        display: none;
      }
      .banner.show {
        display: block;
      }

      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: inline-block;
        vertical-align: middle;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      footer {
        text-align: center;
        color: var(--text-dim);
        font-size: 12px;
        margin-top: 40px;
        line-height: 1.7;
      }

      @media (max-width: 480px) {
        .grid {
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        }
        header.top h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <h1>🪙 실시간 암호화폐 시세 추적기</h1>
        <p>CoinGecko 데이터 · 30초 자동 갱신 · 즐겨찾기 ★ · 일/주/월 추이</p>
      </header>

      <section class="controls">
        <div class="search-row">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="코인 이름/심볼 검색 (예: 비트코인, btc, solana)"
            autocomplete="off"
          />
          <button id="addBtn" class="btn-add">＋ 추가</button>
          <button id="refreshBtn" class="btn-refresh">↻ 새로고침</button>
          <div id="suggest" class="suggest"></div>
        </div>
        <div class="range-row">
          <span class="range-label">추이 기간</span>
          <div class="range-tabs" id="rangeTabs">
            <button class="range-tab active" data-range="day">일</button>
            <button class="range-tab" data-range="week">주</button>
            <button class="range-tab" data-range="month">월</button>
          </div>
        </div>
        <div class="meta-row">
          <span class="last-updated">
            마지막 갱신: <b id="lastUpdated">--:--:--</b>
          </span>
          <span id="autoStatus" class="last-updated">자동 갱신 켜짐 (30초)</span>
        </div>
      </section>

      <div id="errorBanner" class="banner"></div>

      <div id="content"></div>

      <footer>
        무료 CoinGecko 공개 API 사용 · 시세는 참고용입니다.<br />
        관심 코인 목록은 이 브라우저에 저장됩니다.
      </footer>
    </div>

    <script src="client.js"></script>
  </body>
</html>
