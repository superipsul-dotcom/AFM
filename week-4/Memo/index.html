<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>심플 메모장</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Tailwind으로 표현하기 어려운 부분만 커스텀 처리 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.25s ease-out both;
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-modal-pop {
      animation: modalPop 0.18s ease-out both;
    }
    /* 본문 텍스트의 줄바꿈 보존 + 카드 내 말줄임 */
    .preserve-lines { white-space: pre-wrap; word-break: break-word; }
    .clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // ========================================
    // 상수 / 유틸리티
    // ========================================
    // API 기본 경로: 같은 Express 서버가 HTML 과 API 를 함께 서빙하므로
    // 절대 URL(http://localhost:xxxx) 을 하드코딩하지 않고 상대경로를 쓴다.
    const API_BASE_URL = '/api';

    // 공통 fetch 래퍼.
    //  - 네트워크 자체가 끊기면(fetch reject) "서버에 연결할 수 없어요" 로 변환.
    //  - HTTP 에러 또는 { success:false } 응답은 서버 메시지를 그대로 throw.
    //  - 본문이 없는 응답(없을 수 있음)도 안전하게 처리.
    async function apiRequest(path, options = {}) {
      let res;
      try {
        res = await fetch(`${API_BASE_URL}${path}`, {
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
      } catch (e) {
        // DNS/네트워크/서버 다운 → fetch 자체가 reject
        throw new Error('서버에 연결할 수 없어요. 서버가 실행 중인지 확인해 주세요.');
      }

      let body = null;
      try {
        body = await res.json();
      } catch (_) {
        // JSON 이 아닌 응답 (예: 502 게이트웨이) → body 는 null 로 둔다
      }

      if (!res.ok || !body || body.success === false) {
        const msg = (body && body.message) || `요청 처리에 실패했습니다. (HTTP ${res.status})`;
        throw new Error(msg);
      }
      return body.data;
    }

    // 메모 API
    const memoApi = {
      list: () => apiRequest('/memos'),
      create: (payload) =>
        apiRequest('/memos', { method: 'POST', body: JSON.stringify(payload) }),
      update: (id, payload) =>
        apiRequest(`/memos/${id}`, { method: 'PUT', body: JSON.stringify(payload) }),
      remove: (id) => apiRequest(`/memos/${id}`, { method: 'DELETE' }),
      // 즐겨찾기 토글: PATCH /api/memos/:id/favorite { favorite }
      toggleFavorite: (id, favorite) =>
        apiRequest(`/memos/${id}/favorite`, {
          method: 'PATCH',
          body: JSON.stringify({ favorite }),
        }),
    };

    // 날짜 포맷 (예: 2026.06.16 14:32)
    // 서버는 createdAt/updatedAt 을 epoch ms 숫자로 내려주므로 기존 로직 그대로.
    function formatDate(ts) {
      const d = new Date(ts);
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}.${pad(d.getMonth() + 1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================

    // --- Button ---
    function Button({
      children,
      variant = 'primary',
      size = 'md',
      type = 'button',
      disabled = false,
      onClick,
      className = '',
      ...rest
    }) {
      const base =
        'inline-flex items-center justify-center gap-1.5 font-medium rounded-lg transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed select-none';

      const variants = {
        primary: 'bg-indigo-600 text-white hover:bg-indigo-700 focus-visible:ring-indigo-500',
        secondary: 'bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 focus-visible:ring-slate-400',
        danger: 'bg-red-600 text-white hover:bg-red-700 focus-visible:ring-red-500',
        ghost: 'bg-transparent text-slate-600 hover:bg-slate-100 focus-visible:ring-slate-400',
      };

      const sizes = {
        sm: 'text-sm px-3 py-1.5',
        md: 'text-sm px-4 py-2',
        lg: 'text-base px-5 py-2.5',
      };

      return (
        <button
          type={type}
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    // --- Input ---
    function Input({
      label,
      type = 'text',
      value,
      onChange,
      placeholder = '',
      error = '',
      disabled = false,
      className = '',
      ...rest
    }) {
      return (
        <div className={className}>
          {label && (
            <label className="block text-sm font-medium text-slate-700 mb-1">{label}</label>
          )}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            aria-invalid={!!error}
            className={`w-full rounded-lg border px-3.5 py-2.5 text-slate-800 placeholder-slate-400 transition-colors focus:outline-none focus:ring-2 disabled:bg-slate-100 ${
              error
                ? 'border-red-400 focus:ring-red-300'
                : 'border-slate-300 focus:border-indigo-500 focus:ring-indigo-200'
            }`}
            {...rest}
          />
          {error && <p className="mt-1 text-sm text-red-600">{error}</p>}
        </div>
      );
    }

    // --- Textarea ---
    function Textarea({
      label,
      value,
      onChange,
      placeholder = '',
      rows = 6,
      error = '',
      className = '',
      ...rest
    }) {
      return (
        <div className={className}>
          {label && (
            <label className="block text-sm font-medium text-slate-700 mb-1">{label}</label>
          )}
          <textarea
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            rows={rows}
            aria-invalid={!!error}
            className={`w-full resize-y rounded-lg border px-3.5 py-2.5 text-slate-800 placeholder-slate-400 transition-colors focus:outline-none focus:ring-2 ${
              error
                ? 'border-red-400 focus:ring-red-300'
                : 'border-slate-300 focus:border-indigo-500 focus:ring-indigo-200'
            }`}
            {...rest}
          />
          {error && <p className="mt-1 text-sm text-red-600">{error}</p>}
        </div>
      );
    }

    // --- Card ---
    function Card({ children, className = '', ...rest }) {
      return (
        <div
          className={`rounded-2xl bg-white shadow-sm ring-1 ring-slate-200 ${className}`}
          {...rest}
        >
          {children}
        </div>
      );
    }

    // --- Modal ---
    function Modal({ isOpen, onClose, title, children, size = 'md' }) {
      // ESC 키로 닫기
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => {
          if (e.key === 'Escape') onClose();
        };
        window.addEventListener('keydown', onKey);
        // 모달 열릴 때 배경 스크롤 잠금
        document.body.style.overflow = 'hidden';
        return () => {
          window.removeEventListener('keydown', onKey);
          document.body.style.overflow = '';
        };
      }, [isOpen, onClose]);

      if (!isOpen) return null;

      const sizes = {
        sm: 'max-w-sm',
        md: 'max-w-md',
        lg: 'max-w-lg',
      };

      return (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center p-4"
          role="dialog"
          aria-modal="true"
          aria-label={title}
        >
          {/* 배경 오버레이 */}
          <div
            className="absolute inset-0 bg-slate-900/50"
            onClick={onClose}
            aria-hidden="true"
          />
          {/* 컨텐츠 */}
          <Card className={`relative z-10 w-full ${sizes[size]} p-6 animate-modal-pop`}>
            {title && (
              <h2 className="mb-3 text-lg font-semibold text-slate-800">{title}</h2>
            )}
            {children}
          </Card>
        </div>
      );
    }

    // --- 아이콘 (간단한 인라인 SVG) ---
    const Icon = {
      Plus: (p) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
          strokeLinecap="round" strokeLinejoin="round" className={p.className || 'w-4 h-4'}>
          <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      ),
      Search: (p) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
          strokeLinecap="round" strokeLinejoin="round" className={p.className || 'w-4 h-4'}>
          <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      ),
      Edit: (p) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
          strokeLinecap="round" strokeLinejoin="round" className={p.className || 'w-4 h-4'}>
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
      ),
      Trash: (p) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
          strokeLinecap="round" strokeLinejoin="round" className={p.className || 'w-4 h-4'}>
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        </svg>
      ),
      Note: (p) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"
          strokeLinecap="round" strokeLinejoin="round" className={p.className || 'w-4 h-4'}>
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="8" y1="13" x2="16" y2="13" /><line x1="8" y1="17" x2="13" y2="17" />
        </svg>
      ),
      Close: (p) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
          strokeLinecap="round" strokeLinejoin="round" className={p.className || 'w-4 h-4'}>
          <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      ),
      // 즐겨찾기 별. filled=true 면 속을 채우고, false 면 외곽선만 그린다.
      Star: (p) => (
        <svg viewBox="0 0 24 24" fill={p.filled ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth="2"
          strokeLinecap="round" strokeLinejoin="round" className={p.className || 'w-4 h-4'}>
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
        </svg>
      ),
    };

    // ========================================
    // 🧩 Common Components
    // ========================================

    // --- 헤더 ---
    function Header({ count }) {
      return (
        <header className="mb-6">
          <div className="flex items-center gap-3">
            <span className="flex h-11 w-11 items-center justify-center rounded-xl bg-indigo-600 text-white shadow-sm">
              <Icon.Note className="w-6 h-6" />
            </span>
            <div>
              <h1 className="text-2xl font-bold text-slate-800">심플 메모장</h1>
              <p className="text-sm text-slate-500">
                {count > 0 ? `총 ${count}개의 메모` : '메모를 작성해 보세요'}
              </p>
            </div>
          </div>
        </header>
      );
    }

    // --- 검색 바 ---
    function SearchBar({ value, onChange, onClear }) {
      return (
        <div className="relative">
          <span className="pointer-events-none absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
            <Icon.Search className="w-5 h-5" />
          </span>
          <input
            type="text"
            value={value}
            onChange={(e) => onChange(e.target.value)}
            placeholder="제목 또는 본문 검색..."
            aria-label="메모 검색"
            className="w-full rounded-lg border border-slate-300 bg-white py-2.5 pl-11 pr-10 text-slate-800 placeholder-slate-400 transition-colors focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200"
          />
          {value && (
            <button
              type="button"
              onClick={onClear}
              aria-label="검색어 지우기"
              className="absolute right-2.5 top-1/2 -translate-y-1/2 rounded-full p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-600"
            >
              <Icon.Close className="w-4 h-4" />
            </button>
          )}
        </div>
      );
    }

    // --- 빈 상태 ---
    function EmptyState({ isSearching, keyword, favoritesOnly }) {
      const icon = isSearching ? (
        <Icon.Search className="w-8 h-8" />
      ) : favoritesOnly ? (
        <Icon.Star className="w-8 h-8" />
      ) : (
        <Icon.Note className="w-8 h-8" />
      );

      return (
        <div className="flex flex-col items-center justify-center rounded-2xl border-2 border-dashed border-slate-300 bg-white/60 px-6 py-16 text-center">
          <span className="mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-slate-100 text-slate-400">
            {icon}
          </span>
          {isSearching ? (
            <>
              <p className="text-base font-medium text-slate-700">검색 결과가 없습니다</p>
              <p className="mt-1 text-sm text-slate-500">
                "<span className="font-medium text-slate-600">{keyword}</span>"와 일치하는 메모를 찾을 수 없어요.
              </p>
            </>
          ) : favoritesOnly ? (
            <>
              <p className="text-base font-medium text-slate-700">즐겨찾기한 메모가 없습니다</p>
              <p className="mt-1 text-sm text-slate-500">
                메모 카드의 별(<span className="text-amber-500">★</span>) 아이콘을 눌러 즐겨찾기에 추가해 보세요.
              </p>
            </>
          ) : (
            <>
              <p className="text-base font-medium text-slate-700">아직 메모가 없습니다</p>
              <p className="mt-1 text-sm text-slate-500">
                위의 입력창에서 첫 번째 메모를 작성해 보세요.
              </p>
            </>
          )}
        </div>
      );
    }

    // ========================================
    // 📄 기능 컴포넌트
    // ========================================

    // --- 메모 작성 폼 ---
    // onAdd 는 async 이며 성공 시 true 를 반환한다. 성공했을 때만 입력값을 비운다.
    function MemoForm({ onAdd, submitting }) {
      const [title, setTitle] = useState('');
      const [content, setContent] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (submitting) return;
        const t = title.trim();
        const c = content.trim();

        if (!t && !c) {
          setError('제목 또는 본문 중 하나는 입력해야 합니다.');
          return;
        }

        const ok = await onAdd({ title: t, content: c });
        if (ok) {
          // 저장 성공 시에만 폼 초기화 (실패하면 입력 내용 보존)
          setTitle('');
          setContent('');
          setError('');
        }
      };

      return (
        <Card className="p-5">
          <form onSubmit={handleSubmit} className="space-y-3">
            <Input
              value={title}
              onChange={(e) => {
                setTitle(e.target.value);
                if (error) setError('');
              }}
              placeholder="제목"
              aria-label="메모 제목"
              disabled={submitting}
            />
            <Textarea
              value={content}
              onChange={(e) => {
                setContent(e.target.value);
                if (error) setError('');
              }}
              placeholder="내용을 입력하세요..."
              rows={4}
              aria-label="메모 본문"
              error={error}
            />
            <div className="flex justify-end">
              <Button type="submit" variant="primary" size="md" disabled={submitting}>
                <Icon.Plus className="w-4 h-4" />
                {submitting ? '추가 중...' : '메모 추가'}
              </Button>
            </div>
          </form>
        </Card>
      );
    }

    // --- 메모 카드 ---
    function MemoCard({ memo, onEdit, onDelete, onToggleFavorite }) {
      const isEdited = memo.updatedAt && memo.updatedAt !== memo.createdAt;
      const displayTime = isEdited ? memo.updatedAt : memo.createdAt;

      return (
        <Card
          className="group flex flex-col p-5 animate-fade-in-up transition-shadow hover:shadow-md"
          style={memo.favorite ? { backgroundColor: '#fffbeb' } : undefined}
        >
          <div className="flex items-start justify-between gap-2">
            <div className="flex min-w-0 flex-1 items-start gap-1.5">
              {/* 즐겨찾기 토글 (별 아이콘) — 제목 왼쪽 */}
              <button
                type="button"
                onClick={() => onToggleFavorite(memo)}
                aria-label={memo.favorite ? '즐겨찾기 해제' : '즐겨찾기 추가'}
                aria-pressed={memo.favorite}
                title={memo.favorite ? '즐겨찾기 해제' : '즐겨찾기 추가'}
                className={`mt-0.5 shrink-0 rounded-lg p-1 transition-colors ${
                  memo.favorite
                    ? 'text-amber-500 hover:bg-amber-100'
                    : 'text-slate-300 hover:bg-amber-50 hover:text-amber-400'
                }`}
              >
                <Icon.Star filled={memo.favorite} className="w-4 h-4" />
              </button>
              <h3 className="min-w-0 flex-1 break-words text-base font-semibold text-slate-800">
                {memo.title || <span className="italic text-slate-400">(제목 없음)</span>}
              </h3>
            </div>
            {/* 액션 버튼: 모바일에서는 항상 보이고, 데스크탑에서는 hover 시 강조 */}
            <div className="flex shrink-0 items-center gap-1">
              <button
                type="button"
                onClick={() => onEdit(memo)}
                aria-label="메모 수정"
                className="rounded-lg p-1.5 text-slate-400 transition-colors hover:bg-indigo-50 hover:text-indigo-600"
              >
                <Icon.Edit className="w-4 h-4" />
              </button>
              <button
                type="button"
                onClick={() => onDelete(memo)}
                aria-label="메모 삭제"
                className="rounded-lg p-1.5 text-slate-400 transition-colors hover:bg-red-50 hover:text-red-600"
              >
                <Icon.Trash className="w-4 h-4" />
              </button>
            </div>
          </div>

          {memo.content && (
            <p className="preserve-lines clamp-3 mt-2 text-sm leading-relaxed text-slate-600">
              {memo.content}
            </p>
          )}

          <div className="mt-4 flex items-center gap-1.5 border-t border-slate-100 pt-3 text-xs text-slate-400">
            <span>{formatDate(displayTime)}</span>
            {isEdited && (
              <span className="rounded-full bg-slate-100 px-1.5 py-0.5 text-[10px] font-medium text-slate-500">
                수정됨
              </span>
            )}
          </div>
        </Card>
      );
    }

    // --- 메모 목록 ---
    function MemoList({ memos, onEdit, onDelete, onToggleFavorite }) {
      return (
        <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
          {memos.map((memo) => (
            <MemoCard
              key={memo.id}
              memo={memo}
              onEdit={onEdit}
              onDelete={onDelete}
              onToggleFavorite={onToggleFavorite}
            />
          ))}
        </div>
      );
    }

    // --- 메모 수정 모달 ---
    function EditModal({ memo, onSave, onClose, submitting }) {
      const [title, setTitle] = useState('');
      const [content, setContent] = useState('');
      const [error, setError] = useState('');
      const titleRef = useRef(null);

      // 모달이 열릴 때 기존 값 채우기 + 제목 포커스
      useEffect(() => {
        if (memo) {
          setTitle(memo.title || '');
          setContent(memo.content || '');
          setError('');
          // 다음 프레임에 포커스
          setTimeout(() => titleRef.current && titleRef.current.focus(), 50);
        }
      }, [memo]);

      const handleSave = () => {
        if (submitting) return;
        const t = title.trim();
        const c = content.trim();
        if (!t && !c) {
          setError('제목 또는 본문 중 하나는 입력해야 합니다.');
          return;
        }
        onSave(memo.id, { title: t, content: c });
      };

      return (
        <Modal isOpen={!!memo} onClose={onClose} title="메모 수정" size="lg">
          <div className="space-y-3">
            <Input
              ref={titleRef}
              value={title}
              onChange={(e) => {
                setTitle(e.target.value);
                if (error) setError('');
              }}
              placeholder="제목"
              aria-label="메모 제목 수정"
            />
            <Textarea
              value={content}
              onChange={(e) => {
                setContent(e.target.value);
                if (error) setError('');
              }}
              placeholder="내용을 입력하세요..."
              rows={6}
              aria-label="메모 본문 수정"
              error={error}
            />
          </div>
          <div className="mt-5 flex justify-end gap-2">
            <Button variant="secondary" onClick={onClose} disabled={submitting}>취소</Button>
            <Button variant="primary" onClick={handleSave} disabled={submitting}>
              {submitting ? '저장 중...' : '저장'}
            </Button>
          </div>
        </Modal>
      );
    }

    // --- 삭제 확인 모달 ---
    function DeleteConfirmModal({ memo, onConfirm, onClose }) {
      return (
        <Modal isOpen={!!memo} onClose={onClose} title="메모 삭제" size="sm">
          <p className="text-sm leading-relaxed text-slate-600">
            <span className="font-medium text-slate-800">
              "{(memo && (memo.title || memo.content || '').slice(0, 30)) || ''}
              {memo && (memo.title || memo.content || '').length > 30 ? '...' : ''}"
            </span>
            <br />
            이 메모를 삭제하시겠습니까? 삭제된 메모는 복구할 수 없습니다.
          </p>
          <div className="mt-5 flex justify-end gap-2">
            <Button variant="secondary" onClick={onClose}>취소</Button>
            <Button variant="danger" onClick={() => onConfirm(memo.id)}>
              <Icon.Trash className="w-4 h-4" />
              삭제
            </Button>
          </div>
        </Modal>
      );
    }

    // --- 로딩 스피너 ---
    function Spinner({ label = '불러오는 중...' }) {
      return (
        <div className="flex flex-col items-center justify-center rounded-2xl border-2 border-dashed border-slate-300 bg-white/60 px-6 py-16 text-center">
          <span className="mb-3 h-8 w-8 animate-spin rounded-full border-[3px] border-slate-300 border-t-indigo-600" />
          <p className="text-sm text-slate-500">{label}</p>
        </div>
      );
    }

    // --- 에러 배너 (재시도 / 닫기) ---
    function ErrorBanner({ message, onRetry, onDismiss }) {
      return (
        <div className="mb-5 flex items-start gap-3 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
            strokeLinecap="round" strokeLinejoin="round" className="mt-0.5 h-5 w-5 shrink-0">
            <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <p className="flex-1 leading-relaxed">{message}</p>
          <div className="flex shrink-0 items-center gap-1">
            {onRetry && (
              <button type="button" onClick={onRetry}
                className="rounded-md px-2 py-1 text-xs font-medium text-red-700 hover:bg-red-100">
                다시 시도
              </button>
            )}
            {onDismiss && (
              <button type="button" onClick={onDismiss} aria-label="알림 닫기"
                className="rounded-md p-1 text-red-500 hover:bg-red-100 hover:text-red-700">
                <Icon.Close className="h-4 w-4" />
              </button>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      // 메모 상태 — 서버(DB)에서 불러온다.
      const [memos, setMemos] = useState([]);
      const [keyword, setKeyword] = useState('');
      const [showFavoritesOnly, setShowFavoritesOnly] = useState(false); // 즐겨찾기만 보기
      const [editingMemo, setEditingMemo] = useState(null);   // 수정 대상
      const [deletingMemo, setDeletingMemo] = useState(null); // 삭제 대상

      const [loading, setLoading] = useState(true);    // 최초 목록 로딩
      const [submitting, setSubmitting] = useState(false); // 생성/수정 진행 중
      const [error, setError] = useState('');          // 화면 상단 에러 배너

      // 목록 불러오기 (최초 + 재시도)
      const fetchMemos = useCallback(async () => {
        setLoading(true);
        setError('');
        try {
          const data = await memoApi.list();
          setMemos(Array.isArray(data) ? data : []);
        } catch (e) {
          setError(e.message || '메모를 불러오지 못했습니다.');
        } finally {
          setLoading(false);
        }
      }, []);

      // 컴포넌트 마운트 시 1회 로드
      useEffect(() => {
        fetchMemos();
      }, [fetchMemos]);

      // 메모 추가 (서버에 저장 후, 서버가 돌려준 행을 목록 맨 앞에 추가)
      // 성공 여부를 반환해 폼이 입력값 초기화 여부를 결정하도록 한다.
      const handleAdd = useCallback(async ({ title, content }) => {
        setSubmitting(true);
        setError('');
        try {
          const created = await memoApi.create({ title, content });
          setMemos((prev) => [created, ...prev]);
          return true;
        } catch (e) {
          setError(e.message || '메모를 저장하지 못했습니다.');
          return false;
        } finally {
          setSubmitting(false);
        }
      }, []);

      // 메모 수정 저장 (서버 갱신 후 해당 행 교체)
      const handleSaveEdit = useCallback(async (id, { title, content }) => {
        setSubmitting(true);
        setError('');
        try {
          const updated = await memoApi.update(id, { title, content });
          setMemos((prev) => prev.map((m) => (m.id === id ? updated : m)));
          setEditingMemo(null);
        } catch (e) {
          setError(e.message || '메모를 수정하지 못했습니다.');
          // 모달은 열어둔 채로 에러를 보여준다 (사용자가 재시도 가능)
        } finally {
          setSubmitting(false);
        }
      }, []);

      // 메모 삭제 확정 (낙관적 제거 + 실패 시 롤백)
      const handleConfirmDelete = useCallback(async (id) => {
        const snapshot = memos;
        setMemos((prev) => prev.filter((m) => m.id !== id)); // 먼저 UI 에서 제거
        setDeletingMemo(null);
        setError('');
        try {
          await memoApi.remove(id);
        } catch (e) {
          setMemos(snapshot); // 실패하면 원래대로 되돌림
          setError(e.message || '메모를 삭제하지 못했습니다.');
        }
      }, [memos]);

      // 즐겨찾기 토글 (낙관적 업데이트 + 실패 시 롤백)
      const handleToggleFavorite = useCallback(async (memo) => {
        const next = !memo.favorite;
        // 먼저 UI 를 즉시 갱신 (별을 바로 채움/비움)
        setMemos((prev) =>
          prev.map((m) => (m.id === memo.id ? { ...m, favorite: next } : m))
        );
        setError('');
        try {
          const updated = await memoApi.toggleFavorite(memo.id, next);
          // 서버 응답(권위 있는 값)으로 최종 동기화
          setMemos((prev) => prev.map((m) => (m.id === memo.id ? updated : m)));
        } catch (e) {
          // 실패하면 원래 상태로 되돌림
          setMemos((prev) =>
            prev.map((m) => (m.id === memo.id ? { ...m, favorite: memo.favorite } : m))
          );
          setError(e.message || '즐겨찾기 상태를 변경하지 못했습니다.');
        }
      }, []);

      // 즐겨찾기 개수 (필터 버튼 배지에 표시)
      const favoriteCount = useMemo(
        () => memos.filter((m) => m.favorite).length,
        [memos]
      );

      // 검색 + 즐겨찾기 필터 + 정렬(즐겨찾기 우선 → 최신순)
      const filteredMemos = useMemo(() => {
        const kw = keyword.trim().toLowerCase();
        let list = memos;
        if (kw) {
          list = list.filter(
            (m) =>
              (m.title || '').toLowerCase().includes(kw) ||
              (m.content || '').toLowerCase().includes(kw)
          );
        }
        if (showFavoritesOnly) {
          list = list.filter((m) => m.favorite);
        }
        // 즐겨찾기를 맨 위로, 그 안에서 최신순(createdAt 내림차순)
        return [...list].sort((a, b) => {
          if (!!b.favorite !== !!a.favorite) return b.favorite ? 1 : -1;
          return b.createdAt - a.createdAt;
        });
      }, [memos, keyword, showFavoritesOnly]);

      const isSearching = keyword.trim().length > 0;
      const hasMemos = memos.length > 0;

      return (
        <div className="min-h-screen bg-gradient-to-b from-slate-100 to-slate-200">
          <div className="mx-auto max-w-5xl px-4 py-8 sm:px-6 sm:py-10">
            <Header count={memos.length} />

            {/* 에러 배너: 어떤 작업이든 실패하면 상단에 표시 (재시도 = 목록 새로고침) */}
            {error && (
              <ErrorBanner
                message={error}
                onRetry={fetchMemos}
                onDismiss={() => setError('')}
              />
            )}

            {/* 작성 폼 */}
            <div className="mb-6">
              <MemoForm onAdd={handleAdd} submitting={submitting} />
            </div>

            {/* 검색 바 + 즐겨찾기 필터: 메모가 있을 때만 노출 */}
            {hasMemos && (
              <div className="mb-5 space-y-3">
                <SearchBar
                  value={keyword}
                  onChange={setKeyword}
                  onClear={() => setKeyword('')}
                />
                <div className="flex flex-wrap items-center justify-between gap-2">
                  {/* 전체 / 즐겨찾기 세그먼트 토글 */}
                  <div className="inline-flex rounded-lg border border-slate-300 bg-white p-0.5 text-sm">
                    <button
                      type="button"
                      onClick={() => setShowFavoritesOnly(false)}
                      aria-pressed={!showFavoritesOnly}
                      className={`rounded-md px-3 py-1.5 font-medium transition-colors ${
                        !showFavoritesOnly
                          ? 'bg-indigo-600 text-white'
                          : 'text-slate-600 hover:bg-slate-100'
                      }`}
                    >
                      전체
                    </button>
                    <button
                      type="button"
                      onClick={() => setShowFavoritesOnly(true)}
                      aria-pressed={showFavoritesOnly}
                      className={`inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 font-medium transition-colors ${
                        showFavoritesOnly
                          ? 'bg-amber-500 text-white'
                          : 'text-slate-600 hover:bg-slate-100'
                      }`}
                    >
                      <Icon.Star filled={showFavoritesOnly} className="w-3.5 h-3.5" />
                      즐겨찾기
                      {favoriteCount > 0 && (
                        <span
                          className={`rounded-full px-1.5 text-[11px] ${
                            showFavoritesOnly ? 'bg-white/25 text-white' : 'bg-slate-100 text-slate-500'
                          }`}
                        >
                          {favoriteCount}
                        </span>
                      )}
                    </button>
                  </div>
                  {isSearching && (
                    <p className="text-sm text-slate-500">
                      {filteredMemos.length}개의 검색 결과
                    </p>
                  )}
                </div>
              </div>
            )}

            {/* 로딩 / 목록 / 빈 상태 */}
            {loading ? (
              <Spinner label="메모를 불러오는 중..." />
            ) : filteredMemos.length > 0 ? (
              <MemoList
                memos={filteredMemos}
                onEdit={setEditingMemo}
                onDelete={setDeletingMemo}
                onToggleFavorite={handleToggleFavorite}
              />
            ) : (
              <EmptyState
                isSearching={isSearching}
                keyword={keyword.trim()}
                favoritesOnly={showFavoritesOnly}
              />
            )}
          </div>

          {/* 모달들 */}
          <EditModal
            memo={editingMemo}
            onSave={handleSaveEdit}
            onClose={() => setEditingMemo(null)}
            submitting={submitting}
          />
          <DeleteConfirmModal
            memo={deletingMemo}
            onConfirm={handleConfirmDelete}
            onClose={() => setDeletingMemo(null)}
          />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
