  // ---------- V3-4: 구역별 자재선택 마이그레이션 ----------
  // zone.sel 없으면 est.sel 딥카피로 생성. ea 3필드(siliconEa/trenchFloorEa/trenchSideEa)는 zones[0]에만 원값·나머지 0.
  // (전 구역 동일 sel 이면 v2 와 완전 동일한 수치가 나오도록 하는 규칙 — SAMPLE grandTotal 불변의 근거)
  function withZoneSel(est){
    if (!est) return est;
    var out = {}; for (var k in est) out[k] = est[k];
    var baseSel = est.sel || {};
    out.zones = (est.zones || []).map(function(z, i){
      if (z && z.sel) return z; // 이미 있으면 보존
      var s = JSON.parse(JSON.stringify(baseSel));
      if (i !== 0){ s.siliconEa = 0; s.trenchFloorEa = 0; s.trenchSideEa = 0; }
      var nz = {}; for (var kk in z) nz[kk] = z[kk]; nz.sel = s; return nz;
    });
    return out;
  }

  // ---------- 할증 조회 (직접키 → 접미사(Mat/Lab/Sub) fallback) ----------
  function surLookup(surs, key, dim){
    if (!key || !surs) return 0;
    var e = surs[key];
    if (e && e[dim] != null) return e[dim];
    var m = /^(.*?)(Mat|Lab|Sub)$/.exec(key);
    if (m){
      var be = surs[m[1]]; var d = m[2].toLowerCase();
      if (be && be[d] != null) return be[d];
    }
    return 0;
  }

  // ---------- 파생 수량 (finishAll enabled → 전체 구역 공통 마감) ----------
  function computeDerived(est){
    var zones = est.zones || [];
    var fa = est.finishAll || {};
    var allOn = !!fa.enabled;
    var d = { floorSum:0, parapetLen:0, wallArea:0, waterproofArea:0, tapeLen:0,
              gravelArea:0, tileArea:0, woodArea:0, wallStain:0, wallHam:0, wallCrc:0 };
    zones.forEach(function(z){
      var f=num(z.floor), pl=num(z.parapetLen), ph=num(z.parapetH);
      var finish = allOn ? fa.finish : z.finish;
      var wallFinish = allOn ? fa.wallFinish : z.wallFinish;
      d.floorSum += f; d.parapetLen += pl; d.wallArea += pl*ph;
      if (finish==='쇄석') d.gravelArea += f;
      else if (finish==='타일') d.tileArea += f;
      else if (finish==='우드') d.woodArea += f;
      if (wallFinish==='스테인리스') d.wallStain += pl*ph;
      else if (wallFinish==='함석') d.wallHam += pl*ph;
      else if (wallFinish==='crc보드') d.wallCrc += pl*ph;
    });
    d.waterproofArea = d.floorSum + d.wallArea;
    d.tapeLen = d.parapetLen * 2;
    return d;
  }

  function resolveQtyItem(it, est, derived){
    var code = it.qty;
    if (code && code.indexOf('XPS:')===0){
      var thick = code.slice(4), cnt=0;
      if (est.sel.xps1===thick) cnt++;
      if (est.sel.xps2===thick) cnt++;
      if (cnt===0) return null;
      return derived.floorSum * cnt;
    }
    if (code && code.indexOf('N:')===0){
      var field = code.slice(2);
      var v = (est.sel && est.sel[field]!=null) ? est.sel[field] : (est.temp ? est.temp[field] : 0);
      return num(v);
    }
    switch(code){
      case 'WP': return derived.waterproofArea;
      case 'FLOOR': return derived.floorSum;
      case 'WALL': return derived.wallArea;
      case 'PLEN': return derived.parapetLen;
      case 'TAPE': return derived.tapeLen;
      case 'GRAVEL': return derived.gravelArea;
      case 'TILE': return derived.tileArea;
      case 'WOOD': return derived.woodArea;
      case 'W_STAIN': return derived.wallStain;
      case 'W_HAM': return derived.wallHam;
      case 'W_CRC': return derived.wallCrc;
      case 'ONE': return 1;
      default: return 0;
    }
  }

  function operand(t, est, derived){
    if (t==='tileArea') return derived.tileArea;
    if (t==='woodArea') return derived.woodArea;
    if (t.indexOf('sel.')===0) return est.sel[t.slice(4)];
    return t;
  }
  function evalClause(c, est, derived){
    var m = /^(.+?)(<=|>=|=|>|<)(.+)$/.exec(c);
    if (!m) return true;
    var lhs = operand(m[1].trim(), est, derived);
    var op = m[2], rhsRaw = m[3].trim();
    if (op==='=') return String(lhs) === rhsRaw;
    var rhs = parseFloat(rhsRaw), L = parseFloat(lhs);
    if (op==='>') return L > rhs;
    if (op==='<') return L < rhs;
    if (op==='>=') return L >= rhs;
    if (op==='<=') return L <= rhs;
    return true;
  }
  function evalOn(onStr, est, derived){
    if (!onStr) return true;
    return onStr.split('&&').every(function(cl){ return evalClause(cl.trim(), est, derived); });
  }

  // ITEM_DB 행 (overrides: {mat?,lab?,sub?})
  // matQtyOpt: V3-4 병합 경로에서 재료비 산정용 수량(지급자재 구역 제외분). 미전달 시 기존 동작(전역 ownerSupplied) 유지.
  function makeRow(it, qty, est, surs, ov, matQtyOpt){
    var matSur = surLookup(surs, it.sur, 'mat');
    var labSur;
    if (it.labSurFixed != null) labSur = it.labSurFixed;
    else if (it.labSurKey) labSur = surLookup(surs, it.labSurKey, 'lab');
    else labSur = surLookup(surs, it.sur, 'lab');
    var subSur = it.subSurKey ? surLookup(surs, it.subSurKey, 'sub') : 0;
    var mat = (ov && ov.mat != null && ov.mat !== '') ? num(ov.mat) : num(it.mat);
    var lab = (ov && ov.lab != null && ov.lab !== '') ? num(ov.lab) : num(it.lab);
    var sub = (ov && ov.sub != null && ov.sub !== '') ? num(ov.sub) : num(it.sub);
    var overridden = !!(ov && ((ov.mat!=null&&ov.mat!=='') || (ov.lab!=null&&ov.lab!=='') || (ov.sub!=null&&ov.sub!=='')));
    var matFinal = mat*(1+matSur), labFinal = lab*(1+labSur), subFinal = sub*(1+subSur);
    var ownerZeroG = (est.sel && est.sel.ownerSupplied==='예' && it.cat && it.cat.indexOf('XPS')===0);
    var matQ = (matQtyOpt != null) ? matQtyOpt : (ownerZeroG ? 0 : qty);
    var matTotal = matQ*matFinal;
    var labTotal = qty*labFinal;
    var subTotal = qty*subFinal;
    var ownerZero = (matQtyOpt != null) ? (matQ < qty - 1e-9) : ownerZeroG;
    return { id:it.id, grp:it.grp, grpSub:it.grpSub, work:it.work, name:it.name, unit:it.unit,
             qty:qty, mat:mat, lab:lab, sub:sub, matSur:matSur, labSur:labSur, subSur:subSur,
             matFinal:matFinal, labFinal:labFinal, subFinal:subFinal,
             matTotal:matTotal, labTotal:labTotal, subTotal:subTotal, rowTotal:matTotal+labTotal+subTotal,
             vendor:it.vendor||null, cat:it.cat||null, ownerZero:ownerZero, overridden:overridden, custom:false };
  }
  // V3-4: 단일 구역 파생수량 (구역 스코프 마감으로 산정) — 병합 경로에서 사용
  function zoneDerived(z){ return computeDerived({ zones:[z], finishAll:{enabled:false} }); }
  function scaffRow(id, work, name, unit, qty, price){
    var matTotal = qty*price;
    return { id:id, grp:'가설공사', grpSub:'가설 및 장비대', work:work, name:name, unit:unit,
             qty:qty, mat:price, lab:0, sub:0, matSur:0, labSur:0, subSur:0,
             matFinal:price, labFinal:0, subFinal:0, matTotal:matTotal, labTotal:0, subTotal:0,
             rowTotal:matTotal, vendor:null, cat:null, custom:false };
  }

  // ---------- computeEstimate(est, overrides?) ----------
  // overrides = { items:{ <itemId>:{mat?,lab?,sub?} }, equip:{ <name>:price } }
  function computeEstimate(est, overrides){
    overrides = overrides || {};
    var ovItems = overrides.items || {};
    var ovEquip = overrides.equip || {};
    var derived = computeDerived(est);
    var surs = est.surcharges || defaultSurcharges();
    var rates = est.rates || {};
    var rows = [];

    // 1) ITEM_DB
    // V3-4: finishAll.enabled=false 이고 구역이 자기 sel 을 가지면 구역별 병합 경로.
    //       그 외(finishAll.enabled=true, 또는 zone.sel 없는 레거시/샘플 원본)는 v2 전역 단일패스 그대로.
    var faEnabled = !!(est.finishAll && est.finishAll.enabled);
    var useMerge = !faEnabled && (est.zones||[]).some(function(z){ return z && z.sel; });
    if (!useMerge){
      ITEM_DB.forEach(function(it){
        var qty = resolveQtyItem(it, est, derived);
        if (qty == null) return;
        if (it.on && !evalOn(it.on, est, derived)) return;
        if (!(qty > 0)) return;
        rows.push(makeRow(it, qty, est, surs, ovItems[it.id]));
      });
    } else {
      // 구역별: 각 구역이 자기 z.sel·z.finish·z.wallFinish 로 (아이템 × 변형=아이템id) 별 수량 기여를 만들고
      //         반올림·할증 이전에 id 로 합산해 한 행으로 병합. on 의 면적 임계(tileArea<=100 등)는 전역 derived 로 판정.
      var contrib = {}; // itemId -> { qty, matQty }
      (est.zones||[]).forEach(function(z){
        var zSel = z.sel || est.sel;
        var zEst = { sel: zSel, temp: est.temp };
        var zDer = zoneDerived(z);
        ITEM_DB.forEach(function(it){
          var q = resolveQtyItem(it, zEst, zDer);
          if (q == null) return;
          if (it.on && !evalOn(it.on, zEst, derived)) return; // 변형·존재는 zEst/zDer(q>0)로, 임계는 전역 derived로
          if (!(q > 0)) return;
          var c = contrib[it.id] || (contrib[it.id] = { qty:0, matQty:0 });
          var matZero = (zSel && zSel.ownerSupplied==='예' && it.cat && it.cat.indexOf('XPS')===0);
          c.qty += q;
          c.matQty += matZero ? 0 : q;
        });
      });
      ITEM_DB.forEach(function(it){ // ITEM_DB 순서 유지로 병합 행 push
        var c = contrib[it.id];
        if (!c || !(c.qty > 0)) return;
        rows.push(makeRow(it, c.qty, est, surs, ovItems[it.id], c.matQty));
      });
    }

    // 2) 추가공사 (addl 객체 맵) + 화단철거
    var addl = est.addl || {};
    ADDL_DEFS.forEach(function(def){
      var a = addl[def.key];
      if (!a || !a.on) return;
      var qty = num(a.qty);
      if (!(qty>0)) return;
      var mat=num(a.mat), lab=num(a.lab), sub=num(a.sub);
      var surMat=num(a.surMat), surLab=num(a.surLab);
      var matFinal=mat*(1+surMat), labFinal=lab*(1+surLab), subFinal=sub; // 부자재 할증 없음
      var matTotal=qty*matFinal, labTotal=qty*labFinal, subTotal=qty*subFinal;
      rows.push({ id:'addl_'+def.key, grp:def.grp, grpSub:def.grpSub, work:def.work, name:def.name, unit:def.unit||'식',
                  qty:qty, mat:mat, lab:lab, sub:sub, matSur:surMat, labSur:surLab, subSur:0,
                  matFinal:matFinal, labFinal:labFinal, subFinal:subFinal,
                  matTotal:matTotal, labTotal:labTotal, subTotal:subTotal, rowTotal:matTotal+labTotal+subTotal,
                  vendor:null, cat:null, custom:false, addlKey:def.key });
    });

    // 3) customItems (추가공사 직접입력)
    (est.customItems||[]).forEach(function(ci, i){
      var qty = num(ci.qty);
      if (!(qty>0)) return;
      var matSur = surLookup(surs, ci.matSurKey, 'mat');
      var labSur = surLookup(surs, ci.labSurKey, 'lab');
      var subSur = surLookup(surs, ci.subSurKey, 'sub');
      var mat=num(ci.matPrice), lab=num(ci.labPrice), sub=num(ci.subPrice);
      var matFinal=mat*(1+matSur), labFinal=lab*(1+labSur), subFinal=sub*(1+subSur);
      var matTotal=qty*matFinal, labTotal=qty*labFinal, subTotal=qty*subFinal;
      rows.push({ id:'ci_'+i, grp:'추가공사', grpSub:'기타공사', work:ci.work||'추가공사', name:ci.name||'', unit:ci.unit||'식',
                  qty:qty, mat:mat, lab:lab, sub:sub, matSur:matSur, labSur:labSur, subSur:subSur,
                  matFinal:matFinal, labFinal:labFinal, subFinal:subFinal,
                  matTotal:matTotal, labTotal:labTotal, subTotal:subTotal, rowTotal:matTotal+labTotal+subTotal,
                  vendor:ci.vendor||null, cat:ci.cat||null, custom:true });
    });

    // 4) 가설공사 (equip overrides 반영)
    var temp = est.temp || {};
    (temp.equipment||[]).forEach(function(eq, i){
      var q = num(eq.qty); if (!(q>0)) return;
      var base = (EQUIP_MAP[eq.name]!=null) ? EQUIP_MAP[eq.name] : num(eq.price);
      var price = (ovEquip[eq.name]!=null && ovEquip[eq.name]!=='') ? num(ovEquip[eq.name]) : base;
      rows.push(scaffRow('eq_'+i, '장비대', eq.name, '대', q, price));
    });
    if (num(temp.forkliftQty) > 0) rows.push(scaffRow('forklift','장비대','지게차','대', num(temp.forkliftQty), 80000));
    if (temp.waste && temp.waste!=='없음'){
      var wp = (temp.waste==='폐기물 2.5ton') ? 900000 : 550000;
      rows.push(scaffRow('waste','장비대', temp.waste, '식', num(temp.wasteQty)||1, wp));
    }
    var freightPrice = (temp.freight==='지방') ? 1000000 : 500000;
    var freightName = (temp.freight==='지방') ? '지방' : '서울, 경기권';
    rows.push(scaffRow('freight','운임 및 경비', freightName, '식', 1, freightPrice));

    // trades
    var TR = ['철거공사','역전지붕공사','가설공사','추가공사'];
    var trades = {}; TR.forEach(function(k){ trades[k]={mat:0,lab:0,sub:0,total:0}; });
    rows.forEach(function(r){
      var t = trades[r.grp]; if (!t){ t = trades[r.grp] = {mat:0,lab:0,sub:0,total:0}; }
      t.mat += r.matTotal; t.lab += r.labTotal; t.sub += r.subTotal; t.total += r.rowTotal;
    });
    var tradeTotal = {mat:0,lab:0,sub:0,total:0};
    Object.keys(trades).forEach(function(k){
      tradeTotal.mat+=trades[k].mat; tradeTotal.lab+=trades[k].lab; tradeTotal.sub+=trades[k].sub; tradeTotal.total+=trades[k].total;
    });

    // 원가계산서 (V2-3: 부자재 순공사원가 포함이 기본)
    var subInNet = (rates.subInNetCost != null) ? !!rates.subInNetCost : true;
    var directMat = tradeTotal.mat;
    var indirectMat = directMat * num(rates.indirectMat);
    var matSubtotal = directMat + indirectMat;
    var directLab = tradeTotal.lab;
    var indirectLab = directLab * num(rates.indirectLab);
    var labSubtotal = directLab + indirectLab;
    var subTotal = tradeTotal.sub;
    var netCost = matSubtotal + labSubtotal + (subInNet ? subTotal : 0);
    var genAdmin = netCost * num(rates.genAdmin);
    var design = netCost * num(rates.design);
    var profit = netCost * num(rates.profit);
    var constrTotal = netCost + genAdmin + design + profit;
    var vat = (rates.taxInvoice==='예') ? constrTotal*0.1 : 0;
    var grandTotal = constrTotal + vat;
    var perPyeong = (derived.floorSum>0) ? constrTotal/(derived.floorSum/3.3) : 0;

    var cost = { directMat, indirectMat, matSubtotal, directLab, indirectLab, labSubtotal,
                 subTotal, subInNet, netCost, genAdmin, design, profit, constrTotal, vat, grandTotal, perPyeong };

    // 발주서
    var VENDOR_ORDER = ['부광스티로폴','티푸스','프로클리마','잡자재','유신 골재','루비','대산합판','타일판매처','시카','삼화','기타(판매처 미정)'];
    var byVendor = {};
    rows.forEach(function(r){
      if (r.grp==='가설공사') return;
      if (!(r.mat > 0)) return;
      var v = r.vendor || '기타(판매처 미정)';
      if (!byVendor[v]) byVendor[v] = [];
      var pack = PACK_SPECS[r.cat] || {per:1, unit:(r.unit||'ea'), label:''};
      var orderQty = Math.ceil(r.qty/pack.per - 1e-9);
      byVendor[v].push({ name:r.name, cat:r.cat, pack:pack.label, qty:r.qty, orderQty:orderQty,
                         orderUnit:pack.unit, unitPrice:r.mat, amount:r.qty*r.mat });
    });
    var orders = Object.keys(byVendor).sort(function(a,b){
      var ia=VENDOR_ORDER.indexOf(a), ib=VENDOR_ORDER.indexOf(b);
      if (ia<0) ia=999; if (ib<0) ib=999; return ia-ib;
    }).map(function(v){
      var items = byVendor[v];
      var subtotal = items.reduce(function(s,i){ return s+i.amount; }, 0);
      return { vendor:v, items:items, subtotal:subtotal };
    });

    return { derived:derived, rows:rows, trades:trades, tradeTotal:tradeTotal, cost:cost, orders:orders };
  }

  root.RoofCalc = {
    ITEM_DB: ITEM_DB, EQUIP_CATALOG: EQUIP_CATALOG, EQUIP_MAP: EQUIP_MAP, PACK_SPECS: PACK_SPECS,
    DESCRIPTIONS: DESCRIPTIONS, COMPANY: COMPANY, SITE_NOTES: SITE_NOTES, ADDL_DEFS: ADDL_DEFS, ADDL_MAP: ADDL_MAP,
    SAMPLE_DONGSAK: sampleDongsak(), sampleDongsak: sampleDongsak,
    defaultAddl: defaultAddl, defaultSurcharges: defaultSurcharges, newEstimate: newEstimate, computeEstimate: computeEstimate,
    withZoneSel: withZoneSel, migrateCoverNotes: migrateCoverNotes
  };
})();
</script>

<script type="text/babel" data-presets="app-react">

// ======================================== helpers

const won0 = (n) => round(n).toLocaleString('ko-KR');
const area = (n) => (Number(n)||0).toLocaleString('ko-KR', { maximumFractionDigits: 2 });
const pctStr = (n) => { const v = (Number(n)||0)*100; return (Math.round(v*100)/100) + '%'; };
const cx = (...a) => a.filter(Boolean).join(' ');
const TRADES = ['철거공사','역전지붕공사','가설공사','추가공사'];
const esc = (s) => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
// V3-3: 유입경로 셀렉트 옵션 (목록 외 저장값은 임시 옵션으로 보존)
const LEAD_SOURCES = ['티푸스','잡자재','패시브협회','기타'];

// ======================================== 🎨 Design System
function Btn({ variant='primary', size='md', className, ...p }) {

  const variants = {
    primary:'bg-slate-800 text-white hover:bg-slate-700',
    amber:'bg-amber-500 text-white hover:bg-amber-600',
    secondary:'bg-white text-slate-700 border border-slate-300 hover:bg-slate-50',
    danger:'bg-white text-red-600 border border-red-300 hover:bg-red-50',
    ghost:'bg-transparent text-slate-600 hover:bg-slate-200/60',
  };

}
function Card({ className, children, title, right }) {

    <div className={cx('bg-white rounded-xl shadow-sm border border-slate-200/70', className)}>
      {(title || right) && (
        <div className="flex items-center justify-between px-4 py-3 border-b border-slate-100">

}
function Badge({ children, tone='slate' }) {
  const tones = { slate:'bg-slate-100 text-slate-600', amber:'bg-amber-100 text-amber-700', green:'bg-emerald-100 text-emerald-700', red:'bg-red-100 text-red-600', navy:'bg-slate-800 text-white', blue:'bg-blue-100 text-blue-700' };
  return <span className={cx('inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold', tones[tone])}>{children}</span>;
}
function Field({ label, children, hint }) {
  return (
    <label className="block">
      <span className="block text-xs font-semibold text-slate-500 mb-1">{label}</span>
      {children}
      {hint && <span className="block text-[11px] text-slate-400 mt-0.5">{hint}</span>}

}
const inputCls = 'w-full rounded-lg border border-slate-300 px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400 bg-white';
function TextInput({ className, ...p }) { return <input className={cx(inputCls, className)} {...p} />; }
function NumInput({ value, onChange, step='0.01', min='0', className, ...p }) {
  return <input type="number" step={step} min={min} className={cx(inputCls, 'num-cell text-right', className)}
    value={value===0||value ? value : ''} onChange={e=>onChange(e.target.value==='' ? 0 : Number(e.target.value))} {...p} />;
}
function CommaInput({ value, onChange, className, placeholder, ...p }) {
  return <input inputMode="numeric" placeholder={placeholder} className={cx(inputCls, 'num-cell text-right', className)}
    value={value===0 ? '0' : (value ? Number(value).toLocaleString('ko-KR') : '')}
    onChange={e=>{ const raw=e.target.value.replace(/[^\d.]/g,''); onChange(raw===''?0:Number(raw)); }} {...p} />;
}
function Sel({ value, onChange, options, className }) {
  return (
    <select className={cx(inputCls, 'pr-7', className)} value={value} onChange={e=>onChange(e.target.value)}>
      {options.map((o,i)=>{ const val = (typeof o==='object')?o.value:o; const lab=(typeof o==='object')?o.label:o;
        return <option key={i} value={val}>{lab}</option>; })}
    </select>
  );
}
function Toggle({ checked, onChange, labelOn='예', labelOff='아니오' }) {
  return (
    <button type="button" onClick={()=>onChange(!checked)}
      className={cx('relative inline-flex h-6 w-24 items-center rounded-full text-xs font-semibold transition', checked?'bg-amber-500 text-white':'bg-slate-200 text-slate-500')}>
      <span className={cx('absolute px-2 transition', checked?'left-2':'right-2')}>{checked?labelOn:labelOff}</span>
      <span className={cx('absolute h-5 w-5 rounded-full bg-white shadow transition', checked?'right-1':'left-1')}></span>

}
function SectionTitle({ n, children, extra }) {
  return (
    <div className="flex items-center justify-between mb-3">

        {children}
      </h2>
      {extra}
    </div>

}
function hintFor(id){ const it = RC.ITEM_DB.find(x=>x.id===id); if(!it) return ''; return `재 ${won0(it.mat)}/노 ${won0(it.lab)}`; }
function recGenAdmin(sc){ let r=0.10; if(sc.under100==='예') r+=0.03; if(sc.floors==='6-10층') r+=0.02; else if(sc.floors==='10층 이상') r+=0.04; if(sc.craneOk==='불가능') r+=0.05; if(sc.region==='지방') r+=0.05; return Math.round(r*1000)/1000; }

// ======================================== 📐 옥상 형태 계산기
const DIRS = { '위':[0,-1], '오른쪽':[1,0], '아래':[0,1], '왼쪽':[-1,0] };
const DIR_ORDER = ['위','오른쪽','아래','왼쪽'];
function turnDir(cur, t){ const i=DIR_ORDER.indexOf(cur); return t==='우회전' ? DIR_ORDER[(i+1)%4] : DIR_ORDER[(i+3)%4]; }
function computePolygon(edges, startDir){
  let pt=[0,0], heading=startDir; const verts=[[0,0]];
  edges.forEach(e=>{ const v=DIRS[heading]||[1,0]; const L=Number(e.lengthMm)||0; pt=[pt[0]+v[0]*L, pt[1]+v[1]*L]; verts.push(pt); heading=turnDir(heading, e.turn); });
  const end=pt; const closed = Math.abs(end[0])<1 && Math.abs(end[1])<1 && edges.length>=3;
  let peri=0; edges.forEach(e=> peri += Number(e.lengthMm)||0);
  const poly = verts.slice(0, verts.length-1);
  let a2=0; for(let i=0;i<poly.length;i++){ const [x1,y1]=poly[i], [x2,y2]=poly[(i+1)%poly.length]; a2 += x1*y2 - x2*y1; }
  return { verts, closed, periM: peri/1000, areaM2: Math.abs(a2)/2/1e6 };
}
function RoofCalcTool({ zones, onApply }) {
  const [startDir, setStartDir] = useState('오른쪽');
  const [edges, setEdges] = useState([
    { lengthMm:5000, turn:'우회전' }, { lengthMm:3000, turn:'우회전' },
    { lengthMm:5000, turn:'우회전' }, { lengthMm:3000, turn:'우회전' },
  ]);
  const [target, setTarget] = useState(0);
  const res = useMemo(()=>computePolygon(edges, startDir), [edges, startDir]);
  const svg = useMemo(()=>{
    const vs = res.verts; if (!vs.length) return null;
    const xs=vs.map(v=>v[0]), ys=vs.map(v=>v[1]);
    const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
    const w=Math.max(maxX-minX,1), h=Math.max(maxY-minY,1); const pad=14, S=240;
    const sc=Math.min((S-pad*2)/w, (S-pad*2)/h);
    const map=(p)=>[pad+(p[0]-minX)*sc, pad+(p[1]-minY)*sc];
    return { pts: vs.map(map).map(p=>p.join(',')).join(' '), S };
  }, [res]);
  const upd=(i,k,v)=>setEdges(es=>es.map((e,j)=>j===i?{...e,[k]:v}:e));
  return (
    <Card title="📐 옥상 형태 계산기" right={<Badge tone={res.closed?'green':'red'}>{res.closed?'✅ 폐합':'❌ 미폐합'}</Badge>}>
      <div className="grid md:grid-cols-2 gap-4">
        <div>
          <Field label="시작 방향"><Sel value={startDir} onChange={setStartDir} options={DIR_ORDER} /></Field>
          <div className="mt-3 space-y-1.5 max-h-56 overflow-auto pr-1">
            {edges.map((e,i)=>(
              <div key={i} className="flex items-center gap-1.5">
                <span className="text-xs text-slate-400 w-5">{i+1}</span>
                <NumInput step="1" value={e.lengthMm} onChange={v=>upd(i,'lengthMm',v)} className="flex-1" />
                <span className="text-[11px] text-slate-400">mm</span>
                <Sel value={e.turn} onChange={v=>upd(i,'turn',v)} options={['우회전','좌회전']} className="w-24" />
                <Btn size="sm" variant="ghost" onClick={()=>setEdges(es=>es.filter((_,j)=>j!==i))}>✕</Btn>
              </div>
            ))}
          </div>
          <Btn size="sm" variant="secondary" className="mt-2" onClick={()=>setEdges(es=>[...es,{lengthMm:1000,turn:'우회전'}])}>+ 변 추가</Btn>
        </div>
        <div>
          <div className="bg-slate-50 rounded-lg border border-slate-200 flex items-center justify-center" style={{minHeight:svg?svg.S:200}}>
            {svg && <svg width={svg.S} height={svg.S} viewBox={`0 0 ${svg.S} ${svg.S}`}>
              <polygon points={svg.pts} fill="rgba(245,158,11,0.15)" stroke="#f59e0b" strokeWidth="2" strokeLinejoin="round" />
            </svg>}
          </div>
          <div className="grid grid-cols-2 gap-2 mt-3 text-sm">
            <div className="bg-slate-50 rounded-lg p-2"><div className="text-[11px] text-slate-400">총 둘레</div><div className="font-bold num-cell">{area(res.periM)} m</div></div>
            <div className="bg-slate-50 rounded-lg p-2"><div className="text-[11px] text-slate-400">면적 (신발끈)</div><div className="font-bold num-cell">{area(res.areaM2)} ㎡</div></div>
          </div>
          <div className="flex items-center gap-2 mt-3">
            <Sel value={target} onChange={v=>setTarget(Number(v))} options={zones.map((z,i)=>({value:i, label:`${i+1}. ${z.label||'구역'}`}))} className="flex-1" />
            <Btn size="sm" variant="amber" onClick={()=>onApply(target, res.areaM2, res.periM)}>구역에 적용</Btn>
          </div>
        </div>
      </div>
    </Card>
  );
}

function SummaryPanel({ result, est }) {

          <tbody>

            <tr className="font-bold text-slate-800"><td className="py-1 text-left">합계</td><td className="text-right">{won0(tradeTotal.mat)}</td><td className="text-right">{won0(tradeTotal.lab)}</td><td className="text-right text-slate-400">{won0(tradeTotal.sub)}</td></tr>

      </Card>
      <Card className="print-shadow">
        <span className="text-xs font-bold text-slate-500 block mb-2">원가계산서</span>
        <div className="space-y-1 text-xs num-cell">
          {[['직접재료비', cost.directMat],['간접재료비', cost.indirectMat],['직접노무비', cost.directLab],['간접노무비', cost.indirectLab],['부자재 합계', cost.subTotal]].map(([l,v])=>(
            <div key={l} className="flex justify-between text-slate-500"><span>{l}</span><span>{won0(v)}</span></div>
          ))}
          <div className="flex justify-between font-semibold text-slate-700 pt-1 border-t border-slate-100"><span>순공사원가{subIn?' (부자재 포함)':' (부자재 미산입)'}</span><span>{won0(cost.netCost)}</span></div>
          <div className="flex justify-between text-slate-500"><span>일반관리비 {pctStr(est.rates.genAdmin)}</span><span>{won0(cost.genAdmin)}</span></div>
          {cost.design>0 && <div className="flex justify-between text-slate-500"><span>디자인 {pctStr(est.rates.design)}</span><span>{won0(cost.design)}</span></div>}
          <div className="flex justify-between text-slate-500"><span>회사이윤 {pctStr(est.rates.profit)}</span><span>{won0(cost.profit)}</span></div>
          <div className="flex justify-between font-bold text-slate-800 pt-1 border-t border-slate-100"><span>공사비 합계</span><span>{won0(cost.constrTotal)}</span></div>
          <div className="flex justify-between text-slate-500"><span>{est.rates.taxInvoice==='예'?'부가가치세 (10%)':'부가가치세 (미진행)'}</span><span>{won0(cost.vat)}</span></div>
        </div>
        <div className="mt-3 bg-slate-800 text-white rounded-lg p-3 text-center">
          <div className="text-[11px] text-slate-300">★★ 총합계 ({est.rates.taxInvoice==='예'?'VAT 포함':'VAT 별도'})</div>
          <div className="text-2xl font-extrabold num-cell tracking-tight">{won(cost.grandTotal)}</div>
          <div className="text-[11px] text-amber-300 mt-1">평당 {won0(cost.perPyeong)} (VAT별도)</div>
        </div>
      </Card>
    </div>
  );
}
// ======================================== 📝 견적입력 탭
const ADDL_UI = [['acMove','에어컨 이동'],['insulDoor','단열방화문'],['fireDoor','일반방화문'],['floorFrame','바닥 단 프레임'],['raise','단 높임 공사'],['crack','크랙 보수'],['flowerbed','화단 철거']];
const MEMBRANE_OPTS = ['없음','아덱스 WPM 003 ROOFTOP','Sikalastic 590','우레탄방수','adhero 1000','adhero 3000','weldano 3000','Bituthene 3000','지정시트'];
const XPS_OPTS = ['없음','50T','70T','80T','100T','120T','150T','200T'];

// ③ 자재선택 필드 묶음 (est.sel 또는 zone.sel 에 바인딩) — V3-4 로 구역별 재사용
function MaterialSelect({ sel, onSel, showTile, showWood }){
  sel = sel || {};
  return (
    <div>
      <div className="grid sm:grid-cols-2 gap-3">
        <Field label="철거 - 바닥샌딩"><Sel value={sel.sanding} onChange={v=>onSel({sanding:v})} options={['아니오','예']} /></Field>
        <Field label="삼각면귀 (코너비드)"><Sel value={sel.cornerBead} onChange={v=>onSel({cornerBead:v})} options={['없음','삼각면귀 30각','젤리밴드','weldano 3000']} /></Field>
        <Field label="바닥면 프라이머 (바탕면정리+프라이머)"><Sel value={sel.primer} onChange={v=>onSel({primer:v})} options={['아니오','예']} /></Field>
        <Field label="1차 방수 (멤브레인)" hint={sel.membrane!=='없음' ? hintFor(RC.ITEM_DB.find(x=>x.on==='sel.membrane='+sel.membrane)?.id) : ''}>
          <Sel value={sel.membrane} onChange={v=>onSel({membrane:v})} options={MEMBRANE_OPTS} />
        </Field>
        <Field label="XPS 바닥 1P" hint={sel.xps1!=='없음'?`재 ${won0(RC.ITEM_DB.find(x=>x.qty==='XPS:'+sel.xps1)?.mat||0)}`:''}><Sel value={sel.xps1} onChange={v=>onSel({xps1:v})} options={XPS_OPTS} /></Field>
        <Field label="XPS 바닥 2P" hint={sel.xps2!=='없음'?`재 ${won0(RC.ITEM_DB.find(x=>x.qty==='XPS:'+sel.xps2)?.mat||0)}`:''}><Sel value={sel.xps2} onChange={v=>onSel({xps2:v})} options={XPS_OPTS} /></Field>
        <Field label="XPS 벽체"><Sel value={sel.xpsWall} onChange={v=>onSel({xpsWall:v})} options={['없음','30T벽','70T벽','100T벽']} /></Field>
        <Field label="단열재 지급자재 (예=재료비 0)"><Sel value={sel.ownerSupplied} onChange={v=>onSel({ownerSupplied:v})} options={['아니오','예']} /></Field>
        <Field label="투습방수지" hint={sel.vaporBarrier!=='없음' ? hintFor(sel.vaporBarrier==='SIGA'?'vb_siga':'vb_pro') : '없음 = 미시공'}><Sel value={sel.vaporBarrier} onChange={v=>onSel({vaporBarrier:v})} options={['없음','SIGA','프로클리마']} /></Field>
        <Field label="기밀테이프" hint={sel.tape!=='없음' ? hintFor(sel.tape==='SIGA'?'tp_siga':'tp_pro') : '없음 = 미시공'}><Sel value={sel.tape} onChange={v=>onSel({tape:v})} options={['없음','SIGA','프로클리마']} /></Field>
        <Field label="배수판" hint={sel.drainBoard!=='없음' ? hintFor(sel.drainBoard==='잡자재'?'db_jap':'db_tif') : '없음 = 미시공'}><Sel value={sel.drainBoard} onChange={v=>onSel({drainBoard:v})} options={['없음','잡자재','티푸스']} /></Field>
        <Field label="부직포" hint={sel.fabric!=='없음' ? hintFor(sel.fabric==='잡자재'?'fb_jap':'fb_tif') : '없음 = 미시공'}><Sel value={sel.fabric} onChange={v=>onSel({fabric:v})} options={['없음','잡자재','티푸스']} /></Field>
        <Field label="쇄석 마감" hint={sel.gravelPack!=='없음' ? hintFor(sel.gravelPack==='톤백'?'gv_ton':'gv_small') : '없음 = 쇄석작업 미시공'}><Sel value={sel.gravelPack} onChange={v=>onSel({gravelPack:v})} options={['없음','톤백','소분포장']} /></Field>
        <Field label="우레탄실리콘 (ea)"><NumInput step="1" value={sel.siliconEa} onChange={v=>onSel({siliconEa:v})} /></Field>
        <Field label="트렌치 바닥배수 (ea)"><NumInput step="1" value={sel.trenchFloorEa} onChange={v=>onSel({trenchFloorEa:v})} /></Field>
        <Field label="트렌치 측면배수 (ea)"><NumInput step="1" value={sel.trenchSideEa} onChange={v=>onSel({trenchSideEa:v})} /></Field>
      </div>
      {showTile && (
        <div className="grid sm:grid-cols-2 gap-3 mt-3 pt-3 border-t border-slate-100">
          <Field label="타일 부자재 (페데스탈)"><Sel value={sel.tileSub} onChange={v=>onSel({tileSub:v})} options={['잡자재 사 페데스탈','페이그란 페데스탈']} /></Field>
          <Field label="타일 마감재"><Sel value={sel.tileFinish} onChange={v=>onSel({tileFinish:v})} options={['20T타일(중국산)','20T타일(유럽산)']} /></Field>
        </div>
      )}
      {showWood && (
        <div className="grid sm:grid-cols-2 gap-3 mt-3 pt-3 border-t border-slate-100">
          <Field label="우드 마감재 (페데스탈+각관 자동)"><Sel value={sel.woodFinish} onChange={v=>onSel({woodFinish:v})} options={['합성데크','없음']} /></Field>
        </div>
      )}
    </div>
  );
}
function InputTab({ est, result, upd, updSel, updInfo, updTemp, updRates, updSiteCond, updFinishAll, zoneOps, ciOps, addlOps, applyRoof, onConfirm, mode }) {
  const [showCalc, setShowCalc] = useState(false);
  const surKeyOpts = [{value:'',label:'없음'},'primary','sanding','xpsFloor','xpsWallLab','wallFinishLab','sheet','drain','gravelFinish','wallFinish','pedestalSub','finishMat','floorFrame','raise','crack'];
  const fa = est.finishAll || { enabled:false, finish:'쇄석', wallFinish:'없음' };
  return (
    <div className="grid lg:grid-cols-3 gap-4">
      <div className="lg:col-span-2 space-y-4">
        {/* ① 프로젝트 정보 */}
        <Card>
          <SectionTitle n="①">프로젝트 정보</SectionTitle>
          <div className="grid sm:grid-cols-2 gap-3">
            <Field label="공사명"><TextInput value={est.info.title} onChange={e=>updInfo({title:e.target.value})} placeholder="예) 신축 역전지붕공사" /></Field>
            <Field label="현장주소"><TextInput value={est.info.address} onChange={e=>updInfo({address:e.target.value})} placeholder="예) 평택 동삭동 867-7" /></Field>
            <Field label="담당자"><TextInput value={est.info.manager} onChange={e=>updInfo({manager:e.target.value})} /></Field>
            <Field label="견적일자"><TextInput type="date" value={est.info.date} onChange={e=>updInfo({date:e.target.value})} /></Field>
            <Field label="고객 연락처"><TextInput value={est.info.customerContact} onChange={e=>updInfo({customerContact:e.target.value})} /></Field>
            <Field label="유입경로"><Sel value={est.info.leadSource||''} onChange={v=>updInfo({leadSource:v})} options={leadSourceOpts(est.info.leadSource)} /></Field>
          </div>
        </Card>

        {/* ② 구역별 치수 */}
        <Card>
          <SectionTitle n="②" extra={<Btn size="sm" variant="secondary" onClick={()=>setShowCalc(s=>!s)}>📐 형태 계산기</Btn>}>구역별 치수 · 마감</SectionTitle>
          {showCalc && <div className="mb-3"><RoofCalcTool zones={est.zones} onApply={applyRoof} /></div>}
          {/* V2-4: 전체 마감방식 동일 */}
          <div className="flex flex-wrap items-center gap-3 mb-3 p-2 bg-amber-50 rounded-lg">
            <label className="flex items-center gap-2 text-sm font-semibold text-slate-700">
              <input type="checkbox" checked={!!fa.enabled} onChange={e=>updFinishAll({enabled:e.target.checked})} />
              ☑️ 전체 마감방식 동일
            </label>
            {fa.enabled && <>
              <div className="flex items-center gap-1"><span className="text-xs text-slate-500">마감</span><Sel value={fa.finish} onChange={v=>updFinishAll({finish:v})} options={['쇄석','타일','우드','조경']} className="w-28" /></div>
              <div className="flex items-center gap-1"><span className="text-xs text-slate-500">벽체마감</span><Sel value={fa.wallFinish} onChange={v=>updFinishAll({wallFinish:v})} options={['없음','스테인리스','함석','crc보드']} className="w-32" /></div>
            </>}
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="text-[11px] text-slate-400 border-b border-slate-100">
                <th className="text-left font-semibold py-1.5">구역명</th><th className="font-semibold">바닥(㎡)</th><th className="font-semibold">파라펫(m)</th><th className="font-semibold">높이(m)</th><th></th>
              </tr></thead>
              <tbody>
                {est.zones.map((z,i)=>(
                  <tr key={i} className="border-b border-slate-50">
                    <td className="py-1 pr-1"><TextInput value={z.label} onChange={e=>zoneOps.set(i,'label',e.target.value)} className="min-w-[70px]" /></td>
                    <td className="px-1"><NumInput value={z.floor} onChange={v=>zoneOps.set(i,'floor',v)} className="min-w-[68px]" /></td>
                    <td className="px-1"><NumInput value={z.parapetLen} onChange={v=>zoneOps.set(i,'parapetLen',v)} className="min-w-[62px]" /></td>
                    <td className="px-1"><NumInput value={z.parapetH} onChange={v=>zoneOps.set(i,'parapetH',v)} className="min-w-[56px]" /></td>
                    <td className="pl-1"><Btn size="sm" variant="ghost" onClick={()=>zoneOps.remove(i)} disabled={est.zones.length<=1}>✕</Btn></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="flex items-center gap-3 mt-2">
            <Btn size="sm" variant="secondary" onClick={zoneOps.add} disabled={est.zones.length>=10}>+ 구역 추가 (최대 10)</Btn>
            <span className="text-xs text-slate-400 num-cell">방수면적 {area(result.derived.waterproofArea)}㎡ · 벽면적 {area(result.derived.wallArea)}㎡ · 기밀테이프 {area(result.derived.tapeLen)}m</span>
          </div>
        </Card>

        {/* ③ 자재 선택 — enabled=true: 단일 / enabled=false: 구역별 카드 (V3-4) */}
        {fa.enabled ? (
          <Card>
            <SectionTitle n="③">자재 선택</SectionTitle>
            <MaterialSelect sel={est.sel} onSel={updSel} showTile={fa.finish==='타일'} showWood={fa.finish==='우드'} />
          </Card>
        ) : (
          est.zones.map((z,i)=>{ const zl = z.label || ('구역'+(i+1)); return (
            <Card key={i} className="border-l-4 border-l-amber-400">
              <SectionTitle n="③" extra={<Badge tone="amber">구역 {i+1}</Badge>}>자재선택 — {zl}</SectionTitle>
              <div className="grid sm:grid-cols-2 gap-3 mb-3 pb-3 border-b border-slate-100">
                <Field label="마감"><Sel value={z.finish} onChange={v=>zoneOps.set(i,'finish',v)} options={['쇄석','타일','우드','조경']} /></Field>
                <Field label="벽체마감"><Sel value={z.wallFinish} onChange={v=>zoneOps.set(i,'wallFinish',v)} options={['없음','스테인리스','함석','crc보드']} /></Field>
              </div>
              <MaterialSelect sel={z.sel||est.sel} onSel={patch=>zoneOps.setSel(i,patch)} showTile={z.finish==='타일'} showWood={z.finish==='우드'} />
            </Card>
          ); })
        )}

        {/* ④ 가설공사 */}
        <Card>
          <SectionTitle n="④">가설공사 · 장비</SectionTitle>
          <div className="space-y-1.5 mb-3">
            {est.temp.equipment.map((eq,i)=>(
              <div key={i} className="flex items-center gap-2">
                <Sel value={eq.name} onChange={v=>ciOps.setEq(i,'name',v)} options={RC.EQUIP_CATALOG.map(e=>({value:e.name,label:`${e.name} — ${won0(e.price)}`}))} className="flex-1" />
                <NumInput step="1" value={eq.qty} onChange={v=>ciOps.setEq(i,'qty',v)} className="w-16" />
                <span className="text-xs text-slate-400 w-24 text-right num-cell">{won0((RC.EQUIP_MAP[eq.name]||0)*(Number(eq.qty)||0))}</span>
                <Btn size="sm" variant="ghost" onClick={()=>ciOps.removeEq(i)}>✕</Btn>
              </div>
            ))}
            <Btn size="sm" variant="secondary" onClick={ciOps.addEq}>+ 장비 추가</Btn>
          </div>
          <div className="grid sm:grid-cols-2 gap-3">
            <Field label="지게차 (대 · 80,000/대)"><NumInput step="1" value={est.temp.forkliftQty} onChange={v=>updTemp({forkliftQty:v})} /></Field>
            <Field label="폐기물"><Sel value={est.temp.waste} onChange={v=>updTemp({waste:v})} options={['없음','폐기물 1ton','폐기물 2.5ton']} /></Field>
            {est.temp.waste!=='없음' && <Field label="폐기물 수량"><NumInput step="1" value={est.temp.wasteQty} onChange={v=>updTemp({wasteQty:v})} /></Field>}
            <Field label="운임 및 경비" hint="서울·경기 500,000 / 지방 1,000,000"><Sel value={est.temp.freight} onChange={v=>updTemp({freight:v})} options={['서울·경기','지방']} /></Field>
          </div>
        </Card>

        {/* ⑤ 추가공사 (V2-5: 체크 시 인라인 수량/단가/할증 편집) */}
        <Card>
          <SectionTitle n="⑤">추가공사</SectionTitle>
          <div className="space-y-2">
            {ADDL_UI.map(([k,l])=>{ const a=est.addl[k]||{}; return (
              <div key={k} className={cx('rounded-lg border', a.on?'border-amber-300 bg-amber-50/40':'border-slate-200')}>
                <div className="flex items-center justify-between px-2.5 py-1.5">
                  <span className="text-sm text-slate-700 font-medium">{l} <span className="text-[11px] text-slate-400">기본 재 {won0(RC.ADDL_MAP[k].mat)}/노 {won0(RC.ADDL_MAP[k].lab)}</span></span>
                  <Toggle checked={!!a.on} onChange={()=>addlOps.toggle(k)} />
                </div>
                {a.on && (
                  <div className="px-2.5 pb-2.5 grid grid-cols-2 md:grid-cols-6 gap-1.5">
                    <div><span className="text-[10px] text-slate-400">수량</span><NumInput step="1" value={a.qty} onChange={v=>addlOps.set(k,'qty',v)} /></div>
                    <div><span className="text-[10px] text-slate-400">재료단가</span><CommaInput value={a.mat} onChange={v=>addlOps.set(k,'mat',v)} /></div>
                    <div><span className="text-[10px] text-slate-400">노무단가</span><CommaInput value={a.lab} onChange={v=>addlOps.set(k,'lab',v)} /></div>
                    <div><span className="text-[10px] text-slate-400">부자재단가</span><CommaInput value={a.sub} onChange={v=>addlOps.set(k,'sub',v)} /></div>
                    <div><span className="text-[10px] text-slate-400">재료할증</span><NumInput step="0.01" min="-1" value={a.surMat} onChange={v=>addlOps.set(k,'surMat',v)} /></div>
                    <div><span className="text-[10px] text-slate-400">노무할증</span><NumInput step="0.01" min="-1" value={a.surLab} onChange={v=>addlOps.set(k,'surLab',v)} /></div>
                    <div className="col-span-2 md:col-span-6 flex items-center justify-between">
                      <span className="text-[11px] text-slate-500 num-cell">→ 재 {won0(a.mat*(1+(a.surMat||0))*a.qty)} · 노 {won0(a.lab*(1+(a.surLab||0))*a.qty)} · 부 {won0((a.sub||0)*a.qty)}</span>
                      <Btn size="xs" variant="ghost" onClick={()=>addlOps.reset(k)}>기본값 초기화</Btn>
                    </div>
                  </div>
                )}
              </div>
            ); })}
          </div>
          <div className="mt-4 pt-3 border-t border-slate-100">
            <div className="flex items-center justify-between mb-2"><span className="text-xs font-bold text-slate-500">추가공사 직접 입력</span><Btn size="sm" variant="secondary" onClick={ciOps.add}>+ 항목 추가</Btn></div>
            {est.customItems.length===0 && <p className="text-xs text-slate-400">직접 입력한 추가공사 항목이 없습니다.</p>}
            <div className="space-y-2">
              {est.customItems.map((ci,i)=>(
                <div key={i} className="border border-slate-200 rounded-lg p-2 bg-slate-50/50">
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-1.5">
                    <TextInput placeholder="공사내용" value={ci.work} onChange={e=>ciOps.set(i,'work',e.target.value)} />
                    <TextInput placeholder="SPEC / 자재명" value={ci.name} onChange={e=>ciOps.set(i,'name',e.target.value)} className="md:col-span-2" />
                    <div className="flex gap-1"><TextInput placeholder="단위" value={ci.unit} onChange={e=>ciOps.set(i,'unit',e.target.value)} className="w-14" /><NumInput placeholder="수량" value={ci.qty} onChange={v=>ciOps.set(i,'qty',v)} /></div>
                  </div>
                  <div className="grid grid-cols-3 gap-1.5 mt-1.5">
                    <div><span className="text-[10px] text-slate-400">재료단가</span><CommaInput value={ci.matPrice} onChange={v=>ciOps.set(i,'matPrice',v)} /><Sel value={ci.matSurKey||''} onChange={v=>ciOps.set(i,'matSurKey',v||null)} options={surKeyOpts} className="mt-1 text-xs" /></div>
                    <div><span className="text-[10px] text-slate-400">노무단가</span><CommaInput value={ci.labPrice} onChange={v=>ciOps.set(i,'labPrice',v)} /><Sel value={ci.labSurKey||''} onChange={v=>ciOps.set(i,'labSurKey',v||null)} options={surKeyOpts} className="mt-1 text-xs" /></div>
                    <div><span className="text-[10px] text-slate-400">부자재단가</span><CommaInput value={ci.subPrice} onChange={v=>ciOps.set(i,'subPrice',v)} /><Sel value={ci.subSurKey||''} onChange={v=>ciOps.set(i,'subSurKey',v||null)} options={surKeyOpts} className="mt-1 text-xs" /></div>
                  </div>
                  <div className="flex justify-end mt-1"><Btn size="sm" variant="danger" onClick={()=>ciOps.remove(i)}>삭제</Btn></div>
                </div>
              ))}
            </div>
          </div>
        </Card>

        {/* ⑥ 요율 / 할증 / 여건 / 특이사항 */}
        <Card>
          <SectionTitle n="⑥">요율 · 할증 · 현장여건 · 특이사항</SectionTitle>
          <div className="grid sm:grid-cols-3 gap-3">
            <Field label="간접재료비율"><NumInput step="0.001" value={est.rates.indirectMat} onChange={v=>updRates({indirectMat:v})} /></Field>
            <Field label="간접노무비율"><NumInput step="0.001" value={est.rates.indirectLab} onChange={v=>updRates({indirectLab:v})} /></Field>
            <Field label="일반관리비율"><NumInput step="0.001" value={est.rates.genAdmin} onChange={v=>updRates({genAdmin:v})} /></Field>
            <Field label="디자인비율"><NumInput step="0.001" value={est.rates.design} onChange={v=>updRates({design:v})} /></Field>
            <Field label="이윤율"><NumInput step="0.001" value={est.rates.profit} onChange={v=>updRates({profit:v})} /></Field>
            <Field label="세금계산서 발행"><Sel value={est.rates.taxInvoice} onChange={v=>updRates({taxInvoice:v})} options={['예','아니오']} /></Field>
          </div>
          <div className="flex items-center justify-between mt-3 p-2 bg-amber-50 rounded-lg">
            <span className="text-xs text-slate-600">부자재 순공사원가 포함 <span className="text-slate-400">(기본 ON, OFF=구 엑셀 방식)</span></span>
            <Toggle checked={est.rates.subInNetCost!==false} onChange={v=>updRates({subInNetCost:v})} labelOn="포함" labelOff="미산입" />
          </div>

          <div className="mt-4 pt-3 border-t border-slate-100">
            <span className="text-xs font-bold text-slate-500 block mb-2">현장 여건 (일반관리비율 가이드)</span>
            <div className="grid sm:grid-cols-4 gap-2">
              <Field label="100㎡ 미만"><Sel value={est.siteCond.under100} onChange={v=>updSiteCond({under100:v})} options={['아니오','예']} /></Field>

// ======================================== 💰 자재DB 탭 (V2-2 단가 오버라이드)
function PriceDBTab({ overrides, setItemOv, setEquipOv, resetItemOv, resetEquipOv, resetAllOv, priceMeta, onSaveNow, mode }) {
  const ovItems = overrides.items || {};

  const groups = useMemo(()=>{
    const map = {};
    RC.ITEM_DB.forEach(it=>{ const g=it.grp+' › '+it.work; (map[g]=map[g]||[]).push(it); });
    return Object.keys(map).map(g=>({g, items:map[g]}));

  const ovCount = Object.keys(ovItems).length + Object.keys(ovEquip).length;
  return (
    <div className="max-w-6xl mx-auto space-y-4">
      <Card title="💰 자재 단가 DB (오버라이드)" right={
        <div className="flex items-center gap-2">
          <Badge tone={ovCount?'amber':'slate'}>수정 {ovCount}건</Badge>
          <Btn size="sm" variant="secondary" onClick={resetAllOv} disabled={!ovCount}>전체 초기화</Btn>

          {mode==='server' ? ' 팀 공유(서버 저장).' : ' 로컬 저장(localStorage).'}
          {priceMeta && priceMeta.updatedByName && <span className="ml-1">· 마지막 수정 <b>{priceMeta.updatedByName}</b></span>}
        </p>
        <div className="space-y-4 mt-3">
          {groups.map(({g, items})=>(
            <div key={g}>
              <h4 className="text-xs font-bold text-slate-600 bg-slate-100 px-2 py-1 rounded">{g}</h4>
              <div className="overflow-x-auto">
                <table className="w-full text-xs num-cell mt-1">
                  <thead><tr className="text-slate-400 border-b border-slate-100">
                    <th className="text-left p-1">자재명</th><th className="p-1">단위</th>
                    <th className="p-1 text-right">재료 기본</th><th className="p-1 text-right">재료 override</th>
                    <th className="p-1 text-right">노무 기본</th><th className="p-1 text-right">노무 override</th>
                    <th className="p-1 text-right">부자재 기본</th><th className="p-1 text-right">부자재 override</th><th className="p-1"></th>
                  </tr></thead>
                  <tbody>
                    {items.map(it=>{ const ov=ovItems[it.id]||{}; const dirty=(ov.mat!=null&&ov.mat!=='')||(ov.lab!=null&&ov.lab!=='')||(ov.sub!=null&&ov.sub!=='');
                      return (
                        <tr key={it.id} className={cx('border-b border-slate-50', dirty&&'bg-amber-50/50')}>
                          <td className="p-1 text-left text-slate-700 max-w-[240px]">{dirty&&<span className="text-amber-500 mr-1">●</span>}{it.name}</td>
                          <td className="p-1 text-center text-slate-400">{it.unit}</td>
                          <td className="p-1 text-right text-slate-400">{won0(it.mat)}</td>
                          <td className="p-1"><CommaInput value={ov.mat??''} onChange={v=>setItemOv(it.id,'mat',v)} placeholder="—" className="w-24 py-1" /></td>
                          <td className="p-1 text-right text-slate-400">{won0(it.lab)}</td>
                          <td className="p-1"><CommaInput value={ov.lab??''} onChange={v=>setItemOv(it.id,'lab',v)} placeholder="—" className="w-24 py-1" /></td>
                          <td className="p-1 text-right text-slate-400">{won0(it.sub)}</td>
                          <td className="p-1"><CommaInput value={ov.sub??''} onChange={v=>setItemOv(it.id,'sub',v)} placeholder="—" className="w-24 py-1" /></td>
                          <td className="p-1">{dirty&&<Btn size="xs" variant="ghost" onClick={()=>resetItemOv(it.id)}>초기화</Btn>}</td>
                        </tr>
                      ); })}
                  </tbody>
                </table>
              </div>
            </div>
          ))}
        </div>
      </Card>
      <Card title="🏗 장비 단가 (가설공사)">
        <div className="overflow-x-auto">
          <table className="w-full text-xs num-cell">
            <thead><tr className="text-slate-400 border-b border-slate-100"><th className="text-left p-1">장비명</th><th className="p-1 text-right">기본단가</th><th className="p-1 text-right">override</th><th className="p-1"></th></tr></thead>
            <tbody>
              {RC.EQUIP_CATALOG.map(eq=>{ const has=ovEquip[eq.name]!=null&&ovEquip[eq.name]!=='';
                return (
                  <tr key={eq.name} className={cx('border-b border-slate-50', has&&'bg-amber-50/50')}>
                    <td className="p-1 text-left text-slate-700">{has&&<span className="text-amber-500 mr-1">●</span>}{eq.name}</td>
                    <td className="p-1 text-right text-slate-400">{won0(eq.price)}</td>
                    <td className="p-1"><CommaInput value={ovEquip[eq.name]??''} onChange={v=>setEquipOv(eq.name,v)} placeholder="—" className="w-28 py-1 ml-auto" /></td>
                    <td className="p-1">{has&&<Btn size="xs" variant="ghost" onClick={()=>resetEquipOv(eq.name)}>초기화</Btn>}</td>
                  </tr>
                ); })}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function costRowsOf(est, cost){
  return [
    ['직접재료비', cost.directMat], [`간접재료비 (${pctStr(est.rates.indirectMat)})`, cost.indirectMat], ['재료비 소계', cost.matSubtotal],
    ['직접노무비', cost.directLab], [`간접노무비 (${pctStr(est.rates.indirectLab)})`, cost.indirectLab], ['노무비 소계', cost.labSubtotal],
    ['부자재 합계', cost.subTotal],
    [`순공사원가${cost.subInNet?' (부자재 포함)':' (부자재 미산입)'}`, cost.netCost],
    [`일반관리비 (${pctStr(est.rates.genAdmin)})`, cost.genAdmin],
    ...(cost.design>0?[[`디자인 (${pctStr(est.rates.design)})`, cost.design]]:[]),
    [`회사이윤 (${pctStr(est.rates.profit)})`, cost.profit],
    ['공사비 합계', cost.constrTotal],
    [est.rates.taxInvoice==='예'?'부가가치세 (10%)':'부가가치세 (미진행)', cost.vat],
  ];
}

const MEMBRANE_IMG = { '아덱스 WPM 003 ROOFTOP':'membrane_adex','Sikalastic 590':'membrane_sika','우레탄방수':'membrane_urethane','adhero 1000':'membrane_adhero','adhero 3000':'membrane_adhero','weldano 3000':'membrane_weldano','Bituthene 3000':'membrane_bituthene','지정시트':'membrane_bituthene' };
function buildMaterialCards(est, result){

  const xpsThicks = []; [est.sel.xps1, est.sel.xps2].forEach(t=>{ if(t && t!=='없음' && !xpsThicks.includes(t)) xpsThicks.push(t); });
  xpsThicks.forEach(t=>{ const x=D.xps[t]; if(x) push('단열 - 바닥', `XPS 가등급 ${t}`, `${t} 900*1800`, D.roles['XPS바닥'], x[0], x[1], 'xps'); });
  if (est.sel.xpsWall!=='없음'){ const t=est.sel.xpsWall.replace('벽',''); const x=D.xps[t]; if(x) push('단열 - 벽체', `XPS 가등급 ${est.sel.xpsWall}`, `${t} / 연질폼 포함`, D.roles['XPS벽체'], x[0], x[1], 'xps'); }
  { const k='투습_'+est.sel.vaporBarrier; const m=D.mats[k]; if(m) push('2차 투습방수', '투습방수지', est.sel.vaporBarrier, D.roles['투습방수지'], m[0], m[1], est.sel.vaporBarrier==='SIGA'?'vb_siga':'vb_pro'); }
  { const k='기밀_'+est.sel.tape; const m=D.mats[k]; if(m) push('기밀', '기밀테이프', est.sel.tape, D.roles['기밀테이프'], m[0], m[1], est.sel.tape==='SIGA'?'tape_siga':'tape_pro'); }
  { const k='배수판_'+est.sel.drainBoard; const m=D.mats[k]; if(m) push('배수', '배수판 500*500', est.sel.drainBoard, D.roles['배수판'], m[0], m[1], 'drain'); }
  { const k='부직포_'+est.sel.fabric; const m=D.mats[k]; if(m) push('필터', '부직포 300g', est.sel.fabric, D.roles['부직포'], m[0], m[1], 'fabric'); }
  if (d.gravelArea>0 && est.sel.gravelPack!=='없음'){ const k='쇄석_'+est.sel.gravelPack; const m=D.mats[k]; if(m) push('마감 - 쇄석', '쇄석 마감', est.sel.gravelPack, D.roles['쇄석포장'], m[0], m[1], 'gravel'); }
  if (d.tileArea>0){

    const k2='타일_'+est.sel.tileFinish; const m2=D.mats[k2]; if(m2) push('마감 - 타일', '타일 마감재', est.sel.tileFinish, D.roles['마감재(타일)'], m2[0], m2[1], 'tile');
  }

    if (est.sel.woodFinish==='합성데크'){ const m2=D.mats['우드_합성데크']; if(m2) push('마감 - 우드', '합성데크', '합성데크', D.roles['마감재(우드)'], m2[0], m2[1], 'deck'); }

}

// self-test (SPEC §9 + V2, ±1)
function selfTest(){
  const results = []; const T = 1.0;
  const ap = (label, act, exp)=>results.push({label, ok: Math.abs(Number(act)-Number(exp))<=T, act: (Math.round(Number(act)*100)/100), exp});
  const eqb = (label, act, exp)=>results.push({label, ok: act===exp, act:String(act), exp:String(exp)});
  const clone = (o)=>JSON.parse(JSON.stringify(o));
  const r = RC.computeEstimate(RC.SAMPLE_DONGSAK);
  ap('derived.waterproofArea', r.derived.waterproofArea, 206.52);
  ap('derived.wallCrc', r.derived.wallCrc, 15.6);
  ap('trades.역전지붕 mat', r.trades['역전지붕공사'].mat, 12693491.6);
  ap('trades.역전지붕 sub', r.trades['역전지붕공사'].sub, 233064);
  ap('tradeTotal.total', r.tradeTotal.total, 22249517.6);
  ap('cost.subTotal', r.cost.subTotal, 331464);
  ap('cost.netCost (부자재 포함)', r.cost.netCost, 22828192.33);
  ap('cost.constrTotal', r.cost.constrTotal, 27393830.796);
  ap('cost.grandTotal (V2 기본)', r.cost.grandTotal, 30133213.8756);
  ap('cost.perPyeong', r.cost.perPyeong, 502220.23126);
  const bg = r.orders.find(o=>o.vendor==='부광스티로폴'); ap('orders.부광 subtotal', bg?bg.subtotal:0, 4714086);
  const jj = r.orders.find(o=>o.vendor==='잡자재'); ap('orders.잡자재 subtotal', jj?jj.subtotal:0, 4205140);
  const x150 = r.rows.find(x=>x.id==='x150'); ap('x150.matTotal', x150.matTotal, 3049200);
  const wf = r.rows.find(x=>x.id==='wf_crc'); ap('wf_crc.labTotal', wf.labTotal, 546000);
  // 레거시 subInNetCost=false
  const eL=clone(RC.SAMPLE_DONGSAK); eL.rates.subInNetCost=false;
  const rL=RC.computeEstimate(eL); ap('레거시 grandTotal(29,695,681)', rL.cost.grandTotal, 29695681.3956);
  // 오버라이드
  const rOv=RC.computeEstimate(RC.SAMPLE_DONGSAK,{items:{x150:{mat:16000}}}); ap('override x150.matFinal', rOv.rows.find(x=>x.id==='x150').matFinal, 17600);
  // finishAll enabled
  const e4=clone(RC.SAMPLE_DONGSAK); e4.finishAll={enabled:true,finish:'쇄석',wallFinish:'없음'};
  const r4=RC.computeEstimate(e4); ap('finishAll 역전지붕 mat', r4.trades['역전지붕공사'].mat, 12482891.6); eqb('finishAll wf_crc 비활성', r4.rows.some(x=>x.id==='wf_crc'), false);
  // addl crack
  const e3=clone(RC.SAMPLE_DONGSAK); e3.addl.crack={on:true,qty:2,mat:150000,lab:250000,sub:10000,surMat:0,surLab:0};
  const r3=RC.computeEstimate(e3); ap('addl 크랙 추가.lab', r3.trades['추가공사'].lab, 626000);
  // VAT 아니오
  const e1=clone(RC.SAMPLE_DONGSAK); e1.rates.taxInvoice='아니오';
  const r1=RC.computeEstimate(e1); ap('VAT 아니오 grand=constr', r1.cost.grandTotal, 27393830.796);
  // V3-1: 구역별 sel 회귀 (병합 경로 · ea zones[0]만) — 수치 불변
  const eZ=RC.withZoneSel(clone(RC.SAMPLE_DONGSAK));
  const rZ=RC.computeEstimate(eZ); ap('V3 구역별sel grandTotal 불변', rZ.cost.grandTotal, 30133213.8756);
  eqb('V3 zones[1].sel.siliconEa=0', eZ.zones[1].sel.siliconEa, 0);
  // V3-3: ea 구역 합산
  const eEa=RC.withZoneSel(clone(RC.SAMPLE_DONGSAK)); eEa.zones[1].sel.siliconEa=5;
  const silR=RC.computeEstimate(eEa).rows.find(x=>x.id==='sil'); ap('V3 ea 합산 silicon.qty=15', silR?silR.qty:0, 15); ap('V3 ea silicon.matTotal=165,000', silR?silR.matTotal:0, 165000);
  // V3-5: coverNotes 4줄
  eqb('V3 coverNotes 4줄', RC.COMPANY.coverNotes.length, 4);
  return { pass: results.every(r=>r.ok), results };
}

// v1/v2 마이그레이션
function migrateAddl(old){
  const def = RC.defaultAddl();
  if (!old || typeof old!=='object') return def;
  const out = {};
  Object.keys(def).forEach(k=>{
    const o = old[k];
    if (o==null) out[k]=def[k];
    else if (typeof o==='string') out[k]={...def[k], on:o==='예'};
    else if (typeof o==='object') out[k]={...def[k], ...o, on:!!o.on};
    else out[k]=def[k];
  });
  return out;
}
function migrate(e){
  const base = RC.newEstimate();
  const m = Object.assign({}, base, e, {
    info:{...base.info, ...(e.info||{})},
    sel:{...base.sel, ...(e.sel||{})},
    temp:{...base.temp, ...(e.temp||{})},
    rates:{...base.rates, ...(e.rates||{})},
    surcharges:{...base.surcharges, ...(e.surcharges||{})},
    siteCond:{...base.siteCond, ...(e.siteCond||{})},
    siteNotes: (e.siteNotes&&e.siteNotes.length)?e.siteNotes:base.siteNotes,
    customNotes: e.customNotes||[],
    customItems: e.customItems||[],
    zones: (e.zones&&e.zones.length)?e.zones:base.zones,
    memo: e.memo||'',
  });
  // V2-3: subInNetCost 없으면 true (구 엑셀 미산입은 오류였음)
  if (m.rates.subInNetCost==null) m.rates.subInNetCost = true;
  // V2-4: finishAll 없으면 enabled:false (기존 구역별 마감 보존)
  m.finishAll = e.finishAll ? {...base.finishAll, ...e.finishAll} : { enabled:false, finish:'쇄석', wallFinish:'없음' };
  // V2-5: addl 문자열→객체
  m.addl = migrateAddl(e.addl);
  delete m.includeSubInNet;
  // V3-5: coverNotes — 저장분 있으면 마이그레이트(구 3줄→4줄, 커스텀 보존), 없으면 미설정→표시 시 COMPANY 기본 4줄
  if (e.coverNotes) m.coverNotes = RC.migrateCoverNotes(e.coverNotes); else delete m.coverNotes;
  // V3-4: 구역별 자재선택 — zone.sel 생성 (ea 3필드는 zones[0]에만)
  return RC.withZoneSel(m);
}
function buildMeta(e, overrides){

}
function toLocalListItem(e, overrides){

}

function printCombinedHTML(html){
  const ifr = document.createElement('iframe');
  ifr.style.position='fixed'; ifr.style.right='0'; ifr.style.bottom='0'; ifr.style.width='0'; ifr.style.height='0'; ifr.style.border='0';
  document.body.appendChild(ifr);
  const doc = ifr.contentWindow.document; doc.open(); doc.write(html); doc.close();
  let removed=false; const cleanup=()=>{ if(removed) return; removed=true; setTimeout(()=>{ try{document.body.removeChild(ifr);}catch(e){} }, 300); };
  ifr.contentWindow.onafterprint = cleanup;
  setTimeout(()=>{ try{ ifr.contentWindow.focus(); ifr.contentWindow.print(); }catch(e){} cleanup(); }, 450);
}

  useEffect(()=>{ (async()=>{ try{ const r=await fetch('images/materials/manifest.json',{cache:'no-store'}); if(r.ok){ const j=await r.json(); if(j&&typeof j==='object'&&Object.keys(j).length){ setManifest(j); return; } } }catch(e){} setManifest(FALLBACK_MANIFEST); /* V4-3: file:// 등 fetch 실패 시 내장 폴백 */ })(); },[]);

  // ---- boot: 모드 판별 ----
  useEffect(()=>{ (async()=>{
    if (location.protocol==='file:'){ bootLocal(); return; }
    let up=false;
    try{ const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),4000); // DB 콜드 커넥션이 1.5s를 넘겨 로컬 모드로 오폴백하는 사례 실측 → 완화
      const r=await fetch(API+'/health',{signal:ctrl.signal}); clearTimeout(t);
      if(r.ok){ const j=await r.json(); up=!!(j&&j.data&&j.data.ok); }
    }catch(e){ up=false; }
    if(!up){ bootLocal(); return; }
    const tok = (()=>{ try{return localStorage.getItem(LS_TOKEN)||'';}catch(e){return '';} })();
    if(tok){ tokenRef.current=tok;
      const me = await apiFetch('/auth/me');
      if(me.status===200 && me.json&&me.json.data){ setUser(me.json.data.user); setMode('server'); }
      else { tokenRef.current=''; try{localStorage.removeItem(LS_TOKEN);}catch(e){} setMode('login'); }
    } else setMode('login');
  })(); /* eslint-disable-next-line */ },[]);

  function bootLocal(){
    const store = loadLocalStore();
    const found = store.estimates.find(e=>e.id===store.activeId) || store.estimates[0];
    setEst(found ? migrate(found) : RC.newEstimate());
    setList(store.estimates.map(e=>toLocalListItem(migrate(e), overridesRef.current)));
    try{ const ov=JSON.parse(localStorage.getItem(LS_OVERRIDES)); if(ov&&typeof ov==='object') setOverrides({items:ov.items||{}, equip:ov.equip||{}}); }catch(e){}
    setMode('local');
  }

  // ---- server 진입 시 데이터 로드 ----
  useEffect(()=>{ if(mode==='server' && user){ (async()=>{
    const l = await apiFetch('/estimates'); if(l.status===200&&l.json.data) setList(l.json.data.estimates||[]);
    const p = await apiFetch('/prices'); if(p.status===200&&p.json.data){ const ov=p.json.data.overrides||{}; setOverrides({items:ov.items||{}, equip:ov.equip||{}}); setPriceMeta({updatedByName:p.json.data.updatedByName, updatedAt:p.json.data.updatedAt}); }
    setEst(RC.newEstimate());
    // 로컬 견적 업로드 제안 (1회)
    try{ const store=loadLocalStore(); const migrated=localStorage.getItem(LS_MIGRATED); if(!migrated && store.estimates.length>0) setMigrateOffer(store.estimates.length); }catch(e){}
  })(); } /* eslint-disable-next-line */ },[mode, user]);

  const onAuth = (token, u)=>{ tokenRef.current=token; try{localStorage.setItem(LS_TOKEN, token);}catch(e){} setUser(u); setMode('server'); };
  const logout = ()=>{ tokenRef.current=''; try{localStorage.removeItem(LS_TOKEN);}catch(e){} setUser(null); setList([]); setEst(RC.newEstimate()); setMode('login'); };

  async function doMigrateUpload(){
    const store = loadLocalStore(); let n=0;
    for (const raw of store.estimates){ const e=migrate(raw);
      const res = await apiFetch('/estimates', {method:'POST', body:JSON.stringify({title:e.info.title||'새 견적', memo:e.memo||'', data:e, meta:buildMeta(e, overridesRef.current)})});
      if(res.status===201) n++;
    }
    try{ localStorage.setItem(LS_MIGRATED,'1'); }catch(e){}
    setMigrateOffer(0);
    const l = await apiFetch('/estimates'); if(l.status===200&&l.json.data) setList(l.json.data.estimates||[]);
    alert(`${n}건을 서버로 업로드했습니다.`);
  }

  // ---- 저장 (debounced) ----
  function saveLocalNow(){
    const e = estRef.current;
    const store = loadLocalStore();
    const list2 = store.estimates.slice();
    const i = list2.findIndex(x=>x.id===e.id);
    if(i>=0) list2[i]=e; else list2.unshift(e);
    const next = { estimates:list2, activeId:e.id };
    saveLocalStore(next);
    setList(list2.map(x=>toLocalListItem(migrate(x), overridesRef.current)).sort((a,b)=>b.updatedAt-a.updatedAt));
    setSync('saved');
  }
  async function flushServerSave(){
    const g = saveGuard.current;
    if (g.saving){ g.again=true; return; }
    const e = estRef.current;
    const onServer = listRef.current.some(x=>x.id===e.id);
    if (!onServer && !hasContent(e)){ setSync('idle'); return; } // 빈 새 견적은 서버 생성 보류
    g.saving=true; setSync('saving');
    try{
      const meta = buildMeta(e, overridesRef.current);
      if (onServer){
        const r = await apiFetch('/estimates/'+e.id, {method:'PUT', body:JSON.stringify({title:e.info.title||'새 견적', memo:e.memo||'', data:e, meta})});
        if(r.status===200&&r.json.data){ const it=r.json.data.estimate; setList(prev=>prev.map(x=>x.id===it.id?{...x,...it}:x)); setSync('saved'); }
        else setSync('error');
      } else {
        const r = await apiFetch('/estimates', {method:'POST', body:JSON.stringify({title:e.info.title||'새 견적', memo:e.memo||'', data:e, meta})});
        if(r.status===201&&r.json.data){ const it=r.json.data.estimate; const oldId=e.id;
          setEst(prev=> prev.id===oldId ? {...prev, id:it.id} : prev);
          setList(prev=> [it, ...prev.filter(x=>x.id!==it.id)]); setSync('saved');
        } else setSync('error');
      }
    }catch(err){ setSync('error'); }
    finally{ g.saving=false; if(g.again){ g.again=false; setTimeout(flushServerSave, 60); } }
  }
  useEffect(()=>{
    if (mode==='booting' || mode==='login') return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>{ if(modeRef.current==='local') saveLocalNow(); else if(modeRef.current==='server') flushServerSave(); }, mode==='server'?800:500);
    return ()=>clearTimeout(saveTimer.current);
  }, [est, mode]);

  // ---- 오버라이드 저장 (자재DB) ----
  function scheduleOverrideSave(next){
    clearTimeout(ovTimer.current);
    ovTimer.current = setTimeout(()=>{ persistOverrides(next); }, 700);
  }
  async function persistOverrides(ov){
    if (modeRef.current==='server'){ const r=await apiFetch('/prices',{method:'PUT', body:JSON.stringify({overrides:ov})}); if(r.status===200) setPriceMeta({updatedByName:(user&&user.name)||null, updatedAt:Date.now()}); }
    else { try{ localStorage.setItem(LS_OVERRIDES, JSON.stringify(ov)); }catch(e){} }
  }
  const setItemOv = (id,field,val)=>setOverrides(prev=>{ const items={...(prev.items||{})}; const cur={...(items[id]||{})}; if(val===''||val==null) delete cur[field]; else cur[field]=Number(val); if(Object.keys(cur).length) items[id]=cur; else delete items[id]; const next={...prev, items}; scheduleOverrideSave(next); return next; });
  const setEquipOv = (name,val)=>setOverrides(prev=>{ const equip={...(prev.equip||{})}; if(val===''||val==null) delete equip[name]; else equip[name]=Number(val); const next={...prev, equip}; scheduleOverrideSave(next); return next; });
  const resetItemOv = (id)=>setOverrides(prev=>{ const items={...(prev.items||{})}; delete items[id]; const next={...prev, items}; scheduleOverrideSave(next); return next; });
  const resetEquipOv = (name)=>setOverrides(prev=>{ const equip={...(prev.equip||{})}; delete equip[name]; const next={...prev, equip}; scheduleOverrideSave(next); return next; });
  const resetAllOv = ()=>{ const next={items:{},equip:{}}; setOverrides(next); scheduleOverrideSave(next); };
  const saveOverridesNow = ()=>{ clearTimeout(ovTimer.current); persistOverrides(overridesRef.current); };

  // ---- est 업데이트 헬퍼 ----
  const upd = (o)=>setEst(e=>({...e, ...o, updatedAt:Date.now()}));
  const updInfo = (o)=>setEst(e=>({...e, info:{...e.info,...o}, updatedAt:Date.now()}));
  const updSel = (o)=>setEst(e=>({...e, sel:{...e.sel,...o}, updatedAt:Date.now()}));
  const updTemp = (o)=>setEst(e=>({...e, temp:{...e.temp,...o}, updatedAt:Date.now()}));
  const updRates = (o)=>setEst(e=>({...e, rates:{...e.rates,...o}, updatedAt:Date.now()}));
  const updSiteCond = (o)=>setEst(e=>({...e, siteCond:{...e.siteCond,...o}, updatedAt:Date.now()}));
  const updFinishAll = (o)=>setEst(e=>{
    const next = {...e, finishAll:{...e.finishAll, ...o}, updatedAt:Date.now()};
    if (o.enabled===false && e.finishAll.enabled!==false){
      // ON→OFF: zone.sel 없는 구역만 생성 (ea zones[0]에만), 기존 sel 은 보존
      next.zones = e.zones.map((z,i)=> z.sel ? z : {...z, sel: i===0 ? JSON.parse(JSON.stringify(e.sel)) : newZoneSel(e.sel)});
    } else if (o.enabled===true && e.finishAll.enabled!==true){
      // OFF→ON: est.sel = zones[0].sel 딥카피, ea 3필드는 전 구역 합 (균일이었다면 총액 불변)
      if (e.zones[0] && e.zones[0].sel){
        const s = JSON.parse(JSON.stringify(e.zones[0].sel));
        let si=0, tf=0, ts=0;
        e.zones.forEach(z=>{ const zs=z.sel||{}; si+=numv(zs.siliconEa); tf+=numv(zs.trenchFloorEa); ts+=numv(zs.trenchSideEa); });
        s.siliconEa=si; s.trenchFloorEa=tf; s.trenchSideEa=ts;
        next.sel = s;
      }
    }
    return next;
  });
  const zoneOps = {
    set:(i,k,v)=>setEst(e=>({...e, zones:e.zones.map((z,j)=>j===i?{...z,[k]:v}:z), updatedAt:Date.now()})),
    setSel:(i,patch)=>setEst(e=>({...e, zones:e.zones.map((z,j)=>j===i?{...z, sel:{...(z.sel||e.sel), ...patch}}:z), updatedAt:Date.now()})),
    add:()=>setEst(e=> e.zones.length>=10?e:({...e, zones:[...e.zones,{label:'구역'+(e.zones.length+1),floor:0,parapetLen:0,parapetH:0,finish:'쇄석',wallFinish:'없음', sel:newZoneSel(e.sel)}], updatedAt:Date.now()})),
    remove:(i)=>setEst(e=>({...e, zones:e.zones.filter((_,j)=>j!==i), updatedAt:Date.now()})),
  };
  const ciOps = {
    add:()=>setEst(e=>({...e, customItems:[...e.customItems,{work:'',name:'',unit:'m2',qty:0,matPrice:0,matSurKey:null,labPrice:0,labSurKey:null,subPrice:0,subSurKey:null}], updatedAt:Date.now()})),
    set:(i,k,v)=>setEst(e=>({...e, customItems:e.customItems.map((c,j)=>j===i?{...c,[k]:v}:c), updatedAt:Date.now()})),
    remove:(i)=>setEst(e=>({...e, customItems:e.customItems.filter((_,j)=>j!==i), updatedAt:Date.now()})),
    addEq:()=>setEst(e=>({...e, temp:{...e.temp, equipment:[...e.temp.equipment,{name:RC.EQUIP_CATALOG[0].name,qty:1}]}, updatedAt:Date.now()})),
    setEq:(i,k,v)=>setEst(e=>({...e, temp:{...e.temp, equipment:e.temp.equipment.map((q,j)=>j===i?{...q,[k]:v}:q)}, updatedAt:Date.now()})),
    removeEq:(i)=>setEst(e=>({...e, temp:{...e.temp, equipment:e.temp.equipment.filter((_,j)=>j!==i)}, updatedAt:Date.now()})),
  };
  const addlOps = {
    toggle:(k)=>setEst(e=>({...e, addl:{...e.addl, [k]:{...e.addl[k], on:!e.addl[k].on}}, updatedAt:Date.now()})),
    set:(k,field,v)=>setEst(e=>({...e, addl:{...e.addl, [k]:{...e.addl[k], [field]:v}}, updatedAt:Date.now()})),
    reset:(k)=>setEst(e=>({...e, addl:{...e.addl, [k]:{...RC.defaultAddl()[k], on:e.addl[k].on}}, updatedAt:Date.now()})),
  };
  const applyRoof = (idx, areaM2, periM)=>setEst(e=>({...e, zones:e.zones.map((z,j)=>j===idx?{...z, floor:Math.round(areaM2*100)/100, parapetLen:Math.round(periM*100)/100}:z), updatedAt:Date.now()}));

  // ---- 저장목록 액션 ----
  const onNew = ()=>{ setEst(RC.newEstimate()); setTab('input'); };
  const onSample = ()=>{ const s=RC.withZoneSel(RC.sampleDongsak()); s.id='e'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); s.createdAt=s.updatedAt=Date.now(); setEst(s); setTab('input'); };
  const getData = async (id)=>{
    if (modeRef.current==='server'){ const r=await apiFetch('/estimates/'+id); if(r.status===200&&r.json.data) return {data:r.json.data.estimate.data, memo:r.json.data.estimate.memo, serverId:id}; return null; }
    const it=listRef.current.find(x=>x.id===id); return it?{data:it.data, memo:it.memo, serverId:null}:null;
  };
  const onLoad = async (id)=>{ const d=await getData(id); if(!d) return; const e=migrate(d.data);
    if (e.confirmed){ // V4.1: 확정견적은 원본 동결 유지를 위해 새 작성본(사본)으로 연다
      delete e.confirmed; delete e.confirmedAt;
      e.id='e'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); e.createdAt=e.updatedAt=Date.now(); e.memo=d.memo||e.memo;
      setNotice('확정견적 원본은 그대로 두고, 편집용 사본으로 열었습니다');
    } else { if(d.serverId) e.id=d.serverId; e.memo=d.memo||e.memo; }
    setEst(e); setTab('input'); };
  const onDup = async (id)=>{ const d=await getData(id); if(!d) return; const e=migrate(d.data); delete e.confirmed; delete e.confirmedAt; e.id='e'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); e.info={...e.info, title:(e.info.title||'견적')+' (복제)'}; e.memo=d.memo||''; e.createdAt=e.updatedAt=Date.now(); setEst(e); setTab('input'); };
  const onDel = async (id)=>{ if(!confirm('삭제하시겠습니까?')) return;
    if (modeRef.current==='server'){ const r=await apiFetch('/estimates/'+id,{method:'DELETE'}); if(r.status!==200 && r.status!==404) return; setList(prev=>prev.filter(x=>x.id!==id)); }
    else { const store=loadLocalStore(); const est2=store.estimates.filter(e=>e.id!==id); const next={estimates:est2, activeId: store.activeId===id?(est2[0]?est2[0].id:null):store.activeId}; saveLocalStore(next); setList(est2.map(e=>toLocalListItem(migrate(e), overridesRef.current)).sort((a,b)=>b.updatedAt-a.updatedAt)); }
    if(estRef.current.id===id){ setEst(RC.newEstimate()); }
  };
  const onMemo = async (id, memo)=>{
    if (modeRef.current==='server'){ const r=await apiFetch('/estimates/'+id,{method:'PUT', body:JSON.stringify({memo})}); if(r.status===200&&r.json.data){ const it=r.json.data.estimate; setList(prev=>prev.map(x=>x.id===it.id?{...x,...it}:x)); } }
    else { const store=loadLocalStore(); const est2=store.estimates.map(e=>e.id===id?{...e, memo, updatedAt:Date.now()}:e); saveLocalStore({estimates:est2, activeId:store.activeId}); setList(est2.map(e=>toLocalListItem(migrate(e), overridesRef.current)).sort((a,b)=>b.updatedAt-a.updatedAt)); }
    if(estRef.current.id===id) setEst(e=>({...e, memo}));
  };
  // V4.1: 확정견적 — 현재 상태의 동결 사본을 별도 레코드로 저장 (작성 중 견적은 계속 자동저장)
  const onConfirm = async ()=>{
    const cur = estRef.current;
    if(!hasContent(cur)){ setNotice('⚠ 저장할 내용이 없습니다 — 공사명이나 구역을 먼저 입력해 주세요'); return; }
    const ts = Date.now();
    const snap = migrate(JSON.parse(JSON.stringify(cur)));
    snap.id = 'c'+ts.toString(36)+Math.random().toString(36).slice(2,6);
    snap.confirmed = true; snap.confirmedAt = ts; snap.createdAt = snap.updatedAt = ts;
    const title = cur.info.title || '새 견적';
    const meta = { ...buildMeta(snap, overridesRef.current), confirmed:true, confirmedAt:ts };
    if (modeRef.current==='server'){
      const r = await apiFetch('/estimates', {method:'POST', body:JSON.stringify({title, memo:cur.memo||'', data:snap, meta})});
      if(r.status===201 && r.json.data){ setList(prev=>[r.json.data.estimate, ...prev]); setNotice('✅ 확정견적으로 저장했습니다 — 저장목록의 "확정견적" 섹션에 보관됨'); }
      else setNotice('⚠ 확정견적 저장에 실패했습니다');
    } else {
      const store = loadLocalStore();
      const list2 = [snap, ...store.estimates];
      saveLocalStore({ estimates:list2, activeId:store.activeId });
      setList(list2.map(x=>toLocalListItem(migrate(x), overridesRef.current)).sort((a,b)=>b.updatedAt-a.updatedAt));
      setNotice('✅ 확정견적으로 저장했습니다 (이 브라우저에 보관)');
    }
  };
  const onExport = ()=>{ const blob=new Blob([JSON.stringify(est,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(est.info.title||'견적')+'.json'; a.click(); };
  const onImport = (text)=>{ try{ const obj=JSON.parse(text); const e=migrate(obj); e.id='e'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); e.updatedAt=Date.now(); setEst(e); setTab('input'); alert('가져오기 완료'); }catch(err){ alert('JSON 파싱 실패: '+err.message); } };

  // ---- 인쇄 / PDF 저장 (V4-1: 브라우저 인쇄 다이얼로그 = 가로 A4, "PDF로 저장" 선택 시 인쇄 품질 그대로 저장) ----
  const doPrint = ()=>{ const html=buildCombinedDoc(est, result, manifest, k=>(manifest[k]?('images/materials/'+encodeURI(manifest[k])):null), {baseHref: location.href}); printCombinedHTML(html); };

  if (mode==='booting') return <div className="min-h-screen flex items-center justify-center text-slate-400 text-sm">불러오는 중…</div>;
  if (mode==='login') return <LoginScreen onAuth={onAuth} />;

  const syncLabel = { idle:'', saving:'저장 중…', saved:'● 저장됨', error:'⚠ 저장 실패' }[sync];
  const syncTone = { idle:'text-slate-300', saving:'text-amber-500', saved:'text-emerald-500', error:'text-red-500' }[sync];

  return (
    <div className="min-h-screen app-root">
      <header className="no-print sticky top-0 z-20 bg-white/95 backdrop-blur border-b border-slate-200">
        <div className="max-w-7xl mx-auto px-4 py-2.5 flex items-center justify-between gap-3">
          <div className="flex items-center gap-3 min-w-0">
            <div className="h-8 w-8 rounded-lg bg-slate-800 text-white flex items-center justify-center font-extrabold text-sm shrink-0">安</div>
            <div className="min-w-0">
              <div className="font-extrabold text-slate-800 text-sm leading-tight">{COMPANY.name} · 역전지붕방수 견적</div>
              <div className="text-[11px] text-slate-400 truncate">{est.info.title||'(제목 없음)'} {est.info.address?`· ${est.info.address}`:''}</div>
            </div>
          </div>
          <div className="flex items-center gap-3 shrink-0">
            <div className="flex items-center gap-1.5">
              <Btn size="sm" variant="secondary" onClick={doPrint}>🖨 인쇄 · PDF</Btn>
            </div>
            <div className="text-right">
              <div className="text-[10px] text-slate-400">총합계 ({est.rates.taxInvoice==='예'?'VAT 포함':'VAT 별도'}) {mode==='server'&&<span className={syncTone}>{syncLabel}</span>}</div>
              <div className="text-lg font-extrabold text-slate-800 num-cell leading-none">{won(result.cost.grandTotal)}</div>
            </div>
            {mode==='server' && user && (
              <div className="flex items-center gap-1.5 pl-2 border-l border-slate-200">
                <span className="text-xs text-slate-500 font-semibold">{user.name}</span>
                <Btn size="sm" variant="ghost" onClick={logout}>로그아웃</Btn>
              </div>
            )}
          </div>
        </div>
        {mode==='local' && (
          <div className="bg-amber-50 border-t border-amber-200 text-[11px] text-amber-700 px-4 py-1 text-center">
            로컬 모드 — 서버 미접속 (npm start → http://localhost:3015 에서 실행 시 로그인·팀 공유). 데이터는 이 브라우저 localStorage 에 저장됩니다.
          </div>
        )}
        {mode==='server' && migrateOffer>0 && (
          <div className="bg-blue-50 border-t border-blue-200 text-xs text-blue-800 px-4 py-1.5 flex items-center justify-center gap-3">
            <span>이 브라우저에 저장된 로컬 견적 {migrateOffer}건이 있습니다. 서버로 업로드할까요?</span>
            <Btn size="xs" variant="amber" onClick={doMigrateUpload}>업로드</Btn>
            <Btn size="xs" variant="ghost" onClick={()=>{ try{localStorage.setItem(LS_MIGRATED,'1');}catch(e){} setMigrateOffer(0); }}>나중에</Btn>
          </div>
        )}
        {/* V2-8: 직원용 / 고객 제출용 내비 그룹 분리 */}
        <nav className="max-w-7xl mx-auto px-2 flex items-center gap-2 overflow-x-auto">
          <span className="text-[10px] font-bold text-slate-300 pl-1 shrink-0">직원용</span>
          {STAFF_TABS.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} className={cx('px-3 py-2 text-sm font-semibold whitespace-nowrap border-b-2 transition', tab===t.k?'border-amber-500 text-slate-900':'border-transparent text-slate-400 hover:text-slate-600')}>{t.l}</button>
          ))}
          <span className="h-5 w-px bg-slate-200 mx-1 shrink-0"></span>
          <span className="text-[10px] font-bold text-blue-300 pl-1 shrink-0">고객 제출용</span>
          {CUSTOMER_TABS.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} className={cx('px-3 py-2 text-sm font-semibold whitespace-nowrap border-b-2 transition', tab===t.k?'border-blue-500 text-slate-900':'border-transparent text-slate-400 hover:text-slate-600')}>{t.l}</button>
          ))}
        </nav>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-5">
        {tab==='input' && <InputTab est={est} result={result} upd={upd} updSel={updSel} updInfo={updInfo} updTemp={updTemp} updRates={updRates} updSiteCond={updSiteCond} updFinishAll={updFinishAll} zoneOps={zoneOps} ciOps={ciOps} addlOps={addlOps} applyRoof={applyRoof} onConfirm={onConfirm} mode={mode} />}
        {tab==='pricedb' && <PriceDBTab overrides={overrides} setItemOv={setItemOv} setEquipOv={setEquipOv} resetItemOv={resetItemOv} resetEquipOv={resetEquipOv} resetAllOv={resetAllOv} priceMeta={priceMeta} onSaveNow={saveOverridesNow} mode={mode} />}
        {tab==='quote' && <QuoteTab est={est} result={result} />}
        {tab==='detail' && <DetailTab result={result} />}
        {tab==='order' && <OrderTab result={result} />}
        {tab==='material' && <MaterialTab est={est} result={result} manifest={manifest} />}
        {tab==='saved' && <SavedTab list={list} activeId={est.id} mode={mode} onNew={onNew} onLoad={onLoad} onDup={onDup} onDel={onDel} onSample={onSample} onMemo={onMemo} onExport={onExport} onImport={onImport} />}
      </main>
      <footer className="no-print text-center text-[11px] text-slate-400 py-6">{COMPANY.name} · 역전지붕방수 견적 v5 · {mode==='server'?'서버 팀 공유':'로컬 저장'} · 단일 파일 앱</footer>
      {notice && <div className="no-print fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-white text-sm px-4 py-2.5 rounded-xl shadow-lg max-w-[90vw]">{notice}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
