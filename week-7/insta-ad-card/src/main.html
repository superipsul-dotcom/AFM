<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="style.css">
<title>The Row — 메인 광고 카드</title>
</head>
<body>
<!-- 단일 광고 카드: 한 줄 카피 + 비주얼 + CTA
     텍스트는 상단 중앙 스택 — therow.com 홈 히어로와 동일한 문법.
     비주얼(코트+체어)은 중앙 하단, 상단 절반은 여백. -->
<div class="card">
  <img class="bleed" src="../assets/v1-coat-chair.png" alt="">
  <div class="top-center">
    <div class="wordmark">THE<span class="gap"></span>ROW</div>
    <div class="kicker" style="margin-top:58px">Summer 2026</div>
    <div class="copy" style="margin-top:22px">Luxury, spoken softly.</div>
    <div class="hairline h-short"></div>
    <div class="cta-line">컬렉션 보기<span class="dot">·</span>THEROW.COM</div>
  </div>
</div>
</body>
</html>
