<!doctype html>
<html lang="ko">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>안도 드라이브 — 설정</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
         background:#0e0e11; color:#e8e8ea; margin:0; padding:2.5rem 1.5rem; line-height:1.65; }
  main { max-width: 560px; margin: 0 auto; }
  h1 { font-size:1.5rem; margin:0 0 .25rem; }
  .sub { color:#8a8a94; margin:0 0 2rem; font-size:.95rem; }
  .row { display:flex; align-items:center; gap:.75rem; padding:.85rem 0; border-bottom:1px solid #26262c; }
  .row:last-of-type { border-bottom:none; }
  .row .label { flex:1; }
  .row code { color:#9aa4b2; font-size:.82rem; }
  .badge { font-size:.78rem; padding:.15rem .55rem; border-radius:999px; white-space:nowrap; }
  .ok { background:#12351f; color:#5fd08a; } .no { background:#3a1a1a; color:#f08a8a; }
  a.btn { display:inline-block; margin-top:1.75rem; background:#e82127; color:#fff; text-decoration:none;
          padding:.75rem 1.5rem; border-radius:8px; font-weight:600; }
  a.btn[aria-disabled="true"] { background:#2a2a30; color:#6a6a74; pointer-events:none; }
  .note { margin-top:1.5rem; font-size:.85rem; color:#8a8a94; }
</style>
<main>
  <h1>안도 드라이브 🚗</h1>
  <p class="sub">① 개발자 등록 게이트</p>
  <div id="rows"></div>
  <a class="btn" id="login" href="/auth/login" aria-disabled="true">테슬라 계정으로 로그인</a>
  <p class="note" id="note">확인 중…</p>
</main>
<script>
  const R = [
    ['공개키 호스팅', 'publicKeyHosted', '/.well-known/appspecific/com.tesla.3p.public-key.pem'],
    ['TESLA_CLIENT_ID', 'clientIdSet', 'developer.tesla.com에서 발급'],
    ['TESLA_CLIENT_SECRET', 'clientSecretSet', 'developer.tesla.com에서 발급'],
  ];
  fetch('/api/health').then(r => r.json()).then(h => {
    document.getElementById('rows').innerHTML = R.map(([label, key, hint]) => `
      <div class="row">
        <div class="label">${label}<br><code>${hint}</code></div>
        <span class="badge ${h[key] ? 'ok' : 'no'}">${h[key] ? '준비됨' : '없음'}</span>
      </div>`).join('') + `
      <div class="row"><div class="label">redirect_uri<br><code>${h.redirectUri}</code></div>
        <span class="badge ok">이 값을 테슬라 앱에 등록</span></div>
      <div class="row"><div class="label">지역(audience)<br><code>${h.audience}</code></div>
        <span class="badge ${h.audience.includes('.na.') ? 'ok' : 'no'}">${h.audience.includes('.na.') ? '한국=APAC→NA' : '확인 필요'}</span></div>`;
    const ready = h.clientIdSet && h.clientSecretSet && h.publicKeyHosted;
    document.getElementById('login').setAttribute('aria-disabled', String(!ready));
    document.getElementById('note').textContent = ready
      ? 'register.mjs로 도메인 등록을 마친 뒤 로그인하세요.'
      : '위 항목이 모두 준비되어야 로그인할 수 있습니다.';
  }).catch(e => { document.getElementById('note').textContent = '상태 확인 실패: ' + e.message; });
</script>
</html>
