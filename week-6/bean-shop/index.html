    function Modal({ isOpen, onClose, title, children, size = 'md' }) {

    // ========================================
    // 🔀 해시 라우터
    // ========================================
    const RouterContext = createContext({ path: '/', navigate: () => {} });
    const useRouter = () => useContext(RouterContext);

    function getPath() {
      let h = window.location.hash.replace(/^#/, '');
      // 해시 안의 query( #/payment/success?paymentType=NORMAL )는 라우트 매칭에서 분리
      const qi = h.indexOf('?');
      if (qi !== -1) h = h.slice(0, qi);
      return h || '/';
    }

    // ⚠️ 해시 라우팅 successUrl 함정 대응 — 결제 리다이렉트 복귀 시
    // 토스는 paymentKey/orderId/amount를 hash '앞' location.search 에 붙이고,
    // SDK는 paymentType 등을 hash '안' query string 에 붙인다.
    // 두 곳을 모두 파싱해 병합해야 핵심 파라미터를 놓치지 않는다.
    function parseHashQuery() {
      const params = new URLSearchParams();
      // 1) location.search (토스가 부여한 paymentKey/orderId/amount)
      const search = new URLSearchParams(window.location.search);
      search.forEach((value, key) => params.set(key, value));
      // 2) hash 내부 query (SDK가 부여한 paymentType 등)
      const hash = window.location.hash;
      const qi = hash.indexOf('?');
      if (qi !== -1) {
        const hashSearch = new URLSearchParams(hash.slice(qi + 1));
        hashSearch.forEach((value, key) => params.set(key, value));
      }
      return params;
    }

    function Router({ children }) {
      const [path, setPath] = useState(getPath());
      useEffect(() => {
        const onHash = () => setPath(getPath());
        window.addEventListener('hashchange', onHash);
        if (!window.location.hash) window.location.replace('#/');
        return () => window.removeEventListener('hashchange', onHash);
      }, []);
      // 라우트 변경 시 상단으로
      useEffect(() => { window.scrollTo({ top: 0, behavior: 'auto' }); }, [path]);
      const navigate = useCallback((to) => { window.location.hash = to; }, []);
      return <RouterContext.Provider value={{ path, navigate }}>{children}</RouterContext.Provider>;
    }

    function matchRoute(pattern, path) {
      const pp = pattern.split('/').filter(Boolean);
      const ph = path.split('/').filter(Boolean);
      if (pp.length !== ph.length) return null;
      const params = {};
      for (let i = 0; i < pp.length; i++) {
        if (pp[i][0] === ':') params[pp[i].slice(1)] = decodeURIComponent(ph[i]);
        else if (pp[i] !== ph[i]) return null;
      }
      return params;
    }

    function Routes({ children }) {
      const { path } = useRouter();
      let matched = null;
      React.Children.forEach(children, (child) => {
        if (matched || !child) return;
        const params = matchRoute(child.props.path, path);
        if (params) matched = React.cloneElement(child.props.element, { params });
      });
      return matched || <NotFoundPage />;
    }
    function Route() { return null; }

    function Link({ to, className = '', children, ...rest }) {
      const { navigate } = useRouter();
      const onClick = (e) => { e.preventDefault(); navigate(to); };
      return (
        <a href={'#' + to} onClick={onClick} className={className} {...rest}>{children}</a>
      );
    }

    // ========================================
    // 🛒 전역 상태 (장바구니 · 검색 · 토스트) — localStorage 영속화
    // ========================================
    const AppContext = createContext(null);
    const useApp = () => useContext(AppContext);

    function AppProvider({ children }) {
      const [items, setItems] = useState(() => {
        try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; } catch (e) { return []; }
      });
      const [query, setQuery] = useState('');
      const [toastMsg, setToastMsg] = useState(null);
      const toastTimer = useRef(null);

      useEffect(() => {
        try { localStorage.setItem(CART_KEY, JSON.stringify(items)); } catch (e) {}
      }, [items]);
      useEffect(() => () => { if (toastTimer.current) clearTimeout(toastTimer.current); }, []);

      const toast = useCallback((msg) => {
        setToastMsg(msg);
        if (toastTimer.current) clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToastMsg(null), 2200);
      }, []);

      const addItem = useCallback((id, grind, qty) => {
        setItems((prev) => {
          const idx = prev.findIndex((it) => it.id === id && it.grind === grind);
          if (idx >= 0) {
            const next = [...prev];
            next[idx] = { ...next[idx], qty: Math.min(99, next[idx].qty + qty) };
            return next;
          }
          return [...prev, { id, grind, qty }];
        });
      }, []);

      const updateQty = useCallback((id, grind, qty) => {
        setItems((prev) => prev.map((it) =>
          (it.id === id && it.grind === grind) ? { ...it, qty: Math.max(1, Math.min(99, qty)) } : it
        ));
      }, []);

      const removeItem = useCallback((id, grind) => {
        setItems((prev) => prev.filter((it) => !(it.id === id && it.grind === grind)));
      }, []);

      const clearCart = useCallback(() => setItems([]), []);

      const count = useMemo(() => items.reduce((s, it) => s + it.qty, 0), [items]);
      const detailedItems = useMemo(
        () => items.map((it) => ({ ...it, product: getProduct(it.id) })).filter((it) => it.product),
        [items]
      );
      const subtotal = useMemo(
        () => detailedItems.reduce((s, it) => s + it.product.price * it.qty, 0),
        [detailedItems]
      );

      const value = {
        items, detailedItems, addItem, updateQty, removeItem, clearCart,
        count, subtotal, query, setQuery, toast,
      };

      return (
        <AppContext.Provider value={value}>
          {children}
          {toastMsg && <Toast msg={toastMsg} />}
        </AppContext.Provider>
      );
    }

    // ========================================
    // 🔐 인증 (server.js /api/auth 연동 · JWT는 localStorage)
    // ========================================
    async function apiFetch(endpoint, { method = 'GET', body, token } = {}) {
      const headers = {};
      if (body) headers['Content-Type'] = 'application/json';
      if (token) headers['Authorization'] = 'Bearer ' + token;
      let res;
      try {
        res = await fetch(API_BASE_URL + endpoint, {
          method, headers, body: body ? JSON.stringify(body) : undefined,
        });
      } catch (e) {
        throw new Error('서버에 연결할 수 없어요. 잠시 후 다시 시도해 주세요.');
      }
      let json = null;
      try { json = await res.json(); } catch (e) {}
      // 서버 봉투 계약: { success, data, message }
      if (!res.ok || !json || json.success !== true) {
        throw new Error((json && json.message) || '요청에 실패했습니다 (' + res.status + ')');
      }
      return json.data;
    }

    const AuthContext = createContext(null);
    const useAuth = () => useContext(AuthContext);

    function AuthProvider({ children }) {
      const [token, setToken] = useState(() => {
        try { return localStorage.getItem(TOKEN_KEY) || null; } catch (e) { return null; }
      });
      const [user, setUser] = useState(null);
      const [restoring, setRestoring] = useState(() => {
        try { return !!localStorage.getItem(TOKEN_KEY); } catch (e) { return false; }
      });
      const [authOpen, setAuthOpen] = useState(false);

      useEffect(() => {
        try {
          if (token) localStorage.setItem(TOKEN_KEY, token);
          else localStorage.removeItem(TOKEN_KEY);
        } catch (e) {}
      }, [token]);

      // 새로고침 시 저장된 토큰으로 세션 복원 (마운트 1회 · 무효 토큰이면 조용히 로그아웃)
      useEffect(() => {
        if (!token) return;
        let cancelled = false;
        apiFetch('/auth/me', { token })
          .then((data) => { if (!cancelled) setUser(data.user); })
          .catch(() => { if (!cancelled) { setToken(null); setUser(null); } })
          .finally(() => { if (!cancelled) setRestoring(false); });
        return () => { cancelled = true; };
      }, []);

      const signup = useCallback(async (email, password) => {
        const data = await apiFetch('/auth/signup', { method: 'POST', body: { email, password } });
        setToken(data.token); setUser(data.user);
        return data.user;
      }, []);

      const login = useCallback(async (email, password) => {
        const data = await apiFetch('/auth/login', { method: 'POST', body: { email, password } });
        setToken(data.token); setUser(data.user);
        return data.user;
      }, []);

      const logout = useCallback(() => { setToken(null); setUser(null); }, []);

      // 프로필(아바타 등) 변경 후 서버가 돌려준 최신 user로 갱신
      const updateUser = useCallback((u) => setUser(u), []);

      const value = { user, token, restoring, authOpen, setAuthOpen, signup, login, logout, updateUser };
      return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
    }

    // 프로필 아바타 — ImageKit 이미지(URL 변환으로 리사이즈) 또는 이니셜 폴백
    function Avatar({ user, className = '' }) {
      const avatarUrl = user && user.avatarUrl;
      const [failed, setFailed] = useState(false);
      useEffect(() => { setFailed(false); }, [avatarUrl]);
      if (avatarUrl && !failed) {
        const src = avatarUrl + (avatarUrl.includes('?') ? '&' : '?') + 'tr=w-160,h-160,fo-auto';
        return (
          <img
            src={src}
            alt="프로필 사진"
            onError={() => setFailed(true)}
            className={cx('rounded-full object-cover bg-sand shrink-0', className)}
          />
        );
      }
      return (
        <span className={cx('rounded-full grid place-items-center bg-forest text-cream font-bold uppercase select-none shrink-0', className)} aria-hidden="true">
          {user && user.email ? user.email[0] : '?'}
        </span>
      );
    }

    // 프로필 모달 — ImageKit 직접 업로드(서버 서명) → 아바타 URL 저장
    function ProfileModal({ isOpen, onClose }) {
      const { user, token, updateUser } = useAuth();
      const { toast } = useApp();
      const [uploading, setUploading] = useState(false);
      const fileRef = useRef(null);

      if (!user) return null;

      const pick = () => { if (!uploading && fileRef.current) fileRef.current.click(); };

      const onFile = async (e) => {
        const file = e.target.files && e.target.files[0];
        e.target.value = ''; // 같은 파일 재선택 허용
        if (!file) return;
        if (!file.type || !file.type.startsWith('image/')) { toast('이미지 파일만 업로드할 수 있어요'); return; }
        if (file.size > 5 * 1024 * 1024) { toast('5MB 이하 이미지만 업로드할 수 있어요'); return; }
        setUploading(true);
        try {
          // 1) 서버에서 업로드 서명 발급 (private key는 서버에만 있음)
          const auth = await apiFetch('/imagekit/auth', { token });
          // 2) ImageKit V1 업로드 API로 브라우저에서 직접 업로드
          const fd = new FormData();
          fd.append('file', file);
          fd.append('fileName', 'avatar_' + user.id.slice(0, 8) + '_' + Date.now());
          fd.append('publicKey', auth.publicKey);
          fd.append('signature', auth.signature);
          fd.append('expire', String(auth.expire));
          fd.append('token', auth.token);
          fd.append('folder', '/bean-shop/avatars');
          fd.append('useUniqueFileName', 'true');
          const res = await fetch('https://upload.imagekit.io/api/v1/files/upload', { method: 'POST', body: fd });
          let data = null;
          try { data = await res.json(); } catch (err) {}
          if (!res.ok || !data || !data.url) {
            throw new Error((data && data.message) || 'ImageKit 업로드에 실패했어요');
          }
          // 3) 우리 서버에 아바타 URL 저장 → 최신 user 반영
          const saved = await apiFetch('/auth/avatar', { method: 'PUT', token, body: { url: data.url, fileId: data.fileId } });
          updateUser(saved.user);
          toast('프로필 사진이 변경되었어요 ☕');
        } catch (err) {
          toast((err && err.message) || '업로드에 실패했어요');
        } finally {
          setUploading(false);
        }
      };

      return (
        <Modal isOpen={isOpen} onClose={uploading ? () => {} : onClose} title="프로필" size="sm">
          <div className="flex flex-col items-center text-center">
            <div className="relative">
              <Avatar user={user} className="w-28 h-28 text-4xl border-4 border-cream2 shadow-card" />
              {uploading && (
                <span className="absolute inset-0 rounded-full bg-espresso/50 grid place-items-center">
                  <span className="inline-block w-8 h-8 border-2 border-cream/40 border-t-cream rounded-full animate-spin" />
                </span>
              )}
            </div>
            <p className="mt-4 font-medium text-espresso">{user.email}</p>
            <p className="text-xs text-mocha2 mt-1">JPG·PNG 등 5MB 이하 · ImageKit에 저장돼요</p>
            <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={onFile} aria-label="프로필 사진 선택" />
            <div className="flex gap-3 mt-6 w-full">
              <Button size="md" className="flex-1" onClick={pick} disabled={uploading}>
                {uploading ? '업로드 중…' : '📷 사진 변경'}
              </Button>
              <Button size="md" variant="secondary" className="flex-1" onClick={onClose} disabled={uploading}>닫기</Button>
            </div>
          </div>
        </Modal>
      );
    }

    function AuthModal() {
      const { authOpen, setAuthOpen, login, signup } = useAuth();
      const { toast } = useApp();
      const [mode, setMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [password2, setPassword2] = useState('');
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);

      // 열릴 때마다 초기화
      useEffect(() => {
        if (authOpen) {
          setMode('login'); setEmail(''); setPassword(''); setPassword2('');
          setError(null); setLoading(false);
        }
      }, [authOpen]);

      const switchMode = (m) => { setMode(m); setError(null); setPassword(''); setPassword2(''); };
      const close = () => { if (!loading) setAuthOpen(false); };

      const submit = async (e) => {
        e.preventDefault();
        if (loading) return;
        const em = email.trim();
        if (!em || !password) return setError('이메일과 비밀번호를 모두 입력해 주세요');
        if (mode === 'signup') {
          if (password.length < 8) return setError('비밀번호는 8자 이상이어야 합니다');
          if (password !== password2) return setError('비밀번호 확인이 일치하지 않습니다');
        }
        setError(null); setLoading(true);
        try {
          const user = mode === 'login' ? await login(em, password) : await signup(em, password);
          toast(mode === 'login' ? `어서 오세요, ${user.email}님 ☕` : `가입 완료! ${user.email}님, 환영해요 🎉`);
          setAuthOpen(false);
        } catch (err) {
          setError(err.message || '요청에 실패했습니다');
        } finally {
          setLoading(false);
        }
      };

      return (
        <Modal isOpen={authOpen} onClose={close} size="sm">
          <div className="flex rounded-full bg-cream2 border border-sand p-1 mb-6" role="tablist" aria-label="로그인 / 회원가입">
            {[['login', '로그인'], ['signup', '회원가입']].map(([m, label]) => (
              <button
                key={m}
                type="button"
                role="tab"
                aria-selected={mode === m}
                onClick={() => switchMode(m)}
                className={cx(
                  'flex-1 text-sm font-medium py-2 rounded-full transition-colors',
                  mode === m ? 'bg-espresso text-cream shadow-card' : 'text-mocha hover:text-espresso'
                )}
              >
                {label}
              </button>
            ))}
          </div>
          <h3 className="font-serif text-2xl text-espresso text-center">
            {mode === 'login' ? '다시 만나 반가워요' : '안도 빈즈에 어서 오세요'}
          </h3>
          <p className="text-sm text-mocha2 text-center mt-1.5 mb-6">
            {mode === 'login' ? '로그인하고 주문을 이어가세요' : '가입 즉시 로그인되어 바로 주문할 수 있어요'}

    function HomePage() {
      const { query, setQuery } = useApp();
      const [continent, setContinent] = useState('전체');
      const [roast, setRoast] = useState('전체');
      const [process, setProcess] = useState('전체');
      const [sort, setSort] = useState('추천순');

      const filtered = useMemo(() => {
        const q = query.trim().toLowerCase();
        let list = PRODUCTS.filter((p) => {
          if (continent !== '전체' && p.continent !== continent) return false;
          if (roast !== '전체' && p.roast !== roast) return false;
          if (process !== '전체' && p.process !== process) return false;
          if (q) {
            const hay = (p.name + ' ' + p.en + ' ' + p.origin + ' ' + p.country + ' ' + p.cupNotes.join(' ')).toLowerCase();
            if (!hay.includes(q)) return false;
          }
          return true;
        });
        if (sort === '낮은가격') list = [...list].sort((a, b) => a.price - b.price);
        else if (sort === '높은가격') list = [...list].sort((a, b) => b.price - a.price);
        return list;
      }, [continent, roast, process, query, sort]);

      const resetFilters = () => {
        setContinent('전체'); setRoast('전체'); setProcess('전체'); setQuery('');
      };
      const hasFilter = continent !== '전체' || roast !== '전체' || process !== '전체' || query.trim();

      return (
        <div>

              <div className="grid sm:grid-cols-2 gap-5">
                <ChipToggleGroup label="로스팅" options={ROASTS} value={roast} onChange={setRoast} />
                <ChipToggleGroup label="가공방식" options={PROCESSES} value={process} onChange={setProcess} />
              </div>
              {query.trim() && (
                <div className="flex items-center gap-2 text-sm text-mocha">

    // ========================================
    // 📄 장바구니

      const { product, grind, qty, id } = item;

        <div className="flex gap-4 py-5 border-b border-sand last:border-0">

          <div className="flex-1 min-w-0">
            <div className="flex items-start justify-between gap-3">

                <Link to={`/product/${id}`} className="font-serif text-espresso hover:text-forest transition-colors line-clamp-1">{product.name}</Link>
                <div className="text-xs text-mocha2 mt-1">{product.origin} · {product.roast}</div>
                <div className="mt-1.5"><Chip>{grind}</Chip></div>
              </div>
              <button onClick={() => removeItem(id, grind)} aria-label="삭제" className="text-mocha2 hover:text-red-600 transition-colors text-sm">삭제</button>
            </div>
            <div className="flex items-center justify-between mt-3">
              <QtyStepper size="sm" value={qty} onChange={(v) => updateQty(id, grind, v)} />
              <div className="text-right">
                <div className="font-bold text-espresso">{formatKRW(product.price * qty)}</div>
                <div className="text-[11px] text-mocha2">{formatKRW(product.price)} × {qty}</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function CartPage() {
      const { detailedItems, subtotal, count, clearCart, toast } = useApp();

      const { navigate } = useRouter();

      const handleOrder = () => {
        if (!user) {
          toast('주문하려면 로그인이 필요해요 ☕');
          setAuthOpen(true);
          return;
        }
        navigate('/checkout');   // 실결제 플로우(CheckoutPage)로 이동
      };

      const shipping = subtotal === 0 ? 0 : (subtotal >= FREE_SHIPPING ? 0 : SHIPPING_FEE);
      const total = subtotal + shipping;
      const remain = Math.max(0, FREE_SHIPPING - subtotal);
      const progress = Math.min(100, (subtotal / FREE_SHIPPING) * 100);

      if (detailedItems.length === 0) {
        return (
          <div className="max-w-3xl mx-auto px-6 py-24 text-center">
            <div className="text-6xl mb-5">🧺</div>
            <h2 className="font-serif text-2xl text-espresso">장바구니가 비어 있어요</h2>
            <p className="text-mocha mt-2">마음에 드는 싱글 오리진 원두를 담아보세요.</p>
            <div className="mt-7"><Link to="/"><Button size="lg">원두 둘러보기</Button></Link></div>
          </div>
        );
      }

      return (
        <div className="max-w-6xl mx-auto px-6 py-8">
          <h1 className="font-serif text-3xl text-espresso mb-1">장바구니</h1>
          <p className="text-mocha2 text-sm mb-8">담은 상품 {count}개</p>

          <div className="grid lg:grid-cols-[1fr_360px] gap-8 items-start">
            {/* 목록 */}
            <Card className="p-5 sm:p-6">
              {/* 무료배송 진행 */}
              <div className="mb-4 p-4 rounded-xl bg-cream2/70 border border-sand">
                {remain > 0 ? (
                  <p className="text-sm text-mocha">
                    <strong className="text-espresso">{formatKRW(remain)}</strong> 더 담으면 <strong className="text-forest">무료배송</strong>!
                  </p>
                ) : (
                  <p className="text-sm text-forest2 font-medium">🎉 무료배송이 적용되었어요</p>
                )}
                <div className="h-2 rounded-full bg-sand mt-2.5 overflow-hidden">
                  <div className="h-full bg-forest rounded-full transition-all duration-500" style={{ width: progress + '%' }} />
                </div>
              </div>

              {detailedItems.map((it) => <CartLine key={it.id + '__' + it.grind} item={it} />)}

              <div className="flex justify-between items-center mt-5">
                <button onClick={clearCart} className="text-sm text-mocha2 hover:text-red-600 underline underline-offset-4">전체 비우기</button>
                <Link to="/" className="text-sm text-forest hover:text-forest2 font-medium">＋ 계속 쇼핑하기</Link>
              </div>
            </Card>

            {/* 주문 요약 */}
            <Card className="p-6 lg:sticky lg:top-24">
              <h2 className="font-serif text-xl text-espresso mb-5">주문 요약</h2>
              <div className="space-y-3 text-sm">
                <div className="flex justify-between">
                  <span className="text-mocha">상품 금액</span>
                  <span className="text-espresso font-medium">{formatKRW(subtotal)}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-mocha">배송비</span>
                  <span className={cx('font-medium', shipping === 0 ? 'text-forest' : 'text-espresso')}>
                    {shipping === 0 ? '무료' : formatKRW(shipping)}
                  </span>
                </div>
              </div>
              <div className="border-t border-sand my-4" />
              <div className="flex justify-between items-baseline">
                <span className="text-espresso font-semibold">결제 예정 금액</span>
                <span className="text-2xl font-bold text-espresso">{formatKRW(total)}</span>
              </div>
              <Button size="lg" className="w-full mt-6" onClick={handleOrder}>주문하기</Button>
              <p className="text-[11px] text-mocha2 text-center mt-3 leading-relaxed">
                {!user && <span className="block text-mocha">🔒 로그인 후 주문할 수 있어요</span>}
                🔒 토스페이먼츠 테스트 결제 · 실제 금액은 청구되지 않아요
              </p>
            </Card>
          </div>
        </div>
      );
    }

    // ISO 승인시각 → 한국어 표기
    function formatApprovedAt(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleString('ko-KR', { dateStyle: 'medium', timeStyle: 'short' });
      } catch (e) { return iso; }
    }

    // ========================================
    // 📄 결제 (CheckoutPage) — 토스페이먼츠 결제위젯 v2
    // ========================================
    function CheckoutPage() {
      const { detailedItems, subtotal, toast } = useApp();
      const { user, token, restoring, setAuthOpen } = useAuth();

      // 위젯 인스턴스 / 렌더 여부는 ref로 (재렌더에도 유지 · 중복 렌더 방지)
      const widgetsRef = useRef(null);
      const isRenderedRef = useRef(false);
      const [widgetReady, setWidgetReady] = useState(false);
      const [widgetError, setWidgetError] = useState(null);
      const [paying, setPaying] = useState(false);

      const shipping = subtotal === 0 ? 0 : (subtotal >= FREE_SHIPPING ? 0 : SHIPPING_FEE);
      const total = subtotal + shipping;
      const canRender = !!user && detailedItems.length > 0;

      // 비로그인으로 진입하면 로그인 모달 유도 (세션 복원 중에는 대기 — 깜빡임 방지)
      useEffect(() => {
        if (!restoring && !user) setAuthOpen(true);
      }, [restoring, user, setAuthOpen]);

      // 1) 위젯 인스턴스 1회 생성 (로그인 + 장바구니가 있을 때만)
      useEffect(() => {
        if (!canRender || widgetsRef.current) return;
        if (typeof window.TossPayments !== 'function') {
          setWidgetError('결제 모듈을 불러오지 못했어요. 새로고침 후 다시 시도해 주세요.');
          return;
        }
        try {
          const tossPayments = window.TossPayments(TOSS_CLIENT_KEY);
          // customerKey = 로그인 사용자 UUID (비회원이면 TossPayments.ANONYMOUS)
          widgetsRef.current = tossPayments.widgets({ customerKey: user.id });
        } catch (e) {
          setWidgetError('결제 위젯 초기화에 실패했어요: ' + (e.message || e));
        }
      }, [canRender, user]);

      // 2) 금액 설정 + 위젯 렌더 (최초 1회) / 이후 금액 변경 시 setAmount만 재호출
      useEffect(() => {
        if (!canRender || !widgetsRef.current) return;
        let cancelled = false;
        (async () => {
          try {
            await widgetsRef.current.setAmount({ currency: 'KRW', value: total });
            if (!isRenderedRef.current) {
              await widgetsRef.current.renderPaymentMethods({ selector: '#payment-method', variantKey: 'DEFAULT' });
              await widgetsRef.current.renderAgreement({ selector: '#agreement', variantKey: 'AGREEMENT' });
              isRenderedRef.current = true;
              if (!cancelled) setWidgetReady(true);
            }
          } catch (e) {
            if (!cancelled) setWidgetError('결제 수단을 불러오지 못했어요: ' + (e.message || e));
          }
        })();
        return () => { cancelled = true; };
      }, [canRender, total]);

      const handlePay = async () => {
        if (paying) return;
        if (!widgetsRef.current || !isRenderedRef.current) {
          toast('결제 수단을 불러오는 중이에요. 잠시만요 ☕');
          return;
        }
        setPaying(true);
        try {
          // 1) 서버에 주문 생성 → 유니크 orderId / orderName 확보 (amount는 서버 저장 = 검증 기준)
          const items = detailedItems.map((it) => ({
            id: it.product.id,
            name: it.product.name,
            grind: it.grind,
            qty: it.qty,
            price: it.product.price,
          }));
          const order = await apiFetch('/orders', {
            method: 'POST',
            token,
            body: { items, amount: total },
          });

          // 2) 결제창 호출 — 성공 시 successUrl로 리다이렉트(이하 코드 미실행)
          const customerName = (user.email || '').split('@')[0] || '고객';
          await widgetsRef.current.requestPayment({
            orderId: order.orderId,
            orderName: order.orderName,
            successUrl: window.location.origin + '/#/payment/success',
            failUrl: window.location.origin + '/#/payment/fail',
            customerEmail: user.email,
            customerName,
          });
        } catch (error) {
          const code = error && error.code;
          if (code === 'USER_CANCEL' || code === 'PAY_PROCESS_CANCELED' || code === 'PAY_PROCESS_ABORTED') {
            toast('결제를 취소했어요');
          } else {
            toast((error && error.message) || '결제 요청 중 문제가 발생했어요');
          }
          setPaying(false);
        }
      };

      // 세션 복원 중 — 잠깐 로딩 (checkout 직접 새로고침 시 로그인 게이트 깜빡임 방지)
      if (restoring) {
        return (
          <div className="max-w-3xl mx-auto px-6 py-24 text-center">
            <span className="inline-block w-10 h-10 border-2 border-sand2 border-t-forest rounded-full animate-spin" />
            <p className="mt-4 text-mocha2 text-sm">불러오는 중…</p>
          </div>
        );
      }

      // 비로그인 게이트
      if (!user) {
        return (
          <div className="max-w-3xl mx-auto px-6 py-24 text-center">
            <div className="text-6xl mb-5">🔒</div>
            <h2 className="font-serif text-2xl text-espresso">로그인이 필요해요</h2>
            <p className="text-mocha mt-2">주문과 결제를 진행하려면 먼저 로그인해 주세요.</p>
            <div className="mt-7 flex flex-wrap gap-3 justify-center">
              <Button size="lg" onClick={() => setAuthOpen(true)}>로그인 / 회원가입</Button>
              <Link to="/cart"><Button size="lg" variant="secondary">장바구니로</Button></Link>
            </div>
          </div>
        );
      }

      // 빈 장바구니 게이트
      if (detailedItems.length === 0) {
        return (
          <div className="max-w-3xl mx-auto px-6 py-24 text-center">
            <div className="text-6xl mb-5">🧺</div>
            <h2 className="font-serif text-2xl text-espresso">장바구니가 비어 있어요</h2>
            <p className="text-mocha mt-2">담긴 상품이 없어 결제를 진행할 수 없어요.</p>
            <div className="mt-7"><Link to="/"><Button size="lg">원두 둘러보기</Button></Link></div>
          </div>
        );
      }

      return (
        <div className="max-w-6xl mx-auto px-6 py-8">
          <nav className="text-sm text-mocha2 mb-6 flex items-center gap-2" aria-label="경로">
            <Link to="/cart" className="hover:text-espresso">장바구니</Link>
            <span>›</span>
            <span className="text-espresso font-medium">주문 / 결제</span>
          </nav>
          <h1 className="font-serif text-3xl text-espresso mb-8">주문 / 결제</h1>

          <div className="grid lg:grid-cols-[1fr_380px] gap-8 items-start">
            {/* 좌: 결제수단 + 약관 위젯 */}
            <Card className="p-2 sm:p-4 overflow-hidden">
              {widgetError ? (
                <div className="p-8 text-center">
                  <div className="text-4xl mb-3">⚠️</div>
                  <p className="text-espresso font-medium">{widgetError}</p>
                  <p className="text-mocha2 text-sm mt-1">잠시 후 새로고침해 다시 시도해 주세요.</p>
                </div>
              ) : (
                <React.Fragment>
                  {!widgetReady && (
                    <div className="p-12 text-center text-mocha2">
                      <span className="inline-block w-8 h-8 border-2 border-sand2 border-t-forest rounded-full animate-spin" />
                      <p className="mt-3 text-sm">결제 수단을 불러오는 중…</p>
                    </div>
                  )}
                  {/* 토스 위젯이 렌더되는 컨테이너 (반드시 1회만 렌더) */}
                  <div id="payment-method" />
                  <div id="agreement" />
                </React.Fragment>
              )}
            </Card>

            {/* 우: 주문 요약 */}
            <Card className="p-6 lg:sticky lg:top-24">
              <h2 className="font-serif text-xl text-espresso mb-5">주문 요약</h2>
              <div className="space-y-2.5 max-h-56 overflow-auto pr-1 no-scrollbar">
                {detailedItems.map((it) => (
                  <div key={it.id + '__' + it.grind} className="flex gap-2 text-sm">
                    <span className="text-mocha2 tabular-nums shrink-0">{it.qty}×</span>
                    <span className="flex-1 text-espresso truncate">
                      {it.product.name}<span className="text-mocha2"> · {it.grind}</span>
                    </span>
                    <span className="text-espresso font-medium whitespace-nowrap">{formatKRW(it.product.price * it.qty)}</span>
                  </div>
                ))}
              </div>
              <div className="border-t border-sand my-4" />
              <div className="space-y-2 text-sm">
                <div className="flex justify-between">
                  <span className="text-mocha">상품 금액</span>
                  <span className="text-espresso font-medium">{formatKRW(subtotal)}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-mocha">배송비</span>
                  <span className={cx('font-medium', shipping === 0 ? 'text-forest' : 'text-espresso')}>
                    {shipping === 0 ? '무료' : formatKRW(shipping)}
                  </span>
                </div>
              </div>
              <div className="border-t border-sand my-4" />
              <div className="flex justify-between items-baseline">
                <span className="text-espresso font-semibold">결제 금액</span>
                <span className="text-2xl font-bold text-espresso">{formatKRW(total)}</span>
              </div>
              <Button size="lg" className="w-full mt-6" onClick={handlePay} disabled={paying || !widgetReady}>
                {paying ? '결제 진행 중…' : formatKRW(total) + ' 결제하기'}
              </Button>
              <p className="text-[11px] text-mocha2 text-center mt-3 leading-relaxed">
                🔒 토스페이먼츠 안전 결제 · 테스트 모드(실제 청구 없음)
              </p>
            </Card>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 결제 성공 — successUrl 복귀 → 서버 confirm
    // ========================================
    function PaymentSuccessPage() {
      const { clearCart } = useApp();
      const [status, setStatus] = useState('confirming'); // confirming | success | error | invalid
      const [message, setMessage] = useState('');
      const [result, setResult] = useState(null);         // { order, payment }
      const confirmedRef = useRef(false);                 // 더블 confirm 방지

      useEffect(() => {
        if (confirmedRef.current) return;
        confirmedRef.current = true;

        // ⚠️ 해시 라우팅: paymentKey/orderId/amount는 location.search 에 있으므로 병합 파서 사용
        const q = parseHashQuery();
        const paymentKey = q.get('paymentKey');
        const orderId = q.get('orderId');
        const amount = q.get('amount');

        if (!paymentKey || !orderId || !amount) {
          setStatus('invalid');
          return;
        }

        (async () => {
          try {
            const data = await apiFetch('/payments/confirm', {
              method: 'POST',
              body: { paymentKey, orderId, amount: Number(amount) },
            });
            setResult(data);
            setStatus('success');
            clearCart(); // 승인 성공 시에만 장바구니 비우기
            // 새로고침 시 재confirm/민감정보 노출 방지 → search 제거(hash는 유지)
            const cleanUrl = window.location.pathname + window.location.hash;
            window.history.replaceState({}, '', cleanUrl);
          } catch (err) {
            setMessage((err && err.message) || '결제 승인에 실패했어요');
            setStatus('error');
          }
        })();
      }, []); // 마운트 1회 — confirm은 결제당 한 번만 (confirmedRef로 이중 실행 차단)

      if (status === 'confirming') {
        return (
          <div className="max-w-lg mx-auto px-6 py-24 text-center">
            <span className="inline-block w-10 h-10 border-2 border-sand2 border-t-forest rounded-full animate-spin" />
            <h1 className="font-serif text-2xl text-espresso mt-6">결제를 확인하고 있어요</h1>
            <p className="text-mocha mt-2 text-sm">잠시만 기다려 주세요…</p>
          </div>
        );
      }

      if (status === 'invalid') {
        return (
          <div className="max-w-lg mx-auto px-6 py-24 text-center">
            <div className="text-5xl mb-4">🧾</div>
            <h1 className="font-serif text-2xl text-espresso">결제 정보를 찾을 수 없어요</h1>
            <p className="text-mocha mt-2 text-sm">
              결제 정보가 없거나 이미 처리된 주문이에요.<br />주문 내역은 이메일로 안내드려요.
            </p>
            <div className="mt-7"><Link to="/"><Button size="lg">홈으로</Button></Link></div>
          </div>
        );
      }

      if (status === 'error') {
        return (
          <div className="max-w-lg mx-auto px-6 py-24 text-center">
            <div className="text-5xl mb-4">😢</div>
            <h1 className="font-serif text-2xl text-espresso">결제 승인에 실패했어요</h1>
            <p className="text-mocha mt-2 text-sm">{message}</p>
            <p className="text-mocha2 text-xs mt-2">장바구니는 그대로 있어요. 다시 시도해 주세요.</p>
            <div className="mt-7 flex flex-wrap gap-3 justify-center">
              <Link to="/cart"><Button size="lg">장바구니로</Button></Link>
              <Link to="/"><Button size="lg" variant="secondary">홈으로</Button></Link>
            </div>
          </div>
        );
      }

      // success
      const { order, payment } = result;
      const paidAmount = (payment && payment.totalAmount != null) ? payment.totalAmount : order.amount;
      return (
        <div className="max-w-lg mx-auto px-6 py-16">
          <Card className="p-8 text-center rise-in">
            <div className="w-16 h-16 mx-auto rounded-full grid place-items-center text-3xl mb-4" style={{ background: 'linear-gradient(140deg,#4E6047,#3C4A3B)' }}>
              <span className="text-cream">✓</span>
            </div>
            <h1 className="font-serif text-2xl text-espresso">결제가 완료되었어요</h1>
            <p className="text-mocha mt-2 text-sm">가장 신선하게 로스팅해 보내드릴게요 ☕</p>

            <div className="mt-6 text-left bg-cream2/60 border border-sand rounded-2xl p-5 space-y-3">
              <div className="flex justify-between gap-4">
                <span className="text-sm text-mocha2 shrink-0">주문명</span>
                <span className="text-sm text-espresso font-medium text-right">{(payment && payment.orderName) || order.orderName}</span>
              </div>
              <div className="flex justify-between gap-4">
                <span className="text-sm text-mocha2 shrink-0">결제 금액</span>
                <span className="text-sm text-espresso font-bold text-right">{formatKRW(paidAmount)}</span>
              </div>
              {payment && payment.method && (
                <div className="flex justify-between gap-4">
                  <span className="text-sm text-mocha2 shrink-0">결제 수단</span>
                  <span className="text-sm text-espresso font-medium text-right">{payment.method}</span>
                </div>
              )}
              {payment && payment.approvedAt && (
                <div className="flex justify-between gap-4">
                  <span className="text-sm text-mocha2 shrink-0">승인 시각</span>
                  <span className="text-sm text-espresso font-medium text-right">{formatApprovedAt(payment.approvedAt)}</span>
                </div>
              )}
              <div className="flex justify-between gap-4">
                <span className="text-sm text-mocha2 shrink-0">주문번호</span>
                <span className="text-xs text-mocha text-right break-all">{order.orderId}</span>
              </div>
            </div>

            <div className="mt-6 flex flex-col sm:flex-row gap-3 justify-center">
              {payment && payment.receiptUrl && (
                <a href={payment.receiptUrl} target="_blank" rel="noopener noreferrer" className="sm:flex-1">
                  <Button size="lg" variant="secondary" className="w-full">🧾 영수증 보기</Button>
                </a>
              )}
              <Link to="/" className="sm:flex-1"><Button size="lg" className="w-full">홈으로</Button></Link>
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // 📄 결제 실패 — failUrl 복귀
    // ========================================
    function PaymentFailPage() {
      const [info, setInfo] = useState({ code: '', message: '결제가 완료되지 않았어요' });
      useEffect(() => {
        // ⚠️ failUrl도 동일 — code/message가 location.search 에 붙으므로 병합 파서 사용
        const q = parseHashQuery();
        setInfo({
          code: q.get('code') || '',
          message: q.get('message') || '결제가 완료되지 않았어요',
        });
      }, []);
      return (
        <div className="max-w-lg mx-auto px-6 py-16">
          <Card className="p-8 text-center">
            <div className="text-5xl mb-4">😢</div>
            <h1 className="font-serif text-2xl text-espresso">결제에 실패했어요</h1>
            <p className="text-mocha mt-2 text-sm">{info.message}</p>
            {info.code && <p className="text-xs text-mocha2 mt-2">오류 코드: {info.code}</p>}
            <div className="mt-7 flex flex-wrap gap-3 justify-center">
              <Link to="/cart"><Button size="lg">장바구니로 돌아가기</Button></Link>
              <Link to="/"><Button size="lg" variant="secondary">홈으로</Button></Link>
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // 📄 404
    // ========================================
    function NotFoundPage() {
      return (
        <div className="max-w-3xl mx-auto px-6 py-24 text-center">
          <div className="text-6xl mb-4">☕</div>
          <h2 className="font-serif text-3xl text-espresso">페이지를 찾을 수 없어요</h2>
          <p className="text-mocha mt-2">요청하신 페이지가 존재하지 않습니다.</p>
          <div className="mt-7"><Link to="/"><Button size="lg">홈으로 돌아가기</Button></Link></div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return (
        <AppProvider>
          <AuthProvider>
            <Router>
              <div className="min-h-screen flex flex-col">
                <AnnouncementBar />
                <Header />
                <main className="flex-1">
                  <Routes>
                    <Route path="/" element={<HomePage />} />
                    <Route path="/product/:id" element={<ProductDetailPage />} />
                    <Route path="/cart" element={<CartPage />} />
                    <Route path="/checkout" element={<CheckoutPage />} />
                    <Route path="/payment/success" element={<PaymentSuccessPage />} />
                    <Route path="/payment/fail" element={<PaymentFailPage />} />
                  </Routes>
                </main>
                <Footer />
              </div>
              <AuthModal />
            </Router>
          </AuthProvider>
        </AppProvider>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
