                      - generic [ref=e3888]: 앤커 사운드코어 리버티 4 NC 블루투스 이어폰, A3947Z21, 화이트
                      - generic [ref=e3901]:
                        - text: 케이스는 매트한 질감으로 지문과 스크래치가 잘 묻지 않습니다. 무게는 약간 묵직한 편이지만 휴대성에는 문제 없습니다. 이어폰 본체는 봉형 디자인으로 착·탈이 쉽고, 마감이 깔끔하며 유격이나 조립 불량은 없었습니다. 색상은 차분하고 고급스럽지만, 로고 부분은 은은하게 빛나는 소재라 빛 반사 시 존재감이 드러납니다. 케이스 뚜껑 힌지는 탄탄하며 흔들림이 거의 없습니다.
                        - text: 이어팁을 귀에 맞게 선택하면 압박감이 적고 장시간 착용 시에도 피로감이 덜합니다. 무게 배분이 귓속 쪽에 치우쳐 있어 움직임에도 쉽게 빠지지 않습니다. 패시브 차음 성능이 꽤 좋은 편이라, ANC(액티브 노이즈 캔슬링)와 결합하면 지하철·버스 소음을 대부분 걸러낼 수 있습니다. 다만 바람이 강하게 부는 환경에서는 바람 소리가 일부 들어옵니다.
                        - text: 기본 음질은 V자 성향(저음·고음 강조)으로, EDM·팝·락 장르에서 박력 있는 저음을 즐길 수 있습니다. 저음은 양감이 충분하면서도 번지지 않고, 고음은 깔끔하나 일부 곡에서는 다소 날카롭게 느껴질 수 있습니다. 중역대 보컬은 약간 뒤로 물러난 느낌이 있어, 보컬 중심 음악을 즐기는 분은 EQ 조정을 추천합니다. 전용 앱에서 20개 이상의 프리셋과 커스텀 EQ를 지원하므로 취향에 맞춘 세팅이 가능합니다.
                        - text: ✅재구매 의사 있습니다
                        - text: ✅직접 구매하고 사용한 내돈내산 리뷰입니다
                        - text: ✅제 리뷰가 도움이 되셨다면 번거로우시더라도 '도움이 돼요' 눌러주시면 감사하겠습니다
                        - text: The case features a matte texture that resists fingerprints and scratches. While it feels slightly heavy, it remains perfectly portable. The earbuds themselves have a rod-shaped design for easy insertion and removal, with a clean finish and no gaps or assembly defects. The color is subdued and premium, but the logo area uses a subtly reflective material that catches light and stands out. The case lid hinge is sturdy with almost no wobble.
                        - text: Selecting ear tips that fit your ears well reduces pressure and minimizes fatigue during extended wear. Weight distribution is shifted toward the inner ear, preventing them from easily falling out during movement. Passive noise isolation is quite effective; combined with ANC (Active Noise Cancellation), it filters out most subway and bus noise. However, wind noise is partially audible in strong wind conditions.
                        - text: The default sound signature leans V-shaped (emphasizing bass and treble), delivering powerful bass for genres like EDM, pop, and rock. The bass is sufficiently full yet tight, while the treble is clean but can feel slightly sharp on some tracks. Midrange vocals feel slightly recessed, so EQ adjustment is recommended for those who enjoy vocal-centric music. The dedicated app supports over 20 presets and custom EQ, allowing you to tailor the settings to your preference.
                        - text: ✅Would definitely buy again
                        - text: ✅I bought and used this product myself
                        - text: ✅If you found my review helpful, I'd appreciate it if you'd take the trouble to click '도움이 돼요‘
