                        - text: 앤커 리버티 4NC 블루투스 이어폰
                        - text: "총평: 별점 5개 (가격대비 우수함, 가성비 좋음)"
                        - text: 1. 구성 및 스펙
                        - text: 이어폰 2 ea, 이어폰 충전케이스, 여분의 이어팁 4개,
                        - text: USB-C타입 충전케이블 (한쪽은 USB 한쪽은 C타입),
                        - text: 사용 설명서 (영문입니다..)
                        - text: 2. 구매 동기 및 사용 장 단점
                        - text: "*구매 동기"
                        - text: 회사에서 업무용도로 블루투스 이어폰을 항상 사용합니다(통화용도)
                        - text: 주 목적은 통화 용도이며, 개인용도로도 사용할 수 있도록
                        - text: (별그램, 게임 등)
                        - text: 블루투스 이어폰을 찾았습니다. (멀티 포인트 기능 필히 필요)
                        - text: "기존에 사용하던 이어폰은 `자브라 ` 제품으로서"
                        - text: 통화 및 기타 개인 목적의 사용에 있어 우수한 실 사용 체험을 했기에,
                        - text: 비슷한 등급의 블루투스 이어폰을 찾았습니다
                        - text: (23년도에 쿠팡에서 매우 많이 판매됨)
                        - text: "*장점"
                        - text: "-가성비 있는 가격"
                        - text: ": 쿠팡에서 저는 6.6만원에 구매했습니다."
                        - text: (6만원대~ 9만원대에 파는 제품으로, 쿠팡은 가격 변동되는거 아시죠?)
                        - text: 가격은 개개인 차이에 따라 체감적으로 싸다,
                        - text: 비싸다의 폭이 클수 있기 때문에
                        - text: 본인의 생활 패턴 및 환경에 따라 판단하시면 좋을 듯 합니다.
                        - text: (예를 들면 QCY 제품군들을 적당한 가격으로 보시는 분들에게는,
                        - text: 본 제품이 비쌀 수 있으나,
                        - text: 전체적인 품질 및 통화품질 등을 보면 가성비 있는 가격입니다)
                        - text: "-디자인"
                        - text: ": 무광의 매트한 느낌으로서 깔끔합니다."
                        - text: 케이스의 크기는 크지않은 적당한 크기로서,
                        - text: 바지 주머니에 소지하고 다닐 정도는 될 듯 합니다,
                        - text: 에어팟 케이스 보다는 좀 더 큰 듯 합니다.
                        - text: "-탈착/거치"
                        - text: ": 케이스를 열었을 때, 개방감이 있어 탈착하기 쉽고 편합니다."
                        - text: "-음질"
                        - text: ": 저음과 고음을 강조해주는 V자형 사운드로서,"
                        - text: 보통 힙합이나 락 등 강렬한 음악에 어울리기는 하나,
                        - text: 사운드 코어 앱에서 EQ 등 설정이 가능하기에
                        - text: 어떤 장르도 무방합니다.
                        - text: ANC의 경우 저는 보통 기능 자체를 잘 안쓰기는 하는데,
                        - text: 이유는 너무 차폐가 되는 느낌이 오히려 저는
                        - text: 좋지 않더라구요. 그만큼 ANC가 좋다는 것이겠죠.
                        - text: 이 제품도 ANC 기능이 너무 짱짱하게 되서,
                        - text: 오히려 저는 잘 쓰지는 않았습니다.
                        - text: 요약하자면, 제품 자체의 기능은 가격대비 고퀄을
                        - text: 자랑하며, 음질 자체 역시 별다른 안 좋거나 ,
                        - text: 불편하거나 이상하다는 부분은 못 느꼈습니다
                        - text: (어차피 매우 고퀄의 음질을 따지는 분들은
                        - text: 정말 고가의 장비를 구매하는..)
                        - text: "-통화품질 (제 주요 구매 동기)"
                        - text: ": 일단 적당한 가성비 가격의 블루투스 이어폰에서,"
                        - text: 업무할때 문제 없이 통화가 가능한 것에 초점을 맞추자면
                        - text: 통과입니다.
                        - text: 충분히 만족할 만한 가치가 있습니다
                        - text: (조금 아쉬운 부분은 단점에 기술하겠습니다)
                        - text: "-형태"
                        - text: :커널형으로서 귀에 밀착되고,
                        - text: 음성이나 음악 등이 밖으로 세지 않습니다.
                        - text: 오픈형은 조금 덜 할 수 있으나,
                        - text: 골전도형, 공기전도형 등등은
                        - text: 옆사람이 내가 듣는 음악을 어렴풋이
                        - text: 같이 들을 수 있다는 문제가 있습니다.
                        - text: (장단점이 있음, 대신 귀를 막지 않기 때문에
                        - text: 기타 통풍, 염증등에서의 장점도 있음)
                        - text: "-사용 편의"
                        - text: ": 이어폰 케이스를 열면 빠르게 페어링 됩니다."
                        - text: "-> 케이스에서 빼야지 연결되는 제품도 많음"
                        - text: ": 멀티 포인트"
                        - text: "-> 2개의 장비에 동시에 연결할 수 있습니다"
                        - text: ": 한쪽만 개별사용 및 개별 통화 가능"
                        - text: "-> 업무할때 사용하는 거라,"
                        - text: 한쪽씩 번갈아 가면서 사용함이 저는 좋았습니다.
                        - text: "*단점 (가격대비 충분히 만족하고 사용할 수 있으나, 몇가지 기술해 보자면)"
                        - text: "-충전 케이스가 조금더 작거나 얇앗으면 하는 아쉬움은 있습니다"
                        - text: (그러나 충분히 사용가능함)
                        - text: "-더 좋은 (더 고가의 블루투스 ) 이어폰과 비교를 해 보자면,"
                        - text: 통화품질이 조금 아쉬운 부분도 있습니다.
                        - text: 예를들면 아주 조금 울리는듯한 느낌
                        - text: (고가의 이어폰과 비교 통화 해보면 느끼게 되나, 문제될 정도는 아님)
                        - text: (통화 기능 자체를 판단하다면 충분함)
                        - text: 야외에서 바람이 많이 불때는 바람소리가 상대방한테 충분히 전달 될 수 있습니다.
                        - text: 3. 총평
                        - text: 블루투스 이어폰은 사람마다 가치를 판단하는 기준이 다르기는 하나,
                        - text: 저한테는 소지 편의성, 멀티포인트, 통화 품질, 적당한 음질
                        - text: 이정도면 판단기준이 된다고 봅니다.
                        - text: 케이스를 열면 바로 연결되는 편의성과,
                        - text: 2개의 장비에 동시 연결되는 멀티포인트,
                        - text: 막귀라서 음질을 크게 평가할 순 없었지만 충분하다 느낌,
                        - text: 우수한 통화품질 정도를 보면 충분히 별점 5개 기준이 될 것으로 판단합니다
                        - text: "*제 후기가 도움이 되셨다면, [도움이 돼요] 버튼을 꾹! 부탁 드립니다"
                        - text: 실 사용 후기를 정성껏 작성하는데 큰 힘과 도움이 된답니다 !!!
                        - text: 부탁 드릴게요 !!
