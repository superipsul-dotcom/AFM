                      - generic [ref=e3956]: 가격대비 품질 괜찮아요!!
                      - generic [ref=e3958]:
                        - text: ❤앤커 사운드코어 리버티 4 NC 블루투스 이어폰, A3947, 블랙 , REVIEW START!❤
                        - text: ✅장점
                        - text: 1. 노이즈 캔슬링 기능이 있어 주변의 소음을 효과적으로 차단할 수 있습니다.
                        - text: 2. 무선충전 및 고속충전이 가능하며, 인체공학적 설계로 장시간 착용하여도 귀가 불편하지 않습니다.
                        - text: 3. 이어폰 디자인이 심플하고 세련되었으며, 풍부하고 깊이 있는 고품질의 음질로 귀 호강이 가능합니다.
                        - text: 4. 다양한 사이즈의 이어팁이 제공되어 나의 귀에 맞는 최적의 핏을 찾을 수 있습니다.
                        - text: 5. 두 개의 기기에 동시에 연결할 수 있습니다.
                        - text: 6. 이어폰에 터치 센서가 있어 음악 재생 및 정지, 전화 받기 등의 모션을 손쉽게 조작할 수 있습니다.
                        - text: 7. 방수등급은 IPX4 등급으로, 운동 중 땀이나 비에 노출되어도 안전하게 사용할 수 있습니다.
                        - text: ✅단점
                        - text: 1. 버즈나 에어팟에 비해 관련 악세사리가 적습니다.
                        - text: 2. 관련 앱을 깔아 사용하기에 어르신들은 사용하기 힘들 수 있습니다.
                        - text: ✅총평
                        - text: ▶안녕하세요. 35개월 공주님을 육아중인 열혈맘입니다 ^-^!
                        - text: 운동을 할 때 선 없는 이어폰이 필요해서 주문하게 되었어요.
                        - text: 타사 유명 제품보다 가격이 착하고, 이어팁이 크기별로 동봉되어 있어서 내 귀에 맞게 착용할 수 있던점이 좋았어요.
                        - text: 어플을 깔아서 페어링 후, 착용해보니 편안한 착용감과 노이즈 캔슬링이 더욱 만족스러웠습니다.
                        - text: 운동할 때 잘 사용할 수 있을 것 같아요.
                        - text: 만족도 100% 입니다!! *(੭*ˊᵕˋ)੭*ଘ
