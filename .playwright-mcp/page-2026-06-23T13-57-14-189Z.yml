                        - text: 여러 부분으로 나눠 리뷰해보면,
                        - text: 음질
                        - text: 베이스가 단단하고 이퀄라이저 컨트롤이 잘 되어있기 때문에 취향에 맞게 조절이 가능하고, 하드웨어적으로도 과한 EQ에도 잘 버텨줍니다.
                        - text: 버즈2프로나 앤커 제품과 비교하실 분들이 많을텐데 음질의 퀄리티는 버즈2프로가 낫다고 생각되지만, 이퀄라이저로 비슷하게 만들 수 있다는 점, 단단한 저음을 좋아한다면 더 나을 수 있습니다. 앤커 리버티 3 프로에 비하면 저음에서 취향이 갈릴 것으로 보이고, a40 보다는 확실히 우위입니다.
                        - text: 노이즈 캔슬링
                        - text: 고음 저음 전체적으로 무난하게 잘 잡아주는 편입니다. 버즈 2프로에 비하면 좀 더 나은 수준이고, 리버티3프로에 비해서도 고음 노이즈캔슬링은 더 잘 잡아주는 편입니다.
                        - text: 연결성
                        - text: 앱에서 배터리 설정을 제한없음으로 하면 여러 앱 오류가 거의 없어지고 연결도 안정적입니다. 이 설정을 하지 않았을 때와 연결성에서 크게 차이가 나니, 안드로이드 유저 분들은 해당 설정을 권장드립니다. 지하철에서의 연결성도 끊김 1번 정도 수준입니다(1호선 퇴근길 기준)
                        - text: 통화
                        - text: 앤커 리버티 3 프로에 비하면 떨어지는 편입니다. 소리 자체는 잘 잡아주지만, 소리의 명료성이 떨어지고 저가형의 소리가 나는 편입니다. 다만 통화에 무리는 없기에 나쁘지 않다고 할 수 있을 것 같습니다.
