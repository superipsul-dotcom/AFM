                        - text: 귀에 고무부분도 여분으로 더주니 참고하시면됩니다
                        - text: 반응속도는 버즈라이브보다는 살짝 떨어진다고 해야하나? 음악들을때는 차이가 없는데
                        - text: 리듬게임을 할때 살딱 반응속도가 0.1~ 0.3초 정도 느림이 있다고 생각합니다(눈을 깜박이는 속도)
                        - text: 연결성은 좋습니다 처음에 케이스를 열면 흰색불이 들어오다가 2초정도지나면 페어링 모드로 진입합니다
                        - text: 그러면 휴대폰에 뜨더라고요 연결은 빠르다고 생각합니다
                        - text: 휴대성 작은 크기기 때문에 주머니에 쏙들어갑니다
                        - text: 충전은 속도가 빠르지 않나 생각하고요 제가 이제품을 하루에 3~4시간정도 쓰는데 그거치고는2~3일쓰면 배터리가 한칸 달더라고요
                        - text: 일단저는 방전될때까지 쓰지는 않았는데 일단 오래간다는것만 참고하시면 될것 같습니다
                        - text: 근대 단점이라면 아까처럼 반응속도가 0.1~0.3초 정도느리다는 정도 라고 생각하면될것 같습니다
                        - text: 혹시라도 이후에 적을 리뷰가 있다면 적어놓겠습니다
