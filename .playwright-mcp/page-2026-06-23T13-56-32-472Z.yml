                        - text: 예전에 쓰던 이어폰은 가끔 뚝뚝 끊겼는데 이건 그런거 완전 없어요 안정적이에요
                        - text: 배터리도 오래가요 한번 충전하면 러닝 몇번은 거뜬히 해요
                        - text: 저는 하루 한시간씩 뛰는데 일주일에 한번 충전하면 되더라구요 케이스까지 합치면 훨씬 더 오래쓸수있고요
                        - text: 충전 자주 안해도 돼서 편해요
