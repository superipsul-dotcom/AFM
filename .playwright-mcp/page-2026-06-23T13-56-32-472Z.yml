                        - text: 귀걸이형이라 흔들려도 안빠져요 진짜 이거 개꿀이에요 뛰다보면 일반 이어폰은 땀 때문에 미끄러지거나 튀어나오는 경우
                        - text: 많은데 이건 귀에 딱 걸려있어서 절대 안빠져요
