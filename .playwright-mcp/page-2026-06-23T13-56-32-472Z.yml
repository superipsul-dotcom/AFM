                        - text: 이게 처음엔 단점인줄 알았는데 러닝할때는 오히려 장점이더라구요
                        - text: 차 소리나 자전거 오는거 들려서 안전해요 공원에서 뛸때도 뒤에서 사람 오는거 알수있고요
