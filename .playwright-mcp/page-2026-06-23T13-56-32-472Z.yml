                        - text: 친구가 러닝할땐 오픈형이 최고라고 추천해줘서 반신반의하면서 샀는데 진짜 잘 산거같아요
                        - text: 일단 오픈형이라는게 귀를 막지않아서 완전 편해요 일반 이어폰은 귀에 쏙 넣는거라 오래 끼고있으면 귀 아프고 답답하잖아요 근데 이건 귀에 걸치는 형태라 그런거 전혀 없어요 한시간 넘게 뛰어도 귀 안아파요 진짜루
